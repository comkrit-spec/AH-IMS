<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ASIA HYDRO - Procurement & Inventory System</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <style>
    body { background-color: #f8fafc; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    @media print {
      body { background-color: white !important; }
      .print-hidden { display: none !important; }
      @page { margin: 0.5cm; }
    }
  </style>
</head>
<body class="text-gray-800 h-screen overflow-hidden">
  
  <div id="root" class="h-full w-full"></div>

  <script>
    // 🔴 1. วาง URL ของ GOOGLE APPS SCRIPT ของคุณตรงนี้ 🔴
    window.YOUR_GAS_URL = "https://script.google.com/macros/s/AKfycbxHz32WreJDbL_ZM90nxL9u08Z0wEfqdfqUXSXS72N6kcmvcWu28-AQqrgT_-iUwblJsA/exec"; 

    // --- STATE MANAGEMENT ---
    window.DB = null;
    window.USER = null;
    window.isSetup = false;
    window.isSyncing = false;

    window.state = {
      tab: 'dashboard',
      sidebar: false,
      toast: null,
      dialog: null, // {type: 'info'|'confirm'|'error', title, msg, onConfirm}
      
      pr: { view: 'list', search: '', cart: [], isCustom: false, reqDate:'', jobNo:'', suggestVendor:'', remark:'', productId:'', customName:'', qty:'', unit:'ชิ้น' },
      po: { view: 'list', search: '', prId: '', vendorId: '' },
      gr: { poId: '', scan: '', cart: [], remark: '' },
      iss: { ref: '', scan: '', manual: '', remark: '', cart: [] },
      stk: { view: 'card', search: '', cat: '', loc: '', low: false, selected: [], print: [] },
      his: { search: '' },
      rep: { type: 'inventory' },
      set: { tab: 'users' },
      modal: { type: null, data: null } // สำหรับ Form เพิ่มสินค้า/ผู้ใช้
    };

    // --- ข้อมูลตั้งต้น ---
    const getInitData = () => ({
      users: [
        { id: 'U001', username: 'admin', password: '123', name: 'Admin (ดูแลระบบ)', role: 'Admin', department: 'IT' },
        { id: 'U002', username: 'req1', password: '123', name: 'สมชาย (ผู้ขอซื้อ)', role: 'Requester', department: 'Production' },
        { id: 'U003', username: 'pur1', password: '123', name: 'สมศรี (จัดซื้อ)', role: 'Purchaser', department: 'Procurement' },
        { id: 'U004', username: 'store1', password: '123', name: 'สมหมาย (คลังสินค้า)', role: 'Store', department: 'Warehouse' }
      ],
      products: [], vendors: [], prs: [], pos: [], transactions: []
    });

    const getPerms = () => {
      const r = window.USER?.role || '';
      return {
        pr: ['Admin', 'Requester', 'Purchaser'].includes(r),
        appr: ['Admin', 'Purchaser'].includes(r),
        po: ['Admin', 'Purchaser'].includes(r),
        inv: ['Admin', 'Store'].includes(r),
        rep: ['Admin', 'Purchaser', 'Store'].includes(r),
        set: ['Admin'].includes(r)
      };
    };

    const fDate = iso => {
      if(!iso) return '-';
      const d = new Date(iso);
      return `${d.toLocaleDateString('th-TH')} ${d.toLocaleTimeString('th-TH', {hour:'2-digit', minute:'2-digit'})}`;
    };

    // --- CORE ENGINE (Virtual DOM สไตล์ Vanilla JS) ---
    window.updateUI = () => {
      const activeEl = document.activeElement;
      const activeId = activeEl ? activeEl.id : null;
      let cursor = null;
      if (activeEl && (activeEl.tagName === 'INPUT' || activeEl.tagName === 'TEXTAREA')) {
        try { cursor = activeEl.selectionStart; } catch(e){}
      }

      document.getElementById('root').innerHTML = renderApp();

      if (activeId) {
        const el = document.getElementById(activeId);
        if (el) {
          el.focus();
          if (cursor !== null && (el.tagName === 'INPUT' || el.tagName === 'TEXTAREA')) {
            try { el.setSelectionRange(cursor, cursor); } catch(e){}
          }
        }
      }
    };

    // --- API & DB SYNC ---
    window.initFetch = async () => {
      let url = window.YOUR_GAS_URL || localStorage.getItem('procure_gas_url');
      if(!url) { window.isSetup = false; updateUI(); return; }
      
      window.isSetup = true;
      window.isSyncing = true; updateUI();
      
      try {
        const res = await fetch(url, { redirect: 'follow' });
        if(res.redirected && res.url.includes("ServiceLogin")) {
           window.showAlert('CORS Error (สิทธิ์องค์กร)', 'ระบบถูก Google บล็อกการเข้าถึง\nวิธีแก้: ไปที่ Apps Script -> กด Deploy ใหม่ -> เลือก Who has access เป็น "Anyone" \n\n(หากไม่มีให้เลือก กรุณาใช้บัญชี @gmail.com สร้าง Backend แทนครับ)', 'error');
           window.isSyncing = false; updateUI(); return;
        }
        const text = await res.text();
        const data = JSON.parse(text || "{}");
        
        if(Object.keys(data).length === 0 || !data.users) {
           window.DB = getInitData(); await saveDB(true);
        } else {
           window.DB = data;
        }
      } catch(e) {
        window.showAlert('ข้อผิดพลาด', 'ไม่สามารถเชื่อมต่อฐานข้อมูลได้', 'error');
      }
      window.isSyncing = false; updateUI();
    };

    window.saveDB = async (skipUI = false) => {
      window.isSyncing = true; if(!skipUI) updateUI();
      try {
        let url = window.YOUR_GAS_URL || localStorage.getItem('procure_gas_url');
        await fetch(url, { method: 'POST', redirect: 'follow', body: JSON.stringify(window.DB) });
      } catch(e) {
        window.showAlert('แจ้งเตือน', 'บันทึกข้อมูลในเครื่องแล้ว แต่ซิงค์ขึ้น Cloud ล้มเหลว', 'error');
      }
      window.isSyncing = false; if(!skipUI) updateUI();
    };

    window.onload = () => { initFetch(); };

    // --- GLOBAL ACTIONS ---
    window.doLogin = (e) => {
      e.preventDefault();
      const u = document.getElementById('login-u').value.trim();
      const p = document.getElementById('login-p').value.trim();
      const user = window.DB.users.find(x => String(x.username).trim() === u && String(x.password).trim() === p);
      if(user) {
        window.USER = user;
        window.state.tab = user.role === 'Requester' ? 'pr' : 'dashboard';
        window.showToast(`ยินดีต้อนรับคุณ ${user.name}`);
      } else {
        window.showAlert('เข้าสู่ระบบล้มเหลว', 'ชื่อผู้ใช้งานหรือรหัสผ่านไม่ถูกต้อง', 'error');
      }
    };
    window.doLogout = () => { window.showConfirm('ออกจากระบบ', 'ยืนยัน?', () => { window.USER = null; updateUI(); }); };
    window.changeTab = (t) => { window.state.tab = t; window.state.sidebar = false; updateUI(); };
    window.saveUrl = (u) => { 
      if(!u.includes('script.google.com')) return alert('URL ไม่ถูกต้อง');
      localStorage.setItem('procure_gas_url', u); window.YOUR_GAS_URL = u; initFetch(); 
    };

    // --- UI HELPERS ---
    window.showToast = (msg, type='success') => {
      window.state.toast = { msg, type }; updateUI();
      setTimeout(() => { window.state.toast = null; updateUI(); }, 3000);
    };
    window.showAlert = (title, msg, type='error') => { window.state.dialog = { type, title, msg }; updateUI(); };
    window.showConfirm = (title, msg, onConfirm) => { window.pendingConfirm = onConfirm; window.state.dialog = { type: 'confirm', title, msg }; updateUI(); };
    window.closeDialog = () => { window.state.dialog = null; updateUI(); };
    window.execConfirm = () => { if(window.pendingConfirm) window.pendingConfirm(); window.closeDialog(); };

    // =========================================================================
    // HTML RENDERING FUNCTIONS
    // =========================================================================
    function renderApp() {
      if (!window.isSetup) return htmlSetup();
      if (!window.DB) return htmlLoading();
      if (!window.USER) return htmlLogin();

      const perms = getPerms();
      return `
        <div class="flex h-screen w-full bg-slate-50 overflow-hidden print-hidden">
          ${htmlSyncStatus()}
          ${htmlSidebar(perms)}
          <div class="flex-1 flex flex-col h-full relative">
            ${htmlHeader()}
            <main class="flex-1 overflow-y-auto p-4 md:p-8 relative">
              <div class="max-w-7xl mx-auto pb-20">
                ${htmlActiveTab(perms)}
              </div>
            </main>
          </div>
          ${htmlModals()}
          ${htmlToast()}
        </div>
        ${state.stk.print.length > 0 ? htmlPrintView() : ''}
      `;
    }

    // --- BASIC VIEWS ---
    function htmlSetup() {
      return `
        <div class="min-h-screen bg-slate-100 flex items-center justify-center p-4">
          <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-lg text-center animate-in zoom-in-95">
            <div class="bg-emerald-100 w-16 h-16 rounded-2xl flex items-center justify-center mx-auto mb-4"><i class="fas fa-cloud text-3xl text-emerald-600"></i></div>
            <h1 class="text-2xl font-bold mb-2">เชื่อมต่อฐานข้อมูล Cloud</h1>
            <p class="text-gray-500 text-sm mb-6 text-red-500 font-bold">* โปรดนำ URL จาก Apps Script (ที่ใช้ Gmail ส่วนตัวสร้าง) มาวาง *</p>
            <input type="text" id="setup-url" class="w-full p-4 border rounded-xl outline-none font-mono text-sm bg-gray-50 mb-4 focus:ring-2 focus:ring-emerald-500" placeholder="https://script.google.com/macros/s/...">
            <button onclick="window.saveUrl(document.getElementById('setup-url').value)" class="w-full bg-emerald-600 text-white py-3.5 rounded-xl font-bold shadow-md hover:bg-emerald-700 active:scale-95 transition-transform">เชื่อมต่อฐานข้อมูล</button>
          </div>
        </div>
      `;
    }
    function htmlLoading() {
      return `<div class="h-screen flex flex-col items-center justify-center bg-slate-50"><i class="fas fa-circle-notch fa-spin text-blue-600 text-5xl mb-4"></i><h2 class="text-xl font-bold">กำลังเชื่อมต่อ...</h2></div>`;
    }
    function htmlLogin() {
      return `
        <div class="min-h-screen bg-slate-100 flex items-center justify-center p-4">
          <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md animate-in slide-in-from-bottom-4">
            <div class="text-center mb-8"><div class="bg-blue-600 w-16 h-16 rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-lg"><i class="fas fa-box text-white text-3xl"></i></div><h1 class="text-2xl font-black tracking-tight">ASIA HYDRO</h1><p class="text-gray-500 text-sm mt-2">ระบบจัดการจัดซื้อและคลังสินค้า</p></div>
            <form onsubmit="window.doLogin(event)" class="space-y-5">
              <div><label class="block text-sm font-bold mb-1">Username</label><div class="relative"><i class="fas fa-user absolute left-4 top-4 text-gray-400"></i><input type="text" id="login-u" class="w-full pl-10 pr-4 py-3 border rounded-xl outline-none focus:ring-2 focus:ring-blue-500 bg-gray-50" required></div></div>
              <div><label class="block text-sm font-bold mb-1">Password</label><div class="relative"><i class="fas fa-lock absolute left-4 top-4 text-gray-400"></i><input type="password" id="login-p" class="w-full pl-10 pr-4 py-3 border rounded-xl outline-none focus:ring-2 focus:ring-blue-500 bg-gray-50" required></div></div>
              <button type="submit" class="w-full bg-blue-600 text-white py-3.5 rounded-xl font-bold shadow-md hover:bg-blue-700 active:scale-95 transition-transform">เข้าสู่ระบบ</button>
            </form>
          </div>
        </div>
      `;
    }

    // --- LAYOUT COMPONENTS ---
    function htmlSyncStatus() {
      return `
        <div class="fixed top-4 right-4 z-[150] bg-white/90 backdrop-blur rounded-full px-4 py-2 shadow-sm border border-gray-200 flex items-center">
          ${window.isSyncing ? '<i class="fas fa-circle-notch fa-spin text-blue-500 mr-2"></i><span class="text-xs font-bold text-gray-600">กำลังบันทึก</span>' : '<i class="fas fa-cloud text-emerald-500 mr-2"></i><span class="text-xs font-bold text-gray-600">ออนไลน์</span>'}
        </div>
      `;
    }
    function htmlHeader() {
      return `
        <header class="bg-white border-b h-16 flex items-center justify-between px-6 shrink-0 z-10">
          <div class="flex items-center"><button onclick="window.state.sidebar=true; updateUI()" class="md:hidden mr-4 bg-gray-50 p-2 rounded-lg"><i class="fas fa-bars"></i></button><h2 class="font-black uppercase text-gray-800 tracking-widest text-lg">${state.tab}</h2></div>
          <button onclick="window.print()" class="text-sm font-bold bg-white border px-4 py-2 rounded-xl shadow-sm hover:bg-gray-50"><i class="fas fa-print mr-2"></i>พิมพ์</button>
        </header>
      `;
    }
    function htmlSidebar(p) {
      const btn = (id, icon, txt, act=false, badge='') => `<button onclick="window.changeTab('${id}')" class="w-full flex items-center space-x-3 px-4 py-3.5 rounded-xl text-sm font-bold transition-all ${state.tab===id?'bg-blue-600 text-white shadow-md':'text-slate-300 hover:bg-slate-800'}"><i class="fas ${icon} w-5 text-center"></i><span>${txt}</span>${badge}</button>`;
      const head = txt => `<div class="text-[11px] font-black text-slate-500 uppercase tracking-widest mt-6 mb-2 ml-2">${txt}</div>`;
      
      const poWait = window.DB.pos.filter(x=>x.status==='Pending Receipt').length;
      const bPo = poWait > 0 ? `<span class="bg-red-500 text-white text-[10px] px-2 py-0.5 rounded-full ml-auto shadow-sm">${poWait}</span>` : '';

      return `
        ${state.sidebar ? '<div class="fixed inset-0 bg-slate-900/60 z-40 md:hidden" onclick="window.state.sidebar=false; updateUI()"></div>' : ''}
        <nav class="fixed inset-y-0 left-0 z-50 w-72 bg-slate-900 text-white flex flex-col h-full shadow-2xl transition-transform transform md:relative md:translate-x-0 ${state.sidebar ? 'translate-x-0' : '-translate-x-full'}">
          <div class="p-6 flex justify-between items-center border-b border-slate-800"><div class="flex items-center space-x-3"><div class="bg-blue-600 p-2.5 rounded-xl"><i class="fas fa-box text-xl"></i></div><h1 class="text-2xl font-black">ASIA HYDRO</h1></div><button onclick="window.state.sidebar=false; updateUI()" class="md:hidden text-gray-400"><i class="fas fa-times text-xl"></i></button></div>
          <div class="flex-1 py-6 px-4 space-y-1.5 overflow-y-auto custom-scrollbar">
            ${window.USER.role!=='Requester' ? btn('dashboard','fa-home','แดชบอร์ด') : ''}
            ${p.pr ? head('จัดซื้อ') + btn('pr','fa-file-invoice','ใบขอซื้อ (PR)') + (p.po ? btn('po','fa-shopping-cart','ใบสั่งซื้อ (PO)') : '') : ''}
            ${p.inv ? head('คลังสินค้า') + btn('gr','fa-box-open','รับเข้าคลัง',false,bPo) + btn('issue','fa-dolly','เบิกจ่ายของ') + btn('stock','fa-cubes','สต๊อกคงเหลือ') + btn('history','fa-history','ประวัติการเคลื่อนไหว') : ''}
            ${p.rep ? head('รายงาน') + btn('reports','fa-chart-pie','ระบบรายงาน') : ''}
            ${p.set ? head('ตั้งค่าระบบ') + btn('settings','fa-cog','จัดการระบบ') : ''}
          </div>
          <div class="p-5 border-t border-slate-800 mt-auto bg-slate-900/50 flex justify-between items-center"><div class="flex items-center space-x-3"><div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center font-bold text-lg shadow-inner">${window.USER.name.charAt(0)}</div><div><p class="font-bold text-sm">${window.USER.name}</p><p class="text-[10px] text-blue-400 font-bold uppercase">${window.USER.role}</p></div></div><button onclick="window.doLogout()" class="text-slate-400 hover:text-red-400 p-2 rounded-xl hover:bg-slate-800"><i class="fas fa-sign-out-alt text-xl"></i></button></div>
        </nav>
      `;
    }

    // --- TAB RENDERING ---
    function htmlActiveTab(p) {
      const t = state.tab;
      if(t==='dashboard') return viewDashboard(p);
      if(t==='pr') return viewPR(p);
      if(t==='po') return viewPO(p);
      if(t==='gr') return viewGR();
      if(t==='issue') return viewIssue();
      if(t==='stock') return viewStock(p);
      if(t==='history') return viewHistory();
      if(t==='reports') return viewReports();
      if(t==='settings') return viewSettings();
      return '';
    }

    // --- VIEWS ---
    function viewDashboard(p) {
      const prods = window.DB.products;
      const hStk = prods.filter(x=>x.stock>x.minStock).length;
      const lStk = prods.filter(x=>x.stock>0 && x.stock<=x.minStock).length;
      const oStk = prods.filter(x=>x.stock===0).length;
      const hPct = Math.round((hStk/prods.length)*100)||0; const lPct = Math.round((lStk/prods.length)*100)||0; const oPct = Math.round((oStk/prods.length)*100)||0;

      let acts = '';
      if(p.pr) acts+=`<button onclick="window.state.tab='pr'; window.state.pr.view='create'; window.updateUI()" class="bg-white/20 hover:bg-white/30 px-4 py-2.5 rounded-lg font-bold"><i class="fas fa-plus mr-2"></i>สร้าง PR</button>`;
      if(p.inv) acts+=`<button onclick="window.changeTab('gr')" class="bg-emerald-500/80 hover:bg-emerald-500 px-4 py-2.5 rounded-lg font-bold shadow"><i class="fas fa-box-open mr-2"></i>รับเข้า</button><button onclick="window.changeTab('issue')" class="bg-amber-500/80 hover:bg-amber-500 px-4 py-2.5 rounded-lg font-bold shadow"><i class="fas fa-dolly mr-2"></i>เบิกออก</button>`;
      
      let cards = `<div class="bg-white p-5 rounded-2xl shadow-sm border cursor-pointer hover:shadow-md transition-shadow flex items-center space-x-4" onclick="window.changeTab('pr')"><div class="p-3.5 bg-blue-50 text-blue-600 rounded-xl"><i class="fas fa-file-invoice text-2xl"></i></div><div><p class="text-sm text-gray-500 font-bold">PR รอดำเนินการ</p><p class="text-2xl font-black">${window.DB.prs.filter(x=>x.status==='Pending').length}</p></div></div>`;
      if(p.po) cards += `<div class="bg-white p-5 rounded-2xl shadow-sm border cursor-pointer hover:shadow-md transition-shadow flex items-center space-x-4" onclick="window.changeTab('po')"><div class="p-3.5 bg-indigo-50 text-indigo-600 rounded-xl"><i class="fas fa-shopping-cart text-2xl"></i></div><div><p class="text-sm text-gray-500 font-bold">PO รอรับสินค้า</p><p class="text-2xl font-black">${window.DB.pos.filter(x=>x.status==='Pending Receipt').length}</p></div></div>`;
      if(p.inv) {
        cards += `<div class="bg-white p-5 rounded-2xl shadow-sm border cursor-pointer hover:shadow-md transition-shadow flex items-center space-x-4" onclick="window.changeTab('stock')"><div class="p-3.5 bg-emerald-50 text-emerald-600 rounded-xl"><i class="fas fa-cubes text-2xl"></i></div><div><p class="text-sm text-gray-500 font-bold">สินค้าในคลัง</p><p class="text-2xl font-black">${prods.length}</p></div></div>`;
        cards += `<div class="bg-white p-5 rounded-2xl shadow-sm border cursor-pointer hover:shadow-md transition-shadow flex items-center space-x-4" onclick="window.changeTab('stock')"><div class="p-3.5 bg-amber-50 text-amber-600 rounded-xl"><i class="fas fa-exclamation-triangle text-2xl"></i></div><div><p class="text-sm text-gray-500 font-bold">ใกล้หมด/หมด</p><p class="text-2xl font-black text-red-500">${lStk+oStk}</p></div></div>`;
      }

      return `
        <div class="space-y-6">
          <div class="bg-gradient-to-r from-blue-600 to-indigo-700 rounded-2xl p-6 md:p-8 text-white shadow-lg relative overflow-hidden">
            <div class="relative z-10"><h2 class="text-2xl md:text-3xl font-bold mb-2">ยินดีต้อนรับ, ${window.USER.name}</h2><p class="text-blue-100 mb-6">ระบบคลังสินค้าอัจฉริยะ พร้อมทำงาน</p><div class="flex gap-3 flex-wrap">${acts}</div></div>
            <i class="fas fa-layer-group text-[200px] absolute right-0 bottom-0 opacity-10 transform translate-x-10 translate-y-10 hidden md:block"></i>
          </div>
          <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">${cards}</div>
          ${p.inv ? `
            <div class="bg-white rounded-2xl shadow-sm border p-6"><h3 class="font-bold text-gray-800 mb-6">สถานะคลังสินค้า (Stock Health)</h3>
              <div class="w-full h-8 flex rounded-full overflow-hidden mb-4 bg-gray-100 shadow-inner">
                <div style="width: ${hPct}%" class="bg-emerald-500 flex items-center justify-center text-xs font-bold text-white shadow-inner">${hPct>5?hPct+'%':''}</div>
                <div style="width: ${lPct}%" class="bg-amber-400 flex items-center justify-center text-xs font-bold text-white shadow-inner">${lPct>5?lPct+'%':''}</div>
                <div style="width: ${oPct}%" class="bg-red-500 flex items-center justify-center text-xs font-bold text-white shadow-inner">${oPct>5?oPct+'%':''}</div>
              </div>
              <div class="flex gap-4"><div class="flex items-center"><span class="w-3 h-3 rounded-full bg-emerald-500 mr-2"></span><span class="text-sm font-bold">ปกติ (${hStk})</span></div><div class="flex items-center"><span class="w-3 h-3 rounded-full bg-amber-400 mr-2"></span><span class="text-sm font-bold">ใกล้หมด (${lStk})</span></div><div class="flex items-center"><span class="w-3 h-3 rounded-full bg-red-500 mr-2"></span><span class="text-sm font-bold">หมด (${oStk})</span></div></div>
            </div>
          `:''}
        </div>
      `;
    }

    // --- PR VIEW ---
    window.addPrCart = () => {
      const s = window.state.pr;
      if((!s.isCustom && !s.productId) || (s.isCustom && !s.customName) || !s.qty) return window.showAlert('ผิดพลาด','ระบุสินค้าและจำนวนให้ครบ','error');
      const p = window.DB.products.find(x=>x.id===s.productId);
      s.cart.push({ isCustom: s.isCustom, productId: s.productId, customName: s.customName, qty: Number(s.qty), unit: s.isCustom?s.unit:(p?.unit||'ชิ้น'), reqDate: s.reqDate, jobNo: s.jobNo, suggestVendor: s.suggestVendor, remark: s.remark });
      s.productId=''; s.customName=''; s.qty=''; s.remark=''; updateUI();
    };
    window.delPrCart = (i) => { window.state.pr.cart.splice(i,1); updateUI(); };
    window.savePr = () => {
      if(state.pr.cart.length===0) return window.showAlert('ผิดพลาด','ตะกร้าว่าง','error');
      window.showConfirm('บันทึก PR','ยืนยันการสร้างใบขอซื้อ?', () => {
        window.DB.prs.unshift({ id: `PR-${Date.now().toString().slice(-6)}`, date: new Date().toISOString().split('T')[0], requester: window.USER.name, status: 'Pending', items: state.pr.cart });
        state.pr.cart=[]; state.pr.view='list'; window.saveDB(); window.showToast('สร้าง PR สำเร็จ');
      });
    };
    window.actPr = (id, act) => {
      if(act==='del') window.showConfirm('ลบ PR','ยืนยันการลบ?', () => { window.DB.prs=window.DB.prs.filter(p=>p.id!==id); window.saveDB(); window.showToast('ลบสำเร็จ'); });
      if(act==='app') window.showConfirm('อนุมัติ','ยืนยันอนุมัติ?', () => { window.DB.prs.find(p=>p.id===id).status='Approved'; window.saveDB(); window.showToast('อนุมัติสำเร็จ'); });
      if(act==='rej') window.showConfirm('ไม่อนุมัติ','ยืนยันปฏิเสธ?', () => { window.DB.prs.find(p=>p.id===id).status='Rejected'; window.saveDB(); window.showToast('ปฏิเสธสำเร็จ','error'); });
    };

    function viewPR(p) {
      const s = state.pr;
      if(s.view === 'create') {
        const pOpts = window.DB.products.map(x=>`<option value="${x.id}">[${x.id}] ${x.name}</option>`).join('');
        return `
          <div class="bg-white rounded-2xl shadow-sm border p-6 md:p-8 animate-in fade-in">
            <div class="flex justify-between items-center mb-6 border-b pb-4"><h2 class="text-2xl font-black">สร้างใบขอซื้อ (PR)</h2><button onclick="window.state.pr.view='list'; window.updateUI()" class="bg-gray-100 px-4 py-2 rounded-lg font-bold text-gray-600">กลับ</button></div>
            <div class="space-y-6">
              <div><label class="block font-bold mb-2">ผู้ขอซื้อ</label><input type="text" value="${window.USER.name}" class="w-full border rounded-xl p-3 bg-gray-50 font-bold text-gray-500" disabled></div>
              <div class="border border-blue-100 rounded-xl p-6 bg-blue-50/30">
                <div class="flex justify-between items-center mb-4 border-b border-blue-100 pb-3"><h3 class="font-bold text-blue-800 text-lg">เพิ่มสินค้า</h3><label class="font-bold text-sm text-blue-700 cursor-pointer"><input type="checkbox" ${s.isCustom?'checked':''} onchange="window.state.pr.isCustom=this.checked; window.updateUI()" class="mr-2 w-4 h-4"> พิมพ์ชื่อเอง</label></div>
                <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-4">
                  <div class="md:col-span-3">
                    ${!s.isCustom ? `<select id="pr-p-id" class="w-full border rounded-xl p-3 outline-none focus:ring-2 focus:ring-blue-500" onchange="window.state.pr.productId=this.value"><option value="">-- เลือกจากระบบ --</option>${pOpts}</select>` : `<input type="text" id="pr-p-name" placeholder="ชื่อสินค้า..." value="${s.customName}" oninput="window.state.pr.customName=this.value" class="w-full border rounded-xl p-3 outline-none">`}
                  </div>
                  <div class="flex gap-2"><input type="number" placeholder="จำนวน" value="${s.qty}" oninput="window.state.pr.qty=this.value" class="w-full border rounded-xl p-3 outline-none">${s.isCustom?`<input type="text" placeholder="หน่วย" value="${s.unit}" oninput="window.state.pr.unit=this.value" class="w-24 border rounded-xl p-3 outline-none">`:''}</div>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-4">
                  <input type="date" value="${s.reqDate}" oninput="window.state.pr.reqDate=this.value" class="border rounded-xl p-3 outline-none text-gray-600">
                  <input type="text" placeholder="JOB#" value="${s.jobNo}" oninput="window.state.pr.jobNo=this.value" class="border rounded-xl p-3 outline-none">
                  <input type="text" placeholder="Suggest Vendor" value="${s.suggestVendor}" oninput="window.state.pr.suggestVendor=this.value" class="border rounded-xl p-3 outline-none">
                  <input type="text" placeholder="หมายเหตุ" value="${s.remark}" oninput="window.state.pr.remark=this.value" class="border rounded-xl p-3 outline-none">
                </div>
                <div class="text-right mt-4 pt-4 border-t border-blue-100"><button onclick="window.addPRCart()" class="bg-blue-600 text-white px-6 py-2.5 rounded-xl font-bold shadow-md hover:bg-blue-700 active:scale-95"><i class="fas fa-plus mr-2"></i>เพิ่มลงตะกร้า</button></div>
              </div>
              ${s.cart.length > 0 ? `
              <div class="border rounded-xl overflow-hidden shadow-sm"><table class="w-full text-left text-sm"><thead class="bg-gray-50 border-b"><tr><th class="p-4 font-bold">สินค้า</th><th class="p-4 font-bold text-right">จำนวน</th><th class="p-4 font-bold">JOB/หมายเหตุ</th><th class="p-4 font-bold text-center">ลบ</th></tr></thead><tbody class="divide-y">
                ${s.cart.map((it,i) => `<tr><td class="p-4 font-bold">${it.isCustom?it.customName:window.DB.products.find(x=>x.id===it.productId)?.name} ${it.isCustom?'<span class="bg-amber-100 text-amber-700 px-2 py-0.5 rounded text-[10px]">นอกระบบ</span>':''} <div class="text-xs text-blue-600 font-mono mt-1">${it.productId}</div></td><td class="p-4 text-right font-black text-lg">${it.qty} <span class="text-sm font-normal text-gray-500">${it.unit}</span></td><td class="p-4 text-xs text-gray-500">${it.jobNo} ${it.remark}</td><td class="p-4 text-center"><button onclick="window.delPrCart(${i})" class="text-red-500 bg-red-50 p-2 rounded-lg hover:bg-red-500 hover:text-white transition-colors"><i class="fas fa-times"></i></button></td></tr>`).join('')}
              </tbody></table></div>
              <div class="text-right pt-4 border-t"><button onclick="window.savePr()" class="bg-emerald-500 text-white px-8 py-3.5 rounded-xl font-black text-lg shadow-lg hover:bg-emerald-600 active:scale-95"><i class="fas fa-check mr-2"></i>ยืนยันบันทึกใบขอซื้อ</button></div>
              ` : ''}
            </div>
          </div>
        `;
      }

      const q = s.search.toLowerCase();
      const list = window.DB.prs.filter(x => x.id.toLowerCase().includes(q) || x.requester.toLowerCase().includes(q));
      const trs = list.map(pr => {
        let acts = '';
        if(p.appr && pr.status==='Pending') acts = `<button onclick="window.actPr('${pr.id}','app')" class="text-emerald-600 bg-emerald-50 border border-emerald-500 px-3 py-1.5 rounded-lg text-xs font-bold mr-2 hover:bg-emerald-600 hover:text-white">อนุมัติ</button><button onclick="window.actPr('${pr.id}','rej')" class="text-red-500 border border-red-500 px-3 py-1.5 rounded-lg text-xs font-bold hover:bg-red-600 hover:text-white">ปฏิเสธ</button>`;
        if(p.po && pr.status==='Approved') acts = `<button onclick="window.state.po.view='create'; window.state.po.prId='${pr.id}'; window.state.tab='po'; window.updateUI();" class="text-blue-600 bg-blue-50 border border-blue-500 px-4 py-1.5 rounded-lg text-xs font-bold hover:bg-blue-600 hover:text-white">เปิด PO</button>`;
        if(pr.status==='Pending' || pr.status==='Rejected') acts += `<button onclick="window.actPr('${pr.id}','del')" class="text-gray-400 hover:text-red-500 ml-2 p-1.5"><i class="fas fa-trash"></i></button>`;
        const badge = pr.status==='Approved'?'bg-emerald-100 text-emerald-700':pr.status==='Rejected'?'bg-red-100 text-red-700':'bg-amber-100 text-amber-700';
        const txt = pr.status==='Approved'?'อนุมัติแล้ว':pr.status==='Rejected'?'ไม่อนุมัติ':'รอพิจารณา';
        return `<tr class="hover:bg-blue-50/30"><td class="p-4 font-bold text-blue-600">${pr.id}</td><td class="p-4 text-sm">${pr.date}</td><td class="p-4 font-bold">${pr.requester}</td><td class="p-4 text-sm font-medium">${pr.items.length} รายการ</td><td class="p-4 text-center"><span class="px-3 py-1.5 rounded-full text-xs font-bold inline-block w-24 ${badge}">${txt}</span></td><td class="p-4 text-center print-hidden">${acts}</td></tr>`;
      }).join('');

      return `
        <div class="space-y-6">
          <div class="flex flex-col md:flex-row justify-between md:items-center gap-4"><h2 class="text-2xl font-bold">ใบขอซื้อ (PR)</h2><div class="flex gap-2"><div class="relative"><input type="text" id="pr-search" placeholder="ค้นหา PR..." value="${s.search}" oninput="window.state.pr.search=this.value; window.updateUI()" class="pl-10 pr-4 py-2.5 border rounded-xl outline-none focus:ring-2 focus:ring-blue-500 w-full md:w-64 text-sm shadow-sm"><i class="fas fa-search absolute left-4 top-3.5 text-gray-400"></i></div>${p.pr ? `<button onclick="window.state.pr.view='create'; window.updateUI()" class="bg-blue-600 text-white px-5 py-2.5 rounded-xl font-bold shadow-md active:scale-95 whitespace-nowrap"><i class="fas fa-plus mr-1"></i> สร้าง PR</button>` : ''}</div></div>
          <div class="bg-white rounded-2xl shadow-sm border overflow-x-auto"><table class="w-full text-left min-w-[800px]"><thead class="bg-gray-50 border-b text-sm uppercase text-gray-600"><tr><th class="p-4 font-bold">เลขที่ PR</th><th class="p-4 font-bold">วันที่</th><th class="p-4 font-bold">ผู้ขอซื้อ</th><th class="p-4 font-bold">รายการ</th><th class="p-4 font-bold text-center">สถานะ</th><th class="p-4 font-bold text-center print-hidden">จัดการ</th></tr></thead><tbody class="divide-y">${trs||`<tr><td colspan="6" class="p-10 text-center text-gray-500">ไม่พบเอกสาร</td></tr>`}</tbody></table></div>
        </div>
      `;
    }

    // --- PO VIEW ---
    window.savePo = () => {
      const s = state.po;
      if(!s.prId || !s.vendorId) return window.showAlert('ผิดพลาด', 'เลือก PR และ ร้านค้า', 'error');
      window.showConfirm('ออกใบสั่งซื้อ', 'ยืนยันการเปิด PO?', () => {
        const pr = window.DB.prs.find(p=>p.id===s.prId);
        const items = pr.items.map(it => {
          const p = !it.isCustom ? window.DB.products.find(x=>x.id===it.productId) : null;
          return { ...it, expectedQty: it.qty, receivedQty: 0, price: p?p.price:0 };
        });
        window.DB.pos.unshift({ id: `PO-${Date.now().toString().slice(-6)}`, prId: s.prId, vendorId: s.vendorId, date: new Date().toISOString().split('T')[0], status: 'Pending Receipt', items });
        state.po.view = 'list'; state.po.prId = ''; state.po.vendorId = ''; window.saveDB(); window.showToast('สร้าง PO สำเร็จ');
      });
    };
    window.delPo = (id) => { window.showConfirm('ยกเลิก PO', 'ยืนยัน?', () => { window.DB.pos = window.DB.pos.filter(p=>p.id!==id); window.saveDB(); window.showToast('ยกเลิกสำเร็จ'); }); };

    function viewPO(p) {
      const s = state.po;
      if(s.view === 'create') {
        const apr = window.DB.prs.filter(x=>x.status==='Approved' && !window.DB.pos.find(y=>y.prId===x.id));
        const prOpts = apr.map(x=>`<option value="${x.id}" ${s.prId===x.id?'selected':''}>${x.id} (${x.requester})</option>`).join('');
        const vOpts = window.DB.vendors.map(x=>`<option value="${x.id}" ${s.vendorId===x.id?'selected':''}>[${x.id}] ${x.name}</option>`).join('');
        
        let preHtml = '';
        if(s.prId) {
          const pr = window.DB.prs.find(x=>x.id===s.prId);
          preHtml = `<div class="border rounded-xl overflow-hidden shadow-sm mt-6"><div class="bg-gray-50 p-4 border-b font-bold text-sm">พรีวิวสินค้า</div><table class="w-full text-left text-sm"><thead class="bg-white border-b uppercase text-gray-500"><tr><th class="p-4">รหัส</th><th class="p-4">สินค้า</th><th class="p-4 text-right">จำนวน</th><th class="p-4 text-right">ราคา/หน่วย</th></tr></thead><tbody class="divide-y bg-white">` + pr.items.map(it => {
            const p = !it.isCustom ? window.DB.products.find(x=>x.id===it.productId) : null;
            return `<tr><td class="p-4 font-bold">${it.isCustom?'<span class="bg-amber-100 text-amber-700 px-2 py-1 rounded text-xs">นอกระบบ</span>':`<span class="text-blue-600">${p?.id}</span>`}</td><td class="p-4 font-bold">${it.isCustom?it.customName:p?.name}</td><td class="p-4 text-right font-black text-lg">${it.qty} <span class="text-sm font-normal text-gray-500">${it.isCustom?it.unit:p?.unit}</span></td><td class="p-4 text-right text-gray-600">฿${(p?.price||0).toLocaleString()}</td></tr>`;
          }).join('') + `</tbody></table></div>`;
        }

        return `
          <div class="bg-white rounded-2xl shadow-sm border p-6 md:p-8 max-w-4xl animate-in fade-in">
            <div class="flex justify-between items-center mb-6 border-b pb-4"><h2 class="text-2xl font-black">สร้างใบสั่งซื้อ (PO)</h2><button onclick="window.state.po.view='list'; window.updateUI()" class="bg-gray-100 font-bold px-4 py-2 rounded-lg text-gray-600">กลับ</button></div>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 bg-indigo-50/50 p-6 rounded-xl border border-indigo-100">
              <div><label class="block font-bold text-indigo-900 mb-2">อ้างอิง PR *</label><select id="po-pr-sel" onchange="window.state.po.prId=this.value; window.updateUI()" class="w-full border rounded-xl p-3 outline-none focus:ring-2 focus:ring-indigo-500 bg-white"><option value="">-- เลือก PR --</option>${prOpts}</select></div>
              <div><label class="block font-bold text-indigo-900 mb-2">ร้านค้า/ผู้จำหน่าย *</label><select id="po-v-sel" onchange="window.state.po.vendorId=this.value; window.updateUI()" class="w-full border rounded-xl p-3 outline-none focus:ring-2 focus:ring-indigo-500 bg-white"><option value="">-- เลือกร้านค้า --</option>${vOpts}</select></div>
            </div>
            ${preHtml}
            <div class="text-right mt-6 pt-6 border-t"><button onclick="window.savePo()" class="bg-indigo-600 text-white px-8 py-3.5 rounded-xl font-black text-lg shadow-md hover:bg-indigo-700 active:scale-95"><i class="fas fa-check mr-2"></i> ยืนยันออก PO</button></div>
          </div>
        `;
      }

      const q = s.search.toLowerCase();
      const list = window.DB.pos.filter(x => {
        const v = window.DB.vendors.find(y=>y.id===x.vendorId);
        return x.id.toLowerCase().includes(q) || x.prId.toLowerCase().includes(q) || (v&&v.name.toLowerCase().includes(q));
      });

      const trs = list.map(po => {
        const v = window.DB.vendors.find(y=>y.id===po.vendorId);
        const b = po.status==='Completed'?'bg-emerald-100 text-emerald-700':'bg-blue-100 text-blue-700';
        return `<tr class="hover:bg-indigo-50/30"><td class="p-4 font-bold text-indigo-700">${po.id}</td><td class="p-4 text-sm font-medium text-gray-500">${po.prId}</td><td class="p-4 font-bold text-gray-800">${v?.name||''}</td><td class="p-4 text-center text-sm font-medium">${po.date}</td><td class="p-4 text-center"><span class="px-3 py-1.5 rounded-full text-xs font-bold inline-block w-28 ${b}">${po.status==='Completed'?'รับครบแล้ว':'รอรับของ'}</span></td><td class="p-4 text-center print-hidden">${po.status==='Pending Receipt'?`<button onclick="window.delPo('${po.id}')" class="text-red-500 border border-red-200 bg-white hover:bg-red-50 px-3 py-1.5 rounded-lg text-xs font-bold">ยกเลิก PO</button>`:''}</td></tr>`;
      }).join('');

      return `
        <div class="space-y-6">
          <div class="flex flex-col md:flex-row justify-between md:items-center gap-4"><h2 class="text-2xl font-bold">ใบสั่งซื้อ (PO)</h2><div class="flex gap-2"><div class="relative"><input type="text" id="po-search" placeholder="ค้นหา PO..." value="${s.search}" oninput="window.state.po.search=this.value; window.updateUI()" class="pl-10 pr-4 py-2.5 border rounded-xl outline-none focus:ring-2 focus:ring-indigo-500 w-full md:w-64 text-sm shadow-sm"><i class="fas fa-search absolute left-4 top-3.5 text-gray-400"></i></div><button onclick="window.state.po.view='create'; window.updateUI()" class="bg-indigo-600 text-white px-5 py-2.5 rounded-xl font-bold shadow-md active:scale-95 whitespace-nowrap"><i class="fas fa-plus mr-1"></i> สร้าง PO</button></div></div>
          <div class="bg-white rounded-2xl shadow-sm border overflow-x-auto"><table class="w-full text-left min-w-[800px]"><thead class="bg-gray-50 border-b text-sm uppercase text-gray-600"><tr><th class="p-4 font-bold">เลขที่ PO</th><th class="p-4 font-bold">อ้างอิง PR</th><th class="p-4 font-bold">ซัพพลายเออร์</th><th class="p-4 font-bold text-center">วันที่สั่ง</th><th class="p-4 font-bold text-center">สถานะ</th><th class="p-4 font-bold text-center print-hidden">จัดการ</th></tr></thead><tbody class="divide-y">${trs||`<tr><td colspan="6" class="p-10 text-center text-gray-500">ไม่พบเอกสาร</td></tr>`}</tbody></table></div>
        </div>
      `;
    }

    // --- GR VIEW ---
    window.grHandleScan = (e) => {
      if(e.key === 'Enter') {
        const v = e.target.value.trim(); e.target.value = '';
        if(!v) return;
        const p = window.DB.products.find(x=>x.barcode===v || x.id===v);
        if(!p) return window.showAlert('ไม่พบสินค้า', 'ไม่มีสินค้านี้ในระบบ', 'error');
        const po = window.DB.pos.find(x=>x.id===state.gr.poId);
        const item = po.items.find(i=>!i.isCustom && i.productId===p.id);
        if(!item) return window.showAlert('ผิดพลาด', 'สินค้านี้ไม่ได้อยู่ใน PO ที่เลือก', 'error');
        
        const exist = state.gr.cart.find(i=>!i.isCustom && i.productId===p.id);
        if((exist?exist.qty:0)+1 > item.expectedQty - item.receivedQty) return window.showAlert('จำนวนเกิน', 'รับสินค้าเกินที่สั่งแล้ว', 'error');
        
        if(exist) exist.qty += 1; else state.gr.cart.push({ isCustom:false, productId:p.id, qty:1 });
        window.updateUI();
      }
    };
    window.grManual = (pid) => {
      const po = window.DB.pos.find(x=>x.id===state.gr.poId);
      const item = po.items.find(i=>i.productId===pid);
      const exist = state.gr.cart.find(i=>i.productId===pid);
      if((exist?exist.qty:0)+1 > item.expectedQty - item.receivedQty) return window.showAlert('จำนวนเกิน', 'รับสินค้าเกินที่สั่งแล้ว', 'error');
      if(exist) exist.qty += 1; else state.gr.cart.push({ isCustom:item.isCustom, productId:pid, customName:item.customName, qty:1 });
      window.updateUI();
    };
    window.grUpdateQty = (pid, val) => {
      const q = parseInt(val)||0; if(q<0)return;
      const po = window.DB.pos.find(x=>x.id===state.gr.poId);
      const it = po.items.find(i=>i.productId===pid);
      if(q > it.expectedQty - it.receivedQty) return window.showAlert('จำนวนเกิน', `รับสูงสุดได้แค่ ${it.expectedQty - it.receivedQty}`, 'error');
      const idx = state.gr.cart.findIndex(i=>i.productId===pid);
      if(q===0 && idx>-1) state.gr.cart.splice(idx,1);
      else if(idx>-1) state.gr.cart[idx].qty = q;
      else if(q>0) state.gr.cart.push({ isCustom:it.isCustom, productId:pid, customName:it.customName, qty:q });
      window.updateUI();
    };
    window.grSave = () => {
      if(state.gr.cart.length===0) return;
      window.showConfirm('รับเข้าคลัง', 'ยืนยันเพิ่มยอดสต๊อกทันที?', () => {
        const poIdx = window.DB.pos.findIndex(p=>p.id===state.gr.poId);
        let po = JSON.parse(JSON.stringify(window.DB.pos[poIdx]));
        const ref = state.gr.remark ? `${po.id} (${state.gr.remark})` : po.id;
        
        state.gr.cart.forEach(scan => {
          po.items.find(i=>i.productId===scan.productId).receivedQty += scan.qty;
          if(!scan.isCustom) {
            window.DB.products.find(p=>p.id===scan.productId).stock += scan.qty;
            window.DB.transactions.unshift({ id: `TXN-${Date.now()}-${Math.floor(Math.random()*100)}`, type:'IN', date:new Date().toISOString(), productId:scan.productId, qty:scan.qty, referenceNo:ref });
          }
        });
        
        if(po.items.every(i=>i.receivedQty>=i.expectedQty)) po.status = 'Completed';
        window.DB.pos[poIdx] = po;
        state.gr.poId=''; state.gr.cart=[]; state.gr.remark='';
        window.saveDB(); window.showToast('รับของสำเร็จ');
      });
    };

    function viewGR() {
      const s = state.gr;
      if(!s.poId) {
        const acts = window.DB.pos.filter(p=>p.status==='Pending Receipt');
        const opts = acts.map(po => `<option value="${po.id}">${po.id} - ${window.DB.vendors.find(v=>v.id===po.vendorId)?.name||''}</option>`).join('');
        return `
          <h2 class="text-2xl font-bold mb-6">รับสินค้าเข้าสต๊อก (Goods Receipt)</h2>
          <div class="bg-white p-10 rounded-2xl shadow-sm border text-center max-w-2xl mx-auto mt-10 animate-in zoom-in-95">
            <div class="bg-emerald-100 w-20 h-20 rounded-full flex items-center justify-center mx-auto mb-6"><i class="fas fa-truck-loading text-4xl text-emerald-600"></i></div><h3 class="text-xl font-bold mb-2">เตรียมรับสินค้าเข้าคลัง</h3><p class="text-gray-500 mb-6">เลือกใบสั่งซื้อ (PO) ที่รอรับของ</p>
            <select id="gr-po-sel" onchange="window.state.gr.poId=this.value; window.state.gr.cart=[]; window.updateUI()" class="w-full border-2 border-emerald-200 rounded-xl p-4 font-bold outline-none focus:border-emerald-500 bg-gray-50"><option value="">-- คลิกเพื่อเลือก --</option>${opts}</select>
          </div>
        `;
      }

      const po = window.DB.pos.find(p=>p.id===s.poId);
      const trs = po.items.map(it => {
        const p = !it.isCustom ? window.DB.products.find(x=>x.id===it.productId) : null;
        const name = it.isCustom ? it.customName : p?.name;
        const sq = s.cart.find(i=>i.productId===it.productId)?.qty || 0;
        const isComp = it.receivedQty + sq >= it.expectedQty;
        return `
          <tr class="border-b ${sq>0?'bg-emerald-50/50':''}">
            <td class="p-4"><div class="font-bold">${name} ${it.isCustom?'<span class="text-[10px] bg-amber-100 text-amber-700 px-2 py-0.5 rounded ml-2">นอกระบบ</span>':''}</div><div class="text-xs font-mono text-gray-400 mt-1">${p?.barcode || it.productId}</div></td>
            <td class="p-4 text-center font-bold text-gray-600 text-lg">${it.expectedQty}</td><td class="p-4 text-center font-bold text-gray-500 text-lg">${it.receivedQty}</td>
            <td class="p-4 text-center">${isComp&&sq===0?'<span class="text-emerald-500 font-black text-xl">-</span>':`<input type="number" min="0" max="${it.expectedQty-it.receivedQty}" value="${sq}" onchange="window.grUpdateQty('${it.productId}', this.value)" class="w-24 border-2 border-gray-200 rounded-lg p-2 text-center font-black text-emerald-600 text-lg outline-none focus:border-emerald-500">`}</td>
            <td class="p-4 text-center">${isComp?'<i class="fas fa-check-circle text-emerald-500 text-2xl"></i>':`<button onclick="window.grManual('${it.productId}')" class="text-xs bg-white border border-gray-200 hover:bg-gray-100 px-4 py-2 rounded-lg font-bold shadow-sm">+1 (รับมือ)</button>`}</td>
          </tr>
        `;
      }).join('');

      return `
        <h2 class="text-2xl font-bold mb-6">รับสินค้าเข้าสต๊อก (Goods Receipt)</h2>
        <div class="grid grid-cols-1 xl:grid-cols-3 gap-6 animate-in slide-in-from-bottom-4">
          <div class="xl:col-span-2 space-y-6">
            <div class="bg-blue-50/50 p-6 rounded-2xl border border-blue-100 shadow-inner print-hidden"><label class="block font-bold text-blue-900 mb-3"><i class="fas fa-barcode mr-2"></i> สแกนบาร์โค้ด</label><input type="text" id="gr-scan" onkeydown="window.grHandleScan(event)" placeholder="ยิงบาร์โค้ดแล้วกด Enter..." class="w-full p-4 text-xl font-mono border-2 border-blue-200 rounded-xl outline-none focus:border-blue-500 focus:ring-4 focus:ring-blue-100 shadow-sm" autofocus></div>
            <div class="bg-white rounded-2xl shadow-sm border overflow-hidden"><div class="bg-gray-50 p-5 border-b flex justify-between items-center"><h3 class="font-bold flex items-center"><i class="fas fa-box-open text-emerald-600 mr-2 text-xl"></i>รายการใน PO: ${po.id}</h3><button onclick="window.state.gr.poId=''; window.updateUI()" class="text-sm bg-white border border-gray-200 px-3 py-1.5 rounded-lg font-bold text-gray-600 shadow-sm hover:bg-gray-50">เปลี่ยน PO</button></div><div class="overflow-x-auto"><table class="w-full text-left min-w-[700px]"><thead class="bg-white border-b text-xs uppercase text-gray-500"><tr><th class="p-4 font-bold">สินค้า</th><th class="p-4 font-bold text-center">สั่ง (PO)</th><th class="p-4 font-bold text-center">รับแล้ว</th><th class="p-4 font-bold text-center w-36 text-emerald-600">สแกนเพิ่ม</th><th class="p-4 font-bold text-center">จัดการ</th></tr></thead><tbody>${trs}</tbody></table></div></div>
          </div>
          <div class="bg-white p-6 rounded-2xl shadow-sm border h-fit"><h3 class="font-bold text-lg mb-6 pb-3 border-b"><i class="fas fa-file-alt text-blue-600 mr-2"></i> สรุปการรับเข้า</h3><textarea id="gr-rem" rows="3" placeholder="หมายเหตุเพิ่มเติม..." oninput="window.state.gr.remark=this.value" class="w-full border border-gray-300 rounded-xl p-3 mb-6 bg-gray-50 outline-none focus:ring-2 focus:ring-blue-500">${s.remark}</textarea><div class="bg-gray-50 p-4 rounded-xl border border-gray-200 mb-6"><div class="flex justify-between text-sm mb-2"><span class="font-bold text-gray-600">สแกน:</span><span class="font-bold text-gray-800">${s.cart.length} รายการ</span></div><div class="flex justify-between text-sm border-t pt-2 mt-2 items-center"><span class="font-bold text-gray-600">รวมชิ้น:</span><span class="font-black text-emerald-600 text-3xl">${s.cart.reduce((s,i)=>s+i.qty,0)}</span></div></div><button onclick="window.grSave()" class="w-full py-4 rounded-xl font-black text-lg shadow-md text-white transition-transform ${s.cart.length>0?'bg-emerald-500 hover:bg-emerald-600 active:scale-95':'bg-gray-300 pointer-events-none'}"><i class="fas fa-check-circle mr-2"></i> ยืนยันนำเข้าสต๊อก</button></div>
        </div>
      `;
    }

    // 6.6 ISSUE
    window.issScan = (e) => {
      if(e.key === 'Enter') {
        const v = e.target.value.trim(); e.target.value = ''; if(!v) return;
        const p = window.DB.products.find(x=>x.barcode===v || x.id===v);
        if(!p) return window.showAlert('ไม่พบสินค้า', 'ไม่มีรหัสนี้', 'error');
        window.issAdd(p);
      }
    };
    window.issManual = () => {
      const pid = document.getElementById('iss-man').value; if(!pid)return;
      const p = window.DB.products.find(x=>x.id===pid);
      if(!p) return window.showAlert('ผิดพลาด', 'ไม่พบสินค้า', 'error');
      window.issAdd(p); document.getElementById('iss-man').value = '';
    };
    window.issAdd = (p) => {
      const exist = state.iss.cart.find(i=>i.productId===p.id);
      if((exist?exist.qty:0)+1 > p.stock) return window.showAlert('สต๊อกไม่พอ', `เหลือเพียง ${p.stock}`, 'error');
      if(exist) exist.qty += 1; else state.iss.cart.push({ productId: p.id, qty: 1 });
      window.updateUI();
    };
    window.issUpdQty = (pid, val) => {
      const q = parseInt(val)||0; if(q<0)return;
      const p = window.DB.products.find(x=>x.id===pid);
      if(q > p.stock) return window.showAlert('สต๊อกไม่พอ', `เหลือ ${p.stock}`, 'error');
      const idx = state.iss.cart.findIndex(i=>i.productId===pid);
      if(q===0 && idx>-1) state.iss.cart.splice(idx,1);
      else if(idx>-1) state.iss.cart[idx].qty = q;
      window.updateUI();
    };
    window.issSave = () => {
      if(!state.iss.ref || state.iss.cart.length===0) return window.showAlert('ข้อมูลไม่ครบ', 'ระบุผู้เบิกและสแกนสินค้า', 'error');
      window.showConfirm('ตัดสต๊อก', 'ยืนยันการหักสต๊อกทันที?', () => {
        const ref = state.iss.remark ? `${state.iss.ref} (${state.iss.remark})` : state.iss.ref;
        state.iss.cart.forEach(it => {
          window.DB.products.find(p=>p.id===it.productId).stock -= it.qty;
          window.DB.transactions.unshift({ id: `TXN-${Date.now()}-${Math.floor(Math.random()*100)}`, type:'OUT', date:new Date().toISOString(), productId:it.productId, qty:it.qty, referenceNo:ref });
        });
        state.iss.cart=[]; state.iss.ref=''; state.iss.remark='';
        window.saveDB(); window.showToast('เบิกของสำเร็จ');
      });
    };

    function viewIssue() {
      const s = state.iss;
      const trs = s.cart.map((it, i) => {
        const p = window.DB.products.find(x=>x.id===it.productId);
        return `<tr class="border-b hover:bg-gray-50"><td class="p-4"><div class="font-bold">${p.name}</div><div class="text-xs font-mono text-gray-400 mt-0.5">${p.id}</div></td><td class="p-4 text-center font-bold text-gray-500 text-lg">${p.stock}</td><td class="p-4 text-center"><input type="number" min="1" max="${p.stock}" value="${it.qty}" onchange="window.issUpdQty('${p.id}', this.value)" class="w-24 border-2 border-gray-200 rounded-lg p-2 text-center font-black text-amber-600 text-lg outline-none focus:border-amber-500"></td><td class="p-4 text-center"><button onclick="window.state.iss.cart.splice(${i},1); window.updateUI()" class="text-red-500 hover:bg-red-50 p-2 rounded-lg"><i class="fas fa-times text-xl"></i></button></td></tr>`;
      }).join('');

      return `
        <h2 class="text-2xl font-bold mb-6">เบิกจ่ายสินค้า (Goods Issue)</h2>
        <div class="grid grid-cols-1 xl:grid-cols-3 gap-6">
          <div class="xl:col-span-2 space-y-6">
            <div class="bg-white p-6 md:p-8 rounded-2xl shadow-sm border border-gray-100 print-hidden">
              <label class="block font-bold text-gray-700 mb-2">ผู้เบิก / อ้างอิง / แผนก <span class="text-red-500">*</span></label>
              <input type="text" id="iss-r" value="${s.ref}" oninput="window.state.iss.ref=this.value" placeholder="เช่น แผนกผลิต..." class="w-full border-2 border-amber-100 rounded-xl p-3 bg-amber-50/30 font-bold outline-none focus:border-amber-400 focus:ring-4 focus:ring-amber-50 text-gray-800">
              <div class="mt-6 pt-6 border-t grid grid-cols-1 md:grid-cols-2 gap-4">
                <div class="bg-amber-50/50 p-4 rounded-xl border border-amber-100"><label class="block font-bold text-amber-900 mb-2"><i class="fas fa-barcode mr-2"></i>สแกนบาร์โค้ด</label><input type="text" id="iss-s" onkeydown="window.issScan(event)" placeholder="ยิงสแกน..." class="w-full border-2 border-amber-200 rounded-lg p-3 font-mono outline-none focus:border-amber-500"></div>
                <div class="bg-gray-50/50 p-4 rounded-xl border border-gray-100"><label class="block font-bold mb-2"><i class="fas fa-search mr-2"></i>ค้นหาด้วยมือ</label><div class="flex gap-2"><input type="text" id="iss-man" list="iss-dl" class="w-full border rounded-lg p-3 outline-none" placeholder="พิมพ์ชื่อ..."><datalist id="iss-dl">${window.DB.products.filter(p=>p.stock>0).map(p=>`<option value="${p.id}">${p.name} (เหลือ ${p.stock})</option>`).join('')}</datalist><button onclick="window.issManual()" class="bg-slate-800 text-white px-4 rounded-lg"><i class="fas fa-plus"></i></button></div></div>
              </div>
            </div>
            ${s.cart.length>0 ? `
              <div class="bg-white rounded-2xl border shadow-sm overflow-hidden animate-in fade-in"><div class="bg-gray-50 p-4 border-b font-bold"><i class="fas fa-dolly text-amber-600 mr-2"></i>รายการเตรียมเบิก</div><div class="overflow-x-auto"><table class="w-full text-left min-w-[600px]"><thead class="bg-white border-b text-xs uppercase text-gray-500"><tr><th class="p-4 font-bold">สินค้า</th><th class="p-4 font-bold text-center w-28">มีในสต๊อก</th><th class="p-4 font-bold text-center w-36 text-amber-600">จำนวนที่เบิก</th><th class="p-4 font-bold text-center w-20">จัดการ</th></tr></thead><tbody class="divide-y">${trs}</tbody></table></div></div>
            `:''}
          </div>
          <div class="bg-white p-6 rounded-2xl border shadow-sm h-fit"><h3 class="font-bold text-lg mb-6 pb-3 border-b"><i class="fas fa-file-alt text-amber-600 mr-2"></i> สรุปการเบิก</h3><textarea id="iss-rmk" rows="3" placeholder="หมายเหตุ (Optional)..." oninput="window.state.iss.remark=this.value" class="w-full border rounded-xl p-3 mb-6 bg-gray-50 outline-none focus:ring-2 focus:ring-amber-500">${s.remark}</textarea><div class="bg-gray-50 p-4 rounded-xl border border-gray-200 mb-6"><div class="flex justify-between text-sm mb-2"><span class="font-bold text-gray-600">อ้างอิง:</span><span class="font-bold truncate max-w-[140px]">${s.ref||'-'}</span></div><div class="flex justify-between text-sm mb-2"><span class="font-bold text-gray-600">รายการ:</span><span class="font-bold">${s.cart.length} รายการ</span></div><div class="flex justify-between text-sm items-center border-t pt-2 mt-2"><span class="font-bold text-gray-600">รวมชิ้น:</span><span class="font-black text-amber-500 text-3xl">${s.cart.reduce((sum,i)=>sum+i.qty,0)}</span></div></div><button onclick="window.issSave()" class="w-full py-4 rounded-xl font-black text-lg text-white shadow-md transition-transform ${s.cart.length>0&&s.ref?'bg-amber-500 hover:bg-amber-600 active:scale-95':'bg-gray-300 pointer-events-none'}"><i class="fas fa-check mr-2"></i> ยืนยันตัดสต๊อก</button></div>
        </div>
      `;
    }

    // 6.7 STOCK
    window.stkToggleAll = (chk, idsStr) => { state.stk.selected = chk ? JSON.parse(idsStr) : []; updateUI(); };
    window.stkToggle = (id) => { if(state.stk.selected.includes(id)) state.stk.selected = state.stk.selected.filter(x=>x!==id); else state.stk.selected.push(id); updateUI(); };
    window.stkDel = (id) => { window.showConfirm('ลบสินค้า','ลบออกจากระบบอย่างถาวร?',()=>{ window.DB.products=window.DB.products.filter(p=>p.id!==id); window.saveDB(); window.showToast('ลบสำเร็จ'); }); };
    window.stkBulkDel = () => { window.showConfirm('ลบกลุ่ม',`ลบ ${state.stk.selected.length} รายการ?`,()=>{ window.DB.products=window.DB.products.filter(p=>!state.stk.selected.includes(p.id)); state.stk.selected=[]; window.saveDB(); window.showToast('ลบสำเร็จ'); }); };
    
    // Barcode Printing function inside Stock
    window.stkPrint = (id) => { state.stk.print = [window.DB.products.find(p=>p.id===id)]; updateUI(); setTimeout(()=>window.print(), 200); };
    window.stkBulkPrint = () => { state.stk.print = window.DB.products.filter(p=>state.stk.selected.includes(p.id)); updateUI(); setTimeout(()=>window.print(), 200); };
    window.stkClosePrint = () => { state.stk.print = []; updateUI(); };

    function viewStock(p) {
      const s = state.stk;
      const q = s.search.toLowerCase();
      const list = window.DB.products.filter(x => {
        const match = x.name.toLowerCase().includes(q) || x.id.toLowerCase().includes(q) || (x.barcode&&x.barcode.toLowerCase().includes(q));
        const cat = s.cat ? x.category === s.cat : true;
        const loc = s.loc ? x.location === s.loc : true;
        const low = s.low ? x.stock <= x.minStock : true;
        return match && cat && loc && low;
      });

      const cats = [...new Set(window.DB.products.map(x=>x.category).filter(Boolean))];
      const locs = [...new Set(window.DB.products.map(x=>x.location).filter(Boolean))];
      const allIds = JSON.stringify(list.map(x=>x.id));

      let content = '';
      if(s.view === 'card') {
        content = `<div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">` + list.map(pd => `
          <div class="bg-white rounded-2xl shadow-sm border ${pd.stock<=pd.minStock?'border-amber-300 shadow-amber-100':'border-gray-100'} ${s.selected.includes(pd.id)?'ring-2 ring-blue-500 border-blue-500 shadow-md':''} overflow-hidden hover:shadow-lg transition-all duration-300 flex flex-col">
            <div class="aspect-[4/3] w-full bg-gray-50 relative overflow-hidden group">
              <div class="absolute top-3 left-3 z-10"><input type="checkbox" ${s.selected.includes(pd.id)?'checked':''} onchange="window.stkToggle('${pd.id}')" class="w-5 h-5 rounded cursor-pointer shadow-sm accent-blue-600"></div>
              ${pd.image ? `<img src="${pd.image}" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500"/>` : `<div class="w-full h-full flex items-center justify-center text-gray-300"><i class="fas fa-image text-5xl"></i></div>`}
              <div class="absolute top-3 right-3">${pd.stock===0?'<span class="px-3 py-1.5 bg-red-500/95 backdrop-blur text-white text-xs font-bold rounded-full shadow-sm tracking-wide">OUT OF STOCK</span>':pd.stock<=pd.minStock?'<span class="px-3 py-1.5 bg-amber-500/95 backdrop-blur text-white text-xs font-bold rounded-full shadow-sm tracking-wide">LOW STOCK</span>':'<span class="px-3 py-1.5 bg-emerald-500/95 backdrop-blur text-white text-xs font-bold rounded-full shadow-sm tracking-wide">IN STOCK</span>'}</div>
            </div>
            <div class="p-5 flex-1 flex flex-col">
              <div class="mb-3"><h3 class="font-bold text-gray-800 text-lg leading-snug line-clamp-2" title="${pd.name}">${pd.name}</h3><p class="text-xs text-blue-600 font-bold mt-1.5">${pd.id} <span class="text-gray-400 font-mono font-medium">| ${pd.barcode||'ไม่มีบาร์โค้ด'}</span></p></div>
              <div class="mt-auto space-y-2 text-sm text-gray-600 bg-gray-50/50 p-3 rounded-xl border border-gray-100"><div class="flex items-center"><i class="fas fa-layer-group w-4 text-gray-400"></i><span class="truncate font-medium">${pd.category||'-'}</span></div><div class="flex items-center"><i class="fas fa-box w-4 text-gray-400"></i><span class="truncate font-medium">Loc: ${pd.location||'-'}</span></div></div>
              <div class="mt-4 flex justify-between items-end px-1"><div><p class="text-[11px] font-bold text-gray-400 uppercase tracking-wider mb-0.5">Price</p><p class="font-bold text-gray-700">฿${pd.price.toLocaleString()}</p></div><div class="text-right"><p class="text-[11px] font-bold text-gray-400 uppercase tracking-wider mb-0.5">Stock</p><p class="text-2xl font-black ${pd.stock<=pd.minStock?'text-red-500':'text-gray-800'} leading-none">${pd.stock}<span class="text-sm text-gray-500 font-bold ml-1">${pd.unit}</span></p></div></div>
              <div class="mt-5 pt-4 border-t border-gray-100 flex justify-between gap-2"><button onclick="window.stkPrint('${pd.id}')" class="flex items-center justify-center flex-1 py-2 text-sm font-bold text-slate-600 bg-white hover:bg-blue-50 hover:text-blue-700 rounded-lg border shadow-sm"><i class="fas fa-print mr-1.5"></i> พิมพ์บาร์โค้ด</button><button onclick="window.openProdModal('${pd.id}')" class="p-2 text-gray-500 bg-white hover:text-amber-600 hover:bg-amber-50 rounded-lg border shadow-sm"><i class="fas fa-edit"></i></button><button onclick="window.stkDel('${pd.id}')" class="p-2 text-gray-500 bg-white hover:text-red-600 hover:bg-red-50 rounded-lg border shadow-sm"><i class="fas fa-trash"></i></button></div>
            </div>
          </div>
        `).join('') + `</div>`;
      } else {
        content = `
          <div class="bg-white rounded-2xl shadow-sm border overflow-x-auto"><table class="w-full text-left min-w-[1000px]"><thead class="bg-gray-50 border-b text-xs uppercase tracking-wider text-gray-500"><tr><th class="p-5 w-12 text-center"><input type="checkbox" ${s.selected.length>0 && s.selected.length===list.length?'checked':''} onchange="window.stkToggleAll(this.checked, '${allIds}')" class="w-4 h-4 rounded text-blue-600 accent-blue-600"></th><th class="p-5 w-16">Image</th><th class="p-5">รหัส/บาร์โค้ด</th><th class="p-5">ชื่อสินค้า</th><th class="p-5">หมวดหมู่/จัดเก็บ</th><th class="p-5 text-right">Min</th><th class="p-5 text-right">คงเหลือ</th><th class="p-5 text-center">สถานะ</th><th class="p-5 text-center">จัดการ</th></tr></thead>
          <tbody class="divide-y divide-gray-100">
            ${list.map(pd => `

fa-print"></i></button><button onclick="window.openProdModal('${pd.id}')" class="p-2 text-gray-500 hover:text-amber-600 hover:bg-amber-50 rounded-lg border hover:border-amber-200 transition-colors"><i class="fas fa-edit"></i></button><button onclick="window.stkDel('${pd.id}')" class="p-2 text-gray-500 hover:text-red-600 hover:bg-red-50 rounded-lg border hover:border-red-200 transition-colors"><i class="fas fa-trash"></i></button></div></td></tr>
            `).join('')}
          </tbody></table></div>
        `;
      }

      if(list.length === 0) content = `<div class="bg-white p-16 text-center rounded-2xl border flex flex-col items-center"><i class="fas fa-box-open text-5xl text-gray-300 mb-4"></i><h3 class="text-xl font-bold text-gray-700 mb-2">ไม่พบสินค้า</h3><p class="text-gray-500">ลองเปลี่ยนคำค้นหา หรือเคลียร์ตัวกรอง</p></div>`;

      return `
        <div class="space-y-6">
          <div class="flex justify-between items-center"><h2 class="text-2xl font-bold">สต๊อกสินค้า (Inventory)</h2><div class="flex gap-2"><button onclick="window.state.stk.view='card'; window.updateUI()" class="px-4 py-2 rounded-lg font-bold ${s.view==='card'?'bg-blue-50 text-blue-600':'text-gray-500'}"><i class="fas fa-th-large"></i> แบบการ์ด</button><button onclick="window.state.stk.view='table'; window.updateUI()" class="px-4 py-2 rounded-lg font-bold ${s.view==='table'?'bg-blue-50 text-blue-600':'text-gray-500'}"><i class="fas fa-list"></i> แบบตาราง</button></div></div>

              <select onchange="window.state.stk.cat=this.value; window.updateUI()" class="border rounded-xl p-3 outline-none focus:ring-2 focus:ring-blue-500 font-medium bg-white"><option value="">หมวดหมู่ทั้งหมด</option>${cats.map(c=>`<option value="${c}" ${s.cat===c?'selected':''}>${c}</option>`).join('')}</select>

              <button onclick="window.openProdModal('')" class="bg-blue-600 text-white px-5 py-3 rounded-xl font-bold shadow-md hover:bg-blue-700 active:scale-95"><i class="fas fa-plus mr-1.5"></i> เพิ่มสินค้า</button>

          </div>
          <div class="flex justify-between items-center mb-2">

            ${s.selected.length>0 ? `<div class="bg-blue-50 border border-blue-200 rounded-xl p-2.5 flex items-center shadow-sm animate-in fade-in"><span class="font-bold text-blue-800 px-4 text-sm">เลือกแล้ว ${s.selected.length}</span><div class="flex gap-2"><button onclick="window.stkBulkPrint()" class="bg-white border border-blue-300 text-blue-700 px-4 py-2 rounded-lg font-bold shadow-sm"><i class="fas fa-print mr-2"></i>พิมพ์บาร์โค้ด</button><button onclick="window.stkBulkDel()" class="bg-white border border-red-300 text-red-600 px-4 py-2 rounded-lg font-bold shadow-sm"><i class="fas fa-trash mr-2"></i>ลบ</button></div></div>` : ''}
          </div>
          ${content}
        </div>
      `;
