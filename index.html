                        <div className="absolute top-3 left-3 z-10 print:hidden"><input type="checkbox" checked={selectedIds.includes(p.id)} onChange={() => toggleSelect(p.id)} className="w-5 h-5 rounded text-blue-600 focus:ring-blue-500 cursor-pointer shadow-sm border-gray-300 bg-white/80 backdrop-blur-sm accent-blue-600" /></div>
                        {p.image ? <img src={p.image} alt={p.name} className="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500" /> : <div className="w-full h-full flex items-center justify-center text-gray-300"><ImageIcon size={48} /></div>}
                        <div className="absolute top-3 right-3 print:static print:inline-block print:mt-2 print:mr-2">
                          {p.stock === 0 ? <span className="px-3 py-1.5 bg-red-500/95 backdrop-blur-sm text-white text-xs font-bold rounded-full shadow-sm print:border print:border-red-500 print:bg-white print:text-red-500 tracking-wide">OUT OF STOCK</span> : p.stock <= p.minStock ? <span className="px-3 py-1.5 bg-amber-500/95 backdrop-blur-sm text-white text-xs font-bold rounded-full shadow-sm print:border print:border-amber-500 print:bg-white print:text-amber-500 tracking-wide">LOW STOCK</span> : <span className="px-3 py-1.5 bg-emerald-500/95 backdrop-blur-sm text-white text-xs font-bold rounded-full shadow-sm print:border print:border-emerald-500 print:bg-white print:text-emerald-500 tracking-wide">IN STOCK</span>}
                        </div>
                      </div>
                      <div className="p-5 flex-1 flex flex-col">
                        <div className="mb-3"><h3 className="font-bold text-gray-800 text-lg leading-snug line-clamp-2" title={p.name}>{p.name}</h3><p className="text-xs text-blue-600 font-bold mt-1.5">{p.id} <span className="text-gray-400 font-mono font-medium">| {p.barcode || 'ไม่มีบาร์โค้ด'}</span></p></div>
                        <div className="mt-auto space-y-2 text-sm text-gray-600 bg-gray-50/50 p-3 rounded-xl border border-gray-100"><div className="flex items-center"><Layers size={14} className="mr-2 text-gray-400 shrink-0" /><span className="truncate font-medium">{p.category || 'ไม่ระบุหมวดหมู่'}</span></div><div className="flex items-center"><Box size={14} className="mr-2 text-gray-400 shrink-0" /><span className="truncate font-medium">Loc: {p.location || '-'}</span></div></div>
                        <div className="mt-4 flex items-end justify-between px-1"><div><p className="text-[11px] font-bold text-gray-400 uppercase tracking-wider mb-0.5">Price</p><p className="font-bold text-gray-700">฿{p.price.toLocaleString()}</p></div><div className="text-right"><p className="text-[11px] font-bold text-gray-400 uppercase tracking-wider mb-0.5">Stock</p><p className="text-2xl font-black text-gray-800 leading-none"><span className={p.stock <= p.minStock ? 'text-red-500' : 'text-emerald-600'}>{p.stock}</span><span className="text-sm text-gray-500 font-bold ml-1">{p.unit}</span></p></div></div>
                        <div className="mt-5 pt-4 border-t border-gray-100 flex items-center justify-between print:hidden gap-2"><button onClick={() => handleQuickPrint(p)} className="flex items-center justify-center flex-1 py-2 text-sm font-bold text-slate-600 bg-white hover:bg-blue-50 hover:text-blue-700 rounded-lg transition-colors border border-gray-200 hover:border-blue-200 shadow-sm"><Printer size={16} className="mr-1.5" /> พิมพ์บาร์โค้ด</button><button onClick={() => handleEdit(p)} className="p-2 text-gray-500 bg-white hover:text-amber-600 hover:bg-amber-50 rounded-lg transition-colors border border-gray-200 hover:border-amber-200 shadow-sm" title="แก้ไขสินค้า"><Edit size={18} /></button><button onClick={() => handleDelete(p.id)} className="p-2 text-gray-500 bg-white hover:text-red-600 hover:bg-red-50 rounded-lg transition-colors border border-gray-200 hover:border-red-200 shadow-sm" title="ลบสินค้า"><Trash2 size={18} /></button></div>
                      </div>
                    </div>
                  ))
                )}
              </div>
            ) : (
              <div className="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-x-auto print:overflow-visible print:border-none print:shadow-none">
                <table className="w-full text-left min-w-[1000px]">
                  <thead className="bg-gray-50 border-b border-gray-100 text-xs uppercase tracking-wider text-gray-500"><tr><th className="px-5 py-4 font-bold w-12 text-center print:hidden"><input type="checkbox" checked={selectedIds.length > 0 && selectedIds.length === filteredProducts.length} onChange={toggleSelectAll} className="w-4 h-4 rounded text-blue-600 focus:ring-blue-500 cursor-pointer border-gray-300 accent-blue-600" /></th><th className="px-5 py-4 font-bold w-16">Image</th><th className="px-5 py-4 font-bold">รหัส / บาร์โค้ด</th><th className="px-5 py-4 font-bold">ชื่อสินค้า</th><th className="px-5 py-4 font-bold">หมวดหมู่ / จัดเก็บ</th><th className="px-5 py-4 font-bold text-right">Min Stock</th><th className="px-5 py-4 font-bold text-right">คงเหลือ</th><th className="px-5 py-4 font-bold text-center">สถานะ</th><th className="px-5 py-4 font-bold text-center print:hidden">จัดการ</th></tr></thead>
                  <tbody className="divide-y divide-gray-100">
                    {filteredProducts.length === 0 ? (<tr><td colSpan="9" className="text-center py-10 text-gray-500 font-medium">ไม่พบรายการสินค้าที่ค้นหา</td></tr>) : (
                      filteredProducts.map(p => (
                        <tr key={p.id} className={`hover:bg-gray-50 print:break-inside-avoid transition-colors ${selectedIds.includes(p.id) ? 'bg-blue-50/40' : ''}`}>
                          <td className="px-5 py-4 text-center print:hidden"><input type="checkbox" checked={selectedIds.includes(p.id)} onChange={() => toggleSelect(p.id)} className="w-4 h-4 rounded text-blue-600 focus:ring-blue-500 cursor-pointer border-gray-300 accent-blue-600" /></td>
                          <td className="px-5 py-4">{p.image ? <img src={p.image} alt={p.name} className="w-12 h-12 rounded-lg object-cover border border-gray-200 shadow-sm" /> : <div className="w-12 h-12 rounded-lg bg-gray-100 flex items-center justify-center text-gray-400 border border-gray-200"><ImageIcon size={18} /></div>}</td>
                          <td className="px-5 py-4"><div className="font-bold text-gray-800 text-sm">{p.id}</div><div className="text-xs text-blue-600 font-mono font-medium mt-0.5">{p.barcode || '-'}</div></td><td className="px-5 py-4 text-sm font-bold text-gray-700 whitespace-normal max-w-xs">{p.name}</td>
                          <td className="px-5 py-4 text-sm"><div className="font-medium text-gray-700 bg-gray-100 px-2 py-0.5 rounded inline-block mb-1">{p.category || '-'}</div><div className="text-gray-500 text-xs font-medium">Loc: {p.location || '-'}</div></td><td className="px-5 py-4 text-right text-gray-400 font-bold">{p.minStock}</td>
                          <td className="px-5 py-4 text-right"><span className={`text-xl font-black ${p.stock <= p.minStock ? 'text-red-500' : 'text-emerald-600'}`}>{p.stock}</span><span className="text-gray-500 text-xs font-bold ml-1">{p.unit}</span></td>
                          <td className="px-5 py-4 text-center">{p.stock === 0 ? <span className="px-3 py-1 bg-red-100 text-red-700 text-[11px] font-bold rounded-full print:border print:border-red-500 tracking-wide">OUT OF STOCK</span> : p.stock <= p.minStock ? <span className="px-3 py-1 bg-amber-100 text-amber-700 text-[11px] font-bold rounded-full print:border print:border-amber-500 tracking-wide">LOW STOCK</span> : <span className="px-3 py-1 bg-emerald-100 text-emerald-700 text-[11px] font-bold rounded-full print:border print:border-emerald-500 tracking-wide">IN STOCK</span>}</td>
                          <td className="px-5 py-4 text-center print:hidden"><div className="flex items-center justify-center space-x-2"><button onClick={() => handleQuickPrint(p)} className="p-2 text-gray-500 hover:text-blue-600 hover:bg-blue-50 rounded-lg transition-colors border border-transparent hover:border-blue-200" title="พิมพ์บาร์โค้ด"><Printer size={18} /></button><button onClick={() => handleEdit(p)} className="p-2 text-gray-500 hover:text-amber-600 hover:bg-amber-50 rounded-lg transition-colors border border-transparent hover:border-amber-200" title="แก้ไขสินค้า"><Edit size={18} /></button><button onClick={() => handleDelete(p.id)} className="p-2 text-gray-500 hover:text-red-600 hover:bg-red-50 rounded-lg transition-colors border border-transparent hover:border-red-200" title="ลบสินค้า"><Trash2 size={18} /></button></div></td>
                        </tr>
                      ))
                    )}
                  </tbody>
                </table>
              </div>
            )}
          </div>

          {printProducts.length > 0 && (
            <div className="fixed inset-0 bg-white z-[100] flex-col items-center justify-start hidden print:flex p-10 overflow-y-auto">
              {printProducts.map((prod, idx) => (
                <div key={idx} className="text-center max-w-sm border-2 border-dashed border-gray-400 p-8 rounded-xl mb-8 print:break-inside-avoid print:page-break-after-always"><h1 className="text-2xl font-bold mb-4 whitespace-normal">{prod.name}</h1><div className="flex justify-center mb-4"><img src={`https://barcode.tec-it.com/barcode.ashx?data=${prod.barcode || prod.id}&code=Code128&translate-esc=on`} alt={`Barcode ${prod.barcode || prod.id}`} className="h-24 object-contain" /></div><p className="font-mono text-xl font-bold tracking-widest">{prod.barcode || prod.id}</p><div className="mt-4 text-sm text-gray-500">Location: {prod.location || '-'} | Category: {prod.category || '-'}</div></div>
              ))}
              <div className="w-full flex justify-center print:hidden mt-8"><p className="text-sm text-gray-400 text-center mr-4">กำลังเปิดหน้าต่างปริ้นท์... <br/> หากต้องการปิดพรีวิว กรุณากดปุ่มด้านล่าง</p><button onClick={() => setPrintProducts([])} className="bg-gray-200 px-6 py-2 rounded-lg">ปิดหน้าต่างพรีวิว</button></div>
            </div>
          )}

          {isModalOpen && (
            <div className="fixed inset-0 bg-slate-900/60 z-[120] flex items-center justify-center p-4 backdrop-blur-sm animate-in fade-in">
              <div className="bg-white rounded-2xl shadow-2xl w-full max-w-2xl max-h-[90vh] overflow-y-auto print:hidden flex flex-col animate-in zoom-in-95">
                <div className="px-6 py-5 border-b border-gray-100 flex justify-between items-center sticky top-0 bg-white/90 backdrop-blur-md z-10 shrink-0"><h3 className="font-bold text-xl text-gray-800">{formData.isEdit ? 'แก้ไขข้อมูลสินค้า' : 'เพิ่มสินค้าใหม่'}</h3><button onClick={() => setIsModalOpen(false)} className="text-gray-400 hover:text-gray-600 bg-gray-100 hover:bg-gray-200 p-1.5 rounded-lg transition-colors"><X size={20} /></button></div>
                <div className="p-6 md:p-8 space-y-5 overflow-y-auto">
                  <div className="grid grid-cols-1 md:grid-cols-2 gap-5">
                    <div><label className="block text-sm font-bold text-gray-700 mb-1.5">รหัสสินค้า (ID) <span className="text-red-500">*</span></label><input type="text" className="w-full border border-gray-300 rounded-xl p-3 outline-none focus:ring-2 focus:ring-blue-500 bg-gray-50 font-medium" value={formData.id} onChange={e => setFormData({...formData, id: e.target.value})} disabled={formData.isEdit} /></div>
                    <div><label className="block text-sm font-bold text-gray-700 mb-1.5">บาร์โค้ด (Barcode)</label><input type="text" className="w-full border border-gray-300 rounded-xl p-3 outline-none focus:ring-2 focus:ring-blue-500 font-mono" value={formData.barcode} onChange={e => setFormData({...formData, barcode: e.target.value})} /></div>
                    <div className="md:col-span-2"><label className="block text-sm font-bold text-gray-700 mb-1.5">ชื่อสินค้า <span className="text-red-500">*</span></label><input type="text" className="w-full border border-gray-300 rounded-xl p-3 outline-none focus:ring-2 focus:ring-blue-500 font-medium" value={formData.name} onChange={e => setFormData({...formData, name: e.target.value})} /></div>
                    <div><label className="block text-sm font-bold text-gray-700 mb-1.5">หมวดหมู่</label><input type="text" className="w-full border border-gray-300 rounded-xl p-3 outline-none focus:ring-2 focus:ring-blue-500" value={formData.category} onChange={e => setFormData({...formData, category: e.target.value})} list="cat-list" /><datalist id="cat-list">{categories.map(c => <option key={c} value={c} />)}</datalist></div>
                    <div><label className="block text-sm font-bold text-gray-700 mb-1.5">สถานที่จัดเก็บ (Location)</label><input type="text" className="w-full border border-gray-300 rounded-xl p-3 outline-none focus:ring-2 focus:ring-blue-500" value={formData.location} onChange={e => setFormData({...formData, location: e.target.value})} list="loc-list"/><datalist id="loc-list">{locations.map(l => <option key={l} value={l} />)}</datalist></div>
                    <div><label className="block text-sm font-bold text-gray-700 mb-1.5">หน่วยนับ</label><input type="text" className="w-full border border-gray-300 rounded-xl p-3 outline-none focus:ring-2 focus:ring-blue-500" value={formData.unit} onChange={e => setFormData({...formData, unit: e.target.value})} /></div>
                    <div><label className="block text-sm font-bold text-gray-700 mb-1.5">ราคาประเมิน (บาท)</label><input type="number" className="w-full border border-gray-300 rounded-xl p-3 outline-none focus:ring-2 focus:ring-blue-500" value={formData.price} onChange={e => setFormData({...formData, price: Number(e.target.value)})} /></div>
                    <div className="bg-gray-50 p-4 rounded-xl border border-gray-200"><label className="block text-sm font-bold text-gray-700 mb-1.5">ยอดยกมา (Stock เริ่มต้น)</label><input type="number" className="w-full border border-gray-300 rounded-lg p-2.5 outline-none focus:ring-2 focus:ring-gray-400 bg-white font-bold" value={formData.stock} onChange={e => setFormData({...formData, stock: Number(e.target.value)})} disabled={formData.isEdit} />{formData.isEdit && <p className="text-xs text-gray-500 mt-2 flex items-center"><Info size={14} className="mr-1"/>อัปเดตสต๊อกผ่านการรับเข้า/เบิกจ่าย</p>}</div>
                    <div className="bg-amber-50/50 p-4 rounded-xl border border-amber-100"><label className="block text-sm font-bold text-amber-800 mb-1.5">จุดสั่งซื้อ (Min Stock)</label><input type="number" className="w-full border border-amber-300 rounded-lg p-2.5 outline-none focus:ring-2 focus:ring-amber-500 bg-white font-bold text-amber-700" value={formData.minStock} onChange={e => setFormData({...formData, minStock: Number(e.target.value)})} /><p className="text-xs text-amber-600 mt-2">แจ้งเตือนเมื่อต่ำกว่าค่านี้</p></div>
                    <div className="md:col-span-2"><label className="block text-sm font-bold text-gray-700 mb-1.5">URL รูปภาพสินค้า</label><input type="text" className="w-full border border-gray-300 rounded-xl p-3 outline-none focus:ring-2 focus:ring-blue-500" placeholder="https://example.com/image.jpg" value={formData.image} onChange={e => setFormData({...formData, image: e.target.value})} />{formData.image && <img src={formData.image} alt="Preview" className="mt-3 h-32 w-32 object-cover rounded-xl border-2 border-gray-200 shadow-sm" />}</div>
                  </div>
                </div>
                <div className="px-6 py-5 border-t border-gray-100 flex justify-end space-x-3 bg-gray-50 rounded-b-2xl shrink-0"><button onClick={() => setIsModalOpen(false)} className="px-5 py-2.5 rounded-xl text-gray-700 hover:bg-gray-200 font-bold transition-colors">ยกเลิก</button><button onClick={handleSave} className="px-6 py-2.5 rounded-xl bg-blue-600 hover:bg-blue-700 text-white font-bold shadow-md flex items-center transition-transform active:scale-95"><Check size={18} className="mr-2" /> บันทึกข้อมูล</button></div>
              </div>
            </div>
          )}
        </div>
      );
    };

    // --- COMPONENT: History ---
    const HistoryComponent = ({ db, formatDate }) => {
      const [searchTerm, setSearchTerm] = useState('');
      const filteredTransactions = db.transactions.filter(t => {
        const p = db.products.find(x => x.id === t.productId);
        const prodName = p ? p.name.toLowerCase() : '';
        const searchLower = searchTerm.toLowerCase();
        return t.id.toLowerCase().includes(searchLower) || t.referenceNo.toLowerCase().includes(searchLower) || t.productId.toLowerCase().includes(searchLower) || prodName.includes(searchLower);
      });
      return (
        <div className="space-y-6">
          <div className="flex flex-col md:flex-row justify-between items-start md:items-center space-y-4 md:space-y-0">
            <h2 className="text-2xl font-bold text-gray-800">ประวัติความเคลื่อนไหว (Stock Card)</h2>
            <div className="flex w-full md:w-auto space-x-3">
               <div className="relative flex-1 md:w-64 print:hidden"><input type="text" placeholder="ค้นหารหัสเอกสาร, สินค้า..." value={searchTerm} onChange={e => setSearchTerm(e.target.value)} className="w-full pl-10 pr-4 py-2.5 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm shadow-sm" /><Search className="absolute left-3 top-3 text-gray-400" size={18} /></div>
               <button onClick={() => alert('ฟังก์ชัน Export กำลังเตรียมพร้อมในเวอร์ชันถัดไป')} className="flex items-center justify-center text-sm font-bold text-slate-700 bg-white border border-slate-300 px-5 py-2.5 rounded-xl hover:bg-slate-50 print:hidden shadow-sm whitespace-nowrap transition-transform active:scale-95"><Download size={18} className="mr-2" /> ส่งออก Excel</button>
            </div>
          </div>
          <div className="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-x-auto print:overflow-visible print:border-none print:shadow-none">
            <table className="w-full text-left min-w-[800px]">
              <thead className="bg-gray-50 border-b border-gray-100 text-xs uppercase tracking-wider text-gray-600"><tr><th className="px-6 py-4 font-bold">วันที่ / เวลา</th><th className="px-6 py-4 font-bold">รหัสอ้างอิง (TXN)</th><th className="px-6 py-4 font-bold text-center">ประเภท</th><th className="px-6 py-4 font-bold">รหัสสินค้า / ชื่อสินค้า</th><th className="px-6 py-4 font-bold text-right">จำนวน</th><th className="px-6 py-4 font-bold">เอกสารอ้างอิง (Ref)</th></tr></thead>
              <tbody className="divide-y divide-gray-100">
                {filteredTransactions.map(t => {
                  const p = db.products.find(x => x.id === t.productId);
                  return (
                    <tr key={t.id} className="hover:bg-gray-50 transition-colors print:break-inside-avoid">
                      <td className="px-6 py-4 text-sm text-gray-600 font-medium whitespace-nowrap">{formatDate(t.date)}</td>
                      <td className="px-6 py-4 text-xs font-mono font-medium text-gray-400">{t.id}</td>
                      <td className="px-6 py-4"><span className={`px-3 py-1.5 rounded-lg text-[11px] font-black flex items-center w-fit print:border shadow-sm ${t.type === 'IN' ? 'bg-emerald-50 text-emerald-700 border border-emerald-100' : 'bg-amber-50 text-amber-700 border border-amber-100'}`}>{t.type === 'IN' ? <ArrowDownToLine size={14} className="mr-1.5" /> : <ArrowUpFromLine size={14} className="mr-1.5" />}{t.type === 'IN' ? 'รับเข้า' : 'เบิกออก'}</span></td>
                      <td className="px-6 py-4"><div className="text-sm font-bold text-gray-800 whitespace-normal">{p ? p.name : t.productId}</div>{p && <div className="text-xs font-mono text-blue-600 font-medium mt-0.5">{t.productId}</div>}</td>
                      <td className={`px-6 py-4 text-right font-black text-xl ${t.type === 'IN' ? 'text-emerald-600' : 'text-amber-500'}`}>{t.type === 'IN' ? '+' : '-'}{t.qty}</td>
                      <td className="px-6 py-4 text-sm font-medium text-gray-700 whitespace-normal">{t.referenceNo}</td>
                    </tr>
                  )
                })}
                {filteredTransactions.length === 0 && <tr><td colSpan="6" className="px-6 py-10 text-center text-gray-500 font-medium">ไม่พบประวัติการทำรายการที่ค้นหา</td></tr>}
              </tbody>
            </table>
          </div>
        </div>
      );
    };

    // --- COMPONENT: Reports ---
    const ReportsComponent = ({ db }) => {
      const [reportType, setReportType] = useState('inventory'); 
      const totalInventoryValue = db.products.reduce((sum, p) => sum + (p.stock * p.price), 0);
      const formatDate = (iso) => { const d = new Date(iso); return `${d.toLocaleDateString('th-TH')} ${d.toLocaleTimeString('th-TH', {hour: '2-digit', minute:'2-digit'})}`; };

      return (
        <div className="space-y-6">
          <div className="flex flex-col md:flex-row justify-between items-start md:items-center space-y-4 md:space-y-0 print:hidden">
            <h2 className="text-2xl font-bold text-gray-800">ระบบรายงาน (Reports)</h2>
            <div className="flex w-full md:w-auto"><button onClick={() => window.print()} className="bg-blue-600 text-white px-6 py-2.5 rounded-xl hover:bg-blue-700 flex items-center justify-center font-bold shadow-md transition-transform active:scale-95 w-full md:w-auto"><Printer size={18} className="mr-2" /> พิมพ์รายงาน (Print)</button></div>
          </div>

          <div className="bg-white p-2.5 rounded-2xl shadow-sm border border-gray-100 print:hidden flex flex-wrap gap-2">
            <button onClick={() => setReportType('inventory')} className={`px-5 py-2.5 rounded-xl text-sm font-bold flex items-center transition-all ${reportType === 'inventory' ? 'bg-blue-100 text-blue-700 shadow-sm' : 'text-gray-600 hover:bg-gray-100'}`}><Layers size={18} className="mr-2" /> มูลค่าสินค้าคงคลัง</button>
            <button onClick={() => setReportType('po')} className={`px-5 py-2.5 rounded-xl text-sm font-bold flex items-center transition-all ${reportType === 'po' ? 'bg-indigo-100 text-indigo-700 shadow-sm' : 'text-gray-600 hover:bg-gray-100'}`}><ShoppingCart size={18} className="mr-2" /> สรุปการสั่งซื้อ (PO)</button>
            <button onClick={() => setReportType('movement')} className={`px-5 py-2.5 rounded-xl text-sm font-bold flex items-center transition-all ${reportType === 'movement' ? 'bg-emerald-100 text-emerald-700 shadow-sm' : 'text-gray-600 hover:bg-gray-100'}`}><Clock size={18} className="mr-2" /> การเคลื่อนไหวสินค้า (IN/OUT)</button>
          </div>

          <div className="hidden print:block text-center mb-8 border-b-2 border-gray-800 pb-4">
            <h1 className="text-2xl font-bold text-black">ASIA HYDRO SERVICE & PARTS CO.,LTD</h1>
            <h2 className="text-xl text-gray-800 mt-2 font-bold">{reportType === 'inventory' && 'รายงานมูลค่าสินค้าคงคลัง (Inventory Valuation Report)'}{reportType === 'po' && 'รายงานสรุปการสั่งซื้อ (Purchase Order Summary)'}{reportType === 'movement' && 'รายงานการเคลื่อนไหวสินค้า (Stock Movement Report)'}</h2>
            <p className="text-sm text-gray-600 mt-1">พิมพ์เมื่อ: {formatDate(new Date().toISOString())}</p>
          </div>

          {reportType === 'inventory' && (
            <div className="bg-white rounded-2xl shadow-sm border border-gray-100 print:border-none print:shadow-none overflow-hidden">
              <div className="p-6 md:p-8 bg-blue-50/50 border-b border-gray-100 flex flex-col md:flex-row justify-between items-center print:bg-white print:border-b-2 print:border-gray-800 print:p-2"><div><h3 className="text-xl font-bold text-gray-800">สรุปมูลค่าคลังสินค้าทั้งหมด</h3><p className="text-sm font-medium text-gray-500 mt-1 print:hidden">ตามราคาประเมินที่ตั้งไว้ในข้อมูลหลัก (Master Data)</p></div><div className="mt-4 md:mt-0 text-center md:text-right bg-white p-4 rounded-xl border border-gray-200 shadow-sm print:border-none print:p-0 print:shadow-none"><p className="text-sm font-bold text-gray-500 mb-1">มูลค่ารวมทั้งสิ้น</p><p className="text-3xl md:text-4xl font-black text-blue-600 print:text-black">฿{totalInventoryValue.toLocaleString()}</p></div></div>
              <div className="overflow-x-auto print:overflow-visible">
                <table className="w-full text-left min-w-[700px]"><thead className="bg-white border-b text-xs uppercase tracking-wider text-gray-500 print:border-b-2 print:border-gray-800"><tr><th className="px-6 py-4 font-bold">รหัสสินค้า</th><th className="px-6 py-4 font-bold">ชื่อสินค้า</th><th className="px-6 py-4 font-bold">หมวดหมู่</th><th className="px-6 py-4 font-bold text-right">คงเหลือ</th><th className="px-6 py-4 font-bold text-right">ราคาประเมิน/หน่วย</th><th className="px-6 py-4 font-bold text-right">มูลค่ารวม</th></tr></thead><tbody className="divide-y divide-gray-100">
                  {db.products.filter(p => p.stock > 0).map(p => (
                    <tr key={p.id} className="hover:bg-gray-50 print:break-inside-avoid"><td className="px-6 py-4 font-bold text-gray-800">{p.id}</td><td className="px-6 py-4 font-medium text-gray-700">{p.name}</td><td className="px-6 py-4 text-sm font-medium text-gray-500">{p.category || '-'}</td><td className="px-6 py-4 text-right font-black text-lg text-gray-700">{p.stock} <span className="text-xs font-medium text-gray-400">{p.unit}</span></td><td className="px-6 py-4 text-right font-medium text-gray-600">฿{p.price.toLocaleString()}</td><td className="px-6 py-4 text-right font-black text-lg text-blue-600 print:text-black">฿{(p.stock * p.price).toLocaleString()}</td></tr>
                  ))}
                </tbody></table>
              </div>
            </div>
          )}

          {reportType === 'po' && (
            <div className="bg-white rounded-2xl shadow-sm border border-gray-100 print:border-none print:shadow-none overflow-hidden">
              <div className="overflow-x-auto print:overflow-visible">
                <table className="w-full text-left min-w-[800px]"><thead className="bg-gray-50 border-b border-gray-200 text-xs uppercase tracking-wider text-gray-600 print:bg-white print:border-b-2 print:border-gray-800"><tr><th className="px-6 py-4 font-bold">วันที่สั่ง</th><th className="px-6 py-4 font-bold">เลขที่ PO</th><th className="px-6 py-4 font-bold">อ้างอิง PR</th><th className="px-6 py-4 font-bold">ซัพพลายเออร์</th><th className="px-6 py-4 font-bold text-center">สถานะการรับ</th><th className="px-6 py-4 font-bold text-right">มูลค่าประเมิน</th></tr></thead><tbody className="divide-y divide-gray-100">
                  {db.pos.map(po => {
                    const v = db.vendors.find(x=>x.id===po.vendorId);
                    const totalValue = po.items.reduce((sum, item) => sum + (item.expectedQty * item.price), 0);
                    const isCompleted = po.status === 'Completed';
                    return (
                      <tr key={po.id} className="hover:bg-gray-50 print:break-inside-avoid"><td className="px-6 py-4 text-sm font-medium text-gray-600">{po.date}</td><td className="px-6 py-4 text-sm font-bold text-indigo-700">{po.id}</td><td className="px-6 py-4 text-sm font-medium text-gray-500">{po.prId}</td><td className="px-6 py-4 text-sm font-bold text-gray-700">{v ? v.name : po.vendorId}</td><td className="px-6 py-4 text-center"><span className={`px-3 py-1.5 rounded-full text-xs font-bold inline-block w-28 print:border ${isCompleted ? 'bg-emerald-100 text-emerald-700 print:border-emerald-700' : 'bg-blue-100 text-blue-700 print:border-blue-700'}`}>{isCompleted ? 'รับครบแล้ว' : 'รอรับสินค้า'}</span></td><td className="px-6 py-4 text-right font-black text-gray-800">฿{totalValue.toLocaleString()}</td></tr>
                    );
                  })}
                  {db.pos.length === 0 && <tr><td colSpan="6" className="text-center py-10 text-gray-500 font-medium">ไม่มีข้อมูลใบสั่งซื้อ</td></tr>}
                </tbody></table>
              </div>
            </div>
          )}

          {reportType === 'movement' && (
            <div className="bg-white rounded-2xl shadow-sm border border-gray-100 print:border-none print:shadow-none overflow-hidden">
              <div className="overflow-x-auto print:overflow-visible">
                <table className="w-full text-left min-w-[800px]"><thead className="bg-gray-50 border-b border-gray-200 text-xs uppercase tracking-wider text-gray-600 print:bg-white print:border-b-2 print:border-gray-800"><tr><th className="px-6 py-4 font-bold">วันที่ / เวลา</th><th className="px-6 py-4 font-bold text-center">ประเภท</th><th className="px-6 py-4 font-bold">รหัสสินค้า</th><th className="px-6 py-4 font-bold">ชื่อสินค้า</th><th className="px-6 py-4 font-bold text-right">จำนวน</th><th className="px-6 py-4 font-bold">เอกสารอ้างอิง (PO/JOB)</th></tr></thead><tbody className="divide-y divide-gray-100">
                  {db.transactions.map(t => {
                    const p = db.products.find(x=>x.id===t.productId);
                    const isOut = t.type === 'OUT';
                    return (
                      <tr key={t.id} className="hover:bg-gray-50 print:break-inside-avoid"><td className="px-6 py-4 text-sm font-medium text-gray-600 whitespace-nowrap">{formatDate(t.date)}</td><td className="px-6 py-4 text-center"><span className={`px-3 py-1.5 rounded-lg text-xs font-bold inline-block w-20 print:border ${isOut ? 'bg-amber-50 text-amber-700 print:border-amber-700' : 'bg-emerald-50 text-emerald-700 print:border-emerald-700'}`}>{isOut ? 'เบิกออก' : 'รับเข้า'}</span></td><td className="px-6 py-4 text-sm font-bold text-gray-800">{t.productId}</td><td className="px-6 py-4 text-sm font-medium text-gray-700">{p ? p.name : '-'}</td><td className={`px-6 py-4 text-right font-black text-xl ${isOut ? 'text-amber-600 print:text-black' : 'text-emerald-600 print:text-black'}`}>{isOut ? '-' : '+'}{t.qty}</td><td className="px-6 py-4 text-sm font-medium text-gray-600">{t.referenceNo}</td></tr>
                    );
                  })}
                  {db.transactions.length === 0 && <tr><td colSpan="6" className="text-center py-10 text-gray-500 font-medium">ไม่มีข้อมูลการเคลื่อนไหว</td></tr>}
                </tbody></table>
              </div>
            </div>
          )}
        </div>
      );
    };

    // --- COMPONENT: Settings & Users ---
    const SettingsComponent = ({ db, updateDb, showNotify, showAlert, showConfirm }) => {
      const [subTab, setSubTab] = useState('users');
      const [isUserModalOpen, setIsUserModalOpen] = useState(false);
      const [userForm, setUserForm] = useState(null);
      const [isVendorModalOpen, setIsVendorModalOpen] = useState(false);
      const [vendorForm, setVendorForm] = useState(null);

      // User Handlers
      const handleAddUser = () => { setUserForm({ id: `U00${db.users.length + 1}`, username: '', password: '', name: '', role: 'Requester', department: '', isEdit: false }); setIsUserModalOpen(true); };
      const handleEditUser = (user) => { setUserForm({ ...user, isEdit: true }); setIsUserModalOpen(true); };
      const handleDeleteUser = (id) => {
        if (id === 'U001') return showAlert('ปฏิเสธการลบ', 'ไม่สามารถลบบัญชี Admin หลักของระบบได้', 'error');
        showConfirm('ยืนยันลบผู้ใช้งาน', 'คุณต้องการลบบัญชีผู้ใช้งานรหัสนี้ออกจากระบบใช่หรือไม่?', () => { updateDb('users', db.users.filter(u => u.id !== id)); showNotify('ลบข้อมูลผู้ใช้งานสำเร็จ', 'success'); });
      };
      const handleSaveUser = () => {
        if(!userForm.username || !userForm.name || !userForm.password) return showAlert('ข้อมูลไม่ครบ', 'กรุณากรอกข้อมูล Username, รหัสผ่าน และชื่อให้ครบถ้วน', 'error');
        if (userForm.isEdit) { updateDb('users', db.users.map(u => u.id === userForm.id ? userForm : u)); showNotify('อัปเดตข้อมูลผู้ใช้งานสำเร็จ'); } 
        else {
          if(db.users.find(u => u.username === userForm.username)) return showAlert('Username ซ้ำ', 'Username นี้มีในระบบแล้ว กรุณาใช้ชื่ออื่น', 'error');
          updateDb('users', [...db.users, userForm]); showNotify('เพิ่มผู้ใช้งานใหม่สำเร็จ');
        }
        setIsUserModalOpen(false);
      };

      // Vendor Handlers
      const handleAddVendor = () => { setVendorForm({ id: `V00${db.vendors.length + 1}`, name: '', contact: '', email: '', term: 'Cash', isEdit: false }); setIsVendorModalOpen(true); };
      const handleEditVendor = (vendor) => { setVendorForm({ ...vendor, isEdit: true }); setIsVendorModalOpen(true); };
      const handleDeleteVendor = (id) => { showConfirm('ยืนยันการลบ', 'คุณต้องการลบซัพพลายเออร์รายนี้ใช่หรือไม่?', () => { updateDb('vendors', db.vendors.filter(v => v.id !== id)); showNotify('ลบข้อมูลซัพพลายเออร์สำเร็จ', 'success'); }); };
      const handleSaveVendor = () => {
        if(!vendorForm.name) return showAlert('ข้อมูลไม่ครบ', 'กรุณากรอกชื่อบริษัทหรือร้านค้า', 'error');
        if (vendorForm.isEdit) { updateDb('vendors', db.vendors.map(v => v.id === vendorForm.id ? vendorForm : v)); showNotify('อัปเดตข้อมูลซัพพลายเออร์สำเร็จ'); } 
        else { updateDb('vendors', [...db.vendors, vendorForm]); showNotify('เพิ่มซัพพลายเออร์ใหม่สำเร็จ'); }
        setIsVendorModalOpen(false);
      };

      return (
        <div className="space-y-6">
          <h2 className="text-2xl font-bold text-gray-800">ตั้งค่าระบบ (Settings)</h2>
          <div className="flex space-x-2 border-b border-gray-200 overflow-x-auto print:hidden">
            <button onClick={() => setSubTab('users')} className={`px-5 py-3 font-bold border-b-2 transition-colors whitespace-nowrap flex items-center ${subTab === 'users' ? 'border-blue-600 text-blue-600' : 'border-transparent text-gray-500 hover:text-gray-800 hover:bg-gray-50 rounded-t-lg'}`}><Users size={18} className="mr-2" /> ผู้ใช้งานระบบ</button>
            <button onClick={() => setSubTab('vendors')} className={`px-5 py-3 font-bold border-b-2 transition-colors whitespace-nowrap flex items-center ${subTab === 'vendors' ? 'border-blue-600 text-blue-600' : 'border-transparent text-gray-500 hover:text-gray-800 hover:bg-gray-50 rounded-t-lg'}`}><Database size={18} className="mr-2" /> ฐานข้อมูลซัพพลายเออร์</button>
          </div>

          {subTab === 'users' && (
            <div className="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-x-auto animate-in fade-in">
              <div className="p-5 flex justify-end bg-gray-50 border-b border-gray-100 print:hidden"><button onClick={handleAddUser} className="bg-blue-600 text-white px-5 py-2.5 rounded-xl text-sm font-bold flex items-center shadow-md hover:bg-blue-700 transition-transform active:scale-95"><Plus size={18} className="mr-2" /> เพิ่มผู้ใช้งาน</button></div>
              <table className="w-full text-left min-w-[800px]">
                <thead className="bg-white border-b text-xs uppercase tracking-wider text-gray-500"><tr><th className="px-6 py-4 font-bold">รหัสพนักงาน</th><th className="px-6 py-4 font-bold">ชื่อ - นามสกุล</th><th className="px-6 py-4 font-bold">Username</th><th className="px-6 py-4 font-bold">แผนก</th><th className="px-6 py-4 font-bold text-center">ระดับสิทธิ์ (Role)</th><th className="px-6 py-4 font-bold text-center">จัดการ</th></tr></thead>
                <tbody className="divide-y divide-gray-100">
                  {db.users.map(u => (
                    <tr key={u.id} className="hover:bg-gray-50 transition-colors"><td className="px-6 py-4 text-sm font-mono font-medium text-gray-500">{u.id}</td><td className="px-6 py-4 text-sm font-bold text-gray-800">{u.name}</td><td className="px-6 py-4 text-sm text-blue-600 font-bold">{u.username}</td><td className="px-6 py-4 text-sm font-medium text-gray-600">{u.department || '-'}</td><td className="px-6 py-4 text-center"><span className={`px-3 py-1.5 rounded-full text-xs font-bold inline-block w-24 text-center ${u.role === 'Admin' ? 'bg-purple-100 text-purple-700' : u.role === 'Purchaser' ? 'bg-indigo-100 text-indigo-700' : u.role === 'Store' ? 'bg-amber-100 text-amber-700' : 'bg-slate-100 text-slate-700'}`}>{u.role}</span></td><td className="px-6 py-4 text-center"><div className="flex items-center justify-center space-x-2"><button onClick={() => handleEditUser(u)} className="p-2 text-gray-500 bg-white hover:text-amber-600 hover:bg-amber-50 rounded-lg transition-colors border border-gray-200 hover:border-amber-200 shadow-sm" title="แก้ไข"><Edit size={18} /></button><button onClick={() => handleDeleteUser(u.id)} disabled={u.id === 'U001'} className={`p-2 rounded-lg transition-colors border shadow-sm ${u.id === 'U001' ? 'text-gray-300 border-gray-100 bg-gray-50 cursor-not-allowed' : 'text-gray-500 bg-white hover:text-red-600 hover:bg-red-50 border-gray-200 hover:border-red-200'}`} title={u.id === 'U001' ? 'ไม่สามารถลบ Admin หลักได้' : 'ลบผู้ใช้'}><Trash2 size={18} /></button></div></td></tr>
                  ))}
                </tbody>
              </table>
            </div>
          )}

          {subTab === 'vendors' && (
            <div className="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden print:overflow-visible print:border-none print:shadow-none animate-in fade-in">
              <div className="p-5 flex justify-end bg-gray-50 border-b border-gray-100 print:hidden"><button onClick={handleAddVendor} className="bg-indigo-600 text-white px-5 py-2.5 rounded-xl text-sm font-bold flex items-center shadow-md hover:bg-indigo-700 transition-transform active:scale-95"><Plus size={18} className="mr-2" /> เพิ่มซัพพลายเออร์ใหม่</button></div>
              <div className="overflow-x-auto"><table className="w-full text-left min-w-[700px]"><thead className="bg-white border-b text-xs uppercase tracking-wider text-gray-500"><tr><th className="px-6 py-4 font-bold">รหัสผู้ขาย</th><th className="px-6 py-4 font-bold">ชื่อบริษัท / ร้านค้า</th><th className="px-6 py-4 font-bold">เบอร์ติดต่อ</th><th className="px-6 py-4 font-bold">เครดิต (Term)</th><th className="px-6 py-4 font-bold text-center print:hidden">จัดการ</th></tr></thead>
              <tbody className="divide-y divide-gray-100">
                {db.vendors.map(v => (
                  <tr key={v.id} className="hover:bg-indigo-50/50 transition-colors print:break-inside-avoid"><td className="px-6 py-4 font-bold text-indigo-600">{v.id}</td><td className="px-6 py-4 font-bold text-gray-800 whitespace-normal">{v.name}</td><td className="px-6 py-4 text-sm font-medium text-gray-600">{v.contact}</td><td className="px-6 py-4 text-sm font-medium text-gray-600"><span className="bg-gray-100 px-2.5 py-1 rounded-md border border-gray-200">{v.term}</span></td><td className="px-6 py-4 text-center print:hidden"><div className="flex items-center justify-center space-x-2"><button onClick={() => handleEditVendor(v)} className="p-2 text-gray-500 hover:text-indigo-600 hover:bg-indigo-50 rounded-lg transition-colors border border-transparent hover:border-indigo-200"><Edit size={18} /></button><button onClick={() => handleDeleteVendor(v.id)} className="p-2 text-gray-500 hover:text-red-600 hover:bg-red-50 rounded-lg transition-colors border border-transparent hover:border-red-200"><Trash2 size={18} /></button></div></td></tr>
                ))}
              </tbody></table></div>
            </div>
          )}

          {/* User/Vendor Modal */}
          {(isUserModalOpen || isVendorModalOpen) && (
            <div className="fixed inset-0 bg-slate-900/60 z-[150] flex items-center justify-center p-4 backdrop-blur-sm animate-in fade-in">
              <div className="bg-white rounded-2xl shadow-2xl w-full max-w-lg print:hidden flex flex-col animate-in zoom-in-95">
                <div className="px-6 py-5 border-b border-gray-100 flex justify-between items-center sticky top-0 bg-white/90 backdrop-blur-md z-10 rounded-t-2xl">
                  <h3 className="font-bold text-xl text-gray-800">{isUserModalOpen ? (userForm.isEdit ? 'แก้ไขผู้ใช้งาน' : 'เพิ่มผู้ใช้งานใหม่') : (vendorForm.isEdit ? 'แก้ไขซัพพลายเออร์' : 'เพิ่มซัพพลายเออร์')}</h3>
                  <button onClick={() => { setIsUserModalOpen(false); setIsVendorModalOpen(false); }} className="text-gray-400 hover:text-gray-600 bg-gray-100 hover:bg-gray-200 p-1.5 rounded-lg transition-colors"><X size={20} /></button>
                </div>
                <div className="p-6 md:p-8 space-y-5">
                  {isUserModalOpen && userForm ? (
                    <>
                      <div><label className="block text-sm font-bold text-gray-700 mb-2">รหัสพนักงาน</label><input type="text" className="w-full border border-gray-300 rounded-xl p-3 outline-none focus:ring-2 focus:ring-blue-500 bg-gray-100 font-mono font-bold text-gray-500" value={userForm.id} onChange={e => setUserForm({...userForm, id: e.target.value})} disabled={userForm.isEdit} /></div>
                      <div className="grid grid-cols-1 sm:grid-cols-2 gap-5"><div><label className="block text-sm font-bold text-gray-700 mb-2">Username <span className="text-red-500">*</span></label><input type="text" className="w-full border border-gray-300 rounded-xl p-3 outline-none focus:ring-2 focus:ring-blue-500 font-bold" value={userForm.username} onChange={e => setUserForm({...userForm, username: e.target.value})} disabled={userForm.id==='U001'}/></div><div><label className="block text-sm font-bold text-gray-700 mb-2">รหัสผ่าน (Password) <span className="text-red-500">*</span></label><input type="text" className="w-full border border-gray-300 rounded-xl p-3 outline-none focus:ring-2 focus:ring-blue-500 font-bold" value={userForm.password} onChange={e => setUserForm({...userForm, password: e.target.value})} /></div></div>
                      <div><label className="block text-sm font-bold text-gray-700 mb-2">ชื่อ - นามสกุล <span className="text-red-500">*</span></label><input type="text" className="w-full border border-gray-300 rounded-xl p-3 outline-none focus:ring-2 focus:ring-blue-500 font-medium" value={userForm.name} onChange={e => setUserForm({...userForm, name: e.target.value})} /></div>
                      <div className="grid grid-cols-1 sm:grid-cols-2 gap-5"><div><label className="block text-sm font-bold text-gray-700 mb-2">แผนก (Department)</label><input type="text" className="w-full border border-gray-300 rounded-xl p-3 outline-none focus:ring-2 focus:ring-blue-500 font-medium" value={userForm.department} onChange={e => setUserForm({...userForm, department: e.target.value})} /></div><div><label className="block text-sm font-bold text-gray-700 mb-2">ระดับสิทธิ์ (Role)</label><select className="w-full border border-gray-300 rounded-xl p-3 outline-none focus:ring-2 focus:ring-blue-500 font-bold bg-white" value={userForm.role} onChange={e => setUserForm({...userForm, role: e.target.value})} disabled={userForm.id==='U001'}><option value="Requester">Requester (ผู้ขอซื้อ)</option><option value="Purchaser">Purchaser (จัดซื้อ)</option><option value="Store">Store (คลังสินค้า)</option><option value="Admin">Admin (ผู้ดูแลระบบ)</option></select></div></div>
                    </>
                  ) : vendorForm ? (
                    <>
                      <div><label className="block text-sm font-bold text-gray-700 mb-2">ชื่อบริษัท / ร้านค้า <span className="text-red-500">*</span></label><input type="text" className="w-full border border-gray-300 rounded-xl p-3 outline-none focus:ring-2 focus:ring-indigo-500 font-medium" value={vendorForm.name} onChange={e => setVendorForm({...vendorForm, name: e.target.value})} /></div>
                      <div className="grid grid-cols-2 gap-5"><div><label className="block text-sm font-bold text-gray-700 mb-2">เบอร์ติดต่อ</label><input type="text" className="w-full border border-gray-300 rounded-xl p-3 outline-none focus:ring-2 focus:ring-indigo-500 font-medium" value={vendorForm.contact} onChange={e => setVendorForm({...vendorForm, contact: e.target.value})} /></div><div><label className="block text-sm font-bold text-gray-700 mb-2">เครดิต (Term)</label><select className="w-full border border-gray-300 rounded-xl p-3 outline-none focus:ring-2 focus:ring-indigo-500 font-medium bg-white" value={vendorForm.term} onChange={e => setVendorForm({...vendorForm, term: e.target.value})}><option value="Cash">Cash (เงินสด)</option><option value="15 Days">15 Days</option><option value="30 Days">30 Days</option><option value="60 Days">60 Days</option></select></div></div>
                    </>
                  ) : null}
                </div>
                <div className="px-6 py-5 border-t border-gray-100 flex justify-end space-x-3 bg-gray-50/50 rounded-b-2xl">
                  <button onClick={() => { setIsUserModalOpen(false); setIsVendorModalOpen(false); }} className="px-6 py-2.5 rounded-xl text-gray-700 hover:bg-gray-200 font-bold transition-colors">ยกเลิก</button>
                  <button onClick={isUserModalOpen ? handleSaveUser : handleSaveVendor} className={`px-8 py-2.5 rounded-xl text-white font-bold shadow-md flex items-center transition-transform active:scale-95 ${isUserModalOpen ? 'bg-blue-600 hover:bg-blue-700' : 'bg-indigo-600 hover:bg-indigo-700'}`}><Check size={20} className="mr-2" /> บันทึก</button>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    };

    // --- MAIN APP (STATE CONTROLLER) ---
    const App = () => {
      const [gasUrl, setGasUrl] = useState(YOUR_GAS_URL || localStorage.getItem('procure_gas_url') || '');
      const [isSetup, setIsSetup] = useState(!!gasUrl);
      const [db, setDb] = useState(null);
      const [currentUser, setCurrentUser] = useState(null); 
      const [activeTab, setActiveTab] = useState('dashboard'); 
      const [sidebarOpen, setSidebarOpen] = useState(false); 
      const [notification, setNotification] = useState(null);
      const [dialogConfig, setDialogConfig] = useState({ isOpen: false });
      const [isSyncing, setIsSyncing] = useState(false);

      useEffect(() => {
        if (isSetup && gasUrl) fetchDataFromCloud();
      }, [isSetup]);

      const fetchDataFromCloud = async () => {
        try {
          setIsSyncing(true);
          // ใช้ redirect follow เพื่อรองรับการตั้งค่าของ Google
          const response = await fetch(gasUrl, { redirect: "follow" });
          
          if(response.redirected && response.url.includes("ServiceLogin")) {
            throw new Error("AUTH_REQUIRED");
          }

          const text = await response.text();
          const data = JSON.parse(text || "{}");

          if (Object.keys(data).length === 0) {
            setDb(initData); 
            await syncToCloud(initData);
          } else {
            setDb(data);
          }
          setIsSyncing(false);
        } catch (error) {
          console.error("Fetch error:", error);
          if(error.message === "AUTH_REQUIRED") {
            showAlert('ติดสิทธิ์องค์กร (CORS Error)', 'เกิดปัญหาการเข้าถึง Google Apps Script\nวิธีแก้: ไปที่ Apps Script -> Deploy -> ตั้งค่า Who has access เป็น "Anyone" หรือใช้อีเมล @gmail.com สร้าง Backend แทนครับ', 'error');
          } else {
            showAlert('ข้อผิดพลาด', 'ไม่สามารถเชื่อมต่อฐานข้อมูล Cloud ได้ โปรดตรวจสอบ URL ของท่าน', 'error');
          }
          setIsSyncing(false);
        }
      };

      const syncToCloud = async (newData) => {
        try {
          setIsSyncing(true);
          await fetch(gasUrl, { 
            method: 'POST', 
            redirect: 'follow',
            headers: { 'Content-Type': 'text/plain;charset=utf-8' }, 
            body: JSON.stringify(newData) 
          });
          setIsSyncing(false);
        } catch (error) {
          console.error("Sync error:", error);
          showAlert('แจ้งเตือน', 'บันทึกข้อมูลลงเครื่องแล้ว แต่ซิงค์ขึ้น Cloud ล้มเหลว', 'error');
          setIsSyncing(false);
        }
      };

      const updateDb = (collectionName, newCollectionData) => {
        const newDb = { ...db, [collectionName]: newCollectionData };
        setDb(newDb); syncToCloud(newDb);
      };

      const updateMultiple = (updatesObj) => {
        const newDb = { ...db, ...updatesObj };
        setDb(newDb); syncToCloud(newDb);
      };

      const handleSaveUrl = (url) => {
        if(!url.includes('script.google.com')) return alert('URL ไม่ถูกต้อง ต้องมาจาก script.google.com');
        localStorage.setItem('procure_gas_url', url);
        setGasUrl(url); setIsSetup(true);
      };

      const showAlert = (title, message, type = 'info') => setDialogConfig({ isOpen: true, type, title, message });
      const showConfirm = (title, message, onConfirm) => setDialogConfig({ isOpen: true, type: 'confirm', title, message, onConfirm });
      const closeDialog = () => setDialogConfig({ ...dialogConfig, isOpen: false });
      const showNotify = (msg, type = 'success') => { setNotification({ msg, type }); setTimeout(() => setNotification(null), 3000); };
      const changeTab = (tab) => { setActiveTab(tab); setSidebarOpen(false); };

      if (!isSetup) return <SetupGASComponent onSaveUrl={handleSaveUrl} />;
      if (!db) return <div className="h-screen flex flex-col items-center justify-center bg-slate-50"><RefreshCw className="animate-spin text-blue-600 mb-4" size={48} /><h2 className="text-xl font-bold">กำลังเชื่อมต่อฐานข้อมูล Cloud...</h2></div>;
      if (!currentUser) return <><LoginComponent onLogin={setCurrentUser} users={db.users} showAlert={showAlert} /><CustomDialog config={dialogConfig} closeDialog={closeDialog} /></>;

      const perms = getPermissions(currentUser.role);
      const getProduct = (id) => db.products.find(p => p.id === id);

      return (
        <div className="flex h-screen w-full bg-slate-50 font-sans overflow-hidden">
          {/* Cloud Sync Status Indicator */}
          <div className="fixed top-4 right-4 z-[150] bg-white/90 backdrop-blur rounded-full px-4 py-2 shadow-sm border border-gray-200 flex items-center print:hidden">
            {isSyncing ? <><RefreshCw size={16} className="animate-spin text-blue-500 mr-2"/><span className="text-xs font-bold text-gray-600">กำลังบันทึก (Saving)</span></> : 
                         <><Cloud size={16} className="text-emerald-500 mr-2"/><span className="text-xs font-bold text-gray-600">ออนไลน์ (Online)</span></>}
          </div>

          {/* Sidebar Navigation */}
          <div className={`fixed inset-y-0 left-0 z-50 w-72 bg-slate-900 text-white flex flex-col h-full shadow-2xl transition-transform duration-300 transform md:relative md:translate-x-0 print:hidden ${sidebarOpen ? 'translate-x-0' : '-translate-x-full'}`}>
            <div className="p-6 flex items-center space-x-3 border-b border-slate-800">
              <div className="bg-blue-600 p-2.5 rounded-xl"><Box size={24} /></div>
              <h1 className="text-2xl font-black tracking-tight text-white">ASIA HYDRO</h1>
            </div>
            
            <div className="flex-1 py-6 px-4 space-y-1.5 overflow-y-auto custom-scrollbar">
              {currentUser.role !== 'Requester' && (
                <>
                  <div className="text-[11px] font-black text-slate-500 uppercase tracking-widest mb-3 ml-2 mt-2">Main Menu</div>
                  <button onClick={() => changeTab('dashboard')} className={`w-full flex items-center space-x-3 px-4 py-3.5 rounded-xl text-sm font-bold transition-all ${activeTab === 'dashboard' ? 'bg-blue-600 text-white shadow-md' : 'text-slate-300 hover:bg-slate-800 hover:text-white'}`}>
                    <Home size={20} /> <span>แดชบอร์ด</span>
                  </button>
                </>
              )}
              
              {perms.canCreatePR && (
                <>
                  <div className="text-[11px] font-black text-slate-500 uppercase tracking-widest mb-3 mt-6 ml-2">Procurement</div>
                  <button onClick={() => changeTab('pr')} className={`w-full flex items-center space-x-3 px-4 py-3.5 rounded-xl text-sm font-bold transition-all ${activeTab === 'pr' ? 'bg-blue-600 text-white shadow-md' : 'text-slate-300 hover:bg-slate-800 hover:text-white'}`}>
                    <FileText size={20} /> <span>ใบขอซื้อ (PR)</span>
                  </button>
                  {perms.canCreatePO && (
                    <button onClick={() => changeTab('po')} className={`w-full flex items-center space-x-3 px-4 py-3.5 rounded-xl text-sm font-bold transition-all ${activeTab === 'po' ? 'bg-blue-600 text-white shadow-md' : 'text-slate-300 hover:bg-slate-800 hover:text-white'}`}>
                      <ShoppingCart size={20} /> <span>ใบสั่งซื้อ (PO)</span>
                    </button>
                  )}
                </>
              )}

              {perms.canManageInventory && (
                <>
                  <div className="text-[11px] font-black text-slate-500 uppercase tracking-widest mb-3 mt-6 ml-2">Inventory</div>
                  <button onClick={() => changeTab('gr')} className={`w-full flex items-center justify-between px-4 py-3.5 rounded-xl text-sm font-bold transition-all ${activeTab === 'gr' ? 'bg-emerald-500 text-white shadow-md' : 'text-slate-300 hover:bg-slate-800 hover:text-white'}`}>
                    <div className="flex items-center space-x-3"><PackagePlus size={20} /> <span>รับเข้า (สแกน)</span></div>
                    {db.pos.filter(p=>p.status==='Pending Receipt').length > 0 && <span className="bg-red-500 text-white text-[11px] px-2 py-0.5 rounded-full shadow-sm">{db.pos.filter(p=>p.status==='Pending Receipt').length}</span>}
                  </button>
                  <button onClick={() => changeTab('issue')} className={`w-full flex items-center space-x-3 px-4 py-3.5 rounded-xl text-sm font-bold transition-all ${activeTab === 'issue' ? 'bg-amber-500 text-white shadow-md' : 'text-slate-300 hover:bg-slate-800 hover:text-white'}`}>
                    <PackageMinus size={20} /> <span>เบิกจ่าย (สแกน)</span>
                  </button>
                  <button onClick={() => changeTab('stock')} className={`w-full flex items-center space-x-3 px-4 py-3.5 rounded-xl text-sm font-bold transition-all ${activeTab === 'stock' ? 'bg-blue-600 text-white shadow-md' : 'text-slate-300 hover:bg-slate-800 hover:text-white'}`}>
                    <LayoutGrid size={20} /> <span>สต๊อกคงเหลือ</span>
                  </button>
                  <button onClick={() => changeTab('history')} className={`w-full flex items-center space-x-3 px-4 py-3.5 rounded-xl text-sm font-bold transition-all ${activeTab === 'history' ? 'bg-blue-600 text-white shadow-md' : 'text-slate-300 hover:bg-slate-800 hover:text-white'}`}>
                    <Clock size={20} /> <span>ประวัติความเคลื่อนไหว</span>
                  </button>
                </>
              )}

              {perms.canViewReports && (
                <>
                  <div className="text-[11px] font-black text-slate-500 uppercase tracking-widest mb-3 mt-6 ml-2">Analytics</div>
                  <button onClick={() => changeTab('reports')} className={`w-full flex items-center space-x-3 px-4 py-3.5 rounded-xl text-sm font-bold transition-all ${activeTab === 'reports' ? 'bg-blue-600 text-white shadow-md' : 'text-slate-300 hover:bg-slate-800 hover:text-white'}`}>
                    <PieChart size={20} /> <span>รายงาน (Reports)</span>
                  </button>
                </>
              )}
              
              {(perms.canManageSettings || perms.canManageInventory) && (
                <>
                  <div className="text-[11px] font-black text-slate-500 uppercase tracking-widest mb-3 mt-6 ml-2">Settings & Tools</div>
                  {perms.canManageUsers && (
                    <button onClick={() => changeTab('settings')} className={`w-full flex items-center space-x-3 px-4 py-3.5 rounded-xl text-sm font-bold transition-all ${activeTab === 'settings' ? 'bg-blue-600 text-white shadow-md' : 'text-slate-300 hover:bg-slate-800 hover:text-white'}`}>
                      <Settings size={20} /> <span>จัดการระบบ</span>
                    </button>
                  )}
                </>
              )}
            </div>
            
            <div className="p-5 border-t border-slate-800 mt-auto bg-slate-900/50">
              <div className="flex items-center justify-between">
                <div className="flex items-center space-x-3 text-sm text-slate-400">
                  <div className="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center shrink-0 text-white font-bold text-lg shadow-inner">
                    {currentUser.name.charAt(0)}
                  </div>
                  <div className="truncate">
                    <p className="text-white font-bold truncate leading-tight text-[15px]">{currentUser.name}</p>
                    <p className="text-[11px] uppercase text-blue-400 font-black mt-1 tracking-wider">{currentUser.role}</p>
                  </div>
                </div>
                <button onClick={handleLogout} className="text-slate-400 hover:text-red-400 transition-colors p-2.5 rounded-xl hover:bg-slate-800" title="ออกจากระบบ">
                   <LogOut size={20} />
                </button>
              </div>
            </div>
          </div>

          {/* Main Content Area */}
          <div className="flex-1 flex flex-col h-full overflow-hidden relative">
            <header className="bg-white border-b border-gray-200 h-16 flex items-center justify-between px-4 md:px-8 shrink-0 shadow-sm print:hidden z-10">
              <div className="flex items-center">
                <button onClick={() => setSidebarOpen(true)} className="md:hidden text-gray-600 hover:text-blue-600 mr-4 focus:outline-none bg-gray-50 p-2 rounded-lg">
                  <Menu size={24} />
                </button>
                <div className="hidden md:flex text-sm text-gray-500 items-center font-bold">
                  <span className="capitalize text-gray-400">
                    {activeTab === 'gr' || activeTab === 'issue' || activeTab === 'stock' || activeTab === 'history' ? 'Inventory' 
                    : activeTab === 'pr' || activeTab === 'po' ? 'Procurement' 
                    : activeTab === 'reports' ? 'Analytics'
                    : activeTab === 'settings' ? 'Settings' 
                    : 'Main'}
                  </span>
                  <ChevronRight size={16} className="mx-2 text-gray-300" />
                  <span className="text-blue-600 capitalize">
                    {activeTab === 'settings' ? 'System Settings' : activeTab === 'reports' ? 'Reports' : activeTab}
                  </span>
                </div>
                <div className="md:hidden font-black text-gray-800 capitalize text-lg tracking-tight">
                  {activeTab === 'settings' ? 'System Settings' : activeTab === 'gr' ? 'Receive' : activeTab === 'reports' ? 'Reports' : activeTab}
                </div>
              </div>
              <div className="flex items-center space-x-3">
                <button onClick={() => window.print()} className="flex items-center text-sm font-bold text-slate-700 bg-white border border-slate-300 px-4 py-2 rounded-xl hover:bg-slate-50 transition-colors shadow-sm">
                  <Printer size={18} className="mr-0 md:mr-2" /> <span className="hidden md:inline">พิมพ์หน้าจอ</span>
                </button>
              </div>
            </header>

            <main className="flex-1 overflow-y-auto p-4 md:p-8 bg-slate-50/50 print:p-0 print:bg-white print:overflow-visible print:block print:h-auto relative">
              <div className="max-w-7xl mx-auto pb-20 print:max-w-none print:w-full">
                {activeTab === 'dashboard' && <DashboardComponent db={db} changeTab={changeTab} currentUser={currentUser} perms={perms} />}
                {activeTab === 'pr' && <PRComponent db={db} updateDb={updateDb} showNotify={showNotify} showAlert={showAlert} showConfirm={showConfirm} currentUser={currentUser} perms={perms} />}
                {activeTab === 'po' && <POComponent db={db} updateDb={updateDb} showNotify={showNotify} showAlert={showAlert} showConfirm={showConfirm} changeTab={changeTab} />}
                {activeTab === 'gr' && <GoodsReceiptComponent db={db} updateMultiple={updateMultiple} showNotify={showNotify} showAlert={showAlert} showConfirm={showConfirm} getProduct={getProduct} />}
                {activeTab === 'issue' && <GoodsIssueComponent db={db} updateMultiple={updateMultiple} showNotify={showNotify} showAlert={showAlert} showConfirm={showConfirm} getProduct={getProduct} />}
                {activeTab === 'stock' && <StockComponent db={db} updateDb={updateDb} showNotify={showNotify} showAlert={showAlert} showConfirm={showConfirm} />}
                {activeTab === 'history' && <HistoryComponent db={db} formatDate={formatDate} showNotify={showNotify} />}
                {activeTab === 'reports' && <ReportsComponent db={db} formatDate={formatDate} />}
                {activeTab === 'settings' && <SettingsComponent db={db} updateDb={updateDb} showNotify={showNotify} showConfirm={showConfirm} showAlert={showAlert} />}
              </div>
            </main>

            <CustomDialog config={dialogConfig} closeDialog={closeDialog} />

            {notification && (
              <div className={`fixed bottom-6 right-6 px-6 py-4 rounded-2xl shadow-2xl flex items-center text-white text-sm font-bold transition-all duration-300 transform translate-y-0 opacity-100 print:hidden z-[300] ${
                notification.type === 'success' ? 'bg-gray-900' : 'bg-red-600'
              }`}>
                <CheckCircle2 className="mr-3" size={24} />{notification.msg}
              </div>
            )}
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
