<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ASIA HYDRO - Procurement & Inventory System</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700;800&display=swap');
    body { background-color: #f8fafc; font-family: 'Prompt', sans-serif; overflow: hidden; }
    .custom-scrollbar::-webkit-scrollbar { width: 5px; height: 5px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    
    @keyframes slideUpFade { 0% { opacity: 0; transform: translateY(20px); } 100% { opacity: 1; transform: translateY(0); } }
    .animate-slide-up { animation: slideUpFade 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    
    .glass-panel { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.5); }
    .hover-lift { transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
    .hover-lift:hover { transform: translateY(-4px); box-shadow: 0 12px 20px -8px rgba(0, 0, 0, 0.15); }
    
    @media print {
      body { background-color: white !important; overflow: visible !important; }
      .print-hidden { display: none !important; }
      #main-app { display: block !important; height: auto !important; overflow: visible !important; }
    }
  </style>
</head>
<body class="text-slate-800">
  
  <div id="root" class="h-full w-full"></div>

  <script>
    // 🔴 1. วาง URL ของ GOOGLE APPS SCRIPT ของคุณตรงนี้ 🔴
    window.YOUR_GAS_URL = "https://script.google.com/macros/s/AKfycbzZZXmwzaam7WLNTORANnkg9ZK7xsWfspwjpqazXMo_2PX8XGCPZUQp-8AkARZXcZCw2Q/exec"; 

    // --- STATE MANAGEMENT ---
    window.DB = null;
    window.USER = null;
    window.isSetup = false;
    window.isSyncing = false;

    window.state = {
      tab: 'dashboard', sidebar: false, toast: null, dialog: null, 
      pr: { view: 'list', search: '', cart: [], isCustom: false, reqDate:'', jobNo:'', suggestVendor:'', remark:'', productId:'', customName:'', qty:'', unit:'ชิ้น' },
      po: { view: 'list', search: '', prId: '', vendorId: '' },
      gr: { poId: '', scan: '', cart: [], remark: '' },
      iss: { ref: '', scan: '', manual: '', remark: '', cart: [] },
      stk: { view: 'card', search: '', cat: '', loc: '', low: false, selected: [], print: [] },
      his: { search: '' }, rep: { type: 'inventory' }, set: { tab: 'users' }, modal: { type: null, data: null } 
    };

    const getInitData = () => ({
      users: [
        { id: 'U001', username: 'admin', password: '123', name: 'Admin (ดูแลระบบ)', role: 'Admin', department: 'IT' },
        { id: 'U002', username: 'req1', password: '123', name: 'สมชาย (ผู้ขอซื้อ)', role: 'Requester', department: 'Production' },
        { id: 'U003', username: 'pur1', password: '123', name: 'สมศรี (จัดซื้อ)', role: 'Purchaser', department: 'Procurement' },
        { id: 'U004', username: 'store1', password: '123', name: 'สมหมาย (คลังสินค้า)', role: 'Store', department: 'Warehouse' }
      ],
      products: [], vendors: [], prs: [], pos: [], transactions: []
    });

    const getPerms = () => {
      const r = window.USER?.role || '';
      return { pr: ['Admin', 'Requester', 'Purchaser'].includes(r), appr: ['Admin', 'Purchaser'].includes(r), po: ['Admin', 'Purchaser'].includes(r), inv: ['Admin', 'Store'].includes(r), rep: ['Admin', 'Purchaser', 'Store'].includes(r), set: ['Admin'].includes(r) };
    };

    const fDate = iso => {
      if(!iso) return '-'; const d = new Date(iso); return `${d.toLocaleDateString('th-TH')} ${d.toLocaleTimeString('th-TH', {hour:'2-digit', minute:'2-digit'})}`;
    };

    // --- CORE ENGINE ---
    window.updateUI = () => {
      const activeEl = document.activeElement;
      const activeId = activeEl ? activeEl.id : null;
      let cursor = null;
      if (activeEl && (activeEl.tagName === 'INPUT' || activeEl.tagName === 'TEXTAREA')) {
        try { cursor = activeEl.selectionStart; } catch(e){}
      }

      document.getElementById('root').innerHTML = renderApp();

      if (activeId) {
        const el = document.getElementById(activeId);
        if (el) {
          el.focus();
          if (cursor !== null && (el.tagName === 'INPUT' || el.tagName === 'TEXTAREA')) {
            try { el.setSelectionRange(cursor, cursor); } catch(e){}
          }
        }
      }
    };

    // --- API & DB SYNC ---
    window.initFetch = async () => {
      let url = window.YOUR_GAS_URL || localStorage.getItem('procure_gas_url');
      if(!url) { window.isSetup = false; updateUI(); return; }
      window.isSetup = true; window.isSyncing = true; updateUI();
      
      try {
        const res = await fetch(url, { redirect: 'follow' });
        if(res.redirected && res.url.includes("ServiceLogin")) {
           window.showAlert('CORS Error', 'ติดสิทธิ์องค์กร กรุณาใช้ Gmail ส่วนตัวสร้าง Backend', 'error');
           window.isSyncing = false; updateUI(); return;
        }
        const text = await res.text();
        const data = JSON.parse(text || "{}");
        if(Object.keys(data).length === 0 || !data.users) { window.DB = getInitData(); await saveDB(true); } 
        else { window.DB = data; }
      } catch(e) { window.showAlert('ข้อผิดพลาด', 'ไม่สามารถเชื่อมต่อฐานข้อมูลได้', 'error'); }
      window.isSyncing = false; updateUI();
    };

    window.saveDB = async (skipUI = false) => {
      window.isSyncing = true; if(!skipUI) updateUI();
      try {
        let url = window.YOUR_GAS_URL || localStorage.getItem('procure_gas_url');
        await fetch(url, { method: 'POST', redirect: 'follow', headers: { 'Content-Type': 'text/plain;charset=utf-8' }, body: JSON.stringify(window.DB) });
      } catch(e) {
        window.showAlert('แจ้งเตือน', 'บันทึกข้อมูลในเครื่องแล้ว แต่ซิงค์ขึ้น Cloud ล้มเหลว', 'error');
      }
      window.isSyncing = false; if(!skipUI) updateUI();
    };

    window.onload = () => { initFetch(); };

    // --- GLOBAL ACTIONS ---
    window.doLogin = (e) => {
      e.preventDefault();
      const u = document.getElementById('login-u').value.trim();
      const p = document.getElementById('login-p').value.trim();
      const user = window.DB.users.find(x => String(x.username).trim() === u && String(x.password).trim() === p);
      if(user) {
        window.USER = user; window.state.tab = user.role === 'Requester' ? 'pr' : 'dashboard'; window.showToast(`ยินดีต้อนรับคุณ ${user.name}`);
      } else { window.showAlert('เข้าสู่ระบบล้มเหลว', 'ชื่อผู้ใช้งานหรือรหัสผ่านไม่ถูกต้อง', 'error'); }
    };
    window.doLogout = () => { window.showConfirm('ออกจากระบบ', 'ยืนยัน?', () => { window.USER = null; updateUI(); }); };
    window.changeTab = (t) => { window.state.tab = t; window.state.sidebar = false; updateUI(); };
    window.saveUrl = (u) => { if(!u.includes('script.google.com')) return alert('URL ไม่ถูกต้อง'); localStorage.setItem('procure_gas_url', u); window.YOUR_GAS_URL = u; initFetch(); };

    // --- UI HELPERS ---
    window.showToast = (msg, type='success') => { window.state.toast = { msg, type }; updateUI(); setTimeout(() => { window.state.toast = null; updateUI(); }, 3000); };
    window.showAlert = (title, msg, type='error') => { window.state.dialog = { type, title, msg }; updateUI(); };
    window.showConfirm = (title, msg, onConfirm) => { window.pendingConfirm = onConfirm; window.state.dialog = { type: 'confirm', title, msg }; updateUI(); };
    window.closeDialog = () => { window.state.dialog = null; updateUI(); };
    window.execConfirm = () => { if(window.pendingConfirm) window.pendingConfirm(); window.closeDialog(); };

    // =========================================================================
    // HTML RENDERING FUNCTIONS
    // =========================================================================
    function renderApp() {
      if (!window.isSetup) return htmlSetup();
      if (!window.DB) return htmlLoading();
      if (!window.USER) return htmlLogin();

      const perms = getPerms();
      return `
        <div class="flex h-screen w-full bg-slate-50 overflow-hidden print-hidden">
          ${htmlSyncStatus()}
          ${htmlSidebar(perms)}
          <div class="flex-1 flex flex-col h-full relative w-full overflow-hidden">
            ${htmlHeader()}
            <main class="flex-1 overflow-y-auto p-4 md:p-6 lg:p-8 relative custom-scrollbar">
              <div class="max-w-7xl mx-auto pb-20 animate-slide-up">${htmlActiveTab(perms)}</div>
            </main>
          </div>
          ${htmlModals()}
          ${htmlToast()}
        </div>
        ${state.stk.print.length > 0 ? htmlPrintView() : ''}
      `;
    }

    function htmlSetup() {
      return `<div class="min-h-screen bg-slate-100 flex items-center justify-center p-4"><div class="glass-panel p-10 rounded-3xl shadow-2xl w-full max-w-lg text-center animate-in zoom-in-95"><div class="bg-gradient-to-br from-emerald-400 to-emerald-600 w-20 h-20 rounded-2xl flex items-center justify-center mx-auto mb-6 shadow-lg"><i class="fas fa-cloud text-4xl text-white"></i></div><h1 class="text-3xl font-black mb-2 text-slate-800">เชื่อมต่อคลาวด์</h1><p class="text-slate-500 text-sm mb-6 font-medium">วาง URL จาก Google Apps Script (แนะนำใช้ Gmail ส่วนตัว)</p><input type="text" id="setup-url" class="w-full p-4 border border-slate-200 rounded-xl outline-none font-mono text-sm bg-white/50 mb-6 focus:ring-2 focus:ring-emerald-500 shadow-inner" placeholder="https://script.google.com/.../exec"><button onclick="window.saveUrl(document.getElementById('setup-url').value)" class="w-full bg-emerald-600 text-white py-4 rounded-xl font-black text-lg shadow-lg hover:bg-emerald-700 active:scale-95 transition-all">เริ่มต้นใช้งาน</button></div></div>`;
    }
    function htmlLoading() { return `<div class="h-screen flex flex-col items-center justify-center bg-slate-50"><i class="fas fa-circle-notch fa-spin text-blue-600 text-6xl mb-6"></i><h2 class="text-2xl font-black text-slate-700 tracking-wide">กำลังดึงข้อมูล...</h2></div>`; }
    function htmlLogin() {
      return `<div class="min-h-screen bg-slate-100 flex items-center justify-center p-4 relative overflow-hidden"><div class="absolute top-[-10%] left-[-10%] w-96 h-96 bg-blue-400 rounded-full mix-blend-multiply filter blur-3xl opacity-30 animate-pulse"></div><div class="absolute bottom-[-10%] right-[-10%] w-96 h-96 bg-indigo-400 rounded-full mix-blend-multiply filter blur-3xl opacity-30 animate-pulse"></div><div class="glass-panel p-8 md:p-10 rounded-[2rem] shadow-2xl w-full max-w-md animate-in slide-in-from-bottom-8 duration-500 relative z-10 border border-white/60"><div class="text-center mb-10"><div class="bg-gradient-to-br from-blue-600 to-indigo-700 w-20 h-20 rounded-[1.5rem] flex items-center justify-center mx-auto mb-6 shadow-xl transform rotate-3 hover:rotate-0 transition-transform duration-300"><i class="fas fa-layer-group text-white text-4xl"></i></div><h1 class="text-3xl font-black text-slate-800 tracking-tighter">ASIA HYDRO</h1><p class="text-slate-500 text-sm mt-2 font-medium">Smart Procurement & Inventory</p></div><form onsubmit="window.doLogin(event)" class="space-y-6"><div><div class="relative"><i class="fas fa-user absolute left-5 top-[18px] text-slate-400"></i><input type="text" id="login-u" class="w-full pl-12 pr-4 py-4 border-2 border-slate-100 rounded-2xl outline-none focus:ring-4 focus:ring-blue-50 focus:border-blue-500 bg-white/50 shadow-inner font-bold text-slate-700" placeholder="Username" required></div></div><div><div class="relative"><i class="fas fa-lock absolute left-5 top-[18px] text-slate-400"></i><input type="password" id="login-p" class="w-full pl-12 pr-4 py-4 border-2 border-slate-100 rounded-2xl outline-none focus:ring-4 focus:ring-blue-50 focus:border-blue-500 bg-white/50 shadow-inner font-bold text-slate-700" placeholder="Password" required></div></div><button type="submit" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-black text-lg shadow-lg hover:shadow-blue-500/30 hover:bg-blue-700 transition-all hover-lift active:scale-95">เข้าสู่ระบบ</button></form></div></div>`;
    }

    function htmlSyncStatus() {
      return `
        <div class="fixed top-4 md:top-6 right-4 md:right-6 z-[150] glass-panel rounded-full px-5 py-2.5 shadow-lg flex items-center transition-all duration-300">
          ${window.isSyncing ? '<i class="fas fa-circle-notch fa-spin text-blue-600 mr-2.5 text-lg"></i><span class="text-sm font-bold text-slate-700">กำลังซิงค์...</span>' : '<i class="fas fa-cloud text-emerald-500 mr-2.5 text-lg"></i><span class="text-sm font-bold text-slate-700">ซิงค์แล้ว</span>'}
        </div>
      `;
    }
    function htmlHeader() {
      let tName = state.tab === 'gr' ? 'รับเข้าสต๊อก (GR)' : state.tab === 'issue' ? 'เบิกจ่าย (Issue)' : state.tab === 'pr' ? 'ใบขอซื้อ (PR)' : state.tab === 'po' ? 'ใบสั่งซื้อ (PO)' : state.tab === 'stock' ? 'สินค้าคงคลัง' : state.tab === 'history' ? 'ประวัติความเคลื่อนไหว' : state.tab === 'reports' ? 'ระบบรายงาน' : state.tab === 'settings' ? 'ตั้งค่าระบบ' : 'แดชบอร์ด';
      return `<header class="bg-white/90 backdrop-blur-lg border-b border-slate-200 h-20 flex items-center justify-between px-4 md:px-8 shrink-0 z-30 sticky top-0"><div class="flex items-center"><button onclick="window.state.sidebar=true; window.updateUI()" class="md:hidden mr-4 bg-slate-100 p-2.5 rounded-xl hover:bg-slate-200 transition-colors"><i class="fas fa-bars text-slate-700"></i></button><h2 class="font-black text-slate-800 text-xl md:text-2xl">${tName}</h2></div><button onclick="window.print()" class="hidden md:flex text-sm font-bold bg-white border border-slate-200 text-slate-600 px-5 py-2.5 rounded-xl shadow-sm hover:bg-slate-50 transition-colors hover-lift items-center"><i class="fas fa-print mr-2 text-blue-500"></i>พิมพ์หน้าจอ</button></header>`;
    }
    function htmlSidebar(p) {
      const btn = (id, icon, txt, badge='') => `<button onclick="window.changeTab('${id}')" class="w-full flex items-center space-x-3 px-5 py-4 rounded-2xl text-sm font-bold transition-all duration-200 ${state.tab===id?'bg-blue-600 text-white shadow-lg shadow-blue-600/30':'text-slate-400 hover:bg-slate-800 hover:text-white'}"><i class="fas ${icon} w-6 text-center text-lg"></i><span>${txt}</span>${badge}</button>`;
      const head = txt => `<div class="text-[10px] font-black text-slate-500 uppercase tracking-widest mt-8 mb-3 ml-3">${txt}</div>`;
      const poWait = window.DB.pos.filter(x=>x.status==='Pending Receipt').length;
      const bPo = poWait > 0 ? `<span class="bg-red-500 text-white text-[11px] px-2.5 py-0.5 rounded-full ml-auto shadow-sm">${poWait}</span>` : '';

      return `
        ${state.sidebar ? `<div class="fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-40 md:hidden animate-in fade-in" onclick="window.state.sidebar=false; window.updateUI()"></div>` : ''}
        <nav class="fixed inset-y-0 left-0 z-50 w-[280px] bg-slate-900 flex flex-col h-full shadow-2xl transition-transform transform duration-300 md:relative md:translate-x-0 ${state.sidebar ? 'translate-x-0' : '-translate-x-full'}">
          <div class="p-6 flex justify-between items-center border-b border-slate-800/50"><div class="flex items-center space-x-3"><div class="bg-gradient-to-br from-blue-500 to-blue-700 p-3 rounded-2xl shadow-inner"><i class="fas fa-layer-group text-white text-xl"></i></div><h1 class="text-2xl font-black text-white tracking-tight">AH-IMS</h1></div><button onclick="window.state.sidebar=false; window.updateUI()" class="md:hidden text-slate-500 hover:text-white bg-slate-800 p-2 rounded-xl"><i class="fas fa-times text-xl"></i></button></div>
          <div class="flex-1 py-6 px-4 space-y-1 overflow-y-auto custom-scrollbar">
            ${window.USER.role!=='Requester' ? btn('dashboard','fa-chart-pie','แดชบอร์ด') : ''}
            ${p.pr ? head('ระบบจัดซื้อ') + btn('pr','fa-file-invoice','ใบขอซื้อ (PR)') + (p.po ? btn('po','fa-shopping-cart','ใบสั่งซื้อ (PO)') : '') : ''}
            ${p.inv ? head('คลังสินค้า') + btn('gr','fa-truck-loading','รับเข้า (GR)', bPo) + btn('issue','fa-dolly','เบิกจ่าย (Issue)') + btn('stock','fa-cubes','สต๊อกสินค้า') + btn('history','fa-clipboard-list','ประวัติเคลื่อนไหว') : ''}
            ${p.rep ? head('วิเคราะห์ข้อมูล') + btn('reports','fa-chart-line','รายงาน (Reports)') : ''}
            ${p.set ? head('ตั้งค่าระบบ') + btn('settings','fa-cog','จัดการระบบ') : ''}
          </div>
          <div class="p-5 border-t border-slate-800/50 mt-auto bg-slate-900/80 flex justify-between items-center"><div class="flex items-center space-x-3"><div class="w-12 h-12 bg-slate-800 rounded-2xl flex items-center justify-center font-black text-xl text-blue-400 border border-slate-700 shadow-inner">${window.USER.name.charAt(0)}</div><div class="truncate"><p class="font-bold text-sm text-white">${window.USER.name}</p><p class="text-[10px] text-slate-500 font-bold uppercase tracking-wider mt-0.5">${window.USER.role}</p></div></div><button onclick="window.doLogout()" class="text-slate-500 hover:text-red-400 p-3 rounded-xl hover:bg-slate-800 transition-colors"><i class="fas fa-power-off text-xl"></i></button></div>
        </nav>
      `;
    }

    function htmlActiveTab(p) {
      const t = state.tab;
      if(t==='dashboard') return viewDashboard(p);
      if(t==='pr') return viewPR(p);
      if(t==='po') return viewPO(p);
      if(t==='gr') return viewGR();
      if(t==='issue') return viewIssue();
      if(t==='stock') return viewStock(p);
      if(t==='history') return viewHistory();
      if(t==='reports') return viewReports();
      if(t==='settings') return viewSettings();
      return '';
    }

    // --- VIEWS ---
    function viewDashboard(p) {
      const prods = window.DB.products; const txns = window.DB.transactions;
      const hStk = prods.filter(x=>x.stock>x.minStock).length; const lStk = prods.filter(x=>x.stock>0 && x.stock<=x.minStock).length; const oStk = prods.filter(x=>x.stock===0).length;
      const hPct = Math.round((hStk/prods.length)*100)||0; const lPct = Math.round((lStk/prods.length)*100)||0; const oPct = Math.round((oStk/prods.length)*100)||0;
      
      let acts = '';
      if(p.pr) acts+=`<button onclick="window.state.tab='pr'; window.state.pr.view='create'; window.updateUI()" class="bg-white/20 hover:bg-white/30 backdrop-blur-sm border border-white/20 px-5 py-2.5 rounded-xl font-bold flex items-center transition-all hover-lift"><i class="fas fa-plus mr-2"></i>สร้าง PR</button>`;
      if(p.inv) acts+=`<button onclick="window.changeTab('gr')" class="bg-emerald-500/90 hover:bg-emerald-400 backdrop-blur-sm px-5 py-2.5 rounded-xl font-bold flex items-center shadow-lg transition-all hover-lift border border-emerald-400/50"><i class="fas fa-truck-loading mr-2"></i>รับเข้า</button><button onclick="window.changeTab('issue')" class="bg-amber-500/90 hover:bg-amber-400 backdrop-blur-sm px-5 py-2.5 rounded-xl font-bold flex items-center shadow-lg transition-all hover-lift border border-amber-400/50"><i class="fas fa-dolly mr-2"></i>เบิกออก</button>`;
      
      let cards = '';
      if(p.pr) cards += `<div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-100 cursor-pointer hover-lift flex items-center space-x-5" onclick="window.changeTab('pr')"><div class="p-4 bg-blue-50 text-blue-600 rounded-2xl"><i class="fas fa-file-invoice text-3xl"></i></div><div><p class="text-xs text-slate-500 font-bold uppercase tracking-wider mb-1">PR รอพิจารณา</p><p class="text-3xl font-black text-slate-800">${window.DB.prs.filter(x=>x.status==='Pending').length}</p></div></div>`;
      if(p.po) cards += `<div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-100 cursor-pointer hover-lift flex items-center space-x-5" onclick="window.changeTab('po')"><div class="p-4 bg-indigo-50 text-indigo-600 rounded-2xl"><i class="fas fa-shopping-cart text-3xl"></i></div><div><p class="text-xs text-slate-500 font-bold uppercase tracking-wider mb-1">PO รอรับของ</p><p class="text-3xl font-black text-slate-800">${window.DB.pos.filter(x=>x.status==='Pending Receipt').length}</p></div></div>`;
      if(p.inv) {
        cards += `<div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-100 cursor-pointer hover-lift flex items-center space-x-5" onclick="window.changeTab('stock')"><div class="p-4 bg-emerald-50 text-emerald-600 rounded-2xl"><i class="fas fa-cubes text-3xl"></i></div><div><p class="text-xs text-slate-500 font-bold uppercase tracking-wider mb-1">สินค้าในคลัง</p><p class="text-3xl font-black text-slate-800">${prods.length}</p></div></div>`;
        cards += `<div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-100 cursor-pointer hover-lift flex items-center space-x-5" onclick="window.changeTab('stock')"><div class="p-4 bg-red-50 text-red-500 rounded-2xl"><i class="fas fa-exclamation-triangle text-3xl"></i></div><div><p class="text-xs text-slate-500 font-bold uppercase tracking-wider mb-1">สต๊อกวิกฤต</p><p class="text-3xl font-black text-red-600">${lStk+oStk}</p></div></div>`;
      }

      let recentTx = txns.slice(0,5).map(t => {
        const pd = prods.find(x=>x.id===t.productId);
        const isOut = t.type === 'OUT';

        return `
          <div class="bg-white rounded-3xl shadow-sm border border-slate-100 p-6 md:p-10 max-w-4xl mx-auto animate-in fade-in">
            <div class="flex justify-between items-center mb-8 border-b border-slate-100 pb-5"><h2 class="text-2xl md:text-3xl font-black text-slate-800 tracking-tight">สร้างใบสั่งซื้อ (PO)</h2><button onclick="window.state.po.view='list'; window.updateUI()" class="bg-slate-100 font-bold px-5 py-2.5 rounded-xl text-slate-600 hover:bg-slate-200 transition-colors">กลับ</button></div>
            <div class="space-y-6">
              <div class="grid grid-cols-1 md:grid-cols-2 gap-6 bg-indigo-50/50 p-8 rounded-3xl border-2 border-indigo-50">
                <div><label class="block font-black text-indigo-900 mb-2 uppercase tracking-wide text-xs">อ้างอิง PR *</label><select id="po-pr-sel" onchange="window.state.po.prId=this.value; window.updateUI()" class="w-full border-2 border-white shadow-sm rounded-xl p-4 outline-none focus:ring-4 focus:ring-indigo-100 bg-white font-bold text-slate-700"><option value="">-- เลือก PR --</option>${prOpts}</select></div>
                <div><label class="block font-black text-indigo-900 mb-2 uppercase tracking-wide text-xs">ร้านค้า/ผู้จำหน่าย *</label><select id="po-v-sel" onchange="window.state.po.vendorId=this.value; window.updateUI()" class="w-full border-2 border-white shadow-sm rounded-xl p-4 outline-none focus:ring-4 focus:ring-indigo-100 bg-white font-bold text-slate-700"><option value="">-- เลือกร้านค้า --</option>${vOpts}</select></div>
              </div>
              ${preHtml}
              <div class="text-right mt-8 pt-6 border-t border-slate-100"><button onclick="window.savePo()" class="bg-indigo-600 text-white px-10 py-4 rounded-xl font-black text-lg shadow-[0_4px_14px_0_rgba(79,70,229,0.39)] hover:bg-indigo-700 hover-lift"><i class="fas fa-check mr-2"></i> ยืนยันออก PO</button></div>
            </div>
          </div>
        `;
      }

      const q = s.search.toLowerCase();
      const list = window.DB.pos.filter(x => {
        const v = window.DB.vendors.find(y=>y.id===x.vendorId);
        return x.id.toLowerCase().includes(q) || x.prId.toLowerCase().includes(q) || (v&&v.name.toLowerCase().includes(q));
      });

      const trs = list.map(po => {
        const v = window.DB.vendors.find(y=>y.id===po.vendorId);
        const b = po.status==='Completed'?'bg-emerald-100 text-emerald-700':'bg-blue-100 text-blue-700';
        return `<tr class="hover:bg-slate-50 transition-colors"><td class="p-5 font-black text-indigo-600 text-base">${po.id}</td><td class="p-5 text-sm font-bold text-slate-500">${po.prId}</td><td class="p-5 font-bold text-slate-800">${v?.name||''}</td><td class="p-5 text-center text-sm font-medium text-slate-500">${po.date}</td><td class="p-5 text-center"><span class="px-4 py-1.5 rounded-full text-[10px] font-black uppercase tracking-wider inline-block w-28 ${b}">${po.status==='Completed'?'รับครบแล้ว':'รอรับของ'}</span></td><td class="p-5 text-center print-hidden">${po.status==='Pending Receipt'?`<button onclick="window.delPo('${po.id}')" class="text-red-500 bg-white border border-red-200 hover:bg-red-50 px-4 py-1.5 rounded-lg text-xs font-bold hover-lift shadow-sm">ยกเลิก PO</button>`:''}</td></tr>`;
      }).join('');

      return `
        <div class="space-y-6">
          <div class="flex flex-col md:flex-row justify-between md:items-center gap-4"><h2 class="text-3xl font-black tracking-tight text-slate-800">ใบสั่งซื้อ (PO)</h2><div class="flex gap-3"><div class="relative"><input type="text" placeholder="ค้นหา PO..." value="${s.search}" oninput="window.state.po.search=this.value; window.updateUI()" class="pl-12 pr-4 py-3.5 border-none shadow-sm bg-white rounded-2xl outline-none focus:ring-2 focus:ring-indigo-500 w-full md:w-72 font-medium"><i class="fas fa-search absolute left-5 top-4 text-slate-400"></i></div><button onclick="window.state.po.view='create'; window.updateUI()" class="bg-indigo-600 text-white px-6 py-3.5 rounded-2xl font-bold shadow-[0_4px_14px_0_rgba(79,70,229,0.39)] hover-lift whitespace-nowrap"><i class="fas fa-plus mr-2"></i> สร้าง PO</button></div></div>
          <div class="bg-white rounded-3xl shadow-sm border border-slate-100 overflow-x-auto"><table class="w-full text-left min-w-[900px]"><thead class="bg-slate-50/50 border-b border-slate-100 text-xs uppercase tracking-widest text-slate-400"><tr><th class="p-5 font-black">เลขที่ PO</th><th class="p-5 font-black">อ้างอิง PR</th><th class="p-5 font-black">ซัพพลายเออร์</th><th class="p-5 font-black text-center">วันที่สั่ง</th><th class="p-5 font-black text-center">สถานะ</th><th class="p-5 font-black text-center print-hidden">จัดการ</th></tr></thead><tbody class="divide-y divide-slate-100">${trs||`<tr><td colspan="6" class="p-16 text-center"><i class="fas fa-shopping-cart text-4xl text-slate-200 mb-4 block"></i><span class="font-bold text-slate-400">ไม่พบเอกสาร PO</span></td></tr>`}</tbody></table></div>
        </div>
      `;
    }

    // --- GR VIEW ---
    window.grHandleScan = (e) => {
      if(e.key === 'Enter') {
        const v = e.target.value.trim(); e.target.value = '';
        if(!v) return;
        const p = window.DB.products.find(x=>x.barcode===v || x.id===v);
        if(!p) return window.showAlert('ไม่พบสินค้า', 'ไม่มีสินค้านี้ในระบบ', 'error');
        const po = window.DB.pos.find(x=>x.id===state.gr.poId);
        const item = po.items.find(i=>!i.isCustom && i.productId===p.id);
        if(!item) return window.showAlert('ผิดพลาด', 'สินค้านี้ไม่ได้อยู่ใน PO ที่เลือก', 'error');
        
        const exist = state.gr.cart.find(i=>!i.isCustom && i.productId===p.id);
        if((exist?exist.qty:0)+1 > item.expectedQty - item.receivedQty) return window.showAlert('จำนวนเกิน', 'รับสินค้าเกินที่สั่งแล้ว', 'error');
        
        if(exist) exist.qty += 1; else state.gr.cart.push({ isCustom:false, productId:p.id, qty:1 });
        window.updateUI();
      }
    };
    window.grManual = (pid) => {
      const po = window.DB.pos.find(x=>x.id===state.gr.poId);
      const item = po.items.find(i=>i.productId===pid);
      const exist = state.gr.cart.find(i => item.isCustom ? i.customName===item.customName : i.productId===item.productId);
      const curr = exist ? exist.qty : 0;
      if(curr + 1 > item.expectedQty - item.receivedQty) return window.showAlert('จำนวนเกิน', 'รับครบแล้ว', 'error');
      
      if(exist) exist.qty += 1;
      else state.gr.cart.push({ isCustom: item.isCustom, productId: item.productId, customName: item.customName, qty: 1 });
      window.updateUI();
    };
    window.grUpdateQty = (pid, val) => {
      const q = parseInt(val) || 0; if(q<0)return;
      const po = window.DB.pos.find(p=>p.id===state.gr.poId);
      const it = po.items.find(i=>i.productId===pid);
      if(q > it.expectedQty - it.receivedQty) return window.showAlert('จำนวนเกิน', `รับได้สูงสุด ${it.expectedQty - it.receivedQty}`, 'error');
      
      const cIdx = state.gr.cart.findIndex(i => it.isCustom ? i.customName===it.customName : i.productId===it.productId);
      if(q===0 && cIdx > -1) state.gr.cart.splice(cIdx, 1);
      else if(cIdx > -1) state.gr.cart[cIdx].qty = q;
      else if(q>0) state.gr.cart.push({ isCustom: it.isCustom, productId: it.productId, customName: it.customName, qty: q });
      window.updateUI();
    };
    window.grSave = () => {
      if(state.gr.cart.length===0) return;
      window.showConfirm('รับเข้าคลัง', 'ยืนยันเพิ่มยอดสต๊อกทันที?', () => {
        const poIdx = window.DB.pos.findIndex(p=>p.id===state.gr.poId);
        let po = JSON.parse(JSON.stringify(window.DB.pos[poIdx]));
        const ref = state.gr.remark ? `${po.id} (${state.gr.remark})` : po.id;
        
        state.gr.cart.forEach(scan => {
          po.items.find(i => scan.isCustom ? i.customName===scan.customName : i.productId===scan.productId).receivedQty += scan.qty;
          if(!scan.isCustom) {
            window.DB.products.find(p=>p.id===scan.productId).stock += scan.qty;
            window.DB.transactions.unshift({ id: `TXN-${Date.now()}-${Math.floor(Math.random()*100)}`, type:'IN', date:new Date().toISOString(), productId:scan.productId, qty:scan.qty, referenceNo:ref });
          }
        });
        
        if(po.items.every(i=>i.receivedQty>=i.expectedQty)) po.status = 'Completed';
        window.DB.pos[poIdx] = po;
        state.gr.poId=''; state.gr.cart=[]; state.gr.remark='';
        window.saveDB(); window.showToast('รับของสำเร็จ');
      });
    };

    function viewGR() {
      const s = state.gr;
      if(!s.poId) {
        const activePOs = window.DB.pos.filter(p=>p.status==='Pending Receipt');
        const opts = activePOs.map(po => `<option value="${po.id}">${po.id} - ${window.DB.vendors.find(v=>v.id===po.vendorId)?.name||''}</option>`).join('');
        return `
          <h2 class="text-3xl font-black tracking-tight mb-8">รับสินค้าเข้าสต๊อก (Goods Receipt)</h2>
          <div class="bg-white p-12 rounded-[2rem] shadow-sm border border-slate-100 text-center max-w-2xl mx-auto mt-10 animate-slide-up relative overflow-hidden">
            <div class="bg-emerald-50 w-24 h-24 rounded-[2rem] flex items-center justify-center mx-auto mb-6 shadow-inner border border-emerald-100"><i class="fas fa-truck-loading text-5xl text-emerald-500"></i></div>
            <h3 class="text-2xl font-black text-slate-800 mb-2">สแกนรับสินค้าเข้าคลัง</h3>
            <p class="text-slate-500 mb-8 font-medium">กรุณาเลือกใบสั่งซื้อ (PO) ที่รอรับของเพื่อดำเนินการต่อ</p>
            <div class="relative max-w-md mx-auto">
              <select onchange="window.state.gr.poId=this.value; window.state.gr.cart=[]; window.updateUI()" class="w-full border-2 border-emerald-100 hover:border-emerald-200 rounded-2xl p-4 pl-12 text-lg outline-none focus:border-emerald-500 focus:ring-4 focus:ring-emerald-50 bg-white font-bold text-slate-700 shadow-sm transition-all appearance-none cursor-pointer"><option value="">-- คลิกเพื่อเลือกใบ PO --</option>${opts}</select>
              <i class="fas fa-file-invoice absolute left-5 top-5 text-emerald-400"></i><i class="fas fa-chevron-down absolute right-5 top-5 text-emerald-400"></i>
            </div>
          </div>
        `;
      }

      const po = window.DB.pos.find(p=>p.id===s.poId);
      const trs = po.items.map((it, idx) => {
        const p = !it.isCustom ? window.DB.products.find(x=>x.id===it.productId) : null;
        const name = it.isCustom ? it.customName : p?.name;
        const sq = s.cart.find(i => it.isCustom ? i.customName===it.customName : i.productId===it.productId)?.qty || 0;
        const isComp = it.receivedQty + sq >= it.expectedQty;
        
        return `
          <tr class="border-b border-slate-100 ${sq>0?'bg-emerald-50/50':''}">
            <td class="p-5"><div class="font-bold text-slate-800 text-base">${name} ${it.isCustom?'<span class="text-[10px] bg-amber-100 text-amber-700 px-2 py-0.5 rounded ml-2 font-black uppercase">นอกระบบ</span>':''}</div><div class="text-xs font-mono text-blue-500 font-medium mt-1">${p?.barcode || it.productId}</div></td>
            <td class="p-5 text-center font-bold text-slate-500 text-xl">${it.expectedQty}</td>
            <td class="p-5 text-center font-bold text-slate-400 text-xl">${it.receivedQty}</td>
            <td class="p-5 text-center">${isComp&&sq===0?'<span class="text-emerald-500 font-black text-2xl">-</span>':`<input type="number" min="0" max="${it.expectedQty-it.receivedQty}" value="${sq}" onchange="window.grUpdateQty('${it.productId}', this.value)" class="w-24 border-2 border-slate-200 rounded-xl p-2.5 text-center font-black text-emerald-600 text-xl outline-none focus:border-emerald-500 focus:ring-4 focus:ring-emerald-50 shadow-inner">`}</td>
            <td class="p-5 text-center">${isComp?'<i class="fas fa-check-circle text-emerald-500 text-3xl drop-shadow-sm"></i>':`<button onclick="window.grManual('${it.productId}')" class="text-xs bg-white border border-slate-200 hover:bg-slate-50 hover:border-slate-300 px-4 py-2.5 rounded-xl font-bold shadow-sm hover-lift text-slate-600"><i class="fas fa-plus mr-1"></i> รับมือ</button>`}</td>
          </tr>
        `;
      }).join('');

      return `
        <h2 class="text-3xl font-black tracking-tight mb-8">รับสินค้าเข้าสต๊อก (Goods Receipt)</h2>
        <div class="grid grid-cols-1 xl:grid-cols-3 gap-8 animate-in slide-in-from-bottom-4">
          <div class="xl:col-span-2 space-y-6">
            <div class="bg-white p-8 rounded-3xl border border-slate-100 shadow-sm print-hidden"><label class="block font-black text-slate-800 mb-4 tracking-wide"><i class="fas fa-barcode mr-2 text-blue-500"></i> สแกนบาร์โค้ด / QR Code</label><div class="relative"><input type="text" id="gr-scan" onkeydown="window.grHandleScan(event)" placeholder="ยิงสแกนแล้วกด Enter..." class="w-full pl-14 p-5 text-xl font-mono border-2 border-blue-100 bg-blue-50/30 rounded-2xl outline-none focus:border-blue-500 focus:ring-4 focus:ring-blue-50 shadow-inner transition-all" autofocus><i class="fas fa-qrcode absolute left-5 top-[22px] text-2xl text-blue-300"></i></div></div>
            <div class="bg-white rounded-3xl shadow-sm border border-slate-100 overflow-hidden"><div class="bg-slate-50/50 p-6 border-b border-slate-100 flex justify-between items-center"><h3 class="font-black text-lg tracking-tight flex items-center text-slate-800"><i class="fas fa-box-open text-emerald-500 mr-3 text-2xl"></i>รายการใน PO: <span class="text-blue-600 ml-2">${po.id}</span></h3><button onclick="window.state.gr.poId=''; window.updateUI()" class="text-sm bg-white border border-slate-200 px-4 py-2 rounded-xl font-bold text-slate-600 shadow-sm hover:bg-slate-50 hover-lift"><i class="fas fa-sync-alt mr-1.5"></i> เปลี่ยน PO</button></div>
            <div class="overflow-x-auto"><table class="w-full text-left min-w-[700px]"><thead class="bg-white border-b border-slate-100 text-xs uppercase tracking-widest text-slate-400"><tr><th class="p-5 font-black">สินค้า</th><th class="p-5 font-black text-center">สั่ง (PO)</th><th class="p-5 font-black text-center">รับแล้ว</th><th class="p-5 font-black text-center w-36 text-emerald-500">สแกนเพิ่ม</th><th class="p-5 font-black text-center">จัดการ</th></tr></thead><tbody>${trs}</tbody></table></div></div>
          </div>
          <div class="bg-white p-8 rounded-3xl shadow-sm border border-slate-100 h-fit sticky top-24"><h3 class="font-black text-xl mb-6 pb-4 border-b border-slate-100 tracking-tight"><i class="fas fa-clipboard-check text-emerald-500 mr-2"></i> สรุปการรับเข้า</h3>
            <label class="block font-bold text-slate-600 text-sm mb-2">หมายเหตุ (ถ้ามี)</label>
            <textarea id="gr-rem" rows="3" placeholder="ระบุสภาพสินค้า หรือสาเหตุ..." oninput="window.state.gr.remark=this.value" class="w-full border-2 border-slate-100 rounded-2xl p-4 mb-8 bg-slate-50 outline-none focus:ring-2 focus:ring-emerald-500 focus:border-emerald-200 shadow-inner font-medium">${s.remark}</textarea>
            <div class="bg-slate-50 p-6 rounded-2xl border border-slate-100 mb-8"><div class="flex justify-between text-sm mb-3"><span class="font-bold text-slate-500">สแกนแล้ว:</span><span class="font-black text-slate-800">${s.cart.length} รายการ</span></div><div class="flex justify-between text-sm border-t border-slate-200 pt-4 mt-3 items-center"><span class="font-bold text-slate-500">รวมจำนวนชิ้น:</span><span class="font-black text-emerald-600 text-4xl">${s.cart.reduce((sum,i)=>sum+i.qty,0)}</span></div></div>
            <button onclick="window.grSave()" class="w-full py-5 rounded-2xl font-black text-xl shadow-[0_4px_14px_0_rgba(16,185,129,0.39)] text-white transition-transform hover-lift ${s.cart.length>0?'bg-emerald-500 hover:bg-emerald-600 active:scale-95':'bg-slate-300 pointer-events-none shadow-none'}"><i class="fas fa-check-circle mr-2"></i> ยืนยันนำเข้าสต๊อก</button>
          </div>
        </div>
      `;
    }

    // 6.6 ISSUE VIEW
    window.issScan = (e) => {
      if(e.key === 'Enter') {
        const v = e.target.value.trim(); e.target.value = ''; if(!v) return;
        const p = window.DB.products.find(x=>x.barcode===v || x.id===v);
        if(!p) return window.showAlert('ไม่พบสินค้า', 'ไม่มีรหัสนี้ในระบบ', 'error');
        window.issAdd(p);
      }
    };
    window.issManual = () => {
      const pid = document.getElementById('iss-man').value; if(!pid)return;
      const p = window.DB.products.find(x=>x.id===pid);
      if(!p) return window.showAlert('ผิดพลาด', 'ไม่พบสินค้า', 'error');
      window.issAdd(p); document.getElementById('iss-man').value = '';
    };
    window.issAdd = (p) => {
      const exist = state.iss.cart.find(i=>i.productId===p.id);
      if((exist?exist.qty:0)+1 > p.stock) return window.showAlert('สต๊อกไม่พอ', `มีสต๊อกเหลือเพียง ${p.stock}`, 'error');
      if(exist) exist.qty += 1; else state.iss.cart.push({ productId: p.id, qty: 1 });
      window.updateUI();
    };
    window.issUpdQty = (pid, val) => {
      const q = parseInt(val)||0; const p = window.DB.products.find(x=>x.id===pid);
      if(q<0) return; if(q>p.stock) return window.showAlert('สต๊อกไม่พอ', `เบิกได้สูงสุด ${p.stock}`, 'error');
      const idx = state.iss.cart.findIndex(i=>i.productId===pid);
      if(q===0 && idx>-1) state.iss.cart.splice(idx,1);
      else if(idx>-1) state.iss.cart[idx].qty = q;
      window.updateUI();
    };
    window.issSave = () => {
      if(!state.iss.ref || state.iss.cart.length===0) return window.showAlert('ข้อมูลไม่ครบ', 'ระบุผู้เบิก/อ้างอิง และสแกนสินค้า', 'error');
      window.showConfirm('ตัดสต๊อก', 'ยืนยันการหักสต๊อกทันที?', () => {
        const ref = state.iss.remark ? `${state.iss.ref} (${state.iss.remark})` : state.iss.ref;
        state.iss.cart.forEach(it => {
          window.DB.products.find(p=>p.id===it.productId).stock -= it.qty;
          window.DB.transactions.unshift({ id: `TXN-${Date.now()}-${Math.floor(Math.random()*100)}`, type:'OUT', date:new Date().toISOString(), productId:it.productId, qty:it.qty, referenceNo:ref });
        });
        state.iss.cart=[]; state.iss.ref=''; state.iss.remark='';
        window.saveDB(); window.showToast('เบิกของสำเร็จ');
      });
    };

    function viewIssue() {
      const s = state.iss;
      const trs = s.cart.map((it, i) => {
        const p = window.DB.products.find(x=>x.id===it.productId);
        return `<tr class="border-b border-slate-100 hover:bg-slate-50 transition-colors"><td class="p-5"><div class="font-bold text-slate-800 text-base">${p.name}</div><div class="text-xs font-mono text-blue-500 font-medium mt-1">${p.id}</div></td><td class="p-5 text-center font-bold text-slate-400 text-xl">${p.stock}</td><td class="p-5 text-center"><input type="number" min="1" max="${p.stock}" value="${it.qty}" onchange="window.issUpdQty('${p.id}', this.value)" class="w-24 border-2 border-amber-200 rounded-xl p-2.5 text-center font-black text-amber-600 text-xl outline-none focus:border-amber-500 focus:ring-4 focus:ring-amber-50 shadow-inner bg-white"></td><td class="p-5 text-center"><button onclick="window.state.iss.cart.splice(${i},1); window.updateUI()" class="text-red-500 bg-white border border-slate-200 hover:bg-red-50 hover:border-red-200 p-2.5 rounded-xl transition-colors shadow-sm hover-lift"><i class="fas fa-times text-lg"></i></button></td></tr>`;
      }).join('');

      return `
        <h2 class="text-3xl font-black tracking-tight mb-8">เบิกจ่ายสินค้า (Goods Issue)</h2>
        <div class="grid grid-cols-1 xl:grid-cols-3 gap-8">
          <div class="xl:col-span-2 space-y-8">
            <div class="bg-white p-8 rounded-3xl shadow-sm border border-slate-100 print-hidden">
              <label class="block font-black text-slate-700 mb-3 tracking-wide">ผู้เบิก / เลขที่ใบเบิก / โปรเจกต์ <span class="text-red-500">*</span></label>
              <input type="text" id="iss-r" value="${s.ref}" oninput="window.state.iss.ref=this.value" placeholder="เช่น แผนกผลิต..." class="w-full border-2 border-amber-200 rounded-2xl p-4 bg-amber-50/30 font-black text-slate-800 text-lg outline-none focus:border-amber-500 focus:ring-4 focus:ring-amber-50 shadow-inner">
              
              <div class="mt-8 pt-8 border-t border-slate-100 grid grid-cols-1 md:grid-cols-2 gap-6">

tion-colors"><i class="fas fa-print"></i></button><button onclick="window.openProdModal('${pd.id}')" class="p-2 text-slate-400 hover:text-amber-500 hover:bg-amber-50 rounded-lg border border-transparent hover:border-amber-200 transition-colors"><i class="fas fa-edit"></i></button><button onclick="window.stkDel('${pd.id}')" class="p-2 text-slate-400 hover:text-red-500 hover:bg-red-50 rounded-lg border border-transparent hover:border-red-200 transition-colors"><i class="fas fa-trash"></i></button></div></td></tr>
            `).join('')}

      if(list.length === 0) content = `<div class="bg-white p-20 text-center rounded-3xl border border-slate-100 flex flex-col items-center mt-6"><i class="fas fa-box-open text-6xl text-slate-200 mb-4"></i><h3 class="text-xl font-black text-slate-700 mb-2 tracking-tight">ไม่พบสินค้า</h3><p class="text-slate-500 font-medium">ลองเปลี่ยนคำค้นหา หรือเคลียร์ตัวกรองดูนะ</p></div>`;

      let bulkAct = s.selected.length > 0 ? `
        <div class="bg-blue-50 border border-blue-200 rounded-2xl p-3 flex justify-between items-center w-full mt-4 print-hidden shadow-sm animate-in fade-in slide-in-from-top-2">
          <span class="font-black text-blue-800 ml-4 tracking-wide">เลือกแล้ว ${s.selected.length} รายการ</span>
          <div class="flex gap-2"><button onclick="window.stkBulkPrint()" class="bg-white border border-blue-200 text-blue-700 px-5 py-2.5 rounded-xl font-bold shadow-sm hover-lift"><i class="fas fa-print mr-2"></i>พิมพ์บาร์โค้ด</button><button onclick="window.stkBulkDel()" class="bg-white border border-red-200 text-red-600 px-5 py-2.5 rounded-xl font-bold shadow-sm hover-lift"><i class="fas fa-trash mr-2"></i>ลบกลุ่ม</button></div>

              <label class="flex items-center text-sm font-bold text-amber-700 bg-amber-50 px-5 py-3.5 rounded-2xl border border-amber-200 cursor-pointer shadow-sm"><input type="checkbox" ${s.low?'checked':''} onchange="window.state.stk.low=this.checked; window.updateUI()" class="mr-2.5 w-4 h-4 accent-amber-600"><i class="fas fa-exclamation-triangle mr-1.5"></i> ใกล้หมด</label>

    // Modal สินค้า (รองรับอัปโหลดรูป Base64 อัตโนมัติ)
    window.openProdModal = (id='') => {
      let d;
      if(id) {
        const p = window.DB.products.find(x=>x.id===id);
        d = { isEdit:true, id:p.id, barcode:p.barcode||'', name:p.name, cat:p.category||'', loc:p.location||'', unit:p.unit, price:p.price, stock:p.stock, min:p.minStock, img:p.image||'' };
      } else {
        d = { isEdit:false, id:`P00${window.DB.products.length+1}`, barcode:'', name:'', cat:'', loc:'', unit:'ชิ้น', price:0, stock:0, min:10, img:'' };
      }
      window.state.modal = { type: 'prod', data: d };
      window.updateUI();
    };

    window.handleImageUpload = (event) => {
      const file = event.target.files[0];
      if(!file) return;
      const reader = new FileReader();
      reader.onload = (e) => {
        const img = new Image();
        img.onload = () => {
          // บีบอัดรูปก่อนเซฟ (ให้ไม่เกิน 400px และลด quality เหลือ 0.7) เพื่อให้เซฟลง Google Sheets ได้สบาย
          const canvas = document.createElement('canvas');
          const MAX_W = 400; const MAX_H = 400;
          let w = img.width; let h = img.height;
          if (w > h) { if (w > MAX_W) { h *= MAX_W / w; w = MAX_W; } } 
          else { if (h > MAX_H) { w *= MAX_H / h; h = MAX_H; } }
          canvas.width = w; canvas.height = h;
          const ctx = canvas.getContext('2d');
          ctx.drawImage(img, 0, 0, w, h);
          const dataUrl = canvas.toDataURL('image/jpeg', 0.7); // Base64 Compressed
          
          window.state.modal.data.img = dataUrl;
          window.updateUI();
        };
        img.src = e.target.result;
      };
      reader.readAsDataURL(file);
    };

    window.saveProdModal = () => {
      const m = window.state.modal.data;
      if(!m.id || !m.name) return window.showAlert('ผิดพลาด', 'กรอกรหัสและชื่อ', 'error');
      const obj = { id:m.id, barcode:m.barcode, name:m.name, category:m.cat, location:m.loc, unit:m.unit, price:Number(m.price), stock:Number(m.stock), minStock:Number(m.min), image:m.img };
      
      if(m.isEdit) window.DB.products = window.DB.products.map(p=>p.id===m.id ? obj : p);
      else { if(window.DB.products.find(p=>p.id===m.id)) return window.showAlert('ผิดพลาด', 'รหัสซ้ำ', 'error'); window.DB.products.unshift(obj); }
      
      window.saveDB(); window.state.modal=null; window.showToast('บันทึกสำเร็จ');
    };

    window.hisExport = () => {
      let csv = 'Date,Type,Product ID,Product Name,Qty,Reference\n';
      window.DB.transactions.forEach(t => {
        let p = window.DB.products.find(x=>x.id===t.productId);
        csv += `"${fDate(t.date)}","${t.type}","${t.productId}","${p?.name||''}","${t.qty}","${t.referenceNo}"\n`;
      });
      const blob = new Blob(["\uFEFF"+csv], { type: 'text/csv;charset=utf-8;' });
      const link = document.createElement("a"); link.href = URL.createObjectURL(blob); link.download = `StockHistory_${Date.now()}.csv`;
      link.click(); window.showToast("ส่งออกไฟล์สำเร็จ");
    };

    function viewHistory() {
      const s = state.his.search.toLowerCase();
      const list = window.DB.transactions.filter(t => {
        const p = window.DB.products.find(x=>x.id===t.productId);
        return t.id.toLowerCase().includes(s) || t.referenceNo.toLowerCase().includes(s) || t.productId.toLowerCase().includes(s) || (p&&p.name.toLowerCase().includes(s));
      });
      
      const trs = list.map(t => {
        const p = window.DB.products.find(x=>x.id===t.productId);
        const icon = t.type==='IN'?'fa-arrow-down':'fa-arrow-up';
        return `<tr class="border-b border-slate-100 hover:bg-slate-50 transition-colors"><td class="p-5 text-sm font-bold text-slate-500">${fDate(t.date)}</td><td class="p-5 text-center"><span class="px-3 py-1.5 rounded-lg text-[10px] font-black tracking-wider uppercase flex items-center justify-center w-fit mx-auto border shadow-sm ${t.type==='IN'?'bg-emerald-50 text-emerald-700 border-emerald-100':'bg-amber-50 text-amber-700 border-amber-100'}"><i class="fas ${icon} mr-1.5"></i>${t.type==='IN'?'รับเข้า':'เบิกออก'}</span></td><td class="p-5"><div class="text-sm font-black text-slate-800">${p?.name||'-'}</div><div class="text-xs font-mono text-blue-500 font-bold mt-1">${t.productId}</div></td><td class="p-5 text-right font-black text-2xl ${t.type==='IN'?'text-emerald-500':'text-amber-500'}">${t.type==='IN'?'+':'-'}${t.qty}</td><td class="p-5 text-sm font-bold text-slate-600">${t.referenceNo}</td></tr>`;
      }).join('');

      return `
        <div class="space-y-6">
          <div class="flex flex-col md:flex-row justify-between md:items-center gap-4"><h2 class="text-3xl font-black tracking-tight text-slate-800">ประวัติความเคลื่อนไหว</h2><div class="flex w-full md:w-auto gap-3"><div class="relative flex-1 md:w-72"><input type="text" id="his-s" value="${state.his.search}" oninput="window.state.his.search=this.value; window.updateUI()" placeholder="ค้นหารหัสเอกสาร, สินค้า..." class="w-full pl-12 pr-4 py-3 border-none bg-white shadow-sm rounded-xl outline-none focus:ring-2 focus:ring-blue-500 font-medium"><i class="fas fa-search absolute left-5 top-4 text-slate-400"></i></div><button onclick="window.hisExport()" class="flex items-center justify-center font-bold text-slate-700 bg-white border border-slate-200 px-6 py-3 rounded-xl shadow-sm hover-lift"><i class="fas fa-download mr-2 text-blue-600"></i> ส่งออก CSV</button></div></div>
          <div class="bg-white rounded-3xl shadow-sm border border-slate-100 overflow-x-auto"><table class="w-full text-left min-w-[800px]"><thead class="bg-slate-50/50 border-b border-slate-100 text-xs uppercase tracking-widest text-slate-400"><tr><th class="p-5 font-black">เวลา</th><th class="p-5 font-black text-center">ประเภท</th><th class="p-5 font-black">สินค้า</th><th class="p-5 font-black text-right">จำนวน</th><th class="p-5 font-black">อ้างอิง</th></tr></thead><tbody class="divide-y divide-slate-100">${trs||`<tr><td colspan="5" class="p-16 text-center"><i class="fas fa-clipboard-list text-4xl text-slate-200 mb-4 block"></i><span class="font-bold text-slate-400">ไม่มีประวัติ</span></td></tr>`}</tbody></table></div>
        </div>
      `;
    }

    // 6.9 REPORTS
    function viewReports() {
      const t = state.rep.type;
      const db = window.DB;
      let content = '';

      if(t === 'inventory') {
        const total = db.products.reduce((s,p) => s + (p.stock * p.price), 0);
        content = `
          <div class="p-8 bg-blue-50/50 border-b border-blue-100 flex flex-col md:flex-row justify-between items-center print:bg-white print:border-b-2 print:border-black"><div><h3 class="text-xl font-black text-blue-900 tracking-tight">สรุปมูลค่าคลังสินค้าทั้งหมด</h3><p class="text-sm font-bold text-blue-600 mt-1 print-hidden">คำนวณจากราคาประเมิน x สต๊อกคงเหลือ</p></div><div class="mt-4 md:mt-0 text-center md:text-right bg-white p-5 rounded-2xl border border-blue-100 shadow-sm print:border-none print:p-0"><p class="text-xs font-black text-slate-400 uppercase tracking-widest mb-1">มูลค่ารวมทั้งสิ้น</p><p class="text-3xl md:text-4xl font-black text-blue-600 print:text-black">฿${total.toLocaleString()}</p></div></div>
          <div class="overflow-x-auto"><table class="w-full text-left min-w-[700px]"><thead class="bg-white border-b border-slate-100 text-xs uppercase tracking-widest text-slate-400 print:border-b-2 print:border-black"><tr><th class="p-5 font-black">รหัส</th><th class="p-5 font-black">ชื่อสินค้า</th><th class="p-5 font-black text-right">คงเหลือ</th><th class="p-5 font-black text-right">ราคา/หน่วย</th><th class="p-5 font-black text-right">มูลค่ารวม</th></tr></thead><tbody class="divide-y divide-slate-100">
            ${db.products.filter(p=>p.stock>0).map(p=>`<tr class="hover:bg-slate-50 transition-colors print:break-inside-avoid"><td class="p-5 font-bold text-blue-600">${p.id}</td><td class="p-5 font-bold text-slate-700">${p.name}</td><td class="p-5 text-right font-black text-xl text-slate-800">${p.stock} <span class="text-xs font-bold text-slate-400 ml-1">${p.unit}</span></td><td class="p-5 text-right font-bold text-slate-500">฿${p.price.toLocaleString()}</td><td class="p-5 text-right font-black text-xl text-blue-600 print:text-black">฿${(p.stock*p.price).toLocaleString()}</td></tr>`).join('')}
          </tbody></table></div>
        `;
      } else if (t === 'po') {
        content = `
          <div class="overflow-x-auto"><table class="w-full text-left min-w-[800px]"><thead class="bg-slate-50/50 border-b border-slate-100 text-xs uppercase tracking-widest text-slate-400 print:bg-white print:border-b-2 print:border-black"><tr><th class="p-5 font-black">วันที่สั่ง</th><th class="p-5 font-black">เลขที่ PO</th><th class="p-5 font-black">ซัพพลายเออร์</th><th class="p-5 font-black text-center">สถานะ</th><th class="p-5 font-black text-right">มูลค่าประเมิน</th></tr></thead><tbody class="divide-y divide-slate-100">
            ${db.pos.map(po => {
              const v = db.vendors.find(x=>x.id===po.vendorId);
              const val = po.items.reduce((s,i)=>s+(i.expectedQty*i.price),0);
              return `<tr class="hover:bg-indigo-50/30 transition-colors print:break-inside-avoid"><td class="p-5 text-sm font-bold text-slate-500">${po.date}</td><td class="p-5 font-black text-indigo-600 text-lg">${po.id}</td><td class="p-5 font-bold text-slate-800">${v?.name||po.vendorId}</td><td class="p-5 text-center"><span class="px-4 py-1.5 rounded-full text-[10px] font-black uppercase tracking-wider print-border ${po.status==='Completed'?'bg-emerald-100 text-emerald-700':'bg-blue-100 text-blue-700'}">${po.status==='Completed'?'รับครบแล้ว':'รอรับสินค้า'}</span></td><td class="p-5 text-right font-black text-xl text-slate-800">฿${val.toLocaleString()}</td></tr>`;
            }).join('') || '<tr><td colspan="5" class="p-16 text-center text-slate-400 font-bold">ไม่มีข้อมูล</td></tr>'}
          </tbody></table></div>
        `;
      } else if (t === 'job') {
        // Job Costing Logic
        const jobCosts = {};
        db.transactions.filter(tx => tx.type === 'OUT').forEach(tx => {
          const ref = tx.referenceNo || 'ไม่ระบุอ้างอิง';
          if(!jobCosts[ref]) jobCosts[ref] = { total: 0, items: [] };
          const p = db.products.find(x=>x.id===tx.productId);
          const cost = (p?.price || 0) * tx.qty;
          jobCosts[ref].total += cost;
          jobCosts[ref].items.push({ date: tx.date, name: p?.name||tx.productId, qty: tx.qty, cost });
        });

        content = `
          <div class="p-8 bg-amber-50/50 border-b border-amber-100 print:bg-white print:border-b-2 print:border-black"><h3 class="text-xl font-black text-amber-900 tracking-tight mb-2">สรุปต้นทุนตามรหัสอ้างอิง (Job Costing)</h3><p class="text-sm font-bold text-amber-600 print-hidden">คำนวณจากการเบิกออกทั้งหมด จัดกลุ่มตามผู้เบิก/JOB</p></div>
          <div class="p-6 space-y-6">
            ${Object.keys(jobCosts).length === 0 ? '<div class="text-center py-10 text-slate-400 font-bold">ไม่มีข้อมูลการเบิกออก</div>' : 
              Object.keys(jobCosts).map(ref => `
                <div class="border border-slate-200 rounded-2xl overflow-hidden shadow-sm">
                  <div class="bg-slate-50 p-4 border-b flex justify-between items-center"><h4 class="font-black text-slate-800"><i class="fas fa-folder-open text-amber-500 mr-2"></i> ${ref}</h4><div class="font-black text-lg text-amber-600">รวม: ฿${jobCosts[ref].total.toLocaleString()}</div></div>
                  <table class="w-full text-left text-sm"><thead class="bg-white border-b text-xs text-slate-400"><tr><th class="p-3 font-bold">วันที่</th><th class="p-3 font-bold">รายการ</th><th class="p-3 font-bold text-right">จำนวน</th><th class="p-3 font-bold text-right">มูลค่า</th></tr></thead><tbody class="divide-y divide-slate-100">
                    ${jobCosts[ref].items.map(i => `<tr><td class="p-3 text-slate-500">${fDate(i.date)}</td><td class="p-3 font-bold">${i.name}</td><td class="p-3 text-right font-black">${i.qty}</td><td class="p-3 text-right font-bold text-slate-600">฿${i.cost.toLocaleString()}</td></tr>`).join('')}
                  </tbody></table>
                </div>
              `).join('')
            }
          </div>
        `;
      }

      const btn = (id, icon, txt, color) => `<button onclick="window.state.rep.type='${id}'; window.updateUI()" class="px-5 py-3 rounded-xl text-sm font-black flex items-center transition-all ${t===id?`bg-${color}-100 text-${color}-700 shadow-sm border border-${color}-200`:'text-slate-500 bg-white border border-slate-200 hover:bg-slate-50'}"><i class="fas ${icon} mr-2 text-lg"></i> ${txt}</button>`;

      return `
        <div class="space-y-6">
          <div class="flex flex-col md:flex-row justify-between md:items-center gap-4 print-hidden"><h2 class="text-3xl font-black tracking-tight text-slate-800">ระบบวิเคราะห์ (Reports)</h2><button onclick="window.print()" class="bg-slate-800 text-white px-6 py-3 rounded-xl font-bold shadow-md hover:bg-slate-900 hover-lift"><i class="fas fa-print mr-2"></i> พิมพ์รายงาน</button></div>
          <div class="flex flex-wrap gap-3 print-hidden">${btn('inventory','fa-layer-group','มูลค่าสินค้าคงคลัง','blue')} ${btn('po','fa-shopping-cart','สรุปการสั่งซื้อ (PO)','indigo')} ${btn('job','fa-chart-bar','ต้นทุนตามโปรเจกต์ (Job)','amber')}</div>
          <div class="hidden print-block text-center mb-8 border-b-2 border-black pb-4"><h1 class="text-2xl font-black text-black">ASIA HYDRO SERVICE & PARTS</h1><h2 class="text-xl mt-2 font-bold">${t==='inventory'?'รายงานมูลค่าสินค้าคงคลัง':t==='po'?'รายงานสรุปการสั่งซื้อ':t==='job'?'รายงานต้นทุนเบิกจ่าย':''}</h2><p class="text-sm text-gray-600 mt-1">พิมพ์เมื่อ: ${fDate(new Date().toISOString())}</p></div>
          <div class="bg-white rounded-3xl shadow-sm border border-slate-100 print:border-none print:shadow-none overflow-hidden animate-in fade-in slide-in-from-bottom-4">${content}</div>
        </div>
      `;
    }

    // 6.10 SETTINGS
    window.openSetModal = (type, id='') => {
      let d;
      if(type === 'user') {
        if(id) { const u = window.DB.users.find(x=>x.id===id); d = {...u, isEdit:true}; }
        else d = { id:`U00${window.DB.users.length+1}`, username:'', password:'', name:'', role:'Requester', department:'', isEdit:false };
      } else {
        if(id) { const v = window.DB.vendors.find(x=>x.id===id); d = {...v, isEdit:true}; }
        else d = { id:`V00${window.DB.vendors.length+1}`, name:'', contact:'', term:'Cash', isEdit:false };
      }
      state.modal = { type, data: d }; updateUI();
    };

    window.saveSetModal = () => {
      const m = state.modal;
      if(m.type === 'user') {
        const u = m.data; if(!u.username||!u.password||!u.name) return window.showAlert('ผิดพลาด','กรอกข้อมูลให้ครบ','error');
        if(u.isEdit) window.DB.users = window.DB.users.map(x=>x.id===u.id?u:x);
        else { if(window.DB.users.find(x=>x.username===u.username)) return window.showAlert('ซ้ำ','Username นี้มีแล้ว','error'); window.DB.users.push(u); }
        window.saveDB(); state.modal = null; window.showToast('บันทึกผู้ใช้งานสำเร็จ');
      } else {
        const v = m.data; if(!v.name) return window.showAlert('ผิดพลาด','กรอกชื่อบริษัท','error');
        if(v.isEdit) window.DB.vendors = window.DB.vendors.map(x=>x.id===v.id?v:x);
        else window.DB.vendors.push(v);
        window.saveDB(); state.modal = null; window.showToast('บันทึกร้านค้าสำเร็จ');
      }
    };

    window.delSet = (type, id) => {
      if(type==='user'&&id==='U001') return window.showAlert('ปฏิเสธ','ลบ Admin หลักไม่ได้','error');
      window.showConfirm('ยืนยันลบ', 'ลบข้อมูลออกจากระบบ?', () => {
        if(type==='user') window.DB.users = window.DB.users.filter(x=>x.id!==id);
        else window.DB.vendors = window.DB.vendors.filter(x=>x.id!==id);
        window.saveDB(); window.showToast('ลบสำเร็จ');
      });
    };

          </tbody></table></div>
        `;
      } else {
        content = `
          <div class="p-6 flex justify-end bg-slate-50/50 border-b border-slate-100"><button onclick="window.openSetModal('vendor')" class="bg-indigo-600 text-white px-6 py-3 rounded-xl text-sm font-black shadow-[0_4px_14px_0_rgba(79,70,229,0.39)] hover-lift"><i class="fas fa-plus mr-2"></i> เพิ่มซัพพลายเออร์</button></div>
          <div class="overflow-x-auto"><table class="w-full text-left min-w-[700px]"><thead class="bg-white border-b border-slate-100 text-xs uppercase tracking-widest text-slate-400"><tr><th class="p-5 font-black">รหัส</th><th class="p-5 font-black">ชื่อบริษัท / ร้านค้า</th><th class="p-5 font-black">เบอร์ติดต่อ</th><th class="p-5 font-black">เครดิต (Term)</th><th class="p-5 font-black text-center">จัดการ</th></tr></thead><tbody class="divide-y divide-slate-100">
            ${window.DB.vendors.map(v=>`<tr class="hover:bg-indigo-50/30 transition-colors"><td class="p-5 font-black text-indigo-600">${v.id}</td><td class="p-5 font-black text-slate-700">${v.name}</td><td class="p-5 text-sm font-bold text-slate-500">${v.contact}</td><td class="p-5"><span class="bg-slate-100 px-3 py-1.5 rounded-lg font-bold text-xs text-slate-600 border border-slate-200 shadow-inner">${v.term}</span></td><td class="p-5 text-center"><div class="flex justify-center space-x-2"><button onclick="window.openSetModal('vendor','${v.id}')" class="p-2.5 text-slate-400 bg-white hover:text-amber-500 border border-slate-200 hover:border-amber-200 rounded-xl transition-colors shadow-sm"><i class="fas fa-edit"></i></button><button onclick="window.delSet('vendor','${v.id}')" class="p-2.5 text-slate-400 bg-white hover:text-red-500 border border-slate-200 hover:border-red-200 rounded-xl transition-colors shadow-sm"><i class="fas fa-trash"></i></button></div></td></tr>`).join('')}
          </tbody></table></div>

      }
      return `
        <div class="space-y-6 animate-in fade-in">
          <h2 class="text-3xl font-black tracking-tight text-slate-800">ผู้ดูแลระบบ (Settings)</h2>
          <div class="flex space-x-3 border-b border-slate-200"><button onclick="window.state.set.tab='users'; window.updateUI()" class="px-6 py-4 font-black border-b-4 transition-colors ${t==='users'?'border-blue-600 text-blue-600':'border-transparent text-slate-400 hover:text-slate-600'}"><i class="fas fa-users mr-2"></i>ผู้ใช้งานระบบ</button><button onclick="window.state.set.tab='vendors'; window.updateUI()" class="px-6 py-4 font-black border-b-4 transition-colors ${t==='vendors'?'border-indigo-600 text-indigo-600':'border-transparent text-slate-400 hover:text-slate-600'}"><i class="fas fa-building mr-2"></i>ซัพพลายเออร์</button></div>

            <div class="grid grid-cols-2 gap-5"><div><label class="block text-sm font-bold mb-2 text-slate-500 uppercase tracking-widest">Username *</label><input type="text" oninput="window.state.modal.data.username=this.value" value="${m.username}" ${m.id==='U001'?'disabled':''} class="w-full border-2 border-slate-200 p-3.5 rounded-xl font-bold focus:border-blue-500 outline-none"></div><div><label class="block text-sm font-bold mb-2 text-slate-500 uppercase tracking-widest">Password *</label><input type="text" oninput="window.state.modal.data.password=this.value" value="${m.password}" class="w-full border-2 border-slate-200 p-3.5 rounded-xl font-bold focus:border-blue-500 outline-none"></div></div>
            <div><label class="block text-sm font-bold mb-2 text-slate-500 uppercase tracking-widest">ชื่อ-นามสกุล *</label><input type="text" oninput="window.state.modal.data.name=this.value" value="${m.name}" class="w-full border-2 border-slate-200 p-3.5 rounded-xl font-bold focus:border-blue-500 outline-none"></div>
            <div class="grid grid-cols-2 gap-5"><div><label class="block text-sm font-bold mb-2 text-slate-500 uppercase tracking-widest">แผนก</label><input type="text" oninput="window.state.modal.data.department=this.value" value="${m.department}" class="w-full border-2 border-slate-200 p-3.5 rounded-xl font-bold focus:border-blue-500 outline-none"></div><div><label class="block text-sm font-bold mb-2 text-slate-500 uppercase tracking-widest">สิทธิ์ (Role)</label><select onchange="window.state.modal.data.role=this.value" ${m.id==='U001'?'disabled':''} class="w-full border-2 border-slate-200 p-3.5 rounded-xl font-black bg-white focus:border-blue-500 outline-none"><option value="Requester" ${m.role==='Requester'?'selected':''}>Requester</option><option value="Purchaser" ${m.role==='Purchaser'?'selected':''}>Purchaser</option><option value="Store" ${m.role==='Store'?'selected':''}>Store</option><option value="Admin" ${m.role==='Admin'?'selected':''}>Admin</option></select></div></div>
          </div>
        `;
      } else if (state.modal.type === 'vendor') {
        body = `
          <div class="space-y-5">
            <div><label class="block text-sm font-bold mb-2 text-slate-500 uppercase tracking-widest">ชื่อร้านค้า/บริษัท *</label><input type="text" oninput="window.state.modal.data.name=this.value" value="${m.name}" class="w-full border-2 border-slate-200 p-3.5 rounded-xl font-bold focus:border-indigo-500 outline-none"></div>
            <div class="grid grid-cols-2 gap-5"><div><label class="block text-sm font-bold mb-2 text-slate-500 uppercase tracking-widest">เบอร์ติดต่อ</label><input type="text" oninput="window.state.modal.data.contact=this.value" value="${m.contact}" class="w-full border-2 border-slate-200 p-3.5 rounded-xl font-bold focus:border-indigo-500 outline-none"></div><div><label class="block text-sm font-bold mb-2 text-slate-500 uppercase tracking-widest">Term</label><select onchange="window.state.modal.data.term=this.value" class="w-full border-2 border-slate-200 p-3.5 rounded-xl font-black bg-white focus:border-indigo-500 outline-none"><option value="Cash" ${m.term==='Cash'?'selected':''}>Cash</option><option value="30 Days" ${m.term==='30 Days'?'selected':''}>30 Days</option></select></div></div>
          </div>
        `;
      } else if (state.modal.type === 'prod') {
        body = `
          <input type="hidden" id="prod-isedit" value="${m.isEdit}">
          <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
            <div><label class="block text-sm font-bold mb-2 text-slate-500 uppercase tracking-widest">รหัสสินค้า *</label><input type="text" id="prod-id" class="w-full border-2 border-slate-200 p-3.5 rounded-xl bg-slate-50 font-black text-slate-500" value="${m.id}" ${m.isEdit?'disabled':''}></div>
            <div><label class="block text-sm font-bold mb-2 text-slate-500 uppercase tracking-widest">บาร์โค้ด</label><input type="text" id="prod-barcode" class="w-full border-2 border-slate-200 p-3.5 rounded-xl font-mono focus:border-blue-500 outline-none" value="${m.barcode}"></div>
            <div class="md:col-span-2"><label class="block text-sm font-bold mb-2 text-slate-500 uppercase tracking-widest">ชื่อสินค้า *</label><input type="text" id="prod-name" class="w-full border-2 border-slate-200 p-3.5 rounded-xl font-bold focus:border-blue-500 outline-none" value="${m.name}"></div>
            <div><label class="block text-sm font-bold mb-2 text-slate-500 uppercase tracking-widest">หมวดหมู่</label><input type="text" id="prod-cat" list="modal-cat" class="w-full border-2 border-slate-200 p-3.5 rounded-xl font-bold focus:border-blue-500 outline-none" value="${m.cat}"><datalist id="modal-cat">${[...new Set(window.DB.products.map(p=>p.category).filter(Boolean))].map(c=>`<option value="${c}">`).join('')}</datalist></div>
            <div><label class="block text-sm font-bold mb-2 text-slate-500 uppercase tracking-widest">สถานที่เก็บ (Loc)</label><input type="text" id="prod-loc" list="modal-loc" class="w-full border-2 border-slate-200 p-3.5 rounded-xl font-bold focus:border-blue-500 outline-none" value="${m.loc}"><datalist id="modal-loc">${[...new Set(window.DB.products.map(p=>p.location).filter(Boolean))].map(c=>`<option value="${c}">`).join('')}</datalist></div>
            <div><label class="block text-sm font-bold mb-2 text-slate-500 uppercase tracking-widest">หน่วยนับ</label><input type="text" id="prod-unit" class="w-full border-2 border-slate-200 p-3.5 rounded-xl font-bold focus:border-blue-500 outline-none" value="${m.unit}"></div>
            <div><label class="block text-sm font-bold mb-2 text-slate-500 uppercase tracking-widest">ราคา (บาท)</label><input type="number" id="prod-price" class="w-full border-2 border-slate-200 p-3.5 rounded-xl font-bold focus:border-blue-500 outline-none" value="${m.price}"></div>
            <div class="bg-slate-50 p-4 rounded-xl border border-slate-200 shadow-inner"><label class="block text-sm font-bold mb-2 text-slate-500 uppercase tracking-widest">ยอดยกมา (Stock)</label><input type="number" id="prod-stock" class="w-full border-2 border-slate-200 p-3 rounded-lg font-black text-xl text-center focus:border-blue-500 outline-none bg-white" value="${m.stock}" ${m.isEdit?'disabled':''}></div>
            <div class="bg-amber-50 p-4 rounded-xl border border-amber-200 shadow-inner"><label class="block text-sm font-bold text-amber-800 mb-2 uppercase tracking-widest">จุดเตือน (Min)</label><input type="number" id="prod-min" class="w-full border-2 border-amber-300 p-3 rounded-lg font-black text-xl text-center text-amber-600 focus:border-amber-500 outline-none bg-white" value="${m.min}"></div>
            
            <div class="md:col-span-2 bg-slate-50 p-5 rounded-2xl border border-slate-200">
              <label class="block text-sm font-bold mb-3 text-slate-500 uppercase tracking-widest"><i class="fas fa-image mr-2 text-blue-500"></i>รูปภาพสินค้า</label>
              <div class="flex items-center gap-6">
                <div class="shrink-0">
                  <img id="prod-img-preview" src="${m.img}" class="w-24 h-24 object-cover rounded-xl border-2 border-white shadow-md ${!m.img?'hidden':''}">
                  <div id="prod-img-placeholder" class="w-24 h-24 bg-white rounded-xl border-2 border-dashed border-slate-300 flex items-center justify-center text-slate-300 ${m.img?'hidden':''}"><i class="fas fa-camera text-2xl"></i></div>
                </div>
                <div class="flex-1">
                  <input type="file" id="prod-img-upload" accept="image/*" onchange="window.handleImageUpload(event)" class="hidden">
                  <label for="prod-img-upload" class="bg-white border-2 border-blue-200 text-blue-600 px-5 py-2.5 rounded-xl font-bold cursor-pointer hover:bg-blue-50 transition-colors shadow-sm inline-block"><i class="fas fa-upload mr-2"></i> อัปโหลดรูปภาพ</label>
                  <p class="text-xs text-slate-400 mt-2 font-medium">รองรับ JPG, PNG (ระบบจะบีบอัดอัตโนมัติ)</p>
                </div>
              </div>
            </div>
          </div>
        `;
      }

      return `
        <div class="fixed inset-0 bg-slate-900/60 z-[300] flex items-center justify-center p-4 backdrop-blur-sm animate-in fade-in">
          <div class="bg-white p-8 md:p-10 rounded-[2rem] w-full max-w-2xl shadow-2xl animate-in zoom-in-95 max-h-[90vh] overflow-y-auto custom-scrollbar border border-white/20">
            <div class="flex justify-between items-center mb-8 border-b border-slate-100 pb-4"><h3 class="text-2xl font-black text-slate-800 tracking-tight">${m.isEdit?'แก้ไข':'เพิ่ม'}${state.modal.type==='user'?'ผู้ใช้':state.modal.type==='vendor'?'ร้านค้า':'สินค้า'}</h3><button onclick="window.state.modal=null; window.updateUI()" class="bg-slate-100 p-2.5 rounded-xl hover:bg-slate-200 text-slate-500 transition-colors"><i class="fas fa-times text-lg"></i></button></div>
            ${body}
            <div class="flex justify-end gap-3 mt-8 pt-6 border-t border-slate-100"><button onclick="window.state.modal=null; window.updateUI()" class="px-6 py-3.5 bg-slate-100 rounded-xl font-bold text-slate-600 hover:bg-slate-200 transition-colors">ยกเลิก</button><button onclick="window.${state.modal.type==='prod'?'saveProdModal':'saveSetModal'}()" class="px-10 py-3.5 ${state.modal.type==='vendor'?'bg-indigo-600 hover:bg-indigo-700':'bg-blue-600 hover:bg-blue-700'} text-white rounded-xl font-black shadow-lg hover-lift tracking-wide"><i class="fas fa-check mr-2"></i>บันทึกข้อมูล</button></div>
          </div>
        </div>
      `;
    }

  </script>
</body>
</html>
