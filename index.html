    function htmlPrintView() {
      const list = window.state.stk.print;
      return `
        <div class="fixed inset-0 bg-white z-[500] p-10 overflow-y-auto block print:block">
          <div class="grid grid-cols-4 gap-4 print:gap-1">
            ${list.map(p => `<div class="text-center border border-dashed border-gray-400 p-4 rounded-xl flex flex-col items-center justify-center break-inside-avoid print:border-solid print:border-black"><p class="font-bold text-[10px] mb-1 truncate w-full text-black">${p.name}</p><img src="https://barcode.tec-it.com/barcode.ashx?data=${p.barcode||p.id}&code=Code128&translate-esc=on" class="h-12 object-contain"/><p class="font-mono text-xs font-bold mt-1 text-black tracking-widest">${p.barcode||p.id}</p></div>`).join('')}
          </div>
          <div class="fixed bottom-6 right-6 z-[600] print-hidden"><button onclick="window.stkClosePrint()" class="bg-red-600 text-white px-6 py-3 rounded-xl font-bold shadow-2xl hover:bg-red-700"><i class="fas fa-times mr-2"></i> ปิดหน้าต่างปริ้นท์</button></div>
        </div>
      `;
    }

    // 6.8 HISTORY
    window.hisExport = () => {
      let csv = 'Date,Type,Product ID,Product Name,Qty,Reference\n';
      window.DB.transactions.forEach(t => {
        let p = window.DB.products.find(x=>x.id===t.productId);
        csv += `"${fDate(t.date)}","${t.type}","${t.productId}","${p?.name||''}","${t.qty}","${t.referenceNo}"\n`;
      });
      const blob = new Blob(["\uFEFF"+csv], { type: 'text/csv;charset=utf-8;' });
      const link = document.createElement("a");
      link.href = URL.createObjectURL(blob);
      link.download = `StockHistory_${Date.now()}.csv`;
      link.click(); window.showToast("ส่งออกไฟล์สำเร็จ");
    };

    function viewHistory() {
      const s = state.his.search.toLowerCase();
      const list = window.DB.transactions.filter(t => {
        const p = window.DB.products.find(x=>x.id===t.productId);
        return t.id.toLowerCase().includes(s) || t.referenceNo.toLowerCase().includes(s) || t.productId.toLowerCase().includes(s) || (p&&p.name.toLowerCase().includes(s));
      });

      const trs = list.map(t => {
        const p = window.DB.products.find(x=>x.id===t.productId);
        const icon = t.type==='IN'?'fa-arrow-down':'fa-arrow-up';
        return `<tr class="border-b hover:bg-gray-50"><td class="p-4 text-sm font-medium text-gray-600">${fDate(t.date)}</td><td class="p-4 text-center"><span class="px-3 py-1.5 rounded-lg text-[11px] font-black flex items-center w-fit border shadow-sm ${t.type==='IN'?'bg-emerald-50 text-emerald-700 border-emerald-100':'bg-amber-50 text-amber-700 border-amber-100'}"><i class="fas ${icon} mr-1.5"></i>${t.type==='IN'?'รับเข้า':'เบิกออก'}</span></td><td class="p-4"><div class="text-sm font-bold text-gray-800">${p?.name||'-'}</div><div class="text-xs font-mono text-blue-600 font-medium mt-0.5">${t.productId}</div></td><td class="p-4 text-right font-black text-xl ${t.type==='IN'?'text-emerald-600':'text-amber-500'}">${t.type==='IN'?'+':'-'}${t.qty}</td><td class="p-4 text-sm font-medium text-gray-700">${t.referenceNo}</td></tr>`;
      }).join('');

      return `
        <div class="space-y-6">
          <div class="flex flex-col md:flex-row justify-between md:items-center gap-4"><h2 class="text-2xl font-bold">ประวัติความเคลื่อนไหว (Stock Card)</h2><div class="flex w-full md:w-auto gap-3"><div class="relative flex-1 md:w-64"><input type="text" id="his-s" value="${state.his.search}" oninput="window.state.his.search=this.value; window.updateUI()" placeholder="ค้นหารหัสเอกสาร, สินค้า..." class="w-full pl-10 pr-4 py-2.5 border rounded-xl outline-none focus:ring-2 focus:ring-blue-500 text-sm shadow-sm"><i class="fas fa-search absolute left-4 top-3.5 text-gray-400"></i></div><button onclick="window.hisExport()" class="flex items-center justify-center text-sm font-bold text-slate-700 bg-white border px-5 py-2.5 rounded-xl hover:bg-slate-50 shadow-sm active:scale-95"><i class="fas fa-download mr-2"></i> ส่งออก Excel</button></div></div>
          <div class="bg-white rounded-2xl shadow-sm border overflow-x-auto"><table class="w-full text-left min-w-[800px]"><thead class="bg-gray-50 border-b text-xs uppercase tracking-wider text-gray-600"><tr><th class="p-4 font-bold">วันที่ / เวลา</th><th class="p-4 font-bold text-center">ประเภท</th><th class="p-4 font-bold">รหัสสินค้า / ชื่อสินค้า</th><th class="p-4 font-bold text-right">จำนวน</th><th class="p-4 font-bold">เอกสารอ้างอิง (Ref)</th></tr></thead><tbody class="divide-y divide-gray-100">${trs||`<tr><td colspan="5" class="p-10 text-center text-gray-500">ไม่พบประวัติ</td></tr>`}</tbody></table></div>
        </div>
      `;
    }

    // 6.9 REPORTS
    function viewReports() {
      const t = state.rep.type;
      const db = window.DB;
      let content = '';

      if(t === 'inventory') {
        const total = db.products.reduce((s,p) => s + (p.stock * p.price), 0);
        content = `
          <div class="p-6 md:p-8 bg-blue-50/50 border-b flex flex-col md:flex-row justify-between items-center print:bg-white print:border-b-2 print:border-black"><div><h3 class="text-xl font-bold">สรุปมูลค่าคลังสินค้าทั้งหมด</h3><p class="text-sm font-medium text-gray-500 mt-1 print-hidden">ตามราคาประเมินที่ตั้งไว้ในข้อมูลหลัก</p></div><div class="mt-4 md:mt-0 text-center md:text-right bg-white p-4 rounded-xl border shadow-sm print:border-none print:p-0"><p class="text-sm font-bold text-gray-500 mb-1">มูลค่ารวมทั้งสิ้น</p><p class="text-3xl md:text-4xl font-black text-blue-600 print:text-black">฿${total.toLocaleString()}</p></div></div>
          <div class="overflow-x-auto"><table class="w-full text-left min-w-[700px]"><thead class="bg-white border-b text-xs uppercase tracking-wider text-gray-500 print:border-b-2 print:border-black"><tr><th class="p-4">รหัส</th><th class="p-4">ชื่อสินค้า</th><th class="p-4 text-right">คงเหลือ</th><th class="p-4 text-right">ราคา/หน่วย</th><th class="p-4 text-right">มูลค่ารวม</th></tr></thead><tbody class="divide-y">
            ${db.products.filter(p=>p.stock>0).map(p=>`<tr><td class="p-4 font-bold">${p.id}</td><td class="p-4 font-medium">${p.name}</td><td class="p-4 text-right font-black text-lg">${p.stock} <span class="text-xs font-medium text-gray-400">${p.unit}</span></td><td class="p-4 text-right font-medium text-gray-600">฿${p.price.toLocaleString()}</td><td class="p-4 text-right font-black text-lg text-blue-600 print:text-black">฿${(p.stock*p.price).toLocaleString()}</td></tr>`).join('')}
          </tbody></table></div>
        `;
      } else if (t === 'po') {
        content = `
          <div class="overflow-x-auto"><table class="w-full text-left min-w-[800px]"><thead class="bg-gray-50 border-b text-xs uppercase tracking-wider text-gray-600 print:bg-white print:border-b-2 print:border-black"><tr><th class="p-4">วันที่สั่ง</th><th class="p-4">เลขที่ PO</th><th class="p-4">ซัพพลายเออร์</th><th class="p-4 text-center">สถานะ</th><th class="p-4 text-right">มูลค่าประเมิน</th></tr></thead><tbody class="divide-y">
            ${db.pos.map(po => {
              const v = db.vendors.find(x=>x.id===po.vendorId);
              const val = po.items.reduce((s,i)=>s+(i.expectedQty*i.price),0);
              return `<tr><td class="p-4 text-sm font-medium text-gray-600">${po.date}</td><td class="p-4 font-bold text-indigo-700">${po.id}</td><td class="p-4 font-bold text-gray-700">${v?.name||po.vendorId}</td><td class="p-4 text-center"><span class="px-3 py-1.5 rounded-full text-xs font-bold print-border ${po.status==='Completed'?'bg-emerald-100 text-emerald-700':'bg-blue-100 text-blue-700'}">${po.status==='Completed'?'รับครบแล้ว':'รอรับสินค้า'}</span></td><td class="p-4 text-right font-black">฿${val.toLocaleString()}</td></tr>`;
            }).join('') || '<tr><td colspan="5" class="p-10 text-center">ไม่มีข้อมูล</td></tr>'}
          </tbody></table></div>
        `;
      }

      const btn = (id, icon, txt, color) => `<button onclick="window.state.rep.type='${id}'; window.updateUI()" class="px-5 py-2.5 rounded-xl text-sm font-bold flex items-center transition-all ${t===id?`bg-${color}-100 text-${color}-700 shadow-sm`:'text-gray-600 hover:bg-gray-100'}"><i class="fas ${icon} mr-2"></i> ${txt}</button>`;

      return `
        <div class="space-y-6">
          <div class="flex flex-col md:flex-row justify-between md:items-center gap-4 print-hidden"><h2 class="text-2xl font-bold">ระบบรายงาน (Reports)</h2><button onclick="window.print()" class="bg-blue-600 text-white px-6 py-2.5 rounded-xl font-bold shadow-md hover:bg-blue-700 active:scale-95"><i class="fas fa-print mr-2"></i> พิมพ์รายงาน (Print)</button></div>
          <div class="bg-white p-2.5 rounded-2xl shadow-sm border flex flex-wrap gap-2 print-hidden">${btn('inventory','fa-layer-group','มูลค่าสินค้าคงคลัง','blue')} ${btn('po','fa-shopping-cart','สรุปการสั่งซื้อ (PO)','indigo')}</div>
          <div class="hidden print-block text-center mb-8 border-b-2 border-black pb-4"><h1 class="text-2xl font-bold text-black">ASIA HYDRO SERVICE & PARTS CO.,LTD</h1><h2 class="text-xl text-gray-800 mt-2 font-bold">${t==='inventory'?'รายงานมูลค่าสินค้าคงคลัง':t==='po'?'รายงานสรุปการสั่งซื้อ':''}</h2><p class="text-sm text-gray-600 mt-1">พิมพ์เมื่อ: ${fDate(new Date().toISOString())}</p></div>
          <div class="bg-white rounded-2xl shadow-sm border print:border-none print:shadow-none overflow-hidden">${content}</div>
        </div>
      `;
    }

    // 6.10 SETTINGS
    window.openSetModal = (type, id='') => {
      let data = {};
      if(type === 'user') {
        if(id) { const u = window.DB.users.find(x=>x.id===id); data = {...u, isEdit:true}; }
        else data = { id:`U00${window.DB.users.length+1}`, username:'', password:'', name:'', role:'Requester', department:'', isEdit:false };
      } else {
        if(id) { const v = window.DB.vendors.find(x=>x.id===id); data = {...v, isEdit:true}; }
        else data = { id:`V00${window.DB.vendors.length+1}`, name:'', contact:'', term:'Cash', isEdit:false };
      }
      state.modal = { type, data }; updateUI();
    };

    window.saveSetModal = () => {
      const m = state.modal;
      if(m.type === 'user') {
        const u = m.data; if(!u.username||!u.password||!u.name) return window.showAlert('ผิดพลาด','กรอกข้อมูลจำเป็นให้ครบ','error');
        if(u.isEdit) window.DB.users = window.DB.users.map(x=>x.id===u.id?u:x);
        else { if(window.DB.users.find(x=>x.username===u.username)) return window.showAlert('ซ้ำ','Username นี้มีแล้ว','error'); window.DB.users.push(u); }
        window.saveDB(); state.modal = null; window.showToast('บันทึกผู้ใช้งานสำเร็จ');
      } else {
        const v = m.data; if(!v.name) return window.showAlert('ผิดพลาด','กรอกชื่อบริษัท','error');
        if(v.isEdit) window.DB.vendors = window.DB.vendors.map(x=>x.id===v.id?v:x);
        else window.DB.vendors.push(v);
        window.saveDB(); state.modal = null; window.showToast('บันทึกร้านค้าสำเร็จ');
      }
    };

    window.delSet = (type, id) => {
      if(type==='user'&&id==='U001') return window.showAlert('ปฏิเสธ','ลบ Admin หลักไม่ได้','error');
      window.showConfirm('ยืนยันลบ', 'ลบข้อมูลออกจากระบบ?', () => {
        if(type==='user') window.DB.users = window.DB.users.filter(x=>x.id!==id);
        else window.DB.vendors = window.DB.vendors.filter(x=>x.id!==id);
        window.saveDB(); window.showToast('ลบสำเร็จ');
      });
    };

    function viewSettings() {
      const t = state.set.tab;
      let content = '';
      if(t === 'users') {
        content = `
          <div class="p-5 flex justify-end bg-gray-50 border-b"><button onclick="window.openSetModal('user')" class="bg-blue-600 text-white px-5 py-2.5 rounded-xl text-sm font-bold shadow-md hover:bg-blue-700 active:scale-95"><i class="fas fa-plus mr-2"></i> เพิ่มผู้ใช้งาน</button></div>
          <div class="overflow-x-auto"><table class="w-full text-left min-w-[800px]"><thead class="bg-white border-b text-xs uppercase tracking-wider text-gray-500"><tr><th class="p-4">รหัส</th><th class="p-4">ชื่อ-นามสกุล</th><th class="p-4">Username</th><th class="p-4">แผนก</th><th class="p-4 text-center">สิทธิ์</th><th class="p-4 text-center">จัดการ</th></tr></thead><tbody class="divide-y divide-gray-100">
            ${window.DB.users.map(u=>`<tr><td class="p-4 text-sm font-mono text-gray-500">${u.id}</td><td class="p-4 text-sm font-bold">${u.name}</td><td class="p-4 text-sm font-bold text-blue-600">${u.username}</td><td class="p-4 text-sm font-medium text-gray-600">${u.department||'-'}</td><td class="p-4 text-center"><span class="bg-gray-100 px-3 py-1.5 rounded-full text-xs font-bold inline-block w-24 text-center">${u.role}</span></td><td class="p-4 text-center"><button onclick="window.openSetModal('user','${u.id}')" class="p-2 text-gray-500 bg-white hover:text-amber-600 border rounded-lg mr-2"><i class="fas fa-edit"></i></button><button onclick="window.delSet('user','${u.id}')" ${u.id==='U001'?'disabled':''} class="p-2 border rounded-lg ${u.id==='U001'?'text-gray-300 bg-gray-50':'text-gray-500 bg-white hover:text-red-600'}"><i class="fas fa-trash"></i></button></td></tr>`).join('')}
          </tbody></table></div>
        `;
      } else {
        content = `
          <div class="p-5 flex justify-end bg-gray-50 border-b"><button onclick="window.openSetModal('vendor')" class="bg-indigo-600 text-white px-5 py-2.5 rounded-xl text-sm font-bold shadow-md hover:bg-indigo-700 active:scale-95"><i class="fas fa-plus mr-2"></i> เพิ่มซัพพลายเออร์</button></div>
          <div class="overflow-x-auto"><table class="w-full text-left min-w-[700px]"><thead class="bg-white border-b text-xs uppercase tracking-wider text-gray-500"><tr><th class="p-4">รหัส</th><th class="p-4">ชื่อบริษัท / ร้านค้า</th><th class="p-4">เบอร์ติดต่อ</th><th class="p-4">เครดิต (Term)</th><th class="p-4 text-center">จัดการ</th></tr></thead><tbody class="divide-y divide-gray-100">
            ${window.DB.vendors.map(v=>`<tr><td class="p-4 font-bold text-indigo-600">${v.id}</td><td class="p-4 font-bold">${v.name}</td><td class="p-4 text-sm font-medium text-gray-600">${v.contact}</td><td class="p-4"><span class="bg-gray-100 px-2.5 py-1 rounded-md border">${v.term}</span></td><td class="p-4 text-center"><button onclick="window.openSetModal('vendor','${v.id}')" class="p-2 text-gray-500 bg-white hover:text-amber-600 border rounded-lg mr-2"><i class="fas fa-edit"></i></button><button onclick="window.delSet('vendor','${v.id}')" class="p-2 text-gray-500 bg-white hover:text-red-600 border rounded-lg"><i class="fas fa-trash"></i></button></td></tr>`).join('')}
          </tbody></table></div>
        `;
      }
      return `
        <div class="space-y-6">
          <h2 class="text-2xl font-bold text-gray-800">ตั้งค่าระบบ (Settings)</h2>
          <div class="flex space-x-2 border-b border-gray-200"><button onclick="window.state.set.tab='users'; window.updateUI()" class="px-5 py-3 font-bold border-b-2 ${t==='users'?'border-blue-600 text-blue-600':'border-transparent text-gray-500 hover:bg-gray-50'}"><i class="fas fa-users mr-2"></i>ผู้ใช้งานระบบ</button><button onclick="window.state.set.tab='vendors'; window.updateUI()" class="px-5 py-3 font-bold border-b-2 ${t==='vendors'?'border-blue-600 text-blue-600':'border-transparent text-gray-500 hover:bg-gray-50'}"><i class="fas fa-database mr-2"></i>ซัพพลายเออร์</button></div>
          <div class="bg-white rounded-2xl shadow-sm border overflow-hidden">${content}</div>
        </div>
      `;
    }

    function htmlModals() {
      if(!state.modal || !state.modal.type) return '';
      const m = state.modal.data;
      let body = '';
      
      if(state.modal.type === 'user') {
        body = `
          <div class="space-y-4">
            <div><label class="block text-sm font-bold mb-1">รหัส</label><input type="text" value="${m.id}" disabled class="w-full border p-3 rounded-xl bg-gray-100 font-mono font-bold text-gray-500"></div>
            <div class="grid grid-cols-2 gap-4"><div><label class="block text-sm font-bold mb-1">Username *</label><input type="text" oninput="window.state.modal.data.username=this.value" value="${m.username}" ${m.id==='U001'?'disabled':''} class="w-full border p-3 rounded-xl font-bold"></div><div><label class="block text-sm font-bold mb-1">Password *</label><input type="text" oninput="window.state.modal.data.password=this.value" value="${m.password}" class="w-full border p-3 rounded-xl font-bold"></div></div>
            <div><label class="block text-sm font-bold mb-1">ชื่อ-นามสกุล *</label><input type="text" oninput="window.state.modal.data.name=this.value" value="${m.name}" class="w-full border p-3 rounded-xl font-medium"></div>
            <div class="grid grid-cols-2 gap-4"><div><label class="block text-sm font-bold mb-1">แผนก</label><input type="text" oninput="window.state.modal.data.department=this.value" value="${m.department}" class="w-full border p-3 rounded-xl"></div><div><label class="block text-sm font-bold mb-1">สิทธิ์ (Role)</label><select onchange="window.state.modal.data.role=this.value" ${m.id==='U001'?'disabled':''} class="w-full border p-3 rounded-xl font-bold"><option value="Requester" ${m.role==='Requester'?'selected':''}>Requester</option><option value="Purchaser" ${m.role==='Purchaser'?'selected':''}>Purchaser</option><option value="Store" ${m.role==='Store'?'selected':''}>Store</option><option value="Admin" ${m.role==='Admin'?'selected':''}>Admin</option></select></div></div>
          </div>
        `;
      } else if (state.modal.type === 'vendor') {
        body = `
          <div class="space-y-4">
            <div><label class="block text-sm font-bold mb-1">ชื่อร้านค้า *</label><input type="text" oninput="window.state.modal.data.name=this.value" value="${m.name}" class="w-full border p-3 rounded-xl font-bold"></div>
            <div class="grid grid-cols-2 gap-4"><div><label class="block text-sm font-bold mb-1">เบอร์ติดต่อ</label><input type="text" oninput="window.state.modal.data.contact=this.value" value="${m.contact}" class="w-full border p-3 rounded-xl"></div><div><label class="block text-sm font-bold mb-1">Term</label><select onchange="window.state.modal.data.term=this.value" class="w-full border p-3 rounded-xl font-bold"><option value="Cash" ${m.term==='Cash'?'selected':''}>Cash</option><option value="30 Days" ${m.term==='30 Days'?'selected':''}>30 Days</option></select></div></div>
          </div>
        `;
      }

      return `
        <div class="fixed inset-0 bg-slate-900/60 z-[300] flex items-center justify-center p-4 backdrop-blur-sm animate-in fade-in">
          <div class="bg-white p-8 rounded-2xl w-full max-w-md shadow-2xl animate-in zoom-in-95">
            <div class="flex justify-between items-center mb-6 border-b pb-3"><h3 class="text-xl font-bold">${m.isEdit?'แก้ไข':'เพิ่ม'}${state.modal.type==='user'?'ผู้ใช้':'ร้านค้า'}</h3><button onclick="window.state.modal=null; window.updateUI()" class="bg-gray-100 p-2 rounded-lg hover:bg-gray-200"><i class="fas fa-times"></i></button></div>
            ${body}
            <div class="flex justify-end gap-3 mt-8"><button onclick="window.state.modal=null; window.updateUI()" class="px-6 py-2.5 bg-gray-100 rounded-xl font-bold text-gray-600">ยกเลิก</button><button onclick="window.saveSetModal()" class="px-8 py-2.5 bg-blue-600 text-white rounded-xl font-bold shadow-md"><i class="fas fa-check mr-2"></i>บันทึก</button></div>
          </div>
        </div>
      `;
    }

    function htmlToast() {
      if(!state.toast) return '';
      // handled by global element #toast for smooth transitions. We won't re-render it via html to keep animation.
      return ''; 
    }
  </script>
</body>
</html>
