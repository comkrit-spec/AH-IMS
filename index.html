<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ASIA HYDRO - Procurement & Inventory System</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <style>
    body { background-color: #f8fafc; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    .tab-content { display: none; }
    .tab-content.active { display: block; }
    @media print {
      body { background-color: white !important; }
      .print-hidden { display: none !important; }
      #main-app { overflow: visible !important; height: auto !important; }
    }
  </style>
</head>
<body class="text-gray-800 h-screen overflow-hidden flex flex-col">

  <script>
    const YOUR_GAS_URL = "https://script.google.com/macros/s/AKfycbxHz32WreJDbL_ZM90nxL9u08Z0wEfqdfqUXSXS72N6kcmvcWu28-AQqrgT_-iUwblJsA/exec";
  </script>

  <div id="toast" class="fixed bottom-6 right-6 px-6 py-4 rounded-xl shadow-2xl text-white text-sm font-bold z-[400] bg-emerald-600 transition-all duration-300 opacity-0 translate-y-4 pointer-events-none flex items-center">
    <i class="fas fa-check-circle mr-3 text-xl"></i> <span id="toast-msg">Success</span>
  </div>

  <div id="sync-status" class="fixed top-4 right-4 z-[150] bg-white/90 backdrop-blur rounded-full px-4 py-2 shadow-sm border flex items-center print-hidden">
    <i class="fas fa-cloud text-emerald-500 mr-2" id="sync-icon"></i>
    <span class="text-xs font-bold text-gray-600" id="sync-text">ออนไลน์</span>
  </div>

  <div id="loading-screen" class="h-screen w-full flex flex-col items-center justify-center bg-slate-50 absolute z-[200]">
    <i class="fas fa-circle-notch fa-spin text-blue-600 text-5xl mb-4"></i>
    <h2 class="text-xl font-bold">กำลังเชื่อมต่อฐานข้อมูล Cloud...</h2>
  </div>

  <div id="login-screen" class="h-screen w-full bg-slate-100 flex items-center justify-center p-4 absolute z-[100] hidden">
    <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md">
      <div class="text-center mb-8">
        <div class="bg-blue-600 w-16 h-16 rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-lg"><i class="fas fa-box text-white text-3xl"></i></div>
        <h1 class="text-2xl font-black text-gray-800 tracking-tight">ASIA HYDRO</h1>
        <p class="text-gray-500 text-sm mt-2">ระบบจัดการจัดซื้อและคลังสินค้า</p>
      </div>
      <form id="login-form" class="space-y-5">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Username</label>
          <div class="relative"><i class="fas fa-user absolute left-4 top-4 text-gray-400"></i><input type="text" id="login-user" class="w-full pl-10 pr-4 py-3 border border-gray-300 rounded-lg outline-none focus:ring-2 focus:ring-blue-500 bg-gray-50" placeholder="เช่น admin" required></div>
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
          <div class="relative"><i class="fas fa-lock absolute left-4 top-4 text-gray-400"></i><input type="password" id="login-pass" class="w-full pl-10 pr-4 py-3 border border-gray-300 rounded-lg outline-none focus:ring-2 focus:ring-blue-500 bg-gray-50" placeholder="รหัสผ่าน" required></div>
        </div>
        <button type="submit" class="w-full bg-blue-600 text-white py-3 rounded-xl font-bold hover:bg-blue-700 shadow-md">เข้าสู่ระบบ</button>
      </form>
    </div>
  </div>

  <div id="main-app" class="flex h-screen w-full bg-slate-50 overflow-hidden hidden print-hidden">
    
    <nav class="w-72 bg-slate-900 text-white flex flex-col h-full shadow-2xl z-40 transition-transform md:translate-x-0" id="sidebar">
      <div class="p-6 flex items-center justify-between border-b border-slate-800">
        <div class="flex items-center space-x-3"><div class="bg-blue-600 p-2.5 rounded-xl"><i class="fas fa-box text-xl"></i></div><h1 class="text-2xl font-black">ASIA HYDRO</h1></div>
        <button onclick="document.getElementById('sidebar').classList.add('-translate-x-full')" class="md:hidden text-gray-400"><i class="fas fa-times text-2xl"></i></button>
      </div>
      
      <div class="flex-1 py-6 px-4 space-y-1.5 overflow-y-auto custom-scrollbar" id="nav-menu"></div>
      
      <div class="p-5 border-t border-slate-800 mt-auto bg-slate-900/50 flex justify-between items-center">
        <div class="flex items-center space-x-3"><div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center font-bold text-lg" id="user-avatar">A</div><div class="truncate"><p class="font-bold text-sm" id="user-name-display">Name</p><p class="text-[10px] text-blue-400 font-bold uppercase" id="user-role-display">Role</p></div></div>
        <button onclick="logout()" class="text-slate-400 hover:text-red-400 p-2 rounded-xl hover:bg-slate-800"><i class="fas fa-sign-out-alt text-lg"></i></button>
      </div>
    </nav>

    <div class="flex-1 flex flex-col h-full overflow-hidden relative w-full">
      <header class="bg-white border-b border-gray-200 h-16 flex items-center justify-between px-6 shrink-0 shadow-sm print-hidden z-10">
        <div class="flex items-center"><button onclick="document.getElementById('sidebar').classList.remove('-translate-x-full')" class="md:hidden mr-4 bg-gray-100 p-2 rounded"><i class="fas fa-bars"></i></button><h2 class="font-black uppercase text-gray-800 tracking-widest text-lg" id="header-title">Dashboard</h2></div>
        <button onclick="window.print()" class="text-sm font-bold text-slate-700 bg-white border border-slate-300 px-4 py-2 rounded-xl hover:bg-slate-50 shadow-sm"><i class="fas fa-print mr-2"></i>พิมพ์หน้าจอ</button>
      </header>

      <main class="flex-1 overflow-y-auto p-4 md:p-8 bg-slate-50/50 custom-scrollbar relative" id="main-scroll">
        <div class="max-w-7xl mx-auto pb-20" id="tabs-container"></div>
      </main>
    </div>
  </div>

  <div id="print-area" class="hidden print-block bg-white fixed inset-0 z-[500] p-8 overflow-y-auto"></div>
  <button id="close-print-btn" onclick="closePrintView()" class="hidden fixed bottom-6 right-6 bg-red-600 text-white px-6 py-3 rounded-xl font-bold shadow-2xl z-[600] print-hidden"><i class="fas fa-times mr-2"></i> ปิดหน้าต่างปริ้นท์</button>

  <div id="custom-dialog" class="fixed inset-0 bg-slate-900/60 z-[400] flex items-center justify-center p-4 backdrop-blur-sm hidden">
    <div class="bg-white rounded-2xl shadow-2xl w-full max-w-sm overflow-hidden animate-in zoom-in-95">
      <div class="p-6 text-center">
        <div id="dialog-icon" class="flex justify-center mb-4 bg-gray-50 rounded-full w-16 h-16 items-center mx-auto border shadow-sm"></div>
        <h3 id="dialog-title" class="text-xl font-bold mb-2">Title</h3>
        <p id="dialog-message" class="text-gray-600 text-sm whitespace-pre-wrap">Message</p>
      </div>
      <div class="px-6 py-4 bg-gray-50 flex gap-3 justify-end border-t border-gray-100">
        <button id="dialog-cancel" onclick="closeDialog()" class="px-4 py-2 w-full rounded-lg text-gray-600 bg-white border border-gray-300 font-medium hover:bg-gray-100 hidden">ยกเลิก</button>
        <button id="dialog-confirm" class="px-4 py-2 w-full rounded-lg text-white font-medium shadow-sm bg-blue-600 hover:bg-blue-700">ตกลง</button>
      </div>
    </div>
  </div>

  <div id="product-modal" class="fixed inset-0 bg-slate-900/60 z-[300] flex items-center justify-center p-4 backdrop-blur-sm hidden">
    <div class="bg-white p-6 md:p-8 rounded-2xl w-full max-w-2xl shadow-2xl overflow-y-auto max-h-[90vh]">
      <div class="flex justify-between items-center mb-6 border-b pb-3"><h3 class="text-xl font-bold" id="prod-modal-title">เพิ่ม/แก้ไข สินค้า</h3><button onclick="hide('product-modal')" class="text-gray-400 hover:text-gray-800 bg-gray-100 p-2 rounded"><i class="fas fa-times"></i></button></div>
      <input type="hidden" id="prod-isedit">
      <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
        <div><label class="block text-sm font-bold mb-1">รหัสสินค้า *</label><input type="text" id="prod-id" class="w-full border border-gray-300 p-3 rounded-xl bg-gray-50"></div>
        <div><label class="block text-sm font-bold mb-1">บาร์โค้ด</label><input type="text" id="prod-barcode" class="w-full border border-gray-300 p-3 rounded-xl font-mono"></div>
        <div class="md:col-span-2"><label class="block text-sm font-bold mb-1">ชื่อสินค้า *</label><input type="text" id="prod-name" class="w-full border border-gray-300 p-3 rounded-xl"></div>
        <div><label class="block text-sm font-bold mb-1">หมวดหมู่</label><input type="text" id="prod-cat" list="cat-list" class="w-full border border-gray-300 p-3 rounded-xl"><datalist id="cat-list"></datalist></div>
        <div><label class="block text-sm font-bold mb-1">สถานที่เก็บ</label><input type="text" id="prod-loc" list="loc-list" class="w-full border border-gray-300 p-3 rounded-xl"><datalist id="loc-list"></datalist></div>
        <div><label class="block text-sm font-bold mb-1">หน่วยนับ</label><input type="text" id="prod-unit" class="w-full border border-gray-300 p-3 rounded-xl" value="ชิ้น"></div>
        <div><label class="block text-sm font-bold mb-1">ราคาประเมิน (บาท)</label><input type="number" id="prod-price" class="w-full border border-gray-300 p-3 rounded-xl" value="0"></div>
        <div class="bg-gray-50 p-4 rounded-xl border border-gray-200"><label class="block text-sm font-bold mb-1">ยอดยกมา (Stock)</label><input type="number" id="prod-stock" class="w-full border border-gray-300 p-3 rounded-xl font-bold" value="0"></div>
        <div class="bg-amber-50 p-4 rounded-xl border border-amber-200"><label class="block text-sm font-bold text-amber-800 mb-1">จุดเตือน (Min Stock)</label><input type="number" id="prod-min" class="w-full border border-amber-300 p-3 rounded-xl font-bold text-amber-700" value="10"></div>
        <div class="md:col-span-2"><label class="block text-sm font-bold mb-1">URL รูปภาพ</label><input type="text" id="prod-img" class="w-full border border-gray-300 p-3 rounded-xl"></div>
      </div>
      <div class="flex justify-end gap-3"><button onclick="hide('product-modal')" class="px-6 py-2.5 rounded-xl bg-gray-100 font-bold text-gray-600 hover:bg-gray-200">ยกเลิก</button><button onclick="saveProduct()" class="px-8 py-2.5 rounded-xl bg-blue-600 text-white font-bold shadow-md hover:bg-blue-700"><i class="fas fa-check mr-2"></i>บันทึก</button></div>
    </div>
  </div>

  <div id="user-modal" class="fixed inset-0 bg-slate-900/60 z-[300] flex items-center justify-center p-4 backdrop-blur-sm hidden">
    <div class="bg-white p-6 md:p-8 rounded-2xl w-full max-w-md shadow-2xl">
      <div class="flex justify-between items-center mb-6 border-b pb-3"><h3 class="text-xl font-bold" id="user-modal-title">เพิ่ม/แก้ไข ผู้ใช้งาน</h3><button onclick="hide('user-modal')" class="text-gray-400 hover:text-gray-800 bg-gray-100 p-2 rounded"><i class="fas fa-times"></i></button></div>
      <input type="hidden" id="user-isedit"><input type="hidden" id="user-id">
      <div class="space-y-4 mb-6">
        <div><label class="block text-sm font-bold mb-1">Username *</label><input type="text" id="user-username" class="w-full border border-gray-300 p-3 rounded-xl"></div>
        <div><label class="block text-sm font-bold mb-1">Password *</label><input type="text" id="user-password" class="w-full border border-gray-300 p-3 rounded-xl"></div>
        <div><label class="block text-sm font-bold mb-1">ชื่อ - นามสกุล *</label><input type="text" id="user-name" class="w-full border border-gray-300 p-3 rounded-xl"></div>
        <div class="grid grid-cols-2 gap-4">
          <div><label class="block text-sm font-bold mb-1">แผนก</label><input type="text" id="user-dept" class="w-full border border-gray-300 p-3 rounded-xl"></div>
          <div><label class="block text-sm font-bold mb-1">สิทธิ์ (Role)</label><select id="user-role" class="w-full border border-gray-300 p-3 rounded-xl font-bold bg-white"><option value="Requester">Requester</option><option value="Purchaser">Purchaser</option><option value="Store">Store</option><option value="Admin">Admin</option></select></div>
        </div>
      </div>
      <div class="flex justify-end gap-3"><button onclick="hide('user-modal')" class="px-6 py-2.5 rounded-xl bg-gray-100 font-bold text-gray-600 hover:bg-gray-200">ยกเลิก</button><button onclick="saveUser()" class="px-8 py-2.5 rounded-xl bg-blue-600 text-white font-bold shadow-md hover:bg-blue-700"><i class="fas fa-check mr-2"></i>บันทึก</button></div>
    </div>
  </div>

  <div id="vendor-modal" class="fixed inset-0 bg-slate-900/60 z-[300] flex items-center justify-center p-4 backdrop-blur-sm hidden">
    <div class="bg-white p-6 md:p-8 rounded-2xl w-full max-w-md shadow-2xl">
      <div class="flex justify-between items-center mb-6 border-b pb-3"><h3 class="text-xl font-bold" id="vendor-modal-title">เพิ่ม/แก้ไข ซัพพลายเออร์</h3><button onclick="hide('vendor-modal')" class="text-gray-400 hover:text-gray-800 bg-gray-100 p-2 rounded"><i class="fas fa-times"></i></button></div>
      <input type="hidden" id="vendor-isedit"><input type="hidden" id="vendor-id">
      <div class="space-y-4 mb-6">
        <div><label class="block text-sm font-bold mb-1">ชื่อบริษัท/ร้านค้า *</label><input type="text" id="vendor-name" class="w-full border border-gray-300 p-3 rounded-xl"></div>
        <div><label class="block text-sm font-bold mb-1">เบอร์ติดต่อ</label><input type="text" id="vendor-contact" class="w-full border border-gray-300 p-3 rounded-xl"></div>
        <div><label class="block text-sm font-bold mb-1">เครดิต (Term)</label><select id="vendor-term" class="w-full border border-gray-300 p-3 rounded-xl font-bold bg-white"><option value="Cash">Cash (เงินสด)</option><option value="15 Days">15 Days</option><option value="30 Days">30 Days</option><option value="60 Days">60 Days</option></select></div>
      </div>
      <div class="flex justify-end gap-3"><button onclick="hide('vendor-modal')" class="px-6 py-2.5 rounded-xl bg-gray-100 font-bold text-gray-600 hover:bg-gray-200">ยกเลิก</button><button onclick="saveVendor()" class="px-8 py-2.5 rounded-xl bg-indigo-600 text-white font-bold shadow-md hover:bg-indigo-700"><i class="fas fa-check mr-2"></i>บันทึก</button></div>
    </div>
  </div>


  <script>
    // --- 1. STATE & CONFIG ---
    let db = { users: [], products: [], vendors: [], prs: [], pos: [], transactions: [] };
    let currentUser = null;
    let activeTab = 'dashboard';
    
    // Carts for temporary actions
    let prCart = [];
    let grCart = [];
    let issueCart = [];
    let selectedProducts = [];
    
    // Check local storage for URL (if hardcoded URL is empty)
    if(YOUR_GAS_URL === "") YOUR_GAS_URL = localStorage.getItem('procure_gas_url') || "";

    // --- 2. UTILITIES ---
    const $ = id => document.getElementById(id);
    const show = id => { const el = $(id); if(el) el.classList.remove('hidden'); };
    const hide = id => { const el = $(id); if(el) el.classList.add('hidden'); };
    const fDate = iso => { if(!iso)return'-'; const d=new Date(iso); return `${d.toLocaleDateString('th-TH')} ${d.toLocaleTimeString('th-TH',{hour:'2-digit',minute:'2-digit'})}`; };
    
    function showToast(msg, type='success') {
      const t = $('toast'); 
      $('toast-msg').innerText = msg;
      t.className = `fixed bottom-6 right-6 px-6 py-4 rounded-xl shadow-2xl text-white text-sm font-bold z-[400] transition-all duration-300 flex items-center ${type==='success'?'bg-emerald-600':'bg-red-600'}`;
      t.classList.remove('opacity-0', 'translate-y-4', 'pointer-events-none');
      setTimeout(() => t.classList.add('opacity-0', 'translate-y-4', 'pointer-events-none'), 3000);
    }

    function setSyncing(isSync) {
      const icon = $('sync-icon'); const txt = $('sync-text');
      if(!icon) return;
      if(isSync) { icon.className = 'fas fa-circle-notch fa-spin text-blue-500 mr-2'; txt.innerText = 'กำลังซิงค์...'; }
      else { icon.className = 'fas fa-cloud text-emerald-500 mr-2'; txt.innerText = 'ออนไลน์'; }
    }

    function customAlert(title, message, type='info') {
      $('dialog-title').innerText = title;
      $('dialog-message').innerText = message;
      
      const iconBox = $('dialog-icon');
      const btn = $('dialog-confirm');
      $('dialog-cancel').classList.add('hidden');
      
      if(type==='error'){
        $('dialog-title').className = 'text-xl font-bold mb-2 text-red-600';
        iconBox.innerHTML = '<i class="fas fa-exclamation-triangle text-3xl text-red-500"></i>';
        btn.className = 'px-4 py-2 w-full rounded-lg text-white font-medium shadow-sm bg-red-600 hover:bg-red-700';
      } else {
        $('dialog-title').className = 'text-xl font-bold mb-2 text-blue-600';
        iconBox.innerHTML = '<i class="fas fa-info-circle text-3xl text-blue-500"></i>';
        btn.className = 'px-4 py-2 w-full rounded-lg text-white font-medium shadow-sm bg-blue-600 hover:bg-blue-700';
      }
      
      btn.onclick = closeDialog;
      show('custom-dialog');
    }

    function customConfirm(title, message, callback) {
      $('dialog-title').innerText = title;
      $('dialog-title').className = 'text-xl font-bold mb-2 text-amber-600';
      $('dialog-message').innerText = message;
      $('dialog-icon').innerHTML = '<i class="fas fa-question-circle text-3xl text-amber-500"></i>';
      
      const btn = $('dialog-confirm');
      btn.className = 'px-4 py-2 w-full rounded-lg text-white font-medium shadow-sm bg-amber-500 hover:bg-amber-600';
      
      $('dialog-cancel').classList.remove('hidden');
      
      btn.onclick = () => { callback(); closeDialog(); };
      show('custom-dialog');
    }

    function closeDialog() { hide('custom-dialog'); }

    // --- 3. BOOTSTRAP & CLOUD SYNC ---
    window.onload = async () => {
      if(!YOUR_GAS_URL) {
        document.body.innerHTML = `<div class="h-screen flex items-center justify-center flex-col text-red-500 font-bold p-10 text-center"><i class="fas fa-exclamation-triangle text-6xl mb-4"></i><h2>โปรดนำ URL จาก Apps Script มาใส่ตรงตัวแปร YOUR_GAS_URL ในโค้ดก่อนครับ</h2></div>`;
        return;
      }
      try {
        setSyncing(true);
        const res = await fetch(YOUR_GAS_URL, { redirect: "follow" });
        if(res.redirected && res.url.includes("ServiceLogin")) throw new Error("CORS");
        const data = await res.json();
        
        if(Object.keys(data).length === 0 || !data.users) {
          // If DB is empty, use initial basic template (will be created in backend mostly, but fallback here)
          customAlert("แจ้งเตือน", "ไม่พบข้อมูลในระบบ หรือเกิดปัญหาในการดึงตาราง (ระบบอาจว่างเปล่า)", "error");
        } else {
          db = data;
        }
        
        hide('loading-screen'); show('login-screen');
      } catch(e) {
        if(e.message === "CORS") customAlert('ติดสิทธิ์องค์กร', 'เกิดปัญหาการเข้าถึง Google Apps Script\nวิธีแก้: ไปที่ Apps Script -> กด Deploy -> ตั้งค่า Who has access เป็น "Anyone" หรือใช้อีเมล @gmail.com สร้าง Backend แทนครับ', 'error');
        else customAlert('ข้อผิดพลาด', 'ไม่สามารถเชื่อมต่อฐานข้อมูล Cloud ได้ โปรดตรวจสอบ URL ของท่าน', 'error');
        hide('loading-screen');
      }
      setSyncing(false);
    };

    async function syncDB() {
      setSyncing(true);
      try {
        await fetch(YOUR_GAS_URL, { 
          method: 'POST', redirect: 'follow',
          headers: { 'Content-Type': 'text/plain;charset=utf-8' }, 
          body: JSON.stringify(db) 
        });
      } catch(error) {
        console.error(error);
        customAlert('แจ้งเตือน', 'บันทึกข้อมูลลงเครื่องแล้ว แต่ซิงค์ขึ้น Cloud ล้มเหลว', 'error');
      }
      setSyncing(false);
    }

    // --- 4. AUTH & NAVIGATION ---
    $('login-form').onsubmit = (e) => {
      e.preventDefault();
      const u = $('login-user').value.trim();
      const p = $('login-pass').value.trim();
      const user = db.users.find(x => String(x.username).trim() === u && String(x.password).trim() === p);
      
      if(user) {
        currentUser = user;
        $('user-name-display').innerText = user.name;
        $('user-role-display').innerText = user.role;
        $('user-avatar').innerText = user.name.charAt(0);
        
        hide('login-screen'); show('main-app');
        renderSidebar(); openTab(user.role==='Requester' ? 'pr' : 'dashboard');
        showToast(`ยินดีต้อนรับคุณ ${user.name}`);
      } else {
        customAlert('เข้าสู่ระบบล้มเหลว', 'ชื่อผู้ใช้งานหรือรหัสผ่านไม่ถูกต้อง', 'error');
      }
    };

    window.logout = () => { customConfirm('ยืนยันออกจากระบบ', 'ต้องการออกจากระบบใช่หรือไม่?', () => location.reload()); };

    function renderSidebar() {
      const role = currentUser.role;
      const nav = $('nav-menu');
      let html = '';
      const btnClass = "w-full flex items-center space-x-3 px-4 py-3.5 rounded-xl text-sm font-bold text-slate-300 hover:bg-slate-800 hover:text-white transition-colors mb-1 text-left";
      
      if(role !== 'Requester') html += `<button onclick="openTab('dashboard')" class="${btnClass}" id="nav-dashboard"><i class="fas fa-home w-5 text-center"></i><span>แดชบอร์ด</span></button>`;
      
      if(['Admin','Requester','Purchaser'].includes(role)) {
        html += `<div class="text-[11px] font-black text-slate-500 uppercase tracking-widest mt-6 mb-2 ml-2">จัดซื้อ</div>`;
        html += `<button onclick="openTab('pr')" class="${btnClass}" id="nav-pr"><i class="fas fa-file-invoice w-5 text-center"></i><span>ใบขอซื้อ (PR)</span></button>`;
        if(['Admin','Purchaser'].includes(role)) html += `<button onclick="openTab('po')" class="${btnClass}" id="nav-po"><i class="fas fa-shopping-cart w-5 text-center"></i><span>ใบสั่งซื้อ (PO)</span></button>`;
      }
      
      if(['Admin','Store'].includes(role)) {
        const poCount = db.pos.filter(p=>p.status==='Pending Receipt').length;
        const badge = poCount > 0 ? `<span class="bg-red-500 text-white text-[10px] px-2 py-0.5 rounded-full shadow-sm ml-auto">${poCount}</span>` : '';
        html += `<div class="text-[11px] font-black text-slate-500 uppercase tracking-widest mt-6 mb-2 ml-2">คลังสินค้า</div>`;
        html += `<button onclick="openTab('gr')" class="${btnClass}" id="nav-gr"><div class="flex items-center space-x-3"><i class="fas fa-box-open w-5 text-center"></i><span>รับเข้า (สแกน)</span></div>${badge}</button>`;
        html += `<button onclick="openTab('issue')" class="${btnClass}" id="nav-issue"><i class="fas fa-dolly w-5 text-center"></i><span>เบิกจ่าย (สแกน)</span></button>`;
        html += `<button onclick="openTab('stock')" class="${btnClass}" id="nav-stock"><i class="fas fa-cubes w-5 text-center"></i><span>สต๊อกคงเหลือ</span></button>`;
        html += `<button onclick="openTab('history')" class="${btnClass}" id="nav-history"><i class="fas fa-history w-5 text-center"></i><span>ประวัติความเคลื่อนไหว</span></button>`;
      }

      if(['Admin','Purchaser','Store'].includes(role)) {
        html += `<div class="text-[11px] font-black text-slate-500 uppercase tracking-widest mt-6 mb-2 ml-2">Analytics</div>`;
        html += `<button onclick="openTab('reports')" class="${btnClass}" id="nav-reports"><i class="fas fa-chart-pie w-5 text-center"></i><span>รายงาน (Reports)</span></button>`;
      }

      if(role === 'Admin') {
        html += `<div class="text-[10px] font-black text-slate-500 uppercase tracking-widest mt-6 mb-2 ml-2">Settings</div>`;
        html += `<button onclick="openTab('settings')" class="${btnClass}" id="nav-settings"><i class="fas fa-cog w-5 text-center"></i><span>จัดการระบบ/สิทธิ์ผู้ใช้</span></button>`;
      }

      nav.innerHTML = html;
      buildAppSkeletons(); // สร้างโครงสร้าง HTML สำหรับแต่ละแท็บรอไว้
    }

    window.openTab = (tabName) => {
      activeTab = tabName;
      document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
      $(tabName).classList.add('active');
      $('header-title').innerText = tabName.toUpperCase();
      
      // Update Sidebar Style
      document.querySelectorAll('#nav-menu button').forEach(btn => {
        btn.classList.remove('bg-blue-600', 'text-white', 'shadow-md');
        btn.classList.add('text-slate-300');
      });
      const activeBtn = $('nav-'+tabName);
      if(activeBtn) {
        activeBtn.classList.remove('text-slate-300');
        activeBtn.classList.add('bg-blue-600', 'text-white', 'shadow-md');
      }

      // Close mobile sidebar if open
      $('sidebar').classList.add('-translate-x-full');

      // Call Render Function
      if(tabName === 'dashboard') renderDashboard();
      if(tabName === 'pr') renderPR();
      if(tabName === 'po') renderPO();
      if(tabName === 'gr') renderGR();
      if(tabName === 'issue') renderIssue();
      if(tabName === 'stock') renderStock();
      if(tabName === 'history') renderHistory();
      if(tabName === 'reports') renderReports();
      if(tabName === 'settings') renderSettings();
    };

    // --- 5. BUILD SKELETONS (สร้าง DOM พื้นฐานสำหรับแต่ละหน้า) ---
    function buildAppSkeletons() {
      const tc = $('tabs-container');
      tc.innerHTML = `
        <div id="dashboard" class="tab-content space-y-6"></div>
        <div id="pr" class="tab-content space-y-6"></div>
        <div id="po" class="tab-content space-y-6"></div>
        <div id="gr" class="tab-content space-y-6"></div>
        <div id="issue" class="tab-content space-y-6"></div>
        <div id="stock" class="tab-content space-y-6"></div>
        <div id="history" class="tab-content space-y-6"></div>
        <div id="reports" class="tab-content space-y-6"></div>
        <div id="settings" class="tab-content space-y-6"></div>
      `;
    }

    // --- 6. RENDER VIEWS ---

    // 6.1 DASHBOARD
    function renderDashboard() {
      const role = currentUser.role;
      const lowStock = db.products.filter(p => p.stock <= p.minStock).length;
      let acts = '';
      
      if(['Admin','Requester','Purchaser'].includes(role)) acts += `<button onclick="openTab('pr'); window.currentPrView='create'; renderPR();" class="bg-white/20 hover:bg-white/30 backdrop-blur border border-white/30 px-4 py-2.5 rounded-lg font-bold flex items-center transition-colors"><i class="fas fa-plus mr-2"></i> สร้างใบ PR</button>`;
      if(['Admin','Store'].includes(role)) {
        acts += `<button onclick="openTab('gr')" class="bg-emerald-500/80 hover:bg-emerald-500 backdrop-blur px-4 py-2.5 rounded-lg font-bold flex items-center transition-colors"><i class="fas fa-box-open mr-2"></i> รับของเข้า</button>`;
        acts += `<button onclick="openTab('issue')" class="bg-amber-500/80 hover:bg-amber-500 backdrop-blur px-4 py-2.5 rounded-lg font-bold flex items-center transition-colors"><i class="fas fa-dolly mr-2"></i> เบิกของออก</button>`;
      }

      let cards = '';
      if(role !== 'Requester') {
        cards += `
          <div class="bg-white p-5 rounded-2xl shadow-sm border border-gray-100 flex items-center space-x-4 cursor-pointer hover:shadow-md transition-shadow" onclick="openTab('pr')">
            <div class="p-3.5 bg-blue-50 text-blue-600 rounded-xl"><i class="fas fa-file-invoice text-2xl"></i></div>
            <div><p class="text-sm text-gray-500 font-bold">PR รอดำเนินการ</p><p class="text-2xl font-black text-gray-800">${db.prs.filter(p=>p.status==='Pending').length}</p></div>
          </div>`;
        if(['Admin','Purchaser'].includes(role)) {
          cards += `
          <div class="bg-white p-5 rounded-2xl shadow-sm border border-gray-100 flex items-center space-x-4 cursor-pointer hover:shadow-md transition-shadow" onclick="openTab('po')">
            <div class="p-3.5 bg-indigo-50 text-indigo-600 rounded-xl"><i class="fas fa-shopping-cart text-2xl"></i></div>
            <div><p class="text-sm text-gray-500 font-bold">PO รอรับสินค้า</p><p class="text-2xl font-black text-gray-800">${db.pos.filter(p=>p.status==='Pending Receipt').length}</p></div>
          </div>`;
        }
        if(['Admin','Store'].includes(role)) {
          cards += `
          <div class="bg-white p-5 rounded-2xl shadow-sm border border-gray-100 flex items-center space-x-4 cursor-pointer hover:shadow-md transition-shadow" onclick="openTab('stock')">
            <div class="p-3.5 bg-emerald-50 text-emerald-600 rounded-xl"><i class="fas fa-cubes text-2xl"></i></div>
            <div><p class="text-sm text-gray-500 font-bold">สินค้าในคลัง</p><p class="text-2xl font-black text-gray-800">${db.products.length}</p></div>
          </div>
          <div class="bg-white p-5 rounded-2xl shadow-sm border border-gray-100 flex items-center space-x-4 cursor-pointer hover:shadow-md transition-shadow" onclick="openTab('stock')">
            <div class="p-3.5 bg-amber-50 text-amber-600 rounded-xl"><i class="fas fa-exclamation-triangle text-2xl"></i></div>
            <div><p class="text-sm text-gray-500 font-bold">ใกล้หมด/หมด</p><p class="text-2xl font-black text-red-500">${lowStock}</p></div>
          </div>`;
        }
      }

      $('dashboard').innerHTML = `
        <div class="bg-gradient-to-r from-blue-600 to-indigo-700 rounded-2xl p-6 md:p-8 text-white shadow-lg relative overflow-hidden">
           <div class="relative z-10">
              <h2 class="text-2xl md:text-3xl font-bold mb-2">ยินดีต้อนรับสู่ระบบ ASIA HYDRO</h2>
              <p class="text-blue-100 mb-6 max-w-xl">ระบบจัดการคลังสินค้าและจัดซื้ออัจฉริยะ เข้าถึงและจัดการข้อมูลได้อย่างรวดเร็ว</p>
              <div class="flex flex-wrap gap-3">${acts}</div>
           </div>
           <i class="fas fa-layer-group text-[200px] absolute right-0 bottom-0 opacity-10 transform translate-x-10 translate-y-10 hidden md:block"></i>
        </div>
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 md:gap-6 print-hidden">${cards}</div>
      `;
    }

    // 6.2 PR
    window.currentPrView = 'list';
    window.prSearch = '';
    
    window.renderPR = () => {
      const root = $('pr');
      const role = currentUser.role;
      const canApprove = ['Admin','Purchaser'].includes(role);
      
      if(window.currentPrView === 'create') {
        const prodOptions = db.products.map(p => `<option value="${p.id}">[${p.id}] ${p.name}</option>`).join('');
        const isCustom = window.prIsCustom || false;
        
        let cartHtml = '';
        if(prCart.length > 0) {
          cartHtml = `<div class="overflow-x-auto border border-gray-200 rounded-xl shadow-sm bg-white mt-6">
            <table class="w-full text-left whitespace-nowrap min-w-[800px]"><thead class="bg-gray-50 text-xs text-gray-500 border-b uppercase"><tr><th class="px-5 py-4 font-bold">สินค้า</th><th class="px-5 py-4 font-bold text-right">จำนวน</th><th class="px-5 py-4 font-bold">วันที่ต้องการ</th><th class="px-5 py-4 font-bold">JOB#</th><th class="px-5 py-4 font-bold">หมายเหตุ</th><th class="px-5 py-4 font-bold text-center">จัดการ</th></tr></thead><tbody class="divide-y">
            ${prCart.map((it, i) => `<tr><td class="px-5 py-3"><div class="font-bold">${it.isCustom ? it.customName : db.products.find(x=>x.id===it.productId)?.name} ${it.isCustom ? '<span class="text-[10px] bg-amber-100 text-amber-700 px-2 py-0.5 rounded ml-2">นอกระบบ</span>':''}</div><div class="text-xs text-blue-600">${it.productId}</div></td><td class="px-5 py-3 text-right font-black text-lg">${it.qty} <span class="text-sm text-gray-500 font-normal">${it.unit}</span></td><td class="px-5 py-3 text-gray-600">${it.reqDate||'-'}</td><td class="px-5 py-3 text-indigo-600 font-bold">${it.jobNo||'-'}</td><td class="px-5 py-3 text-gray-500 text-xs truncate max-w-[150px]">${it.suggestVendor} ${it.remark}</td><td class="px-5 py-3 text-center"><button onclick="removePrItem(${i})" class="text-red-500 bg-red-50 p-2 rounded-lg"><i class="fas fa-times"></i></button></td></tr>`).join('')}
            </tbody></table></div>
            <div class="flex justify-end pt-6 border-t mt-6"><button onclick="savePR()" class="bg-emerald-500 text-white px-8 py-3.5 rounded-xl font-black text-lg shadow-lg hover:bg-emerald-600 active:scale-95"><i class="fas fa-check mr-2"></i> ยืนยันบันทึกใบขอซื้อ</button></div>`;
        }

        root.innerHTML = `
          <div class="bg-white rounded-2xl shadow-sm border p-4 md:p-8 max-w-5xl animate-in fade-in">
            <div class="flex justify-between items-center mb-6 border-b pb-4"><h2 class="text-2xl font-black">สร้างใบขอซื้อ (PR)</h2><button onclick="window.currentPrView='list'; renderPR();" class="text-gray-500 bg-gray-100 px-4 py-2 rounded-lg font-bold">กลับ</button></div>
            <div class="space-y-6">
              <div><label class="block text-sm font-bold mb-1">ผู้ขอซื้อ *</label><input type="text" class="w-full border rounded-xl p-3 bg-gray-50 font-bold text-gray-500" value="${currentUser.name}" disabled></div>
              <div class="border border-blue-100 rounded-xl p-6 bg-blue-50/30">
                <div class="flex justify-between items-center mb-4 border-b border-blue-100 pb-3"><h3 class="font-bold text-blue-800 text-lg">เพิ่มรายการสินค้า</h3><label class="flex items-center text-sm font-bold text-blue-700 cursor-pointer"><input type="checkbox" id="pr-iscustom" class="mr-2 w-4 h-4" ${isCustom?'checked':''} onchange="window.prIsCustom=this.checked; renderPR()">พิมพ์ชื่อเอง (นอกระบบ)</label></div>
                <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-4">
                  <div class="md:col-span-3"><label class="block text-xs font-bold mb-1">สินค้า *</label>
                    ${!isCustom ? `<select id="pr-prod-id" class="w-full border rounded-lg p-3 outline-none focus:ring-2 focus:ring-blue-500"><option value="">-- เลือกจากระบบ --</option>${prodOptions}</select>` : `<input type="text" id="pr-prod-name" placeholder="พิมพ์ชื่อสินค้า..." class="w-full border rounded-lg p-3 outline-none focus:ring-2 focus:ring-blue-500">`}
                  </div>
                  <div class="flex gap-2"><div class="flex-1"><label class="block text-xs font-bold mb-1">จำนวน *</label><input type="number" id="pr-qty" class="w-full border rounded-lg p-3 outline-none focus:ring-2 focus:ring-blue-500"></div>${isCustom ? `<div class="w-24"><label class="block text-xs font-bold mb-1">หน่วย</label><input type="text" id="pr-unit" placeholder="หน่วย" class="w-full border rounded-lg p-3 outline-none"></div>` : ''}</div>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-4">
                  <div><label class="block text-xs font-bold mb-1">วันที่ต้องการ</label><input type="date" id="pr-date" class="w-full border rounded-lg p-3 outline-none"></div>
                  <div><label class="block text-xs font-bold mb-1">JOB# (รหัสงาน)</label><input type="text" id="pr-job" placeholder="AH#..." class="w-full border rounded-lg p-3 outline-none"></div>
                  <div><label class="block text-xs font-bold mb-1">Suggest Vendor</label><input type="text" id="pr-vendor" placeholder="แนะนำร้านค้า" class="w-full border rounded-lg p-3 outline-none"></div>
                  <div><label class="block text-xs font-bold mb-1">หมายเหตุ</label><input type="text" id="pr-remark" placeholder="สเปคเพิ่มเติม" class="w-full border rounded-lg p-3 outline-none"></div>
                </div>
                <div class="flex justify-end pt-4"><button onclick="addPrItem()" class="bg-blue-600 text-white px-6 py-2.5 rounded-xl font-bold shadow-md hover:bg-blue-700"><i class="fas fa-plus mr-2"></i> เพิ่มลงตะกร้า</button></div>
              </div>
              ${cartHtml}
            </div>
          </div>
        `;
      } else {
        const list = db.prs.filter(pr => pr.id.toLowerCase().includes(window.prSearch.toLowerCase()) || pr.requester.toLowerCase().includes(window.prSearch.toLowerCase()));
        
        let trs = list.map(pr => {
          let acts = '';
          if(canApprove && pr.status === 'Pending') acts = `<button onclick="actionPR('${pr.id}','approve')" class="text-emerald-600 bg-emerald-50 border border-emerald-500 px-3 py-1.5 rounded-lg text-xs font-bold mr-2 hover:bg-emerald-600 hover:text-white transition-colors">อนุมัติ</button><button onclick="actionPR('${pr.id}','reject')" class="text-red-500 border border-red-500 px-3 py-1.5 rounded-lg text-xs font-bold hover:bg-red-600 hover:text-white transition-colors">ไม่อนุมัติ</button>`;
          if(canApprove && pr.status === 'Approved') acts = `<button onclick="window.poFromPr='${pr.id}'; openTab('po'); window.currentPoView='create'; renderPO();" class="text-blue-600 border border-blue-500 px-4 py-1.5 rounded-lg text-xs font-bold hover:bg-blue-600 hover:text-white transition-colors">เปิด PO</button>`;
          if(pr.status === 'Pending' || pr.status === 'Rejected') acts += `<button onclick="actionPR('${pr.id}','delete')" class="text-gray-400 hover:text-red-500 ml-2 p-1.5"><i class="fas fa-trash"></i></button>`;

          let badge = pr.status === 'Approved' ? 'bg-emerald-100 text-emerald-700' : pr.status === 'Rejected' ? 'bg-red-100 text-red-700' : 'bg-amber-100 text-amber-700';
          let txt = pr.status === 'Approved' ? 'อนุมัติแล้ว' : pr.status === 'Rejected' ? 'ไม่อนุมัติ' : 'รอดำเนินการ';

          return `<tr class="hover:bg-blue-50/50"><td class="p-4 font-bold text-blue-600">${pr.id}</td><td class="p-4 text-sm">${pr.date}</td><td class="p-4 font-bold">${pr.requester}</td><td class="p-4 text-sm font-medium">${pr.items.length} รายการ</td><td class="p-4 text-center"><span class="px-3 py-1.5 rounded-full text-xs font-bold inline-block w-24 ${badge}">${txt}</span></td><td class="p-4 text-center print-hidden">${acts}</td></tr>`;
        }).join('');

        if(trs === '') trs = `<tr><td colspan="6" class="text-center py-10 text-gray-500">ไม่พบเอกสาร PR</td></tr>`;

        root.innerHTML = `
          <div class="flex justify-between items-center mb-4">
            <h2 class="text-2xl font-bold">ใบขอซื้อ (PR)</h2>
            <div class="flex space-x-3">
              <div class="relative"><input type="text" placeholder="ค้นหา..." value="${window.prSearch}" onkeyup="window.prSearch=this.value; renderPR()" class="w-64 pl-10 pr-4 py-2.5 border rounded-xl outline-none focus:ring-2 focus:ring-blue-500 text-sm"><i class="fas fa-search absolute left-4 top-3.5 text-gray-400"></i></div>
              <button onclick="window.currentPrView='create'; renderPR()" class="bg-blue-600 text-white px-5 py-2.5 rounded-xl font-bold shadow-md active:scale-95"><i class="fas fa-plus mr-1"></i> สร้าง PR</button>
            </div>
          </div>
          <div class="bg-white rounded-2xl shadow-sm border overflow-hidden"><table class="w-full text-left min-w-[800px]"><thead class="bg-gray-50 border-b text-sm uppercase text-gray-600"><tr><th class="p-4 font-bold">เลขที่ PR</th><th class="p-4 font-bold">วันที่</th><th class="p-4 font-bold">ผู้ขอซื้อ</th><th class="p-4 font-bold">รายการ</th><th class="p-4 font-bold text-center">สถานะ</th><th class="p-4 font-bold text-center">จัดการ</th></tr></thead><tbody class="divide-y divide-gray-100">${trs}</tbody></table></div>
        `;
      }
    };

    window.addPrItem = () => {
      const isCustom = window.prIsCustom || false;
      const pid = isCustom ? '' : $('pr-prod-id').value;
      const pname = isCustom ? $('pr-prod-name').value : '';
      const qty = parseInt($('pr-qty').value);
      
      if((!isCustom && !pid) || (isCustom && !pname) || !qty) return customAlert('ผิดพลาด', 'กรุณาระบุสินค้าและจำนวนให้ครบถ้วน', 'error');
      
      let unit = 'ชิ้น';
      if(!isCustom) unit = db.products.find(x=>x.id===pid)?.unit || 'ชิ้น';
      else unit = $('pr-unit').value || 'ชิ้น';

      prCart.push({ isCustom, productId: pid, customName: pname, qty, unit, reqDate: $('pr-date').value, jobNo: $('pr-job').value, suggestVendor: $('pr-vendor').value, remark: $('pr-remark').value });
      renderPR();
    };
    window.removePrItem = (idx) => { prCart.splice(idx, 1); renderPR(); };
    window.savePR = () => {
      customConfirm('ยืนยัน', 'บันทึกใบขอซื้อฉบับนี้?', () => {
        const pr = { id: `PR-${Date.now().toString().slice(-6)}`, date: new Date().toISOString().split('T')[0], requester: currentUser.name, status: 'Pending', items: prCart };
        db.prs.unshift(pr); syncDB(); prCart = []; window.currentPrView = 'list'; renderPR(); showToast('สร้าง PR สำเร็จ');
      });
    };
    window.actionPR = (id, act) => {
      if(act==='delete') customConfirm('ลบเอกสาร', 'ลบใบ PR นี้?', () => { db.prs = db.prs.filter(p=>p.id!==id); syncDB(); renderPR(); showToast('ลบสำเร็จ'); });
      else if(act==='approve') customConfirm('อนุมัติ', 'ยืนยันอนุมัติใบขอซื้อ?', () => { db.prs.find(p=>p.id===id).status='Approved'; syncDB(); renderPR(); showToast('อนุมัติสำเร็จ'); });
      else if(act==='reject') customConfirm('ปฏิเสธ', 'ไม่อนุมัติใบขอซื้อ?', () => { db.prs.find(p=>p.id===id).status='Rejected'; syncDB(); renderPR(); showToast('ปฏิเสธสำเร็จ', 'error'); });
    };

    // 6.3 PO
    window.currentPoView = 'list';
    window.poSearch = '';
    window.poFromPr = '';

    window.renderPO = () => {
      const root = $('po');
      if(window.currentPoView === 'create') {
        const approvedPRs = db.prs.filter(pr => pr.status === 'Approved' && !db.pos.find(po => po.prId === pr.id));
        const prOpts = approvedPRs.map(p => `<option value="${p.id}" ${window.poFromPr===p.id?'selected':''}>${p.id} (ขอโดย: ${p.requester})</option>`).join('');
        const vOpts = db.vendors.map(v => `<option value="${v.id}">[${v.id}] ${v.name}</option>`).join('');

        let previewHtml = '';
        if(window.poFromPr) {
          const pr = db.prs.find(x=>x.id===window.poFromPr);
          if(pr) {
            previewHtml = `<div class="border rounded-xl overflow-hidden mt-6 shadow-sm"><div class="bg-gray-50 px-5 py-3 border-b font-bold">พรีวิวรายการสั่งซื้อ</div><table class="w-full text-left text-sm"><thead class="bg-white border-b uppercase text-gray-500"><tr><th class="p-3">สินค้า</th><th class="p-3 text-right">จำนวน</th><th class="p-3 text-right">ราคาประเมิน</th></tr></thead><tbody>
              ${pr.items.map(it => {
                const p = !it.isCustom ? db.products.find(x=>x.id===it.productId) : null;
                const name = it.isCustom ? it.customName : p?.name;
                const price = p ? p.price : 0;
                return `<tr class="border-b"><td class="p-3 font-bold">${name} ${it.isCustom?'<span class="text-[10px] bg-amber-100 text-amber-700 px-2 py-0.5 rounded ml-2">นอกระบบ</span>':''}</td><td class="p-3 text-right font-black">${it.qty} <span class="text-xs font-normal text-gray-500">${it.isCustom?it.unit:p?.unit}</span></td><td class="p-3 text-right text-gray-600">฿${price.toLocaleString()}</td></tr>`;
              }).join('')}
            </tbody></table></div>`;
          }
        }

        root.innerHTML = `
          <div class="bg-white rounded-2xl shadow-sm border p-4 md:p-8 max-w-4xl animate-in fade-in">
            <div class="flex justify-between items-center mb-6 border-b pb-4"><h2 class="text-2xl font-black">สร้างใบสั่งซื้อ (PO)</h2><button onclick="window.currentPoView='list'; window.poFromPr=''; renderPO();" class="text-gray-500 bg-gray-100 px-4 py-2 rounded-lg font-bold">กลับ</button></div>
            <div class="space-y-6">
              <div class="grid grid-cols-1 md:grid-cols-2 gap-6 bg-indigo-50/50 p-6 rounded-xl border border-indigo-100">
                <div><label class="block font-bold text-indigo-900 mb-2">อ้างอิง PR *</label><select id="po-pr-id" class="w-full border rounded-xl p-3 bg-white" onchange="window.poFromPr=this.value; renderPO()"><option value="">-- เลือกเอกสาร PR --</option>${prOpts}</select></div>
                <div><label class="block font-bold text-indigo-900 mb-2">ซัพพลายเออร์ *</label><select id="po-vendor-id" class="w-full border rounded-xl p-3 bg-white"><option value="">-- เลือกร้านค้า --</option>${vOpts}</select></div>
              </div>
              ${previewHtml}
              <div class="text-right pt-6"><button onclick="savePO()" class="bg-indigo-600 text-white px-8 py-3.5 rounded-xl font-black text-lg shadow-md hover:bg-indigo-700"><i class="fas fa-check mr-2"></i> ยืนยันออก PO</button></div>
            </div>
          </div>
        `;
      } else {
        const list = db.pos.filter(po => {
          const v = db.vendors.find(x=>x.id===po.vendorId);
          const s = window.poSearch.toLowerCase();
          return po.id.toLowerCase().includes(s) || po.prId.toLowerCase().includes(s) || (v&&v.name.toLowerCase().includes(s));
        });

        let trs = list.map(po => {
          const v = db.vendors.find(x=>x.id===po.vendorId);
          let acts = po.status === 'Pending Receipt' ? `<button onclick="actionPO('${po.id}')" class="text-red-500 hover:bg-red-50 px-3 py-1.5 rounded-lg text-sm font-bold border border-transparent transition-colors">ยกเลิก PO</button>` : '';
          let badge = po.status === 'Completed' ? 'bg-emerald-100 text-emerald-700' : 'bg-blue-100 text-blue-700';
          let txt = po.status === 'Completed' ? 'รับครบแล้ว' : 'รอรับสินค้า';

          return `<tr class="hover:bg-indigo-50/50"><td class="p-4 font-bold text-indigo-700">${po.id}</td><td class="p-4 text-sm text-gray-500 font-medium">${po.prId}</td><td class="p-4 font-bold">${v?.name||''}</td><td class="p-4 text-sm text-center text-gray-600">${po.date}</td><td class="p-4 text-center"><span class="px-3 py-1.5 rounded-full text-xs font-bold inline-block w-28 ${badge}">${txt}</span></td><td class="p-4 text-center print-hidden">${acts}</td></tr>`;
        }).join('');

        if(trs==='') trs=`<tr><td colspan="6" class="text-center py-10 text-gray-500">ไม่พบเอกสาร PO</td></tr>`;

        root.innerHTML = `
          <div class="flex justify-between items-center mb-4">
            <h2 class="text-2xl font-bold">ใบสั่งซื้อ (PO)</h2>
            <div class="flex space-x-3">
              <div class="relative"><input type="text" placeholder="ค้นหาเลขที่ PO, PR..." value="${window.poSearch}" onkeyup="window.poSearch=this.value; renderPO()" class="w-64 pl-10 pr-4 py-2.5 border rounded-xl outline-none focus:ring-2 focus:ring-indigo-500 text-sm"><i class="fas fa-search absolute left-4 top-3.5 text-gray-400"></i></div>
              <button onclick="window.currentPoView='create'; renderPO()" class="bg-indigo-600 text-white px-5 py-2.5 rounded-xl font-bold shadow-md"><i class="fas fa-plus mr-1"></i> สร้าง PO</button>
            </div>
          </div>
          <div class="bg-white rounded-2xl shadow-sm border overflow-hidden"><table class="w-full text-left min-w-[800px]"><thead class="bg-gray-50 border-b text-sm uppercase text-gray-600"><tr><th class="p-4 font-bold">เลขที่ PO</th><th class="p-4 font-bold">อ้างอิง PR</th><th class="p-4 font-bold">ซัพพลายเออร์</th><th class="p-4 font-bold text-center">วันที่สั่ง</th><th class="p-4 font-bold text-center">สถานะ</th><th class="p-4 font-bold text-center">จัดการ</th></tr></thead><tbody class="divide-y divide-gray-100">${trs}</tbody></table></div>
        `;
      }
    };

    window.savePO = () => {
      const prId = $('po-pr-id').value; const vId = $('po-vendor-id').value;
      if(!prId || !vId) return customAlert('ผิดพลาด', 'กรุณาเลือก PR และร้านค้าให้ครบ', 'error');
      customConfirm('สร้าง PO', 'ยืนยันการออกใบสั่งซื้อ?', () => {
        const pr = db.prs.find(p=>p.id===prId);
        const poId = `PO-${Date.now().toString().slice(-6)}`;
        const items = pr.items.map(it => {
          const p = !it.isCustom ? db.products.find(x=>x.id===it.productId) : null;
          return { ...it, expectedQty: it.qty, receivedQty: 0, price: p?p.price:0 };
        });
        db.pos.unshift({ id: poId, prId, vendorId: vId, date: new Date().toISOString().split('T')[0], status: 'Pending Receipt', items });
        syncDB(); window.currentPoView='list'; window.poFromPr=''; renderPO(); showToast('สร้าง PO สำเร็จ');
      });
    };
    window.actionPO = (id) => { customConfirm('ยกเลิก', 'ลบ PO นี้?', () => { db.pos = db.pos.filter(p=>p.id!==id); syncDB(); renderPO(); }); };

    // 6.4 GR
    window.selectedGrPo = '';
    window.grSearch = '';
    
    window.renderGR = () => {
      const root = $('gr');
      if(!window.selectedGrPo) {
        const activePOs = db.pos.filter(p => p.status === 'Pending Receipt');
        const opts = activePOs.map(po => `<option value="${po.id}">${po.id} - ${db.vendors.find(v=>v.id===po.vendorId)?.name||''}</option>`).join('');
        root.innerHTML = `
          <h2 class="text-2xl font-bold mb-6">รับสินค้าเข้า (Goods Receipt)</h2>
          <div class="bg-white p-10 rounded-2xl shadow-sm border text-center max-w-2xl mx-auto mt-10 animate-in zoom-in-95">
            <div class="bg-emerald-100 w-20 h-20 rounded-full flex items-center justify-center mx-auto mb-6"><i class="fas fa-truck-loading text-4xl text-emerald-600"></i></div>
            <h3 class="text-xl font-bold text-gray-800 mb-2">เตรียมรับสินค้าเข้าคลัง</h3>
            <p class="text-gray-500 mb-6">เลือกใบสั่งซื้อ (PO) เพื่อตรวจรับสินค้า</p>
            <select onchange="window.selectedGrPo=this.value; grCart=[]; renderGR();" class="w-full border-2 border-emerald-100 rounded-xl p-4 text-lg outline-none focus:border-emerald-500 bg-gray-50 font-bold"><option value="">-- เลือกใบ PO --</option>${opts}</select>
          </div>
        `;
      } else {
        const po = db.pos.find(p=>p.id===window.selectedGrPo);
        
        let trs = po.items.map((it, idx) => {
          const p = !it.isCustom ? db.products.find(x=>x.id===it.productId) : null;
          const name = it.isCustom ? it.customName : p?.name;
          const sq = grCart.find(i => it.isCustom ? i.customName===it.customName : i.productId===it.productId)?.qty || 0;
          const isComp = it.receivedQty + sq >= it.expectedQty;
          
          return `
            <tr class="border-b ${sq>0?'bg-emerald-50':''}">
              <td class="p-4"><div class="font-bold">${name} ${it.isCustom?'<span class="text-[10px] bg-amber-100 text-amber-700 px-2 py-0.5 rounded ml-2">นอกระบบ</span>':''}</div><div class="text-xs font-mono text-gray-400 mt-1">${p?.barcode || it.productId}</div></td>
              <td class="p-4 text-center font-bold text-gray-600 text-lg">${it.expectedQty}</td>
              <td class="p-4 text-center font-bold text-gray-500 text-lg">${it.receivedQty}</td>
              <td class="p-4 text-center">${isComp&&sq===0?'<span class="text-emerald-500 font-black text-xl">-</span>':`<input type="number" min="0" max="${it.expectedQty-it.receivedQty}" value="${sq}" onchange="updateGrQty(${idx}, this.value)" class="w-24 border-2 border-gray-200 rounded-lg p-2 text-center font-black text-emerald-600 text-lg outline-none focus:border-emerald-500">`}</td>
              <td class="p-4 text-center">${isComp?'<i class="fas fa-check-circle text-emerald-500 text-2xl"></i>':`<button onclick="addGrManual(${idx})" class="text-xs bg-white hover:bg-slate-100 px-4 py-2 rounded-lg border font-bold shadow-sm">+1 (รับมือ)</button>`}</td>
            </tr>
          `;
        }).join('');

        root.innerHTML = `
          <h2 class="text-2xl font-bold mb-6">รับสินค้าเข้า (Goods Receipt)</h2>
          <div class="grid grid-cols-1 xl:grid-cols-3 gap-6 animate-in slide-in-from-bottom-4">
            <div class="xl:col-span-2 space-y-6">
              <div class="bg-blue-50/50 p-6 rounded-2xl border border-blue-100 shadow-inner"><label class="block font-bold text-blue-900 mb-3"><i class="fas fa-barcode mr-2"></i> เครื่องสแกนบาร์โค้ด</label><input type="text" id="gr-scan" placeholder="ยิงบาร์โค้ด / รหัส แล้วกด Enter" class="w-full p-4 text-xl font-mono border-2 border-blue-200 rounded-xl outline-none focus:border-blue-500" autofocus></div>
              <div class="bg-white rounded-2xl shadow-sm border overflow-hidden"><div class="bg-gray-50 p-4 border-b flex justify-between items-center"><h3 class="font-bold flex items-center"><i class="fas fa-box-open text-emerald-600 mr-2"></i>รายการใน PO: ${po.id}</h3><button onclick="window.selectedGrPo=''; renderGR()" class="text-sm border px-3 py-1.5 rounded-lg bg-white shadow-sm font-bold text-gray-600">เปลี่ยน PO</button></div>
              <table class="w-full text-left"><thead class="bg-white border-b text-xs uppercase text-gray-500"><tr><th class="p-4 font-bold">สินค้า</th><th class="p-4 font-bold text-center">สั่ง (PO)</th><th class="p-4 font-bold text-center">รับแล้ว</th><th class="p-4 font-bold text-center">จำนวนรับรอบนี้</th><th class="p-4 font-bold text-center">จัดการ</th></tr></thead><tbody>${trs}</tbody></table></div>
            </div>
            <div class="bg-white p-6 rounded-2xl shadow-sm border h-fit"><h3 class="font-bold text-lg mb-6 pb-3 border-b"><i class="fas fa-file-alt text-blue-600 mr-2"></i> สรุปรับเข้า</h3>
              <textarea id="gr-rem" rows="3" placeholder="หมายเหตุ (Optional)..." class="w-full border p-3 rounded-xl mb-6 bg-gray-50 outline-none focus:ring-2 focus:ring-blue-500"></textarea>
              <div class="bg-gray-50 p-4 rounded-xl border mb-6"><div class="flex justify-between text-sm mb-2"><span class="font-bold text-gray-600">สแกน:</span><span class="font-bold">${grCart.length} รายการ</span></div><div class="flex justify-between text-sm border-t pt-2 mt-2"><span class="font-bold text-gray-600">รวมชิ้น:</span><span class="font-black text-emerald-600 text-3xl">${grCart.reduce((s,i)=>s+i.qty,0)}</span></div></div>
              <button onclick="confirmGR()" class="w-full py-4 rounded-xl font-black text-lg shadow-md text-white ${grCart.length>0?'bg-emerald-500 hover:bg-emerald-600 active:scale-95':'bg-gray-300 pointer-events-none'}"><i class="fas fa-check mr-2"></i> ยืนยันนำเข้าสต๊อก</button>
            </div>
          </div>
        `;
        
        // ผูก Event สแกนบาร์โค้ด
        const scanEl = $('gr-scan');
        if(scanEl) {
          scanEl.addEventListener('keydown', (e) => {
            if(e.key==='Enter' && scanEl.value.trim()){
              const val = scanEl.value.trim(); scanEl.value = '';
              const prod = db.products.find(x=>x.barcode===val || x.id===val);
              if(!prod) return customAlert('ผิดพลาด', 'ไม่พบสินค้าในระบบ', 'error');
              
              const itemIdx = po.items.findIndex(i=>!i.isCustom && i.productId===prod.id);
              if(itemIdx===-1) return customAlert('ผิดพลาด', 'สินค้านี้ไม่อยู่ใน PO นี้', 'error');
              
              window.addGrManual(itemIdx);
            }
          });
          scanEl.focus();
        }
      }
    };

    window.addGrManual = (idx) => {
      const po = db.pos.find(p=>p.id===window.selectedGrPo);
      const it = po.items[idx];
      const exist = grCart.find(i => it.isCustom ? i.customName===it.customName : i.productId===it.productId);
      const curr = exist ? exist.qty : 0;
      if(curr + 1 > it.expectedQty - it.receivedQty) return customAlert('จำนวนเกิน', 'รับครบแล้ว', 'error');
      
      if(exist) exist.qty += 1;
      else grCart.push({ isCustom: it.isCustom, productId: it.productId, customName: it.customName, qty: 1 });
      renderGR();
    };

    window.updateGrQty = (idx, val) => {
      const q = parseInt(val) || 0; if(q<0)return;
      const po = db.pos.find(p=>p.id===window.selectedGrPo);
      const it = po.items[idx];
      if(q > it.expectedQty - it.receivedQty) return customAlert('จำนวนเกิน', `รับได้สูงสุด ${it.expectedQty - it.receivedQty}`, 'error');
      
      const cIdx = grCart.findIndex(i => it.isCustom ? i.customName===it.customName : i.productId===it.productId);
      if(q===0 && cIdx > -1) grCart.splice(cIdx, 1);
      else if(cIdx > -1) grCart[cIdx].qty = q;
      else if(q>0) grCart.push({ isCustom: it.isCustom, productId: it.productId, customName: it.customName, qty: q });
      renderGR();
    };

    window.confirmGR = () => {
      if(grCart.length===0) return;
      customConfirm('รับเข้า', 'ยืนยันเพิ่มยอดเข้าสต๊อก?', () => {
        const po = db.pos.find(p=>p.id===window.selectedGrPo);
        const rem = $('gr-rem').value;
        const ref = rem ? `${po.id} (${rem})` : po.id;

        grCart.forEach(scan => {
          po.items.find(i => scan.isCustom ? i.customName===scan.customName : i.productId===scan.productId).receivedQty += scan.qty;
          if(!scan.isCustom) {
            db.products.find(p=>p.id===scan.productId).stock += scan.qty;
            db.transactions.unshift({ id: `TXN-${Date.now()}-${Math.floor(Math.random()*100)}`, type: 'IN', date: new Date().toISOString(), productId: scan.productId, qty: scan.qty, referenceNo: ref });
          }
        });

        if(po.items.every(i => i.receivedQty >= i.expectedQty)) po.status = 'Completed';
        
        syncDB(); window.selectedGrPo=''; grCart=[]; renderGR(); showToast('รับเข้าสำเร็จ');
      });
    };

    // 6.5 ISSUE
    window.issueRef = '';
    window.renderIssue = () => {
      const root = $('issue');
      let trs = issueCart.map((it, idx) => {
        const p = db.products.find(x=>x.id===it.productId);
        return `<tr class="border-b"><td class="p-4"><div class="font-bold">${p.name}</div><div class="text-xs text-gray-400 font-mono">${p.id}</div></td><td class="p-4 text-center font-bold text-gray-500">${p.stock}</td><td class="p-4 text-center"><input type="number" min="1" max="${p.stock}" value="${it.qty}" onchange="updateIssueQty('${p.id}', this.value)" class="w-24 border-2 border-gray-200 rounded-lg p-2 text-center font-black text-amber-600 text-lg outline-none focus:border-amber-400"></td><td class="p-4 text-center"><button onclick="issueCart.splice(${idx},1); renderIssue();" class="text-red-500 hover:bg-red-50 p-2 rounded-lg"><i class="fas fa-times"></i></button></td></tr>`;
      }).join('');

      root.innerHTML = `
        <h2 class="text-2xl font-bold mb-6">เบิกจ่ายสินค้า (Goods Issue)</h2>
        <div class="grid grid-cols-1 xl:grid-cols-3 gap-6">
          <div class="xl:col-span-2 space-y-6">
            <div class="bg-white p-6 md:p-8 rounded-2xl shadow-sm border">
              <label class="block font-bold mb-2">ผู้เบิก / อ้างอิง <span class="text-red-500">*</span></label>
              <input type="text" id="issue-ref-input" value="${window.issueRef}" onkeyup="window.issueRef=this.value; renderIssueDebounce()" placeholder="เช่น แผนกผลิต..." class="w-full border-2 border-amber-100 rounded-xl p-3 bg-amber-50/20 font-bold outline-none focus:border-amber-400">
              
              <div class="mt-6 pt-6 border-t grid grid-cols-1 md:grid-cols-2 gap-4">
                <div class="bg-amber-50/50 p-4 rounded-xl border border-amber-100"><label class="block font-bold text-amber-900 mb-2"><i class="fas fa-barcode mr-2"></i> สแกนบาร์โค้ด</label><input type="text" id="issue-scan" placeholder="ยิงบาร์โค้ด..." class="w-full border-2 border-amber-200 rounded-lg p-3 font-mono outline-none focus:border-amber-500"></div>
                <div class="bg-gray-50/50 p-4 rounded-xl border border-gray-100"><label class="block font-bold text-gray-700 mb-2"><i class="fas fa-search mr-2"></i> ค้นหาด้วยมือ</label><div class="flex gap-2"><input type="text" id="issue-manual" list="is-list" class="w-full border rounded-lg p-3 outline-none" placeholder="พิมพ์ชื่อ..."><datalist id="is-list">${db.products.filter(p=>p.stock>0).map(p=>`<option value="${p.id}">${p.name} (เหลือ ${p.stock})</option>`).join('')}</datalist><button onclick="addIssueManual()" class="bg-slate-800 text-white px-4 rounded-lg"><i class="fas fa-plus"></i></button></div></div>
              </div>
            </div>
            ${issueCart.length>0 ? `<div class="bg-white rounded-2xl border shadow-sm overflow-hidden"><div class="bg-gray-50 p-4 border-b font-bold"><i class="fas fa-dolly text-amber-600 mr-2"></i>รายการเตรียมเบิก</div><table class="w-full text-left text-sm"><thead class="bg-white border-b text-xs uppercase text-gray-500"><tr><th class="p-4">สินค้า</th><th class="p-4 text-center w-24">คงเหลือ</th><th class="p-4 text-center w-32">จำนวนเบิก</th><th class="p-4 text-center w-16">ลบ</th></tr></thead><tbody class="divide-y">${trs}</tbody></table></div>` : ''}
          </div>
          <div class="bg-white p-6 rounded-2xl border shadow-sm h-fit"><h3 class="font-bold text-lg mb-4 pb-2 border-b">สรุปการเบิก</h3><textarea id="issue-rem" rows="3" placeholder="หมายเหตุ..." class="w-full border p-3 rounded-xl mb-4 bg-gray-50 outline-none focus:ring-2 focus:ring-amber-500"></textarea><div class="bg-gray-50 p-4 rounded-xl border mb-6"><div class="flex justify-between text-sm mb-2"><span class="font-bold text-gray-600">อ้างอิง:</span><span class="font-bold truncate max-w-[120px]">${window.issueRef||'-'}</span></div><div class="flex justify-between text-sm border-t pt-2 mt-2"><span class="font-bold text-gray-600">รวมชิ้น:</span><span class="font-black text-amber-500 text-3xl">${issueCart.reduce((s,i)=>s+i.qty,0)}</span></div></div><button onclick="confirmIssue()" class="w-full py-4 rounded-xl font-black text-lg text-white shadow-md ${issueCart.length>0&&window.issueRef?'bg-amber-500 hover:bg-amber-600 active:scale-95':'bg-gray-300 pointer-events-none'}"><i class="fas fa-check mr-2"></i> ยืนยันตัดสต๊อก</button></div>
        </div>
      `;

      const scanEl = $('issue-scan');
      if(scanEl) {
        scanEl.addEventListener('keydown', (e) => {
          if(e.key==='Enter' && scanEl.value.trim()){
            const val = scanEl.value.trim(); scanEl.value = '';
            const prod = db.products.find(x=>x.barcode===val || x.id===val);
            if(!prod) return customAlert('ไม่พบสินค้า', 'ไม่มีรหัสนี้ในระบบ', 'error');
            addIssueItem(prod);
          }
        });
        scanEl.focus();
      }
    };

    let issueTimer;
    window.renderIssueDebounce = () => { clearTimeout(issueTimer); issueTimer = setTimeout(renderIssue, 500); };

    window.addIssueManual = () => {
      const pid = $('issue-manual').value; if(!pid) return;
      const p = db.products.find(x=>x.id===pid);
      if(!p) return customAlert('ผิดพลาด', 'ไม่พบสินค้า', 'error');
      addIssueItem(p);
    };

    function addIssueItem(p) {
      const exist = issueCart.find(i=>i.productId===p.id);
      if((exist?exist.qty:0)+1 > p.stock) return customAlert('สต๊อกไม่พอ', `มีสต๊อกเหลือเพียง ${p.stock}`, 'error');
      if(exist) exist.qty += 1; else issueCart.push({productId: p.id, qty: 1});
      renderIssue();
    }

    window.updateIssueQty = (pid, val) => {
      const q = parseInt(val)||0; const p = db.products.find(x=>x.id===pid);
      if(q<0) return; if(q>p.stock) return customAlert('สต๊อกไม่พอ', `สูงสุด ${p.stock}`, 'error');
      const idx = issueCart.findIndex(i=>i.productId===pid);
      if(q===0) issueCart.splice(idx,1); else issueCart[idx].qty = q;
      renderIssue();
    };

    window.confirmIssue = () => {
      if(!window.issueRef || issueCart.length===0) return;
      customConfirm('ยืนยันตัดสต๊อก', 'หักยอดสต๊อกทันที ยืนยันไหม?', () => {
        const rem = $('issue-rem').value;
        const ref = rem ? `${window.issueRef} (${rem})` : window.issueRef;
        issueCart.forEach(it => {
          db.products.find(p=>p.id===it.productId).stock -= it.qty;
          db.transactions.unshift({ id: `TXN-${Date.now()}-${Math.floor(Math.random()*100)}`, type: 'OUT', date: new Date().toISOString(), productId: it.productId, qty: it.qty, referenceNo: ref });

    };
    window.delProd = (id) => customConfirm('ลบสินค้า', 'ยืนยันลบ?', () => { db.products = db.products.filter(p=>p.id!==id); syncDB(); renderStock(); showToast('ลบสำเร็จ'); });
    window.deleteBulkProd = () => customConfirm('ลบกลุ่ม', `ลบ ${selectedProducts.length} ชิ้น?`, () => { db.products = db.products.filter(p=>!selectedProducts.includes(p.id)); selectedProducts=[]; syncDB(); renderStock(); showToast('ลบสำเร็จ'); });

    // Barcode Printing
    window.printBarcode = (id) => _buildPrintView([db.products.find(p=>p.id===id)]);

      const pa = $('print-area');
      pa.innerHTML = `<div class="grid grid-cols-4 gap-4">` + list.map(p => `
        <div class="text-center border border-dashed border-gray-400 p-4 rounded-xl flex flex-col items-center break-inside-avoid">

        </div>
      `).join('') + `</div>`;

      setTimeout(() => window.print(), 200);

    // 6.7 HISTORY

            <input type="text" placeholder="ค้นหา..." value="${window.histSearch}" onkeyup="window.histSearch=this.value; renderHistory()" class="w-64 px-4 py-2 border rounded-xl outline-none focus:ring-2 focus:ring-blue-500 text-sm">

      $('settings').innerHTML = `
        <h2 class="text-2xl font-bold mb-6">ตั้งค่าระบบ (Settings)</h2>
        <div class="flex gap-2 border-b mb-6"><button onclick="window.setTab='users'; renderSettings()" class="px-5 py-3 font-bold border-b-2 ${window.setTab==='users'?'border-blue-600 text-blue-600':'border-transparent text-gray-500'}"><i class="fas fa-users mr-2"></i> ผู้ใช้งาน</button><button onclick="window.setTab='vendors'; renderSettings()" class="px-5 py-3 font-bold border-b-2 ${window.setTab==='vendors'?'border-blue-600 text-blue-600':'border-transparent text-gray-500'}"><i class="fas fa-database mr-2"></i> ซัพพลายเออร์</button></div>
        <div class="bg-white rounded-2xl shadow-sm border overflow-hidden">${content}</div>
      `;
    };

    window.openUserModal = (id='') => {
      if(id) {
        const u = db.users.find(x=>x.id===id);
        $('user-isedit').value='true'; $('user-id').value=u.id;
        $('user-username').value=u.username; $('user-password').value=u.password; $('user-name').value=u.name; $('user-dept').value=u.department||''; $('user-role').value=u.role;
        $('user-username').disabled = id==='U001'; $('user-role').disabled = id==='U001';
        $('user-modal-title').innerText = 'แก้ไขผู้ใช้';
      } else {
        $('user-isedit').value=''; $('user-id').value=`U00${db.users.length+1}`;
        $('user-username').value=''; $('user-password').value=''; $('user-name').value=''; $('user-dept').value=''; $('user-role').value='Requester';
        $('user-username').disabled = false; $('user-role').disabled = false;
        $('user-modal-title').innerText = 'เพิ่มผู้ใช้ใหม่';
      }
      show('user-modal');
    };
    
    window.saveUser = () => {
      const obj = { id:$('user-id').value, username:$('user-username').value, password:$('user-password').value, name:$('user-name').value, role:$('user-role').value, department:$('user-dept').value };
      if(!obj.username || !obj.name || !obj.password) return customAlert('ผิดพลาด', 'กรอกให้ครบ', 'error');
      if($('user-isedit').value) db.users = db.users.map(u => u.id===obj.id ? obj : u);
      else { if(db.users.find(u=>u.username===obj.username)) return customAlert('ซ้ำ','Username นี้มีแล้ว','error'); db.users.push(obj); }
      syncDB(); hide('user-modal'); renderSettings(); showToast('บันทึกผู้ใช้สำเร็จ');
    };
    window.delUser = (id) => customConfirm('ลบผู้ใช้', 'ยืนยัน?', () => { db.users = db.users.filter(u=>u.id!==id); syncDB(); renderSettings(); });

    window.openVendorModal = (id='') => {
      if(id) {
        const v = db.vendors.find(x=>x.id===id);
        $('vendor-isedit').value='true'; $('vendor-id').value=v.id;
        $('vendor-name').value=v.name; $('vendor-contact').value=v.contact||''; $('vendor-term').value=v.term;
        $('vendor-modal-title').innerText = 'แก้ไขร้านค้า';
      } else {
        $('vendor-isedit').value=''; $('vendor-id').value=`V00${db.vendors.length+1}`;
        $('vendor-name').value=''; $('vendor-contact').value=''; $('vendor-term').value='Cash';
        $('vendor-modal-title').innerText = 'เพิ่มร้านค้าใหม่';
      }
      show('vendor-modal');
    };

    window.saveVendor = () => {
      const obj = { id:$('vendor-id').value, name:$('vendor-name').value, contact:$('vendor-contact').value, term:$('vendor-term').value };
      if(!obj.name) return customAlert('ผิดพลาด', 'กรอกชื่อบริษัท', 'error');
      if($('vendor-isedit').value) db.vendors = db.vendors.map(v => v.id===obj.id ? obj : v);
      else db.vendors.push(obj);
      syncDB(); hide('vendor-modal'); renderSettings(); showToast('บันทึกร้านค้าสำเร็จ');
    };
    window.delVendor = (id) => customConfirm('ลบร้านค้า', 'ยืนยัน?', () => { db.vendors = db.vendors.filter(v=>v.id!==id); syncDB(); renderSettings(); });

  </script>
</body>
</html>
