<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ASIA HYDRO - Procurement & Inventory System</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    body { background-color: #f8fafc; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: #475569; border-radius: 10px; }
    .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #64748b; }
    @media print {
      body { background-color: white !important; }
      .print\:hidden { display: none !important; }
      @page { margin: 0.5cm; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" data-type="module">
    import React, { useState, useEffect, useRef } from 'https://esm.sh/react@18.2.0';
    import ReactDOM from 'https://esm.sh/react-dom@18.2.0/client';
    import * as Lucide from 'https://esm.sh/lucide-react@0.263.1';

    const { 
      Home, FileText, ShoppingCart, PackagePlus, PackageMinus, Layers, Settings, Plus, Search, Check, X, Barcode, 
      AlertCircle, ChevronRight, CheckCircle2, Box, Printer, Tag, Clock, Database, ArrowDownToLine, ArrowUpFromLine, 
      Download, Menu, Edit, Trash2, Image: ImageIcon, Filter, LayoutGrid, LayoutList, AlertTriangle, Building, 
      Sliders, Users, Lock, LogOut, PieChart, Info, HelpCircle, Cloud, RefreshCw
    } = Lucide;

    // =========================================================================
    // 🔴 1. วาง URL ของ GOOGLE APPS SCRIPT ของคุณตรงนี้ 🔴
    // =========================================================================
    const YOUR_GAS_URL = "https://script.google.com/macros/s/AKfycbyLsmvfZhwVf-6v7C-2KziMZU8ZklXdLOxVJAwc7AqH3G3ec5o3NxgLepzdIkPsXseZ2g/exec"; 

    // --- ข้อมูลแม่แบบ (ใช้สร้างฐานข้อมูลอัตโนมัติเมื่อรันครั้งแรก) ---
    const initData = {
      users: [
        { id: 'U001', username: 'admin', password: '123', name: 'Admin (ผู้ดูแลระบบ)', role: 'Admin', department: 'IT' },
        { id: 'U002', username: 'req1', password: '123', name: 'สมชาย (ผู้ขอซื้อ)', role: 'Requester', department: 'Production' },
        { id: 'U003', username: 'pur1', password: '123', name: 'สมศรี (จัดซื้อ)', role: 'Purchaser', department: 'Procurement' },
        { id: 'U004', username: 'store1', password: '123', name: 'สมหมาย (คลังสินค้า)', role: 'Store', department: 'Warehouse' }
      ],
      products: [], vendors: [], prs: [], pos: [], transactions: []
    };

    const getPermissions = (role) => ({
      canCreatePR: ['Admin', 'Requester', 'Purchaser'].includes(role),
      canApprovePR: ['Admin', 'Purchaser'].includes(role),
      canCreatePO: ['Admin', 'Purchaser'].includes(role),
      canManageInventory: ['Admin', 'Store'].includes(role),
      canViewReports: ['Admin', 'Purchaser', 'Store'].includes(role),
      canManageSettings: ['Admin'].includes(role),
    });

    const formatDate = (iso) => {
      const d = new Date(iso);
      return `${d.toLocaleDateString('th-TH')} ${d.toLocaleTimeString('th-TH', {hour: '2-digit', minute:'2-digit'})}`;
    };

    // --- 1. COMPONENT: Custom Dialog ---
    const CustomDialog = ({ config, closeDialog }) => {
      if (!config.isOpen) return null;
      const isConfirm = config.type === 'confirm';
      const isError = config.type === 'error';
      return (
        <div className="fixed inset-0 bg-slate-900/60 z-[300] flex items-center justify-center p-4 backdrop-blur-sm">
          <div className="bg-white rounded-2xl shadow-2xl w-full max-w-sm overflow-hidden animate-in zoom-in-95">
            <div className="p-6 text-center">
              <div className="flex justify-center mb-4 bg-gray-50 rounded-full w-16 h-16 items-center mx-auto">
                {isError ? <AlertTriangle size={32} className="text-red-500"/> : isConfirm ? <HelpCircle size={32} className="text-amber-500"/> : <Info size={32} className="text-blue-500"/>}
              </div>
              <h3 className={`text-xl font-bold mb-2 ${isError ? 'text-red-600' : isConfirm ? 'text-amber-600' : 'text-blue-600'}`}>{config.title}</h3>
              <p className="text-gray-600 text-sm whitespace-pre-wrap">{config.message}</p>
            </div>
            <div className="px-6 py-4 bg-gray-50 flex gap-3 justify-end border-t border-gray-100">
              {isConfirm && <button onClick={closeDialog} className="px-4 py-2 w-full rounded-lg text-gray-600 bg-white border border-gray-300 font-medium hover:bg-gray-100">ยกเลิก</button>}
              <button onClick={() => { if(config.onConfirm) config.onConfirm(); closeDialog(); }} className={`px-4 py-2 w-full rounded-lg text-white font-medium ${isError ? 'bg-red-600' : isConfirm ? 'bg-amber-500' : 'bg-blue-600'}`}>ตกลง</button>
            </div>
          </div>
        </div>
      );
    };

    // --- 2. COMPONENT: Setup URL ---
    const SetupGASComponent = ({ onSaveUrl }) => {
      const [url, setUrl] = useState('');
      return (
        <div className="min-h-screen bg-slate-100 flex items-center justify-center p-4">
          <div className="bg-white p-8 rounded-2xl shadow-xl w-full max-w-lg text-center">
            <div className="bg-emerald-100 w-16 h-16 rounded-2xl flex items-center justify-center mx-auto mb-4"><Cloud className="text-emerald-600" size={32} /></div>
            <h1 className="text-2xl font-bold text-gray-800">เชื่อมต่อฐานข้อมูล Cloud</h1>
            <p className="text-gray-500 text-sm mt-2 mb-6">วาง URL ของ Google Apps Script ที่ Deploy เรียบร้อยแล้ว</p>
            <input type="text" value={url} onChange={e => setUrl(e.target.value)} className="w-full p-4 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none font-mono text-sm bg-gray-50 mb-4" placeholder="https://script.google.com/macros/s/..." />
            <button onClick={() => onSaveUrl(url)} className="w-full bg-emerald-600 text-white py-3.5 rounded-xl font-bold hover:bg-emerald-700 shadow-md">บันทึกการเชื่อมต่อ (Connect)</button>
          </div>
        </div>
      );
    };

    // --- 3. COMPONENT: Login ---
    const LoginComponent = ({ onLogin, users, showAlert }) => {
      const [username, setUsername] = useState('');
      const [password, setPassword] = useState('');
      const handleLogin = (e) => {
        e.preventDefault();
        const user = users.find(u => u.username === username && u.password === password);
        if (user) onLogin(user);
        else showAlert('เข้าสู่ระบบล้มเหลว', 'ชื่อผู้ใช้งานหรือรหัสผ่านไม่ถูกต้อง', 'error');
      };
      return (
        <div className="min-h-screen bg-slate-100 flex items-center justify-center p-4">
          <div className="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md animate-in slide-in-from-bottom-4">
            <div className="text-center mb-8">
              <div className="bg-blue-600 w-16 h-16 rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-lg"><Box size={32} className="text-white" /></div>
              <h1 className="text-2xl font-black text-gray-800 tracking-tight">ASIA HYDRO</h1>
              <p className="text-gray-500 text-sm mt-2">ระบบจัดการจัดซื้อและคลังสินค้า</p>
            </div>
            <form onSubmit={handleLogin} className="space-y-5">
              <div>
                <label className="block text-sm font-medium text-gray-700 mb-1">Username</label>
                <div className="relative"><input type="text" value={username} onChange={e=>setUsername(e.target.value)} className="w-full pl-10 pr-4 py-3 border border-gray-300 rounded-lg outline-none focus:ring-2 focus:ring-blue-500" required /><Users className="absolute left-3 top-3.5 text-gray-400" size={18} /></div>
              </div>
              <div>
                <label className="block text-sm font-medium text-gray-700 mb-1">Password</label>
                <div className="relative"><input type="password" value={password} onChange={e=>setPassword(e.target.value)} className="w-full pl-10 pr-4 py-3 border border-gray-300 rounded-lg outline-none focus:ring-2 focus:ring-blue-500" required /><Lock className="absolute left-3 top-3.5 text-gray-400" size={18} /></div>
              </div>
              <button type="submit" className="w-full bg-blue-600 text-white py-3 rounded-xl font-bold hover:bg-blue-700 shadow-md">เข้าสู่ระบบ</button>
            </form>
          </div>
        </div>
      );
    };

    // --- 4. COMPONENT: Dashboard (แก้ไขชื่อให้ตรงกับการเรียกใช้) ---
    const Dashboard = ({ db, changeTab, currentUser, perms }) => {
      const { prs, pos, products, transactions } = db;
      const lowStock = products.filter(p => p.stock <= p.minStock).length;
      return (
        <div className="space-y-6">
          <div className="bg-gradient-to-r from-blue-600 to-indigo-700 rounded-2xl p-8 text-white shadow-lg relative overflow-hidden">
             <div className="relative z-10">
                <h2 className="text-3xl font-bold mb-2">ยินดีต้อนรับ, {currentUser.name}</h2>
                <p className="text-blue-100 mb-6">เลือกระบบการทำงานที่คุณต้องการด้านล่าง</p>
                <div className="flex flex-wrap gap-3">
                  {perms.canCreatePR && <button onClick={()=>changeTab('pr')} className="bg-white/20 hover:bg-white/30 px-4 py-2.5 rounded-lg font-medium flex items-center"><Plus size={18} className="mr-2" /> สร้างใบ PR</button>}
                  {perms.canManageInventory && (
                    <><button onClick={()=>changeTab('gr')} className="bg-emerald-500/80 hover:bg-emerald-500 px-4 py-2.5 rounded-lg font-medium flex items-center"><PackagePlus size={18} className="mr-2" /> รับเข้า</button>
                    <button onClick={()=>changeTab('issue')} className="bg-amber-500/80 hover:bg-amber-500 px-4 py-2.5 rounded-lg font-medium flex items-center"><PackageMinus size={18} className="mr-2" /> เบิกออก</button></>
                  )}
                </div>
             </div>
             <Layers size={200} className="absolute right-0 bottom-0 opacity-10 transform translate-x-10 translate-y-10" />
          </div>
          <div className="grid grid-cols-1 md:grid-cols-4 gap-4">
            <div className="bg-white p-5 rounded-xl shadow-sm border border-gray-100 flex items-center space-x-4 cursor-pointer" onClick={()=>changeTab('pr')}>
              <div className="p-3 bg-blue-50 text-blue-600 rounded-xl"><FileText size={24}/></div>
              <div><p className="text-sm text-gray-500">PR รอดำเนินการ</p><p className="text-2xl font-black">{prs.filter(p=>p.status==='Pending').length}</p></div>
            </div>
            {perms.canCreatePO && <div className="bg-white p-5 rounded-xl shadow-sm border border-gray-100 flex items-center space-x-4 cursor-pointer" onClick={()=>changeTab('po')}>
              <div className="p-3 bg-indigo-50 text-indigo-600 rounded-xl"><ShoppingCart size={24}/></div>
              <div><p className="text-sm text-gray-500">PO รอรับของ</p><p className="text-2xl font-black">{pos.filter(p=>p.status==='Pending Receipt').length}</p></div>
            </div>}
            {perms.canManageInventory && <>
              <div className="bg-white p-5 rounded-xl shadow-sm border border-gray-100 flex items-center space-x-4 cursor-pointer" onClick={()=>changeTab('stock')}>
                <div className="p-3 bg-emerald-50 text-emerald-600 rounded-xl"><Layers size={24}/></div>
                <div><p className="text-sm text-gray-500">สินค้าในคลัง</p><p className="text-2xl font-black">{products.length}</p></div>
              </div>
              <div className="bg-white p-5 rounded-xl shadow-sm border border-gray-100 flex items-center space-x-4 cursor-pointer" onClick={()=>changeTab('stock')}>
                <div className="p-3 bg-amber-50 text-amber-600 rounded-xl"><AlertTriangle size={24}/></div>
                <div><p className="text-sm text-gray-500">ใกล้หมด/หมด</p><p className="text-2xl font-black">{lowStock}</p></div>
              </div>
            </>}
          </div>
        </div>
      );
    };

    // --- 5. COMPONENT: PR ---
    const PRComponent = ({ db, updateDb, showNotify, showAlert, showConfirm, currentUser, perms }) => {
      const [view, setView] = useState('list');
      const [newPR, setNewPR] = useState({ requester: currentUser.name, items: [] });
      const [itemInput, setItemInput] = useState({ productId: '', customName: '', qty: '', unit: 'ชิ้น', remark: '' });
      const [isCustom, setIsCustom] = useState(false);

      const handleCreatePR = () => {
        if (!newPR.items.length) return showAlert('ผิดพลาด', 'กรุณาเพิ่มสินค้าอย่างน้อย 1 รายการ', 'error');
        showConfirm('ยืนยัน', 'ต้องการบันทึกใบ PR หรือไม่?', () => {
          const prId = `PR-${Date.now().toString().slice(-6)}`;
          updateDb('prs', [{id: prId, date: new Date().toISOString().split('T')[0], requester: newPR.requester, status: 'Pending', items: newPR.items}, ...db.prs]);
          setView('list'); setNewPR({ requester: currentUser.name, items: [] }); showNotify('สร้างใบ PR สำเร็จ');
        });
      };

      const addItem = () => {
        if ((!isCustom && !itemInput.productId) || (isCustom && !itemInput.customName) || !itemInput.qty) return showAlert('ผิดพลาด', 'กรอกข้อมูลไม่ครบ', 'error');
        setNewPR({...newPR, items: [...newPR.items, { ...itemInput, isCustom, qty: parseInt(itemInput.qty) }]});
        setItemInput({ productId: '', customName: '', qty: '', unit: 'ชิ้น', remark: '' });
      };

      if (view === 'create') {
        return (
          <div className="bg-white rounded-xl shadow-sm border p-6">
            <div className="flex justify-between mb-4"><h2 className="text-xl font-bold">สร้างใบขอซื้อ (PR)</h2><button onClick={()=>setView('list')} className="text-gray-500">กลับ</button></div>
            <div className="p-4 bg-blue-50/50 border border-blue-100 rounded-xl mb-4">
              <div className="flex justify-between mb-2"><h3 className="font-bold">เพิ่มสินค้า</h3><label><input type="checkbox" checked={isCustom} onChange={e=>setIsCustom(e.target.checked)} className="mr-1"/> พิมพ์นอกระบบ</label></div>
              <div className="flex gap-2">
                {!isCustom ? <select className="flex-1 p-2 border rounded" value={itemInput.productId} onChange={e=>setItemInput({...itemInput, productId: e.target.value})}><option value="">- เลือก -</option>{db.products.map(p=><option key={p.id} value={p.id}>{p.name}</option>)}</select> : <input type="text" className="flex-1 p-2 border rounded" placeholder="ชื่อสินค้า..." value={itemInput.customName} onChange={e=>setItemInput({...itemInput, customName: e.target.value})} />}
                <input type="number" className="w-20 p-2 border rounded" placeholder="จำนวน" value={itemInput.qty} onChange={e=>setItemInput({...itemInput, qty: e.target.value})} />
                <button onClick={addItem} className="bg-blue-600 text-white px-4 rounded">เพิ่ม</button>
              </div>
            </div>
            {newPR.items.length > 0 && (
              <table className="w-full text-sm mb-4">
                <thead className="bg-gray-100"><tr><th className="p-2">สินค้า</th><th className="p-2 text-right">จำนวน</th><th className="p-2 text-center">ลบ</th></tr></thead>
                <tbody>{newPR.items.map((it, i) => <tr key={i} className="border-b"><td className="p-2">{it.isCustom ? it.customName : db.products.find(p=>p.id===it.productId)?.name}</td><td className="p-2 text-right">{it.qty}</td><td className="p-2 text-center text-red-500 cursor-pointer" onClick={()=>setNewPR({...newPR, items: newPR.items.filter((_, idx)=>idx!==i)})}>X</td></tr>)}</tbody>
              </table>
            )}
            <button onClick={handleCreatePR} className="bg-emerald-500 text-white w-full p-3 rounded-lg font-bold">บันทึก PR</button>
          </div>
        );
      }

      return (
        <div className="space-y-4">
          <div className="flex justify-between items-center"><h2 className="text-xl font-bold">ใบขอซื้อ (PR)</h2>{perms.canCreatePR && <button onClick={()=>setView('create')} className="bg-blue-600 text-white px-4 py-2 rounded-lg">+ สร้าง PR</button>}</div>
          <div className="bg-white border rounded-xl overflow-hidden">
            <table className="w-full text-left text-sm">
              <thead className="bg-gray-50"><tr><th className="p-3">เลขที่</th><th className="p-3">ผู้ขอ</th><th className="p-3">สถานะ</th>{perms.canApprovePR && <th className="p-3">จัดการ</th>}</tr></thead>
              <tbody>
                {db.prs.map(pr => (
                  <tr key={pr.id} className="border-t">
                    <td className="p-3 font-bold">{pr.id}</td><td className="p-3">{pr.requester}</td>
                    <td className="p-3"><span className={`px-2 py-1 rounded-full text-xs font-bold ${pr.status==='Approved'?'bg-emerald-100 text-emerald-700':pr.status==='Rejected'?'bg-red-100 text-red-700':'bg-amber-100 text-amber-700'}`}>{pr.status}</span></td>
                    {perms.canApprovePR && <td className="p-3">
                      {pr.status === 'Pending' && <><button onClick={()=>updateDb('prs', db.prs.map(p=>p.id===pr.id?{...p,status:'Approved'}:p))} className="text-emerald-600 mr-2">อนุมัติ</button><button onClick={()=>updateDb('prs', db.prs.map(p=>p.id===pr.id?{...p,status:'Rejected'}:p))} className="text-red-500">ปฏิเสธ</button></>}
                    </td>}
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>
      );
    };

    // --- 6. COMPONENT: PO ---
    const POComponent = ({ db, updateDb, showNotify, showAlert, showConfirm }) => {
      const [selectedPR, setSelectedPR] = useState('');
      const [selectedVendor, setSelectedVendor] = useState('');
      const approvedPRs = db.prs.filter(pr => pr.status === 'Approved' && !db.pos.find(po => po.prId === pr.id));

      const createPO = () => {
        if (!selectedPR || !selectedVendor) return showAlert('ผิดพลาด', 'เลือก PR และร้านค้า', 'error');
        showConfirm('สร้าง PO', 'ยืนยันสร้างใบสั่งซื้อ?', () => {
          const pr = db.prs.find(p => p.id === selectedPR);
          const poId = `PO-${Date.now().toString().slice(-6)}`;
          const items = pr.items.map(it => ({ ...it, expectedQty: it.qty, receivedQty: 0, price: 0 }));
          updateDb('pos', [{ id: poId, prId: pr.id, vendorId: selectedVendor, date: new Date().toISOString().split('T')[0], status: 'Pending Receipt', items }, ...db.pos]);
          showNotify('สร้าง PO สำเร็จ'); setSelectedPR('');
        });
      };

      return (
        <div className="space-y-6">
          <div className="bg-white p-6 rounded-xl border shadow-sm flex gap-4 items-end">
            <div className="flex-1"><label className="block text-sm font-bold mb-1">เลือก PR ที่อนุมัติ</label><select className="w-full p-2 border rounded" value={selectedPR} onChange={e=>setSelectedPR(e.target.value)}><option value="">- เลือก PR -</option>{approvedPRs.map(p=><option key={p.id} value={p.id}>{p.id}</option>)}</select></div>
            <div className="flex-1"><label className="block text-sm font-bold mb-1">เลือกร้านค้า</label><select className="w-full p-2 border rounded" value={selectedVendor} onChange={e=>setSelectedVendor(e.target.value)}><option value="">- เลือกร้านค้า -</option>{db.vendors.map(v=><option key={v.id} value={v.id}>{v.name}</option>)}</select></div>
            <button onClick={createPO} className="bg-indigo-600 text-white px-6 py-2 rounded font-bold">ออก PO</button>
          </div>
          <div className="bg-white border rounded-xl overflow-hidden">
            <table className="w-full text-left text-sm">
              <thead className="bg-gray-50"><tr><th className="p-3">เลข PO</th><th className="p-3">อ้างอิง PR</th><th className="p-3">ร้านค้า</th><th className="p-3">สถานะ</th></tr></thead>
              <tbody>
                {db.pos.map(po => (
                  <tr key={po.id} className="border-t"><td className="p-3 font-bold text-indigo-600">{po.id}</td><td className="p-3">{po.prId}</td><td className="p-3">{db.vendors.find(v=>v.id===po.vendorId)?.name}</td><td className="p-3">{po.status === 'Completed' ? <span className="text-emerald-600 font-bold">รับครบแล้ว</span> : <span className="text-blue-600 font-bold">รอรับของ</span>}</td></tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>
      );
    };

    // --- 7. COMPONENT: STOCK ---
    const StockComponent = ({ db, updateDb, showNotify, showAlert, showConfirm }) => {
      const [isOpen, setIsOpen] = useState(false);
      const [form, setForm] = useState(null);
      const [selectedIds, setSelectedIds] = useState([]);
      const [printData, setPrintData] = useState([]);

      const handleAdd = () => { setForm({ id: `P${Date.now().toString().slice(-4)}`, barcode: '', name: '', category: '', location: '', unit: 'ชิ้น', price: 0, stock: 0, minStock: 10, isEdit: false }); setIsOpen(true); };
      const handleEdit = (p) => { setForm({ ...p, isEdit: true }); setIsOpen(true); };
      const handleDel = (id) => showConfirm('ลบสินค้า', 'ยืนยันการลบ?', () => updateDb('products', db.products.filter(p=>p.id!==id)));
      
      const save = () => {
        if(!form.name || !form.id) return showAlert('ผิดพลาด', 'กรอกชื่อและรหัสให้ครบ', 'error');
        if(form.isEdit) updateDb('products', db.products.map(p => p.id === form.id ? form : p));
        else updateDb('products', [form, ...db.products]);
        setIsOpen(false); showNotify('บันทึกสำเร็จ');
      };

      const toggleSelectAll = (e) => e.target.checked ? setSelectedIds(db.products.map(p => p.id)) : setSelectedIds([]);
      const toggleSelect = (id) => selectedIds.includes(id) ? setSelectedIds(selectedIds.filter(i => i !== id)) : setSelectedIds([...selectedIds, id]);
      const doPrint = (items) => { setPrintData(items); setTimeout(() => window.print(), 100); };

      return (
        <div className="space-y-4">
          <div className={`flex justify-between items-center ${printData.length>0?'print:hidden':''}`}><h2 className="text-2xl font-bold">สต๊อกสินค้า</h2><button onClick={handleAdd} className="bg-blue-600 text-white px-4 py-2 rounded-lg font-bold">+ เพิ่มสินค้า</button></div>
          
          <div className={`bg-white rounded-2xl shadow-sm border overflow-x-auto ${printData.length>0?'print:hidden':''}`}>
            <table className="w-full text-left min-w-[1000px]">
              <thead className="bg-gray-50 border-b text-xs uppercase tracking-wider text-gray-500">
                <tr><th className="p-4 text-center"><input type="checkbox" checked={selectedIds.length>0 && selectedIds.length===db.products.length} onChange={toggleSelectAll} className="w-4 h-4 rounded text-blue-600"/></th><th className="p-4">รหัส / บาร์โค้ด</th><th className="p-4">ชื่อสินค้า</th><th className="p-4">หมวดหมู่</th><th className="p-4 text-right">Min Stock</th><th className="p-4 text-right">คงเหลือ</th><th className="p-4 text-center">สถานะ</th><th className="p-4 text-center">จัดการ</th></tr>
              </thead>
              <tbody className="divide-y divide-gray-100">
                {db.products.map(p => (
                  <tr key={p.id} className={`hover:bg-gray-50 ${selectedIds.includes(p.id)?'bg-blue-50/40':''}`}>
                    <td className="p-4 text-center"><input type="checkbox" checked={selectedIds.includes(p.id)} onChange={()=>toggleSelect(p.id)} className="w-4 h-4 rounded text-blue-600"/></td>
                    <td className="p-4 font-bold">{p.id} <span className="block text-xs font-normal text-blue-600">{p.barcode||'-'}</span></td>
                    <td className="p-4 font-medium">{p.name}</td>
                    <td className="p-4 text-sm">{p.category}</td>
                    <td className="p-4 text-right text-gray-400">{p.minStock}</td>
                    <td className="p-4 text-right font-black text-lg">{p.stock} <span className="text-xs font-normal text-gray-500">{p.unit}</span></td>
                    <td className="p-4 text-center">
                       {p.stock === 0 ? <span className="px-2 py-1 bg-red-100 text-red-700 text-xs font-bold rounded-full">OUT OF STOCK</span> : 
                        p.stock <= p.minStock ? <span className="px-2 py-1 bg-amber-100 text-amber-700 text-xs font-bold rounded-full">LOW STOCK</span> : 
                        <span className="px-2 py-1 bg-emerald-100 text-emerald-700 text-xs font-bold rounded-full">IN STOCK</span>}
                    </td>
                    <td className="p-4 text-center">
                      <button onClick={()=>doPrint([p])} className="text-gray-500 p-2"><Printer size={18}/></button>
                      <button onClick={()=>handleEdit(p)} className="text-amber-500 p-2"><Edit size={18}/></button>
                      <button onClick={()=>handleDel(p.id)} className="text-red-500 p-2"><Trash2 size={18}/></button>
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>

          {selectedIds.length > 0 && <div className="bg-blue-50 border border-blue-200 rounded-xl p-3 flex justify-between items-center"><span className="font-bold text-blue-800 ml-2">เลือกแล้ว {selectedIds.length} รายการ</span><div className="flex gap-2"><button onClick={()=>doPrint(db.products.filter(p=>selectedIds.includes(p.id)))} className="bg-white border border-blue-300 text-blue-700 px-4 py-2 rounded-lg font-bold shadow-sm">พิมพ์บาร์โค้ด</button><button onClick={()=>showConfirm('ลบกลุ่ม', 'ลบสินค้าที่เลือกทั้งหมด?', ()=>{updateDb('products', db.products.filter(p=>!selectedIds.includes(p.id))); setSelectedIds([])})} className="bg-white border border-red-300 text-red-600 px-4 py-2 rounded-lg font-bold shadow-sm">ลบ</button></div></div>}

          {/* Quick Print Section */}
          {printData.length > 0 && (
            <div className="fixed inset-0 bg-white z-[100] hidden print:block p-10">
              <div className="grid grid-cols-4 gap-4">
                {printData.map((prod, idx) => (
                  <div key={idx} className="text-center border border-dashed border-gray-400 p-4 rounded-xl flex flex-col items-center justify-center break-inside-avoid">
                    <p className="font-bold text-[10px] mb-1 truncate w-full text-black">{prod.name}</p>
                    <img src={`https://barcode.tec-it.com/barcode.ashx?data=${prod.barcode || prod.id}&code=Code128&translate-esc=on`} className="h-12 object-contain" />
                    <p className="font-mono text-xs font-bold mt-1 text-black tracking-widest">{prod.barcode || prod.id}</p>
                  </div>
                ))}
              </div>
            </div>
          )}
          {printData.length > 0 && <div className="fixed bottom-4 right-4 print:hidden z-[110]"><button onClick={()=>setPrintData([])} className="bg-red-500 text-white px-6 py-3 rounded-xl font-bold shadow-2xl">ปิดหน้าต่างปริ้นท์</button></div>}

          {isOpen && (
            <div className="fixed inset-0 bg-black/50 z-[150] flex items-center justify-center p-4">
              <div className="bg-white p-6 rounded-xl w-full max-w-md">
                <h3 className="font-bold mb-4">{form.isEdit?'แก้ไข':'เพิ่ม'}สินค้า</h3>
                <div className="space-y-3">
                  <input type="text" placeholder="รหัส" className="w-full border p-2 rounded bg-gray-50" value={form.id} disabled={form.isEdit} onChange={e=>setForm({...form, id: e.target.value})}/>
                  <input type="text" placeholder="ชื่อสินค้า" className="w-full border p-2 rounded" value={form.name} onChange={e=>setForm({...form, name: e.target.value})}/>
                  <div className="flex gap-2">
                    <input type="number" placeholder="สต๊อก" className="w-1/2 border p-2 rounded" value={form.stock} onChange={e=>setForm({...form, stock: Number(e.target.value)})} disabled={form.isEdit}/>
                    <input type="number" placeholder="จุดสั่งซื้อ" className="w-1/2 border p-2 rounded" value={form.minStock} onChange={e=>setForm({...form, minStock: Number(e.target.value)})}/>
                  </div>
                </div>
                <div className="flex justify-end gap-2 mt-6">
                  <button onClick={()=>setIsOpen(false)} className="px-4 py-2 border rounded">ยกเลิก</button>
                  <button onClick={save} className="px-4 py-2 bg-blue-600 text-white rounded font-bold">บันทึก</button>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    };

    // --- 8. COMPONENT: GoodsReceipt (รับเข้า) ---
    const GoodsReceiptComponent = ({ db, updateMultiple, showNotify, showAlert, showConfirm }) => {
      const [selectedPO, setSelectedPO] = useState('');
      const [scanInput, setScanInput] = useState('');
      const [scannedItems, setScannedItems] = useState([]);
      const activePOs = db.pos.filter(po => po.status === 'Pending Receipt');
      const currentPO = db.pos.find(p => p.id === selectedPO);

      const handleScan = (e) => {
        if (e.key === 'Enter' && scanInput.trim() !== '') {
          const val = scanInput.trim(); setScanInput(''); 
          const product = db.products.find(p => p.barcode === val || p.id === val || p.name === val);
          if (!product) return showAlert('ผิดพลาด', 'ไม่พบสินค้านี้', 'error');
          const poItem = currentPO.items.find(i => i.productId === product.id);
          if (!poItem) return showAlert('ผิดพลาด', 'สินค้าไม่อยู่ใน PO นี้', 'error');
          
          const exist = scannedItems.find(i => i.productId === product.id);
          if ((exist?exist.qty:0) + 1 > poItem.expectedQty - poItem.receivedQty) return showAlert('ผิดพลาด', 'จำนวนเกิน PO', 'error');
          
          if (exist) setScannedItems(scannedItems.map(i => i.productId === product.id ? {...i, qty: i.qty+1} : i));
          else setScannedItems([...scannedItems, { isCustom: false, productId: product.id, qty: 1 }]);
        }
      };

      const confirmReceipt = () => {
        showConfirm('รับเข้า', 'ยืนยันการเพิ่มยอดเข้าสต๊อก?', () => {
          let updatedPOs = [...db.pos], updatedProducts = [...db.products], newTransactions = [];
          let poIndex = updatedPOs.findIndex(p => p.id === currentPO.id);
          let updatedPO = JSON.parse(JSON.stringify(updatedPOs[poIndex])); 

          scannedItems.forEach(scan => {
            const itemIdx = updatedPO.items.findIndex(i => i.productId === scan.productId);
            if (itemIdx > -1) updatedPO.items[itemIdx].receivedQty += scan.qty;
            const prodIdx = updatedProducts.findIndex(p => p.id === scan.productId);
            if (prodIdx > -1) updatedProducts[prodIdx] = {...updatedProducts[prodIdx], stock: updatedProducts[prodIdx].stock + scan.qty};
            newTransactions.push({ id: `TXN-${Date.now()}-${Math.floor(Math.random()*1000)}`, type: 'IN', date: new Date().toISOString(), productId: scan.productId, qty: scan.qty, referenceNo: updatedPO.id });
          });

          updatedPO.status = updatedPO.items.every(i => i.receivedQty >= i.expectedQty) ? 'Completed' : 'Pending Receipt';
          updatedPOs[poIndex] = updatedPO;

          updateMultiple({ pos: updatedPOs, products: updatedProducts, transactions: [...newTransactions, ...db.transactions] });
          setSelectedPO(''); setScannedItems([]); showNotify('รับเข้าสำเร็จ');
        });
      };

      if(!selectedPO) return (
        <div className="bg-white p-10 rounded-2xl shadow-sm border text-center max-w-2xl mx-auto mt-10">
          <div className="bg-emerald-100 w-20 h-20 rounded-full flex items-center justify-center mx-auto mb-6"><PackagePlus size={40} className="text-emerald-600"/></div>
          <h3 className="text-xl font-bold mb-4">เตรียมรับสินค้าเข้าคลัง</h3>
          <select className="w-full border-2 border-emerald-200 rounded-xl p-4 font-bold outline-none" value={selectedPO} onChange={e=>setSelectedPO(e.target.value)}><option value="">-- เลือกใบ PO ที่รอรับของ --</option>{activePOs.map(po => <option key={po.id} value={po.id}>{po.id}</option>)}</select>
        </div>
      );

      return (
        <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
          <div className="lg:col-span-2 space-y-4">
            <div className="bg-blue-50 p-6 rounded-2xl border border-blue-100"><label className="block font-bold text-blue-900 mb-2">สแกนบาร์โค้ด / รหัส / ชื่อ</label><input type="text" value={scanInput} onChange={e=>setScanInput(e.target.value)} onKeyDown={handleScan} placeholder="ยิงบาร์โค้ดแล้ว Enter..." className="w-full p-4 text-xl font-mono border-2 border-blue-200 rounded-xl outline-none focus:border-blue-500" autoFocus /></div>
            <div className="bg-white rounded-2xl border shadow-sm overflow-hidden"><div className="p-4 bg-gray-50 border-b flex justify-between"><h3 className="font-bold">รายการใน {currentPO.id}</h3><button onClick={()=>setSelectedPO('')} className="text-sm border px-3 py-1 rounded bg-white font-bold">เปลี่ยน PO</button></div>
            <table className="w-full text-left text-sm">
              <thead className="bg-white border-b"><tr><th className="p-3">สินค้า</th><th className="p-3 text-center">สั่ง (PO)</th><th className="p-3 text-center">รับแล้ว</th><th className="p-3 text-center">สแกนรอบนี้</th></tr></thead>
              <tbody>{currentPO.items.map((it, idx) => {
                const scanQty = scannedItems.find(i => i.productId === it.productId)?.qty || 0;
                const isComp = it.receivedQty + scanQty >= it.expectedQty;
                return <tr key={idx} className="border-b hover:bg-gray-50"><td className="p-3 font-bold">{db.products.find(p=>p.id===it.productId)?.name} <div className="text-xs font-mono text-gray-400">{it.productId}</div></td><td className="p-3 text-center">{it.expectedQty}</td><td className="p-3 text-center">{it.receivedQty}</td><td className="p-3 text-center font-black text-emerald-600 text-lg">{isComp && scanQty===0 ? <CheckCircle2 className="inline text-emerald-500"/> : scanQty>0?`+${scanQty}` : <button onClick={()=>setScannedItems([...scannedItems, {isCustom:false, productId:it.productId, qty:1}])} className="text-xs bg-gray-100 px-3 py-1 rounded border hover:bg-gray-200">+1 (รับมือ)</button>}</td></tr>
              })}</tbody>
            </table></div>
          </div>
          <div className="bg-white p-6 rounded-2xl border shadow-sm h-fit"><h3 className="font-bold text-lg mb-4 pb-2 border-b">สรุปการรับเข้า</h3><div className="flex justify-between mb-2"><span className="text-gray-500">รายการ:</span><span className="font-bold">{scannedItems.length}</span></div><div className="flex justify-between mb-6 text-xl"><span className="text-gray-500">รวมชิ้น:</span><span className="font-black text-emerald-600">{scannedItems.reduce((s,i)=>s+i.qty,0)}</span></div><button onClick={confirmReceipt} disabled={scannedItems.length===0} className="w-full bg-emerald-500 text-white font-black py-4 rounded-xl hover:bg-emerald-600 shadow-md">ยืนยันนำเข้าสต๊อก</button></div>
        </div>
      );
    };

    // --- 9. COMPONENT: Goods Issue (เบิกจ่าย) ---
    const GoodsIssueComponent = ({ db, updateMultiple, showNotify, showAlert, showConfirm }) => {
      const [scanInput, setScanInput] = useState('');
      const [issueItems, setIssueItems] = useState([]);
      const [reference, setReference] = useState('');
      const [manualProd, setManualProd] = useState('');

      const addIssue = (p) => {
        const exist = issueItems.find(i => i.productId === p.id);
        if ((exist?exist.qty:0) + 1 > p.stock) return showAlert('ผิดพลาด', 'สต๊อกไม่พอ', 'error');
        if(exist) setIssueItems(issueItems.map(i => i.productId === p.id ? {...i, qty: i.qty+1} : i));
        else setIssueItems([...issueItems, {productId: p.id, qty: 1}]);
      };

      const handleScan = (e) => {
        if (e.key === 'Enter' && scanInput.trim()) {
          const p = db.products.find(x => x.barcode === scanInput.trim() || x.id === scanInput.trim());
          setScanInput(''); if(!p) return showAlert('ผิดพลาด','ไม่พบสินค้า','error');
          addIssue(p);
        }
      };

      const confirmIssue = () => {
        if(!reference || issueItems.length===0) return showAlert('ผิดพลาด','ระบุผู้เบิกและสินค้า','error');
        showConfirm('ยืนยันเบิกของ', 'ตัดสต๊อกทันที ยืนยันไหม?', () => {
          let updatedProducts = [...db.products], newTransactions = [];
          issueItems.forEach(it => {
            const idx = updatedProducts.findIndex(p => p.id === it.productId);
            updatedProducts[idx] = {...updatedProducts[idx], stock: updatedProducts[idx].stock - it.qty};
            newTransactions.push({ id: `TXN-${Date.now()}-${Math.floor(Math.random()*1000)}`, type: 'OUT', date: new Date().toISOString(), productId: it.productId, qty: it.qty, referenceNo: reference });
          });
          updateMultiple({ products: updatedProducts, transactions: [...newTransactions, ...db.transactions] });
          setIssueItems([]); setReference(''); showNotify('เบิกของสำเร็จ');
        });
      };

      return (
        <div className="grid grid-cols-1 xl:grid-cols-3 gap-6">
          <div className="xl:col-span-2 space-y-6">
            <div className="bg-white p-6 rounded-2xl shadow-sm border"><label className="block font-bold mb-2">ผู้เบิก / แผนก *</label><input type="text" value={reference} onChange={e=>setReference(e.target.value)} placeholder="ระบุอ้างอิง..." className="w-full border-2 border-amber-200 rounded-xl p-3 bg-amber-50/30 font-bold outline-none focus:border-amber-500" /><div className="mt-6 pt-6 border-t grid grid-cols-2 gap-4"><div><label className="block font-bold text-amber-800 mb-2">สแกนบาร์โค้ด</label><input type="text" value={scanInput} onChange={e=>setScanInput(e.target.value)} onKeyDown={handleScan} placeholder="ยิงสแกน..." className="w-full border-2 border-amber-200 rounded-lg p-3 font-mono outline-none" /></div><div><label className="block font-bold mb-2">เลือกด้วยมือ</label><div className="flex gap-2"><input type="text" list="prod-list" value={manualProd} onChange={e=>setManualProd(e.target.value)} className="w-full border rounded-lg p-3 outline-none" placeholder="พิมพ์ชื่อ..."/><datalist id="prod-list">{db.products.filter(p=>p.stock>0).map(p=><option key={p.id} value={p.id}>{p.name} (เหลือ {p.stock})</option>)}</datalist><button onClick={()=>{const p=db.products.find(x=>x.id===manualProd); if(p)addIssue(p); setManualProd('');}} className="bg-slate-800 text-white px-4 rounded-lg"><Plus/></button></div></div></div></div>
            {issueItems.length > 0 && <div className="bg-white rounded-2xl border shadow-sm"><table className="w-full text-left text-sm"><thead className="bg-gray-50 border-b"><tr><th className="p-4">สินค้า</th><th className="p-4 text-center">คงเหลือ</th><th className="p-4 text-center">เบิก</th><th className="p-4 text-center">ลบ</th></tr></thead><tbody>{issueItems.map((it, i) => <tr key={i} className="border-b hover:bg-gray-50"><td className="p-4 font-bold">{db.products.find(p=>p.id===it.productId)?.name}</td><td className="p-4 text-center">{db.products.find(p=>p.id===it.productId)?.stock}</td><td className="p-4 text-center font-black text-amber-600 text-lg">{it.qty}</td><td className="p-4 text-center"><button onClick={()=>setIssueItems(issueItems.filter(x=>x.productId!==it.productId))} className="text-red-500"><Trash2 size={16}/></button></td></tr>)}</tbody></table></div>}
          </div>
          <div className="bg-white p-6 rounded-2xl shadow-sm border h-fit"><h3 className="font-bold text-lg mb-4 pb-2 border-b">สรุปการเบิกจ่าย</h3><div className="flex justify-between mb-2 text-sm"><span className="text-gray-500">อ้างอิง:</span><span className="font-bold">{reference || '-'}</span></div><div className="flex justify-between mb-6 text-xl mt-4 pt-4 border-t"><span className="text-gray-500">รวมชิ้น:</span><span className="font-black text-amber-500">{issueItems.reduce((s,i)=>s+i.qty,0)}</span></div><button onClick={confirmIssue} disabled={!reference || issueItems.length===0} className="w-full bg-amber-500 text-white font-black py-4 rounded-xl hover:bg-amber-600 shadow-md">ยืนยันตัดสต๊อก</button></div>
        </div>
      );
    };

    // --- 10. COMPONENT: History ---
    const HistoryComponent = ({ db, formatDate }) => {
      return (
        <div className="space-y-6">
          <div className="flex justify-between items-center"><h2 className="text-2xl font-bold">ประวัติความเคลื่อนไหว</h2></div>
          <div className="bg-white rounded-2xl shadow-sm border overflow-x-auto"><table className="w-full text-left text-sm"><thead className="bg-gray-50 border-b"><tr><th className="p-4">เวลา</th><th className="p-4 text-center">ประเภท</th><th className="p-4">รหัสสินค้า</th><th className="p-4 text-right">จำนวน</th><th className="p-4">อ้างอิง</th></tr></thead><tbody>{db.transactions.map(t => <tr key={t.id} className="border-b hover:bg-gray-50"><td className="p-4">{formatDate(t.date)}</td><td className="p-4 text-center"><span className={`px-2 py-1 rounded text-[10px] font-bold ${t.type==='IN'?'bg-emerald-100 text-emerald-700':'bg-amber-100 text-amber-700'}`}>{t.type}</span></td><td className="p-4 font-bold">{t.productId}</td><td className={`p-4 text-right font-black text-lg ${t.type==='IN'?'text-emerald-600':'text-amber-500'}`}>{t.type==='IN'?'+':'-'}{t.qty}</td><td className="p-4 text-gray-600">{t.referenceNo}</td></tr>)}</tbody></table></div>
        </div>
      );
    };

    // --- 11. COMPONENT: Reports ---
    const ReportsComponent = ({ db }) => {
      const totalVal = db.products.reduce((s,p) => s + (p.stock * p.price), 0);
      return (
        <div className="space-y-6">
          <div className="flex justify-between items-center print:hidden"><h2 className="text-2xl font-bold">รายงาน (Reports)</h2><button onClick={()=>window.print()} className="bg-blue-600 text-white px-6 py-2.5 rounded-xl font-bold">พิมพ์รายงาน</button></div>
          <div className="hidden print:block text-center mb-8 border-b-2 border-black pb-4"><h1 className="text-2xl font-bold">ASIA HYDRO SERVICE & PARTS CO.,LTD</h1><h2 className="text-xl mt-2">รายงานมูลค่าสินค้าคงคลัง (Inventory Valuation)</h2></div>
          <div className="bg-white rounded-2xl shadow-sm border print:border-none print:shadow-none overflow-hidden">
            <div className="p-6 md:p-8 bg-blue-50/50 border-b flex justify-between items-center print:bg-white print:border-b-2 print:border-black"><h3 className="text-xl font-bold">สรุปมูลค่าคลังสินค้าทั้งหมด</h3><div className="text-right"><p className="text-sm font-bold text-gray-500 mb-1">มูลค่ารวมทั้งสิ้น</p><p className="text-3xl font-black text-blue-600 print:text-black">฿{totalVal.toLocaleString()}</p></div></div>
            <table className="w-full text-left text-sm"><thead className="bg-gray-50 border-b print:border-b-2 print:border-black"><tr><th className="p-4 font-bold">รหัส</th><th className="p-4 font-bold">ชื่อสินค้า</th><th className="p-4 font-bold text-right">คงเหลือ</th><th className="p-4 font-bold text-right">ราคาประเมิน</th><th className="p-4 font-bold text-right">มูลค่ารวม</th></tr></thead><tbody className="divide-y">
              {db.products.filter(p=>p.stock>0).map(p => <tr key={p.id} className="print:break-inside-avoid"><td className="p-4 font-bold">{p.id}</td><td className="p-4">{p.name}</td><td className="p-4 text-right font-bold">{p.stock} {p.unit}</td><td className="p-4 text-right">฿{p.price.toLocaleString()}</td><td className="p-4 text-right font-black text-blue-600 print:text-black">฿{(p.stock*p.price).toLocaleString()}</td></tr>)}
            </tbody></table>
          </div>
        </div>
      );
    };

    // --- 12. COMPONENT: Settings & Users ---
    const SettingsComponent = ({ db, updateDb, showNotify, showConfirm, showAlert }) => {
      const [view, setView] = useState('users');
      const [modal, setModal] = useState({ open: false, type: '', data: null });

      const saveUser = () => {
        if(!modal.data.username || !modal.data.name || !modal.data.password) return showAlert('ผิดพลาด', 'กรอกข้อมูลให้ครบ', 'error');
        if(modal.data.isEdit) updateDb('users', db.users.map(u => u.id === modal.data.id ? modal.data : u));
        else updateDb('users', [...db.users, { ...modal.data, id: `U00${db.users.length+1}` }]);
        setModal({open: false}); showNotify('บันทึกสำเร็จ');
      };

      const saveVendor = () => {
        if(!modal.data.name) return showAlert('ผิดพลาด', 'กรอกชื่อซัพพลายเออร์', 'error');
        if(modal.data.isEdit) updateDb('vendors', db.vendors.map(v => v.id === modal.data.id ? modal.data : v));
        else updateDb('vendors', [...db.vendors, { ...modal.data, id: `V00${db.vendors.length+1}` }]);
        setModal({open: false}); showNotify('บันทึกสำเร็จ');
      };

      return (
        <div className="space-y-6">
          <h2 className="text-2xl font-bold">ตั้งค่าระบบ (Settings)</h2>
          <div className="flex space-x-2 border-b"><button onClick={()=>setView('users')} className={`px-5 py-3 font-bold border-b-2 ${view==='users'?'border-blue-600 text-blue-600':''}`}><Users size={16} className="inline mr-1"/> ผู้ใช้งาน</button><button onClick={()=>setView('vendors')} className={`px-5 py-3 font-bold border-b-2 ${view==='vendors'?'border-blue-600 text-blue-600':''}`}><Database size={16} className="inline mr-1"/> ซัพพลายเออร์</button></div>
          
          {view === 'users' && (
            <div className="bg-white rounded-2xl shadow-sm border p-4">
              <div className="text-right mb-4"><button onClick={()=>setModal({open:true, type:'user', data:{username:'',password:'',name:'',role:'Requester',department:'',isEdit:false}})} className="bg-blue-600 text-white px-5 py-2.5 rounded-xl font-bold shadow-md"><Plus size={18} className="inline mr-1"/> เพิ่มผู้ใช้งาน</button></div>
              <table className="w-full text-left text-sm"><thead className="bg-gray-50 border-b"><tr><th className="p-4">Username</th><th className="p-4">ชื่อพนักงาน</th><th className="p-4 text-center">สิทธิ์ (Role)</th><th className="p-4 text-center">จัดการ</th></tr></thead>
              <tbody>{db.users.map(u => <tr key={u.id} className="border-b"><td className="p-4 font-bold text-blue-600">{u.username}</td><td className="p-4 font-bold">{u.name}</td><td className="p-4 text-center"><span className="bg-gray-100 px-3 py-1 rounded-full text-xs font-bold">{u.role}</span></td><td className="p-4 text-center flex justify-center gap-2"><button onClick={()=>setModal({open:true, type:'user', data:{...u, isEdit:true}})} className="text-amber-500 bg-amber-50 p-2 rounded-lg"><Edit size={16}/></button><button onClick={()=>showConfirm('ลบ', 'ลบผู้ใช้นี้?', ()=>updateDb('users', db.users.filter(x=>x.id!==u.id)))} disabled={u.id==='U001'} className="text-red-500 bg-red-50 p-2 rounded-lg disabled:opacity-50"><Trash2 size={16}/></button></td></tr>)}</tbody></table>
            </div>
          )}

          {view === 'vendors' && (
            <div className="bg-white rounded-2xl shadow-sm border p-4">
              <div className="text-right mb-4"><button onClick={()=>setModal({open:true, type:'vendor', data:{name:'',contact:'',term:'Cash',isEdit:false}})} className="bg-indigo-600 text-white px-5 py-2.5 rounded-xl font-bold shadow-md"><Plus size={18} className="inline mr-1"/> เพิ่มร้านค้า</button></div>
              <table className="w-full text-left text-sm"><thead className="bg-gray-50 border-b"><tr><th className="p-4">รหัส</th><th className="p-4">ชื่อร้านค้า/บริษัท</th><th className="p-4">ติดต่อ</th><th className="p-4 text-center">จัดการ</th></tr></thead>
              <tbody>{db.vendors.map(v => <tr key={v.id} className="border-b"><td className="p-4 font-bold text-indigo-600">{v.id}</td><td className="p-4 font-bold">{v.name}</td><td className="p-4 text-gray-500">{v.contact}</td><td className="p-4 text-center flex justify-center gap-2"><button onClick={()=>setModal({open:true, type:'vendor', data:{...v, isEdit:true}})} className="text-amber-500 bg-amber-50 p-2 rounded-lg"><Edit size={16}/></button><button onClick={()=>showConfirm('ลบ', 'ลบร้านค้านี้?', ()=>updateDb('vendors', db.vendors.filter(x=>x.id!==v.id)))} className="text-red-500 bg-red-50 p-2 rounded-lg"><Trash2 size={16}/></button></td></tr>)}</tbody></table>
            </div>
          )}

          {/* User/Vendor Modal */}
          {modal.open && (
            <div className="fixed inset-0 bg-slate-900/60 z-[150] flex items-center justify-center p-4">
              <div className="bg-white p-8 rounded-2xl w-full max-w-md shadow-2xl">
                <h3 className="font-bold text-xl mb-6">{modal.data.isEdit ? 'แก้ไข' : 'เพิ่ม'}{modal.type === 'user' ? 'ผู้ใช้งาน' : 'ซัพพลายเออร์'}</h3>
                <div className="space-y-4">
                  {modal.type === 'user' ? (
                    <>
                      <input type="text" placeholder="Username *" className="w-full border border-gray-300 p-3 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none" value={modal.data.username} onChange={e=>setModal({...modal, data:{...modal.data, username: e.target.value}})} disabled={modal.data.id==='U001'} />
                      <input type="text" placeholder="Password *" className="w-full border border-gray-300 p-3 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none" value={modal.data.password} onChange={e=>setModal({...modal, data:{...modal.data, password: e.target.value}})} />
                      <input type="text" placeholder="ชื่อ-นามสกุล *" className="w-full border border-gray-300 p-3 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none" value={modal.data.name} onChange={e=>setModal({...modal, data:{...modal.data, name: e.target.value}})} />
                      <select className="w-full border border-gray-300 p-3 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none bg-white font-bold" value={modal.data.role} onChange={e=>setModal({...modal, data:{...modal.data, role: e.target.value}})} disabled={modal.data.id==='U001'}><option value="Requester">Requester (ผู้ขอซื้อ)</option><option value="Purchaser">Purchaser (จัดซื้อ)</option><option value="Store">Store (คลัง)</option><option value="Admin">Admin (แอดมิน)</option></select>
                    </>
                  ) : (
                    <>
                      <input type="text" placeholder="ชื่อบริษัท/ร้านค้า *" className="w-full border border-gray-300 p-3 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none" value={modal.data.name} onChange={e=>setModal({...modal, data:{...modal.data, name: e.target.value}})} />
                      <input type="text" placeholder="ข้อมูลติดต่อ" className="w-full border border-gray-300 p-3 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none" value={modal.data.contact} onChange={e=>setModal({...modal, data:{...modal.data, contact: e.target.value}})} />
                      <select className="w-full border border-gray-300 p-3 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none bg-white font-bold" value={modal.data.term} onChange={e=>setModal({...modal, data:{...modal.data, term: e.target.value}})}><option value="Cash">Cash (เงินสด)</option><option value="30 Days">30 Days</option></select>
                    </>
                  )}
                </div>
                <div className="flex justify-end gap-3 mt-8"><button onClick={()=>setModal({open:false})} className="px-6 py-3 bg-gray-100 rounded-xl font-bold text-gray-600 hover:bg-gray-200">ยกเลิก</button><button onClick={modal.type==='user'?saveUser:saveVendor} className="px-8 py-3 bg-blue-600 text-white rounded-xl font-bold shadow-md hover:bg-blue-700">บันทึก</button></div>
              </div>
            </div>
          )}
        </div>
      );
    };

    // --- MAIN APP (STATE CONTROLLER) ---
    const App = () => {
      const [gasUrl, setGasUrl] = useState(YOUR_GAS_URL || localStorage.getItem('procure_gas_url') || '');
      const [isSetup, setIsSetup] = useState(!!gasUrl);
      const [db, setDb] = useState(null);
      const [currentUser, setCurrentUser] = useState(null); 
      const [activeTab, setActiveTab] = useState('dashboard'); 
      const [sidebarOpen, setSidebarOpen] = useState(false); 
      const [notification, setNotification] = useState(null);
      const [dialogConfig, setDialogConfig] = useState({ isOpen: false });
      const [isSyncing, setIsSyncing] = useState(false);

      useEffect(() => {
        if (isSetup && gasUrl) fetchDataFromCloud();
      }, [isSetup]);

      const fetchDataFromCloud = async () => {
        try {
          setIsSyncing(true);
          const response = await fetch(gasUrl, { redirect: "follow" });
          
          if(response.redirected && response.url.includes("ServiceLogin")) throw new Error("AUTH_REQUIRED");

          const text = await response.text();
          const data = JSON.parse(text || "{}");

          if (Object.keys(data).length === 0) { setDb(initData); await syncToCloud(initData); } 
          else { setDb(data); }
          setIsSyncing(false);
        } catch (error) {
          if(error.message === "AUTH_REQUIRED") showAlert('ติดสิทธิ์องค์กร', 'เกิด CORS Error กรุณา Deploy ด้วย Gmail ส่วนตัว หรือตั้ง Who has access: Anyone', 'error');
          else showAlert('ข้อผิดพลาด', 'ไม่สามารถเชื่อมต่อฐานข้อมูลได้', 'error');
          setIsSyncing(false);
        }
      };

      const syncToCloud = async (newData) => {
        try {
          setIsSyncing(true);
          await fetch(gasUrl, { method: 'POST', redirect: 'follow', headers: { 'Content-Type': 'text/plain;charset=utf-8' }, body: JSON.stringify(newData) });
          setIsSyncing(false);
        } catch (error) {
          showAlert('แจ้งเตือน', 'ซิงค์ข้อมูลลง Cloud ล้มเหลว', 'error');
          setIsSyncing(false);
        }
      };

      const updateDb = (collectionName, newCollectionData) => { const newDb = { ...db, [collectionName]: newCollectionData }; setDb(newDb); syncToCloud(newDb); };
      const updateMultiple = (updatesObj) => { const newDb = { ...db, ...updatesObj }; setDb(newDb); syncToCloud(newDb); };

      const handleSaveUrl = (url) => { if(!url.includes('script.google.com')) return alert('URL ไม่ถูกต้อง'); localStorage.setItem('procure_gas_url', url); setGasUrl(url); setIsSetup(true); };
      const showAlert = (title, message, type = 'info') => setDialogConfig({ isOpen: true, type, title, message });
      const showConfirm = (title, message, onConfirm) => setDialogConfig({ isOpen: true, type: 'confirm', title, message, onConfirm });
      const closeDialog = () => setDialogConfig({ ...dialogConfig, isOpen: false });
      const showNotify = (msg, type = 'success') => { setNotification({ msg, type }); setTimeout(() => setNotification(null), 3000); };
      const changeTab = (tab) => { setActiveTab(tab); setSidebarOpen(false); };

      if (!isSetup) return <SetupGASComponent onSaveUrl={handleSaveUrl} />;
      if (!db) return <div className="h-screen flex flex-col items-center justify-center bg-slate-50"><RefreshCw className="animate-spin text-blue-600 mb-4" size={48} /><h2 className="text-xl font-bold">Connecting Database...</h2></div>;
      if (!currentUser) return <><LoginComponent onLogin={setCurrentUser} users={db.users} showAlert={showAlert} /><CustomDialog config={dialogConfig} closeDialog={closeDialog} /></>;

      const perms = getPermissions(currentUser.role);
      const getProduct = (id) => db.products.find(p => p.id === id);

      return (
        <div className="flex h-screen w-full bg-slate-50 font-sans overflow-hidden">
          <div className="fixed top-4 right-4 z-[150] bg-white/90 backdrop-blur rounded-full px-4 py-2 shadow-sm border flex items-center print:hidden">
            {isSyncing ? <><RefreshCw size={16} className="animate-spin text-blue-500 mr-2"/><span className="text-xs font-bold text-gray-600">กำลังบันทึก (Saving)</span></> : <><Cloud size={16} className="text-emerald-500 mr-2"/><span className="text-xs font-bold text-gray-600">ออนไลน์ (Online)</span></>}
          </div>

          {/* Sidebar Navigation */}
          <div className={`fixed inset-y-0 left-0 z-50 w-72 bg-slate-900 text-white flex flex-col h-full transition-transform transform md:relative md:translate-x-0 print:hidden ${sidebarOpen ? 'translate-x-0' : '-translate-x-full'}`}>
            <div className="p-6 flex items-center justify-between border-b border-slate-800"><div className="flex items-center space-x-3"><div className="bg-blue-600 p-2.5 rounded-xl"><Box size={24} /></div><h1 className="text-2xl font-black">ASIA HYDRO</h1></div><button onClick={()=>setSidebarOpen(false)} className="md:hidden text-slate-400"><X size={24}/></button></div>
            <div className="flex-1 py-6 px-4 space-y-1.5 overflow-y-auto custom-scrollbar">
              {currentUser.role !== 'Requester' && <button onClick={() => changeTab('dashboard')} className={`w-full flex items-center space-x-3 px-4 py-3.5 rounded-xl text-sm font-bold ${activeTab==='dashboard'?'bg-blue-600 text-white':'text-slate-300 hover:bg-slate-800'}`}><Home size={20} /> <span>แดชบอร์ด</span></button>}
              {perms.canCreatePR && <><div className="text-[11px] font-black text-slate-500 uppercase mt-4 mb-2 ml-2">จัดซื้อ</div><button onClick={() => changeTab('pr')} className={`w-full flex items-center space-x-3 px-4 py-3.5 rounded-xl text-sm font-bold ${activeTab==='pr'?'bg-blue-600 text-white':'text-slate-300 hover:bg-slate-800'}`}><FileText size={20} /> <span>ใบขอซื้อ (PR)</span></button>{perms.canCreatePO && <button onClick={() => changeTab('po')} className={`w-full flex items-center space-x-3 px-4 py-3.5 rounded-xl text-sm font-bold ${activeTab==='po'?'bg-blue-600 text-white':'text-slate-300 hover:bg-slate-800'}`}><ShoppingCart size={20} /> <span>ใบสั่งซื้อ (PO)</span></button>}</>}
              {perms.canManageInventory && <><div className="text-[11px] font-black text-slate-500 uppercase mt-4 mb-2 ml-2">คลังสินค้า</div><button onClick={() => changeTab('gr')} className={`w-full flex items-center justify-between px-4 py-3.5 rounded-xl text-sm font-bold ${activeTab==='gr'?'bg-emerald-500 text-white':'text-slate-300 hover:bg-slate-800'} `}><div className="flex items-center space-x-3"><PackagePlus size={20} /> <span>รับเข้า (สแกน)</span></div>{db.pos.filter(p=>p.status==='Pending Receipt').length > 0 && <span className="bg-red-500 text-white text-[10px] px-2 py-0.5 rounded-full">{db.pos.filter(p=>p.status==='Pending Receipt').length}</span>}</button><button onClick={() => changeTab('issue')} className={`w-full flex items-center space-x-3 px-4 py-3.5 rounded-xl text-sm font-bold ${activeTab==='issue'?'bg-amber-500 text-white':'text-slate-300 hover:bg-slate-800'}`}><PackageMinus size={20} /> <span>เบิกจ่าย (สแกน)</span></button><button onClick={() => changeTab('stock')} className={`w-full flex items-center space-x-3 px-4 py-3.5 rounded-xl text-sm font-bold ${activeTab==='stock'?'bg-blue-600 text-white':'text-slate-300 hover:bg-slate-800'}`}><LayoutGrid size={20} /> <span>สต๊อกคงเหลือ</span></button><button onClick={() => changeTab('history')} className={`w-full flex items-center space-x-3 px-4 py-3.5 rounded-xl text-sm font-bold ${activeTab==='history'?'bg-blue-600 text-white':'text-slate-300 hover:bg-slate-800'}`}><Clock size={20} /> <span>ประวัติ</span></button></>}
              {perms.canViewReports && <button onClick={() => changeTab('reports')} className={`w-full flex items-center space-x-3 px-4 py-3.5 rounded-xl text-sm font-bold mt-4 ${activeTab==='reports'?'bg-blue-600 text-white':'text-slate-300 hover:bg-slate-800'}`}><PieChart size={20} /> <span>รายงาน</span></button>}
              {perms.canManageSettings && <button onClick={() => changeTab('settings')} className={`w-full flex items-center space-x-3 px-4 py-3.5 rounded-xl text-sm font-bold mt-4 ${activeTab==='settings'?'bg-blue-600 text-white':'text-slate-300 hover:bg-slate-800'}`}><Settings size={20} /> <span>ตั้งค่าระบบ</span></button>}
            </div>
            <div className="p-5 border-t border-slate-800 flex justify-between items-center"><div className="flex items-center space-x-3"><div className="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center font-bold">{currentUser.name.charAt(0)}</div><div><p className="font-bold text-sm">{currentUser.name}</p><p className="text-[10px] text-blue-400 font-bold uppercase">{currentUser.role}</p></div></div><button onClick={()=>showConfirm('ออกจากระบบ', 'ยืนยัน?', ()=>setCurrentUser(null))} className="text-slate-400 hover:text-red-400"><LogOut size={20} /></button></div>
          </div>

          <div className="flex-1 flex flex-col h-full overflow-hidden relative">
            <header className="bg-white border-b h-16 flex items-center px-4 md:px-8 print:hidden"><button onClick={() => setSidebarOpen(!sidebarOpen)} className="md:hidden mr-4"><Menu size={24} /></button><h2 className="font-black uppercase text-gray-800 tracking-widest">{activeTab}</h2></header>
            <main className="flex-1 overflow-y-auto p-4 md:p-8"><div className="max-w-7xl mx-auto pb-20">
              {activeTab === 'dashboard' && <Dashboard db={db} changeTab={changeTab} currentUser={currentUser} perms={perms} />}
              {activeTab === 'pr' && <PRComponent db={db} updateDb={updateDb} showNotify={showNotify} showAlert={showAlert} showConfirm={showConfirm} currentUser={currentUser} perms={perms} />}
              {activeTab === 'po' && <POComponent db={db} updateDb={updateDb} showNotify={showNotify} showAlert={showAlert} showConfirm={showConfirm} />}
              {activeTab === 'gr' && <GoodsReceiptComponent db={db} updateMultiple={updateMultiple} showNotify={showNotify} showAlert={showAlert} showConfirm={showConfirm} getProduct={getProduct} />}
              {activeTab === 'issue' && <GoodsIssueComponent db={db} updateMultiple={updateMultiple} showNotify={showNotify} showAlert={showAlert} showConfirm={showConfirm} getProduct={getProduct} />}
              {activeTab === 'stock' && <StockComponent db={db} updateDb={updateDb} showNotify={showNotify} showAlert={showAlert} showConfirm={showConfirm} />}
              {activeTab === 'history' && <HistoryComponent db={db} formatDate={formatDate} />}
              {activeTab === 'reports' && <ReportsComponent db={db} />}
              {activeTab === 'settings' && <SettingsComponent db={db} updateDb={updateDb} showNotify={showNotify} showConfirm={showConfirm} showAlert={showAlert} />}
            </div></main>
          </div>

          <CustomDialog config={dialogConfig} closeDialog={closeDialog} />
          {notification && <div className={`fixed bottom-6 right-6 px-6 py-4 rounded-2xl shadow-xl text-white text-sm font-bold z-[300] bg-gray-900`}><CheckCircle2 className="inline mr-2" size={24} />{notification.msg}</div>}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
