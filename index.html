<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ASIA HYDRO - Procurement & Inventory System</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <style>
    body { background-color: #f8fafc; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: #475569; border-radius: 10px; }
    .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #64748b; }
    @media print {
      body { background-color: white !important; }
      .print\:hidden { display: none !important; }
      @page { margin: 0.5cm; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" data-type="module">
    import React, { useState, useEffect, useRef } from 'https://esm.sh/react@18.2.0';
    import ReactDOM from 'https://esm.sh/react-dom@18.2.0/client';
    import * as Lucide from 'https://esm.sh/lucide-react@0.263.1';

    const { 
      Home, FileText, ShoppingCart, PackagePlus, PackageMinus, Layers, Settings, Plus, Search, Check, X, Barcode, 
      AlertCircle, ChevronRight, CheckCircle2, Box, Printer, Tag, Clock, Database, ArrowDownToLine, ArrowUpFromLine, 
      Download, Menu, Edit, Trash2, Image: ImageIcon, Filter, LayoutGrid, LayoutList, AlertTriangle, Building, 
      Sliders, Users, Lock, LogOut, PieChart, Info, HelpCircle, Cloud, RefreshCw
    } = Lucide;

    // =========================================================================
    // 🔴 1. วาง URL ของ GOOGLE APPS SCRIPT ของคุณตรงนี้ 🔴
    // =========================================================================
    const YOUR_GAS_URL = "https://script.google.com/macros/s/AKfycbxHz32WreJDbL_ZM90nxL9u08Z0wEfqdfqUXSXS72N6kcmvcWu28-AQqrgT_-iUwblJsA/exec"; 

    // --- ข้อมูลแม่แบบ (ใช้สร้างฐานข้อมูลอัตโนมัติเมื่อรันครั้งแรก) ---
    const initData = {
      users: [
        { id: 'U001', username: 'admin', password: '123', name: 'Admin (ผู้ดูแลระบบ)', role: 'Admin', department: 'IT' },
        { id: 'U002', username: 'req1', password: '123', name: 'สมชาย (ผู้ขอซื้อ)', role: 'Requester', department: 'Production' },
        { id: 'U003', username: 'pur1', password: '123', name: 'สมศรี (จัดซื้อ)', role: 'Purchaser', department: 'Procurement' },
        { id: 'U004', username: 'store1', password: '123', name: 'สมหมาย (คลังสินค้า)', role: 'Store', department: 'Warehouse' }
      ],
      products: [], vendors: [], prs: [], pos: [], transactions: []
    };

    const getPermissions = (role) => ({
      canCreatePR: ['Admin', 'Requester', 'Purchaser'].includes(role),
      canApprovePR: ['Admin', 'Purchaser'].includes(role),
      canCreatePO: ['Admin', 'Purchaser'].includes(role),
      canManageInventory: ['Admin', 'Store'].includes(role),
      canViewReports: ['Admin', 'Purchaser', 'Store'].includes(role),
      canManageSettings: ['Admin'].includes(role),
      canManageUsers: ['Admin'].includes(role),
    });

    const formatDate = (iso) => {
      if (!iso) return '-';
      const d = new Date(iso);
      return `${d.toLocaleDateString('th-TH')} ${d.toLocaleTimeString('th-TH', {hour: '2-digit', minute:'2-digit'})}`;
    };

    // --- COMPONENT: Custom Dialog ---
    const CustomDialog = ({ config, closeDialog }) => {
      if (!config.isOpen) return null;
      const isConfirm = config.type === 'confirm';
      const isError = config.type === 'error';
      return (
        <div className="fixed inset-0 bg-slate-900/60 z-[200] flex items-center justify-center p-4 backdrop-blur-sm transition-opacity animate-in fade-in duration-200">
          <div className="bg-white rounded-2xl shadow-2xl w-full max-w-sm overflow-hidden animate-in zoom-in-95 duration-200">
            <div className="p-6 text-center">
              <div className="flex justify-center mb-4 bg-gray-50 rounded-full w-16 h-16 items-center mx-auto border border-gray-100 shadow-sm">
                {isError ? <AlertTriangle size={32} className="text-red-500" /> : isConfirm ? <HelpCircle size={32} className="text-amber-500" /> : <Info size={32} className="text-blue-500" />}
              </div>
              <h3 className={`text-xl font-bold mb-2 ${isError ? 'text-red-600' : isConfirm ? 'text-amber-600' : 'text-blue-600'}`}>{config.title}</h3>
              <p className="text-gray-600 text-sm whitespace-pre-wrap">{config.message}</p>
            </div>
            <div className="px-6 py-4 bg-gray-50 flex gap-3 justify-end border-t border-gray-100">
              {isConfirm && <button onClick={closeDialog} className="px-4 py-2 w-full rounded-lg text-gray-600 bg-white border border-gray-300 hover:bg-gray-100 font-medium transition-colors">ยกเลิก</button>}
              <button onClick={() => { if(config.onConfirm) config.onConfirm(); closeDialog(); }} className={`px-4 py-2 w-full rounded-lg text-white font-medium shadow-sm transition-colors ${isError ? 'bg-red-600 hover:bg-red-700' : isConfirm ? 'bg-amber-500 hover:bg-amber-600' : 'bg-blue-600 hover:bg-blue-700'}`}>ตกลง</button>
            </div>
          </div>
        </div>
      );
    };

    // --- COMPONENT: Setup URL ---
    const SetupGASComponent = ({ onSaveUrl }) => {
      const [url, setUrl] = useState('');
      return (
        <div className="min-h-screen bg-slate-100 flex items-center justify-center p-4">
          <div className="bg-white p-8 rounded-2xl shadow-xl w-full max-w-lg text-center">
            <div className="bg-emerald-100 w-16 h-16 rounded-2xl flex items-center justify-center mx-auto mb-4"><Cloud className="text-emerald-600" size={32} /></div>
            <h1 className="text-2xl font-bold text-gray-800">เชื่อมต่อฐานข้อมูล Cloud</h1>
            <p className="text-gray-500 text-sm mt-2 mb-6">วาง URL ของ Google Apps Script ที่ Deploy เรียบร้อยแล้ว</p>
            <input type="text" value={url} onChange={e => setUrl(e.target.value)} className="w-full p-4 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none font-mono text-sm bg-gray-50 mb-4" placeholder="https://script.google.com/macros/s/..." />
            <button onClick={() => onSaveUrl(url)} className="w-full bg-emerald-600 text-white py-3.5 rounded-xl font-bold hover:bg-emerald-700 shadow-md">บันทึกการเชื่อมต่อ (Connect)</button>
          </div>
        </div>
      );
    };

    // --- COMPONENT: Login ---
    const LoginComponent = ({ onLogin, users, showAlert }) => {
      const [username, setUsername] = useState('');
      const [password, setPassword] = useState('');
      const handleLogin = (e) => {
        e.preventDefault();
        const user = users.find(u => u.username === username && u.password === password);
        if (user) onLogin(user);
        else showAlert('เข้าสู่ระบบล้มเหลว', 'ชื่อผู้ใช้งานหรือรหัสผ่านไม่ถูกต้อง กรุณาลองใหม่อีกครั้ง', 'error');
      };
      return (
        <div className="min-h-screen bg-slate-100 flex items-center justify-center p-4">
          <div className="bg-white p-6 md:p-8 rounded-2xl shadow-xl w-full max-w-md animate-in slide-in-from-bottom-4 duration-500">
            <div className="text-center mb-8">
              <div className="bg-blue-600 w-16 h-16 rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-lg transform rotate-3 hover:rotate-0 transition-transform">
                <Box size={32} className="text-white" />
              </div>
              <h1 className="text-2xl font-black text-gray-800 tracking-tight">ASIA HYDRO</h1>
              <p className="text-gray-500 text-sm mt-2">ระบบจัดการจัดซื้อและคลังสินค้าอัจฉริยะ</p>
            </div>
            <form onSubmit={handleLogin} className="space-y-5">
              <div>
                <label className="block text-sm font-medium text-gray-700 mb-1">Username</label>
                <div className="relative">
                  <input type="text" value={username} onChange={e => setUsername(e.target.value)} className="w-full pl-10 pr-4 py-3 border border-gray-300 rounded-lg outline-none focus:ring-2 focus:ring-blue-500 bg-gray-50/50" placeholder="เช่น admin" required />
                  <Users className="absolute left-3 top-3.5 text-gray-400" size={18} />
                </div>
              </div>
              <div>
                <label className="block text-sm font-medium text-gray-700 mb-1">Password</label>
                <div className="relative">
                  <input type="password" value={password} onChange={e => setPassword(e.target.value)} className="w-full pl-10 pr-4 py-3 border border-gray-300 rounded-lg outline-none focus:ring-2 focus:ring-blue-500 bg-gray-50/50" placeholder="รหัสผ่าน" required />
                  <Lock className="absolute left-3 top-3.5 text-gray-400" size={18} />
                </div>
              </div>
              <button type="submit" className="w-full bg-blue-600 text-white py-3 rounded-xl font-bold hover:bg-blue-700 hover:shadow-lg transition-all transform active:scale-[0.98]">เข้าสู่ระบบ (Login)</button>
            </form>
          </div>
        </div>
      );
    };

    // --- COMPONENT: Dashboard ---
    const DashboardComponent = ({ db, changeTab, currentUser, permissions }) => {
      const { prs, pos, products } = db;
      const healthyStock = products.filter(p => p.stock > p.minStock).length;
      const lowStock = products.filter(p => p.stock > 0 && p.stock <= p.minStock).length;
      const outOfStock = products.filter(p => p.stock === 0).length;
      
      const healthyPct = Math.round((healthyStock / products.length) * 100) || 0;
      const lowPct = Math.round((lowStock / products.length) * 100) || 0;
      const outPct = Math.round((outOfStock / products.length) * 100) || 0;

      return (
        <div className="space-y-6">
          <div className="bg-gradient-to-r from-blue-600 to-indigo-700 rounded-2xl p-6 md:p-8 text-white shadow-lg print:hidden relative overflow-hidden">
             <div className="relative z-10">
                <h2 className="text-2xl md:text-3xl font-bold mb-2">ยินดีต้อนรับสู่ระบบ ASIA HYDRO</h2>
                <p className="text-blue-100 mb-6 max-w-xl">ระบบจัดการคลังสินค้าและจัดซื้ออัจฉริยะ เข้าถึงและจัดการข้อมูลได้อย่างรวดเร็ว เลือกเมนูด้านล่างเพื่อเริ่มต้นการทำงาน</p>
                <div className="flex flex-wrap gap-3">
                  {permissions.canCreatePR && <button onClick={() => changeTab('pr')} className="bg-white/20 hover:bg-white/30 backdrop-blur-sm border border-white/30 text-white px-4 py-2.5 rounded-lg font-medium flex items-center transition-colors"><Plus size={18} className="mr-2" /> สร้างใบ PR</button>}
                  {permissions.canManageInventory && (
                     <><button onClick={() => changeTab('gr')} className="bg-emerald-500/80 hover:bg-emerald-500 backdrop-blur-sm text-white px-4 py-2.5 rounded-lg font-medium flex items-center transition-colors shadow-sm"><PackagePlus size={18} className="mr-2" /> รับของเข้า</button>
                     <button onClick={() => changeTab('issue')} className="bg-amber-500/80 hover:bg-amber-500 backdrop-blur-sm text-white px-4 py-2.5 rounded-lg font-medium flex items-center transition-colors shadow-sm"><PackageMinus size={18} className="mr-2" /> เบิกของออก</button></>
                  )}
                  {permissions.canViewReports && <button onClick={() => changeTab('reports')} className="bg-white/10 hover:bg-white/20 backdrop-blur-sm text-white px-4 py-2.5 rounded-lg font-medium flex items-center transition-colors"><PieChart size={18} className="mr-2" /> ดูรายงาน</button>}
                </div>
             </div>
             <Layers size={200} className="absolute right-0 bottom-0 opacity-10 pointer-events-none hidden md:block transform translate-x-10 translate-y-10" />
          </div>

          <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 md:gap-6 print:hidden">
            <div className="bg-white p-5 rounded-2xl shadow-sm border border-gray-100 flex items-center space-x-4 transition-transform hover:-translate-y-1 cursor-pointer" onClick={() => permissions.canCreatePR && changeTab('pr')}>
              <div className="p-3.5 bg-blue-50 text-blue-600 rounded-xl"><FileText size={24} /></div>
              <div><p className="text-sm text-gray-500 font-medium">PR รอดำเนินการ</p><p className="text-2xl font-black text-gray-800">{prs.filter(pr => pr.status === 'Pending').length}</p></div>
            </div>
            
            {permissions.canCreatePO && (
              <div className="bg-white p-5 rounded-2xl shadow-sm border border-gray-100 flex items-center space-x-4 transition-transform hover:-translate-y-1 cursor-pointer" onClick={() => changeTab('po')}>
                <div className="p-3.5 bg-indigo-50 text-indigo-600 rounded-xl"><ShoppingCart size={24} /></div>
                <div><p className="text-sm text-gray-500 font-medium">PO รอรับสินค้า</p><p className="text-2xl font-black text-gray-800">{pos.filter(po => po.status === 'Pending Receipt').length}</p></div>
              </div>
            )}
            
            {permissions.canManageInventory && (
              <>
                <div className="bg-white p-5 rounded-2xl shadow-sm border border-gray-100 flex items-center space-x-4 transition-transform hover:-translate-y-1 cursor-pointer" onClick={() => changeTab('stock')}>
                  <div className="p-3.5 bg-emerald-50 text-emerald-600 rounded-xl"><Layers size={24} /></div>
                  <div><p className="text-sm text-gray-500 font-medium">สินค้าในคลัง</p><p className="text-2xl font-black text-gray-800">{products.length} <span className="text-sm font-medium text-gray-500">รายการ</span></p></div>
                </div>
                <div className="bg-white p-5 rounded-2xl shadow-sm border border-gray-100 flex items-center space-x-4 transition-transform hover:-translate-y-1 cursor-pointer" onClick={() => changeTab('stock')}>
                  <div className="p-3.5 bg-amber-50 text-amber-600 rounded-xl"><AlertTriangle size={24} /></div>
                  <div><p className="text-sm text-gray-500 font-medium">ใกล้หมด/หมด</p><p className="text-2xl font-black text-red-500">{lowStock + outOfStock}</p></div>
                </div>
              </>
            )}
          </div>

          {permissions.canManageInventory && (
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
              <div className="bg-white rounded-2xl shadow-sm border border-gray-100 p-6 flex flex-col">
                 <h3 className="font-bold text-gray-800 mb-6">สถานะคลังสินค้า (Stock Health)</h3>
                 <div className="flex-1 flex flex-col justify-center">
                    <div className="w-full h-8 flex rounded-full overflow-hidden mb-6 bg-gray-100 shadow-inner">
                       <div style={{width: `${healthyPct}%`}} className="h-full bg-emerald-500 transition-all duration-1000 flex items-center justify-center text-xs font-bold text-white shadow-[inset_0_-2px_4px_rgba(0,0,0,0.15)]" title={`ปกติ ${healthyPct}%`}>{healthyPct > 10 && `${healthyPct}%`}</div>
                       <div style={{width: `${lowPct}%`}} className="h-full bg-amber-400 transition-all duration-1000 flex items-center justify-center text-xs font-bold text-white shadow-[inset_0_-2px_4px_rgba(0,0,0,0.1)]" title={`ใกล้หมด ${lowPct}%`}>{lowPct > 10 && `${lowPct}%`}</div>
                       <div style={{width: `${outPct}%`}} className="h-full bg-red-500 transition-all duration-1000 flex items-center justify-center text-xs font-bold text-white shadow-[inset_0_-2px_4px_rgba(0,0,0,0.2)]" title={`สินค้าหมด ${outPct}%`}>{outPct > 10 && `${outPct}%`}</div>
                    </div>
                    <div className="flex flex-wrap justify-between gap-4">
                       <div className="flex items-center"><span className="w-3 h-3 rounded-full bg-emerald-500 mr-2"></span><span className="text-sm text-gray-600 font-medium">ปกติ ({healthyStock})</span></div>
                       <div className="flex items-center"><span className="w-3 h-3 rounded-full bg-amber-400 mr-2"></span><span className="text-sm text-gray-600 font-medium">ใกล้หมด ({lowStock})</span></div>
                       <div className="flex items-center"><span className="w-3 h-3 rounded-full bg-red-500 mr-2"></span><span className="text-sm text-gray-600 font-medium">หมดสต๊อก ({outOfStock})</span></div>
                    </div>
                 </div>
              </div>
              <div className="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden print:border-none print:shadow-none print:overflow-visible">
                <div className="px-6 py-4 border-b border-gray-100 flex justify-between items-center bg-gray-50/50">
                  <h3 className="font-bold text-gray-800">รายการเคลื่อนไหวล่าสุด</h3>
                  <button onClick={() => changeTab('history')} className="text-sm text-blue-600 font-medium hover:underline print:hidden">ดูทั้งหมด</button>
                </div>
                <div className="p-0">
                  {db.transactions.length === 0 ? (
                     <div className="p-6 flex flex-col items-center justify-center text-gray-400 h-48 space-y-2"><Box size={32} className="opacity-50" /><p>ยังไม่มีรายการเคลื่อนไหว</p></div>
                  ) : (
                    <ul className="divide-y divide-gray-100">
                      {db.transactions.slice(0, 4).map(t => {
                        const p = db.products.find(x => x.id === t.productId);
                        return (
                          <li key={t.id} className="px-6 py-4 flex justify-between items-center hover:bg-gray-50 print:break-inside-avoid">
                            <div className="flex items-center space-x-4">
                              <div className={`p-2.5 rounded-xl shadow-sm ${t.type === 'IN' ? 'bg-emerald-50 text-emerald-600 border border-emerald-100' : 'bg-amber-50 text-amber-600 border border-amber-100'}`}>
                                {t.type === 'IN' ? <ArrowDownToLine size={18} /> : <ArrowUpFromLine size={18} />}
                              </div>
                              <div>
                                <p className="text-sm font-bold text-gray-800 line-clamp-1">{p ? p.name : t.productId}</p>
                                <p className="text-xs text-gray-500 mt-0.5">{t.referenceNo} • {formatDate(t.date)}</p>
                              </div>
                            </div>
                            <div className={`font-black text-lg ${t.type === 'IN' ? 'text-emerald-600' : 'text-amber-600'}`}>{t.type === 'IN' ? '+' : '-'}{t.qty}</div>
                          </li>
                        )
                      })}
                    </ul>
                  )}
                </div>
              </div>
            </div>
          )}
        </div>
      );
    };

    // --- COMPONENT: PR ---
    const PRComponent = ({ db, updateDb, showNotify, showAlert, showConfirm, currentUser, permissions, changeTab }) => {
      const [view, setView] = useState('list');
      const [searchTerm, setSearchTerm] = useState('');
      const [newPR, setNewPR] = useState({ requester: currentUser.name, items: [] });
      const [isCustomItem, setIsCustomItem] = useState(false);
      const [itemInput, setItemInput] = useState({ productId: '', customName: '', qty: '', unit: 'ชิ้น', reqDate: '', jobNo: '', suggestVendor: '', remark: '' });
      
      const filteredPRs = db.prs.filter(pr => pr.id.toLowerCase().includes(searchTerm.toLowerCase()) || pr.requester.toLowerCase().includes(searchTerm.toLowerCase()));

      const handleCreatePR = () => {
        if (!newPR.requester || newPR.items.length === 0) return showAlert('ข้อมูลไม่ครบถ้วน', 'กรุณาระบุผู้ขอซื้อและเพิ่มรายการสินค้าอย่างน้อย 1 รายการ', 'error');
        showConfirm('ยืนยันสร้างใบ PR', 'คุณต้องการบันทึกใบขอซื้อฉบับนี้ใช่หรือไม่?', () => {
          const prId = `PR-${new Date().toISOString().slice(2,7).replace('-','')}-${Math.floor(Math.random() * 1000).toString().padStart(3, '0')}`;
          const pr = { id: prId, date: new Date().toISOString().split('T')[0], requester: newPR.requester, status: 'Pending', items: newPR.items };
          updateDb('prs', [pr, ...db.prs]);
          setView('list'); setNewPR({ requester: currentUser.name, items: [] }); showNotify('สร้างใบ PR สำเร็จ');
        });
      };

      const addItemToPR = () => {
        if ((!isCustomItem && !itemInput.productId) || (isCustomItem && !itemInput.customName) || !itemInput.qty) return showAlert('ข้อมูลไม่ครบ', 'กรุณาระบุสินค้าและจำนวนที่ต้องการขอซื้อ', 'error');
        setNewPR({ ...newPR, items: [...newPR.items, { ...itemInput, isCustom: isCustomItem, qty: parseInt(itemInput.qty) }] });
        setItemInput({ productId: '', customName: '', qty: '', unit: 'ชิ้น', reqDate: '', jobNo: '', suggestVendor: '', remark: '' });
      };

      const approvePR = (id) => showConfirm('ยืนยันการอนุมัติ', `คุณต้องการอนุมัติใบขอซื้อ ${id} ใช่หรือไม่?`, () => { updateDb('prs', db.prs.map(pr => pr.id === id ? { ...pr, status: 'Approved' } : pr)); showNotify(`อนุมัติใบ PR ${id} เรียบร้อยแล้ว`); });
      const rejectPR = (id) => showConfirm('ปฏิเสธการอนุมัติ', `คุณต้องการไม่อนุมัติใบขอซื้อ ${id} ใช่หรือไม่?`, () => { updateDb('prs', db.prs.map(pr => pr.id === id ? { ...pr, status: 'Rejected' } : pr)); showNotify(`ไม่อนุมัติใบ PR ${id} แล้ว`, 'error'); });
      const deletePR = (id) => showConfirm('ยืนยันการลบ', `คุณต้องการลบใบขอซื้อ ${id} ใช่หรือไม่?`, () => { updateDb('prs', db.prs.filter(pr => pr.id !== id)); showNotify(`ลบใบ PR ${id} เรียบร้อยแล้ว`, 'success'); });

      if (view === 'create') {
        return (
          <div className="bg-white rounded-2xl shadow-sm border border-gray-100 p-4 md:p-8 max-w-5xl animate-in fade-in">
            <div className="flex flex-col md:flex-row md:justify-between items-start md:items-center mb-6 border-b border-gray-100 pb-4"><h2 className="text-xl md:text-2xl font-black text-gray-800">สร้างใบขอซื้อ (PR)</h2><button onClick={() => setView('list')} className="mt-4 md:mt-0 text-gray-500 hover:bg-gray-100 px-4 py-2 rounded-lg font-medium transition-colors">กลับหน้ารายการ</button></div>
            <div className="space-y-6">
              <div><label className="block text-sm font-bold text-gray-700 mb-1">แผนก/ผู้ขอซื้อ <span className="text-red-500">*</span></label><input type="text" className="w-full border border-gray-300 rounded-xl p-3 outline-none focus:ring-2 focus:ring-blue-500 bg-gray-50" placeholder="เช่น แผนกบัญชี, Store" value={newPR.requester} onChange={e => setNewPR({...newPR, requester: e.target.value})} disabled={currentUser.role === 'Requester'} /></div>
              <div className="border border-blue-100 rounded-xl p-4 md:p-6 bg-blue-50/30">
                <div className="flex flex-col md:flex-row md:justify-between md:items-center mb-4 border-b border-blue-100 pb-3 space-y-2 md:space-y-0"><h3 className="font-bold text-blue-800 text-lg">เพิ่มรายการสินค้า</h3><label className="flex items-center text-sm text-blue-700 cursor-pointer bg-white px-4 py-1.5 rounded-full border border-blue-200 shadow-sm w-fit transition-colors hover:bg-blue-50"><input type="checkbox" className="mr-2 accent-blue-600 w-4 h-4" checked={isCustomItem} onChange={e => setIsCustomItem(e.target.checked)} />พิมพ์ชื่อสินค้าเอง (นอกระบบ)</label></div>
                <div className="grid grid-cols-1 md:grid-cols-4 gap-4 mb-4">
                  <div className={isCustomItem ? "md:col-span-2" : "md:col-span-3"}><label className="block text-xs font-bold text-gray-600 mb-1">สินค้า <span className="text-red-500">*</span></label>{!isCustomItem ? <select className="w-full border border-gray-300 rounded-lg p-3 outline-none focus:ring-2 focus:ring-blue-500 bg-white" value={itemInput.productId} onChange={e => setItemInput({...itemInput, productId: e.target.value})}><option value="">-- เลือกสินค้าจากระบบ --</option>{db.products.map(p => <option key={p.id} value={p.id}>[{p.id}] {p.name}</option>)}</select> : <input type="text" className="w-full border border-gray-300 rounded-lg p-3 outline-none focus:ring-2 focus:ring-blue-500 bg-white" placeholder="พิมพ์ชื่อสินค้า หรือ รายละเอียดงาน..." value={itemInput.customName} onChange={e => setItemInput({...itemInput, customName: e.target.value})} />}</div>
                  <div className={isCustomItem ? "md:col-span-2" : "md:col-span-1"}><label className="block text-xs font-bold text-gray-600 mb-1">จำนวน <span className="text-red-500">*</span></label><div className="flex space-x-2"><input type="number" className="w-full border border-gray-300 rounded-lg p-3 outline-none focus:ring-2 focus:ring-blue-500 bg-white" placeholder="ระบุตัวเลข" value={itemInput.qty} onChange={e => setItemInput({...itemInput, qty: e.target.value})} />{isCustomItem && <input type="text" className="w-24 border border-gray-300 rounded-lg p-3 outline-none focus:ring-2 focus:ring-blue-500 bg-white" placeholder="หน่วย" value={itemInput.unit} onChange={e => setItemInput({...itemInput, unit: e.target.value})} />}</div></div>
                </div>
                <div className="grid grid-cols-1 md:grid-cols-4 gap-4 mb-4">
                  <div><label className="block text-xs font-bold text-gray-600 mb-1">วันที่ต้องการ</label><input type="date" className="w-full border border-gray-300 rounded-lg p-3 outline-none focus:ring-2 focus:ring-blue-500 bg-white" value={itemInput.reqDate} onChange={e => setItemInput({...itemInput, reqDate: e.target.value})} /></div>
                  <div><label className="block text-xs font-bold text-gray-600 mb-1">JOB# (รหัสงาน)</label><input type="text" className="w-full border border-gray-300 rounded-lg p-3 outline-none focus:ring-2 focus:ring-blue-500 bg-white" placeholder="เช่น AH#35, Plant" value={itemInput.jobNo} onChange={e => setItemInput({...itemInput, jobNo: e.target.value})} /></div>
                  <div><label className="block text-xs font-bold text-gray-600 mb-1">Suggest Vendor</label><input type="text" className="w-full border border-gray-300 rounded-lg p-3 outline-none focus:ring-2 focus:ring-blue-500 bg-white" placeholder="ผู้จำหน่ายที่แนะนำ" value={itemInput.suggestVendor} onChange={e => setItemInput({...itemInput, suggestVendor: e.target.value})} /></div>
                  <div><label className="block text-xs font-bold text-gray-600 mb-1">หมายเหตุ / สเปค</label><input type="text" className="w-full border border-gray-300 rounded-lg p-3 outline-none focus:ring-2 focus:ring-blue-500 bg-white" placeholder="เช่น Size M 2 ตัว" value={itemInput.remark} onChange={e => setItemInput({...itemInput, remark: e.target.value})} /></div>
                </div>
                <div className="flex justify-end mt-4 pt-4 border-t border-blue-100"><button onClick={addItemToPR} className="bg-blue-600 text-white px-6 py-2.5 rounded-xl hover:bg-blue-700 font-bold flex items-center shadow-md w-full md:w-auto justify-center transition-transform active:scale-95"><Plus size={18} className="mr-2" /> เพิ่มลงตะกร้า PR</button></div>
              </div>

              {newPR.items.length > 0 && (
                <div className="overflow-x-auto border border-gray-200 rounded-xl shadow-sm bg-white">
                  <table className="w-full text-left whitespace-nowrap min-w-[800px]">
                    <thead className="bg-gray-50 text-xs text-gray-500 border-b uppercase tracking-wider"><tr><th className="px-5 py-4 font-bold">สินค้า / รายละเอียด</th><th className="px-5 py-4 font-bold text-right">จำนวน</th><th className="px-5 py-4 font-bold">วันที่ต้องการ</th><th className="px-5 py-4 font-bold">JOB#</th><th className="px-5 py-4 font-bold">Suggest Vendor</th><th className="px-5 py-4 font-bold">หมายเหตุ</th><th className="px-5 py-4 font-bold text-center print:hidden">จัดการ</th></tr></thead>
                    <tbody className="divide-y divide-gray-100">
                      {newPR.items.map((item, idx) => {
                        const p = !item.isCustom ? db.products.find(x=>x.id===item.productId) : null;
                        const name = item.isCustom ? item.customName : p?.name;
                        const unit = item.isCustom ? item.unit : p?.unit;
                        return (
                          <tr key={idx} className="text-sm hover:bg-gray-50 print:break-inside-avoid">
                            <td className="px-5 py-3"><div className="font-bold text-gray-800 whitespace-normal">{name}</div>{!item.isCustom && <div className="text-xs text-blue-600 font-medium">{p?.id}</div>}{item.isCustom && <div className="text-xs text-amber-600 font-medium">สินค้านอกระบบ</div>}</td>
                            <td className="px-5 py-3 text-right font-black text-gray-800 text-lg">{item.qty} <span className="text-gray-500 text-sm font-normal">{unit}</span></td>
                            <td className="px-5 py-3 text-gray-600">{item.reqDate || '-'}</td><td className="px-5 py-3 text-indigo-600 font-bold">{item.jobNo || '-'}</td><td className="px-5 py-3 text-gray-600 text-xs truncate max-w-[120px] whitespace-normal">{item.suggestVendor || '-'}</td><td className="px-5 py-3 text-gray-500 text-xs truncate max-w-[150px] whitespace-normal">{item.remark || '-'}</td>
                            <td className="px-5 py-3 text-center print:hidden"><button onClick={() => setNewPR({...newPR, items: newPR.items.filter((_, i) => i !== idx)})} className="text-red-500 hover:text-red-700 bg-red-50 p-2 rounded-lg transition-colors"><X size={18} /></button></td>
                          </tr>
                        );
                      })}
                    </tbody>
                  </table>
                </div>
              )}
              <div className="text-right pt-6 border-t"><button onClick={handleCreatePR} className="bg-emerald-500 text-white px-8 py-3.5 rounded-xl hover:bg-emerald-600 font-black flex items-center shadow-lg w-full md:w-auto justify-center transition-transform active:scale-95 text-lg"><Check className="mr-2" size={24} /> ยืนยันบันทึกใบขอซื้อ</button></div>
            </div>
          </div>
        );
      }

      return (
        <div className="space-y-6">
          <div className="flex flex-col md:flex-row justify-between items-start md:items-center space-y-4 md:space-y-0">
            <h2 className="text-2xl font-bold text-gray-800">ใบขอซื้อ (Purchase Request)</h2>
            <div className="flex w-full md:w-auto space-x-3">
               <div className="relative flex-1 md:w-64 print:hidden"><input type="text" placeholder="ค้นหาเลขที่ PR, ผู้ขอซื้อ..." value={searchTerm} onChange={e => setSearchTerm(e.target.value)} className="w-full pl-10 pr-4 py-2.5 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm shadow-sm" /><Search className="absolute left-3 top-3 text-gray-400" size={18} /></div>
               {permissions.canCreatePR && <button onClick={() => setView('create')} className="bg-blue-600 text-white px-5 py-2.5 rounded-xl hover:bg-blue-700 flex items-center justify-center text-sm font-bold shadow-md print:hidden whitespace-nowrap transition-transform active:scale-95"><Plus size={18} className="mr-1.5" /> สร้างใบ PR</button>}
            </div>
          </div>

          <div className="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-x-auto print:overflow-visible print:border-none print:shadow-none">
            <table className="w-full text-left min-w-[800px]">
              <thead className="bg-gray-50 border-b border-gray-100 text-sm text-gray-600 uppercase tracking-wider">
                <tr><th className="px-6 py-4 font-bold">เลขที่ PR</th><th className="px-6 py-4 font-bold">วันที่</th><th className="px-6 py-4 font-bold">ผู้ขอซื้อ</th><th className="px-6 py-4 font-bold">จำนวนรายการ</th><th className="px-6 py-4 font-bold text-center">สถานะ</th>{permissions.canApprovePR && <th className="px-6 py-4 font-bold text-center print:hidden">จัดการ</th>}</tr>
              </thead>
              <tbody className="divide-y divide-gray-100">
                {filteredPRs.length === 0 ? (
                   <tr><td colSpan={permissions.canApprovePR ? "6" : "5"} className="text-center py-10 text-gray-500">ไม่พบเอกสาร PR ที่ค้นหา</td></tr>
                ) : (
                  filteredPRs.map(pr => (
                    <tr key={pr.id} className="hover:bg-blue-50/50 transition-colors print:break-inside-avoid">
                      <td className="px-6 py-4 font-bold text-blue-600">{pr.id}</td>
                      <td className="px-6 py-4 text-sm text-gray-600">{pr.date}</td>
                      <td className="px-6 py-4 text-sm font-medium text-gray-800">{pr.requester}</td>
                      <td className="px-6 py-4 text-sm text-gray-600 font-medium">{pr.items.length} รายการ</td>
                      <td className="px-6 py-4 text-center"><span className={`px-3 py-1.5 rounded-full text-xs font-bold inline-block w-24 text-center ${pr.status === 'Approved' ? 'bg-emerald-100 text-emerald-700' : pr.status === 'Rejected' ? 'bg-red-100 text-red-700' : 'bg-amber-100 text-amber-700'}`}>{pr.status === 'Approved' ? 'อนุมัติแล้ว' : pr.status === 'Rejected' ? 'ไม่อนุมัติ' : 'รอดำเนินการ'}</span></td>
                      {permissions.canApprovePR && (
                        <td className="px-6 py-4 text-center print:hidden">
                          <div className="flex justify-center items-center space-x-2">
                            {pr.status === 'Pending' && (
                              <><button onClick={() => approvePR(pr.id)} className="text-emerald-600 hover:bg-emerald-600 hover:text-white px-3 py-1.5 rounded-lg text-xs font-bold border border-emerald-500 transition-colors">อนุมัติ</button><button onClick={() => rejectPR(pr.id)} className="text-red-500 hover:bg-red-600 hover:text-white px-3 py-1.5 rounded-lg text-xs font-bold border border-red-500 transition-colors">ไม่อนุมัติ</button></>
                            )}
                            {pr.status === 'Approved' && permissions.canCreatePO && (
                              <button onClick={() => changeTab('po')} className="text-blue-600 hover:bg-blue-600 hover:text-white px-4 py-1.5 rounded-lg text-xs font-bold border border-blue-500 transition-colors">เปิด PO</button>
                            )}
                            {(pr.status === 'Pending' || pr.status === 'Rejected') && (
                              <button onClick={() => deletePR(pr.id)} className="text-gray-500 hover:bg-gray-100 px-2 py-1.5 rounded-lg text-xs font-medium transition-colors" title="ลบเอกสาร"><Trash2 size={18} /></button>
                            )}
                          </div>
                        </td>
                      )}
                    </tr>
                  ))
                )}
              </tbody>
            </table>
          </div>
        </div>
      );
    };

    // --- COMPONENT: PO ---
    const POComponent = ({ db, updateDb, showNotify, showAlert, showConfirm }) => {
      const [view, setView] = useState('list');
      const [searchTerm, setSearchTerm] = useState('');
      const [selectedPR, setSelectedPR] = useState('');
      const [selectedVendor, setSelectedVendor] = useState('');
      
      const approvedPRs = db.prs.filter(pr => pr.status === 'Approved' && !db.pos.find(po => po.prId === pr.id));
      const filteredPOs = db.pos.filter(po => {
        const v = db.vendors.find(x=>x.id===po.vendorId);
        const vendorName = v ? v.name.toLowerCase() : '';
        const searchLower = searchTerm.toLowerCase();
        return po.id.toLowerCase().includes(searchLower) || po.prId.toLowerCase().includes(searchLower) || vendorName.includes(searchLower);
      });

      const handleCreatePO = () => {
        if (!selectedPR || !selectedVendor) return showAlert('ข้อมูลไม่ครบ', 'กรุณาเลือก PR และระบุผู้จำหน่ายก่อนออกใบสั่งซื้อ', 'error');
        showConfirm('ยืนยันสร้างใบ PO', 'ระบบจะทำการออกใบสั่งซื้อและส่งต่อให้คลังสินค้ารอรับของ ยืนยันการทำรายการ?', () => {
          const pr = db.prs.find(p => p.id === selectedPR);
          const poId = `PO-${new Date().toISOString().slice(2,7).replace('-','')}-${Math.floor(Math.random() * 1000).toString().padStart(3, '0')}`;
          const newPO = {
            id: poId, prId: selectedPR, vendorId: selectedVendor, date: new Date().toISOString().split('T')[0], status: 'Pending Receipt',
            items: pr.items.map(item => {
              const p = !item.isCustom ? db.products.find(x=>x.id===item.productId) : null;
              return { isCustom: item.isCustom, productId: item.productId, customName: item.customName, unit: item.isCustom ? item.unit : p?.unit, expectedQty: item.qty, receivedQty: 0, price: p ? p.price : 0 }
            })
          };
          updateDb('pos', [newPO, ...db.pos]);
          setView('list'); showNotify('สร้างใบ PO สำเร็จ และพร้อมรับสินค้า', 'success');
        });
      };

      const deletePO = (id) => {
        showConfirm('ยกเลิกใบสั่งซื้อ', `คุณแน่ใจหรือไม่ที่จะยกเลิก/ลบใบสั่งซื้อ ${id}?`, () => {
          updateDb('pos', db.pos.filter(po => po.id !== id));
          showNotify(`ยกเลิกใบ PO ${id} เรียบร้อยแล้ว`, 'success');
        });
      };

      if (view === 'create') {
        return (
          <div className="bg-white rounded-2xl shadow-sm border border-gray-100 p-4 md:p-8 max-w-4xl animate-in fade-in">
            <div className="flex justify-between items-center mb-6 border-b border-gray-100 pb-4"><h2 className="text-xl md:text-2xl font-black text-gray-800">สร้างใบสั่งซื้อ (PO) จาก PR</h2><button onClick={() => setView('list')} className="text-gray-500 hover:bg-gray-100 px-4 py-2 rounded-lg font-medium transition-colors">กลับหน้ารายการ</button></div>
            <div className="space-y-6">
              <div className="grid grid-cols-1 md:grid-cols-2 gap-6 bg-indigo-50/50 p-6 rounded-xl border border-indigo-100">
                <div><label className="block text-sm font-bold text-indigo-900 mb-2">เลือกใบ PR ที่อนุมัติแล้ว <span className="text-red-500">*</span></label><select className="w-full border border-gray-300 rounded-xl p-3 outline-none focus:ring-2 focus:ring-indigo-500 bg-white shadow-sm" value={selectedPR} onChange={e => setSelectedPR(e.target.value)}><option value="">-- เลือกเอกสาร PR --</option>{approvedPRs.map(pr => <option key={pr.id} value={pr.id}>{pr.id} (ขอโดย: {pr.requester})</option>)}</select></div>
                <div><label className="block text-sm font-bold text-indigo-900 mb-2">เลือกร้านค้า/ซัพพลายเออร์ <span className="text-red-500">*</span></label><select className="w-full border border-gray-300 rounded-xl p-3 outline-none focus:ring-2 focus:ring-indigo-500 bg-white shadow-sm" value={selectedVendor} onChange={e => setSelectedVendor(e.target.value)}><option value="">-- เลือกจากฐานข้อมูล --</option>{db.vendors.map(v => <option key={v.id} value={v.id}>[{v.id}] {v.name}</option>)}</select></div>
              </div>
              {selectedPR && (
                <div className="border border-gray-200 rounded-xl overflow-hidden shadow-sm">
                  <div className="bg-gray-50 px-5 py-3 border-b font-bold text-sm text-gray-700">พรีวิวรายการสินค้าที่จะสั่งซื้อ</div>
                  <div className="overflow-x-auto print:overflow-visible">
                    <table className="w-full text-left min-w-[600px]"><thead className="bg-white text-xs text-gray-500 border-b uppercase tracking-wider"><tr><th className="px-5 py-3 font-bold">รหัส</th><th className="px-5 py-3 font-bold">ชื่อสินค้า</th><th className="px-5 py-3 font-bold text-right">จำนวน</th><th className="px-5 py-3 font-bold text-right">ราคาต่อหน่วยประเมิน</th></tr></thead><tbody className="divide-y divide-gray-100 bg-white">
                      {db.prs.find(p => p.id === selectedPR).items.map((item, idx) => {
                        const p = !item.isCustom ? db.products.find(x=>x.id===item.productId) : null;
                        return (
                          <tr key={idx} className="text-sm">
                            <td className="px-5 py-3 font-medium">{item.isCustom ? <span className="text-amber-500 bg-amber-50 px-2 py-1 rounded text-xs">นอกระบบ</span> : <span className="text-blue-600">{p?.id}</span>}</td>
                            <td className="px-5 py-3"><div className="font-bold text-gray-800 whitespace-normal">{item.isCustom ? item.customName : p?.name}</div>{item.jobNo && <div className="text-xs text-indigo-600 font-medium mt-0.5">JOB: {item.jobNo}</div>}{item.remark && <div className="text-xs text-gray-500 whitespace-normal mt-0.5">หมายเหตุ: {item.remark}</div>}</td>
                            <td className="px-5 py-3 text-right font-black text-gray-800 text-lg">{item.qty} <span className="text-gray-500 font-normal text-sm">{item.isCustom ? item.unit : p?.unit}</span></td>
                            <td className="px-5 py-3 text-right text-gray-600">฿{(p ? p.price : 0).toLocaleString()}</td>
                          </tr>
                        );
                      })}
                    </tbody></table>
                  </div>
                </div>
              )}
              <div className="flex justify-end pt-6 border-t border-gray-100"><button onClick={handleCreatePO} className="bg-indigo-600 text-white px-8 py-3.5 rounded-xl hover:bg-indigo-700 font-black flex items-center shadow-lg w-full md:w-auto justify-center transition-transform active:scale-95 text-lg"><Check className="mr-2" size={24} /> ยืนยันออกใบสั่งซื้อ (PO)</button></div>
            </div>
          </div>
        );
      }

      return (
        <div className="space-y-6">
          <div className="flex flex-col md:flex-row justify-between items-start md:items-center space-y-4 md:space-y-0">
            <h2 className="text-2xl font-bold text-gray-800">ใบสั่งซื้อ (Purchase Order)</h2>
            <div className="flex w-full md:w-auto space-x-3">
               <div className="relative flex-1 md:w-64 print:hidden"><input type="text" placeholder="ค้นหาเลขที่ PO, PR, ซัพพลายเออร์..." value={searchTerm} onChange={e => setSearchTerm(e.target.value)} className="w-full pl-10 pr-4 py-2.5 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500 text-sm shadow-sm" /><Search className="absolute left-3 top-3 text-gray-400" size={18} /></div>
               <button onClick={() => setView('create')} className="bg-indigo-600 text-white px-5 py-2.5 rounded-xl hover:bg-indigo-700 flex items-center justify-center text-sm font-bold shadow-md print:hidden whitespace-nowrap transition-transform active:scale-95"><Plus size={18} className="mr-1.5" /> สร้างใบ PO</button>
            </div>
          </div>
          <div className="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-x-auto print:overflow-visible print:border-none print:shadow-none">
            <table className="w-full text-left min-w-[800px]">
              <thead className="bg-gray-50 border-b border-gray-100 text-sm text-gray-600 uppercase tracking-wider"><tr><th className="px-6 py-4 font-bold">เลขที่ PO</th><th className="px-6 py-4 font-bold">อ้างอิง PR</th><th className="px-6 py-4 font-bold">ซัพพลายเออร์</th><th className="px-6 py-4 font-bold text-center">วันที่สั่ง</th><th className="px-6 py-4 font-bold text-center">สถานะ</th><th className="px-6 py-4 font-bold text-center print:hidden">จัดการ</th></tr></thead>
              <tbody className="divide-y divide-gray-100">
                {filteredPOs.length === 0 ? (<tr><td colSpan="6" className="text-center py-10 text-gray-500">ไม่พบเอกสาร PO ที่ค้นหา</td></tr>) : (
                  filteredPOs.map(po => {
                    const v = db.vendors.find(x=>x.id===po.vendorId);
                    return (
                      <tr key={po.id} className="hover:bg-indigo-50/50 transition-colors print:break-inside-avoid">
                        <td className="px-6 py-4 font-bold text-indigo-700">{po.id}</td><td className="px-6 py-4 text-sm text-gray-500 font-medium">{po.prId}</td><td className="px-6 py-4 text-sm font-medium text-gray-800 whitespace-normal">{v ? v.name : po.vendorId}</td><td className="px-6 py-4 text-sm text-center text-gray-600">{po.date}</td>
                        <td className="px-6 py-4 text-center"><span className={`px-3 py-1.5 rounded-full text-xs font-bold inline-block w-28 ${po.status === 'Completed' ? 'bg-emerald-100 text-emerald-700' : 'bg-blue-100 text-blue-700'}`}>{po.status === 'Pending Receipt' ? 'รอรับสินค้า' : 'รับครบแล้ว'}</span></td>
                        <td className="px-6 py-4 text-center print:hidden">{po.status === 'Pending Receipt' && (<button onClick={() => deletePO(po.id)} className="text-red-500 hover:bg-red-50 px-3 py-1.5 rounded-lg text-sm font-medium transition-colors border border-transparent hover:border-red-200">ยกเลิก PO</button>)}</td>
                      </tr>
                    );
                  })
                )}
              </tbody>
            </table>
          </div>
        </div>
      );
    };

    // --- COMPONENT: Goods Receipt (รับเข้า) ---
    const GoodsReceiptComponent = ({ db, updateMultiple, showNotify, showAlert, showConfirm, getProduct }) => {
      const [selectedPO, setSelectedPO] = useState('');
      const [scanInput, setScanInput] = useState('');
      const [scannedItems, setScannedItems] = useState([]);
      const [receiptRemark, setReceiptRemark] = useState(''); 
      const barcodeInputRef = useRef(null);

      const activePOs = db.pos.filter(po => po.status === 'Pending Receipt');
      const currentPO = db.pos.find(p => p.id === selectedPO);

      useEffect(() => { if (selectedPO && barcodeInputRef.current) barcodeInputRef.current.focus(); }, [selectedPO]);

      const handleScan = (e) => {
        if (e.key === 'Enter' && scanInput.trim() !== '') {
          const inputVal = scanInput.trim(); setScanInput(''); 
          const product = db.products.find(p => p.barcode === inputVal || p.id === inputVal || p.name === inputVal);
          if (!product) return showAlert('ค้นหาไม่พบ', 'ไม่พบสินค้านี้ในระบบ (สามารถค้นหาได้ด้วย บาร์โค้ด, รหัสสินค้า, หรือชื่อ)', 'error');
          const poItem = currentPO.items.find(i => !i.isCustom && i.productId === product.id);
          if (!poItem) return showAlert('สินค้าไม่ตรงกัน', 'สินค้านี้ไม่ได้อยู่ในใบ PO ที่ท่านกำลังรับเข้า', 'error');

          const existingScan = scannedItems.find(i => !i.isCustom && i.productId === product.id);
          const currentScannedQty = existingScan ? existingScan.qty : 0;
          if (currentScannedQty + 1 > poItem.expectedQty - poItem.receivedQty) return showAlert('จำนวนเกิน', 'รับสินค้าเกินจำนวนที่สั่งในเอกสาร PO แล้ว', 'error');

          if (existingScan) setScannedItems(scannedItems.map(i => (!i.isCustom && i.productId === product.id) ? { ...i, qty: i.qty + 1 } : i));
          else setScannedItems([...scannedItems, { isCustom: false, productId: product.id, qty: 1 }]);
        }
      };

      const handleManualReceive = (item) => {
        const existingScan = scannedItems.find(i => item.isCustom ? i.customName === item.customName : i.productId === item.productId);
        const currentScannedQty = existingScan ? existingScan.qty : 0;
        if (currentScannedQty + 1 > item.expectedQty - item.receivedQty) return showAlert('จำนวนเกิน', 'รับสินค้าเกินจำนวนที่สั่งใน PO แล้ว', 'error');

        if (existingScan) setScannedItems(scannedItems.map(i => (item.isCustom ? i.customName === item.customName : i.productId === item.productId) ? { ...i, qty: i.qty + 1 } : i));
        else setScannedItems([...scannedItems, { isCustom: item.isCustom, productId: item.productId, customName: item.customName, qty: 1 }]);
      };

      const updateScannedQty = (item, newQty) => {
        const qty = parseInt(newQty) || 0;
        if (qty < 0) return;
        if (qty > item.expectedQty - item.receivedQty) return showAlert('จำนวนเกิน', `ใส่จำนวนเกิน! รับได้สูงสุดแค่ ${item.expectedQty - item.receivedQty}`, 'error');

        if (qty === 0) setScannedItems(scannedItems.filter(i => item.isCustom ? i.customName !== item.customName : i.productId !== item.productId));
        else {
          const existingScan = scannedItems.find(i => item.isCustom ? i.customName === item.customName : i.productId === item.productId);
          if (existingScan) setScannedItems(scannedItems.map(i => (item.isCustom ? i.customName === item.customName : i.productId === item.productId) ? { ...i, qty: qty } : i));
          else setScannedItems([...scannedItems, { isCustom: item.isCustom, productId: item.productId, customName: item.customName, qty: qty }]);
        }
      };

      const confirmReceipt = () => {
        if (scannedItems.length === 0) return;
        showConfirm('ยืนยันรับเข้าสต๊อก', 'ระบบจะทำการบวกจำนวนสินค้าเข้าคลัง และบันทึกประวัติการรับของ ยืนยันทำรายการ?', () => {
          let updatedPOs = [...db.pos];
          let updatedProducts = [...db.products];
          let newTransactions = [];
          const fullReference = receiptRemark ? `${currentPO.id} (${receiptRemark})` : currentPO.id;
          
          let poIndex = updatedPOs.findIndex(p => p.id === currentPO.id);
          let updatedPO = JSON.parse(JSON.stringify(updatedPOs[poIndex]));

          scannedItems.forEach(scan => {
            const itemIdx = updatedPO.items.findIndex(i => scan.isCustom ? i.customName === scan.customName : i.productId === scan.productId);
            if (itemIdx > -1) updatedPO.items[itemIdx].receivedQty += scan.qty;

            if (!scan.isCustom) {
                const prodIdx = updatedProducts.findIndex(p => p.id === scan.productId);
                if (prodIdx > -1) updatedProducts[prodIdx].stock += scan.qty;
                newTransactions.push({ id: `TXN-${Date.now()}-${Math.floor(Math.random()*100)}`, type: 'IN', date: new Date().toISOString(), productId: scan.productId, qty: scan.qty, referenceNo: fullReference });
            } else {
                newTransactions.push({ id: `TXN-${Date.now()}-${Math.floor(Math.random()*100)}`, type: 'IN', date: new Date().toISOString(), productId: `(นอกระบบ) ${scan.customName}`, qty: scan.qty, referenceNo: fullReference });
            }
          });

          const isComplete = updatedPO.items.every(i => i.receivedQty >= i.expectedQty);
          if (isComplete) updatedPO.status = 'Completed';
          updatedPOs[poIndex] = updatedPO;

          updateMultiple({ pos: updatedPOs, products: updatedProducts, transactions: [...newTransactions, ...db.transactions] });
          setSelectedPO(''); setScannedItems([]); setReceiptRemark(''); showNotify('รับเข้าสินค้าเรียบร้อยแล้ว', 'success');
        });
      };

      return (
        <div className="space-y-6">
          <h2 className="text-2xl font-bold text-gray-800">รับสินค้าเข้า (Goods Receipt)</h2>
          {!selectedPO ? (
            <div className="bg-white p-6 md:p-10 rounded-2xl shadow-sm border border-gray-100 max-w-2xl mx-auto mt-10 print:hidden text-center animate-in zoom-in-95">
              <div className="bg-emerald-100 w-20 h-20 rounded-full flex items-center justify-center mx-auto mb-6"><PackagePlus size={40} className="text-emerald-600" /></div>
              <h3 className="text-xl font-bold text-gray-800 mb-2">เตรียมรับสินค้าเข้าคลัง</h3><p className="text-gray-500 mb-6">กรุณาเลือกใบสั่งซื้อ (PO) ที่ส่งมาจากจัดซื้อ เพื่อตรวจรับสินค้า</p>
              <select className="w-full border-2 border-emerald-100 rounded-xl p-4 text-base md:text-lg outline-none focus:border-emerald-500 focus:ring-4 focus:ring-emerald-100 font-medium text-gray-700 transition-all appearance-none cursor-pointer" value={selectedPO} onChange={(e) => setSelectedPO(e.target.value)}>
                <option value="">-- คลิกเพื่อเลือกใบ PO ที่รอรับของ --</option>
                {activePOs.map(po => {
                  const v = db.vendors.find(x=>x.id===po.vendorId);
                  return <option key={po.id} value={po.id}>{po.id} - {v ? v.name : po.vendorId}</option>
                })}
              </select>
            </div>
          ) : (
            <div className="grid grid-cols-1 xl:grid-cols-3 gap-6 animate-in slide-in-from-bottom-4">
              <div className="xl:col-span-2 space-y-6">
                <div className="bg-blue-50/50 p-4 md:p-6 rounded-2xl border border-blue-100 shadow-inner print:hidden"><label className="block text-blue-900 font-bold mb-3 flex items-center text-sm md:text-base"><Barcode className="mr-2" size={20} /> เครื่องสแกนบาร์โค้ด (Barcode Scanner)</label><input type="text" ref={barcodeInputRef} value={scanInput} onChange={(e) => setScanInput(e.target.value)} onKeyDown={handleScan} placeholder="ยิงบาร์โค้ด / พิมพ์รหัส / พิมพ์ชื่อสินค้า (แล้วกด Enter)" className="w-full p-4 md:p-5 text-lg md:text-xl font-mono border-2 border-blue-200 rounded-xl outline-none focus:border-blue-600 focus:ring-4 focus:ring-blue-100 shadow-sm transition-all" autoFocus /></div>
                <div className="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden print:overflow-visible print:border-none print:shadow-none">
                  <div className="bg-gray-50 px-5 md:px-6 py-4 border-b border-gray-100 flex justify-between items-center"><h3 className="font-bold text-gray-800 flex items-center"><PackagePlus size={18} className="mr-2 text-emerald-600"/> รายการสินค้าใน {currentPO.id}</h3><button onClick={() => {setSelectedPO(''); setScannedItems([])}} className="text-sm text-gray-500 hover:text-gray-800 bg-white border border-gray-200 px-3 py-1.5 rounded-lg shadow-sm print:hidden transition-colors">เปลี่ยน PO</button></div>
                  <div className="overflow-x-auto print:overflow-visible">
                    <table className="w-full text-left min-w-[700px]">
                      <thead className="bg-white text-xs text-gray-500 border-b uppercase tracking-wider"><tr><th className="px-6 py-4 font-bold">สินค้า</th><th className="px-6 py-4 font-bold text-center">สั่ง (PO)</th><th className="px-6 py-4 font-bold text-center">รับแล้ว</th><th className="px-6 py-4 font-bold text-center w-36">จำนวนที่รับรอบนี้</th><th className="px-6 py-4 font-bold text-center print:hidden">สถานะ</th></tr></thead>
                      <tbody className="divide-y divide-gray-50">
                        {currentPO.items.map((item, idx) => {
                          const p = !item.isCustom ? getProduct(item.productId) : null;
                          const name = item.isCustom ? item.customName : p?.name;
                          const barcode = p ? p.barcode : 'ไม่มีบาร์โค้ด';
                          const scanItem = scannedItems.find(i => item.isCustom ? i.customName === item.customName : i.productId === item.productId);
                          const scanQty = scanItem ? scanItem.qty : 0;
                          const isComplete = item.receivedQty + scanQty >= item.expectedQty;
                          
                          return (
                            <tr key={idx} className={`${scanQty > 0 ? 'bg-emerald-50/30' : ''} print:break-inside-avoid transition-colors`}>
                              <td className="px-6 py-4"><div className="font-bold text-gray-800 flex items-center whitespace-normal">{name} {item.isCustom && <span className="ml-2 px-2 py-0.5 bg-amber-100 text-amber-700 text-[10px] uppercase font-bold rounded-full">นอกระบบ</span>}</div><div className="text-xs text-gray-400 font-mono mt-0.5">{barcode}</div></td>
                              <td className="px-6 py-4 text-center font-medium text-gray-600 text-lg">{item.expectedQty}</td><td className="px-6 py-4 text-center font-medium text-gray-500 text-lg">{item.receivedQty}</td>
                              <td className="px-6 py-4 text-center">{isComplete && scanQty === 0 ? <span className="text-emerald-500 font-black text-xl">-</span> : <input type="number" min="0" max={item.expectedQty - item.receivedQty} value={scanQty} onChange={(e) => updateScannedQty(item, e.target.value)} className="w-24 border-2 border-gray-200 rounded-lg p-2 text-center font-black text-emerald-600 text-lg outline-none focus:ring-4 focus:ring-emerald-100 focus:border-emerald-500 transition-all" />}</td>
                              <td className="px-6 py-4 text-center print:hidden">{isComplete ? <div className="flex justify-center"><CheckCircle2 className="text-emerald-500" size={24} /></div> : <button onClick={() => handleManualReceive(item)} className="text-xs bg-white hover:bg-slate-100 text-slate-700 px-4 py-2 rounded-lg border border-slate-200 transition-colors font-bold shadow-sm">+1 (รับมือ)</button>}</td>
                            </tr>
                          );
                        })}
                      </tbody>
                    </table>
                  </div>
                </div>
              </div>
              <div className="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 h-fit sticky top-6 print:hidden">
                <h3 className="text-lg font-bold text-gray-800 mb-6 border-b border-gray-100 pb-3 flex items-center"><FileText size={18} className="mr-2 text-blue-600"/> สรุปการรับเข้าคลัง</h3>
                <div className="mb-6"><label className="block text-sm font-bold text-gray-700 mb-2">หมายเหตุ (Optional)</label><textarea rows="3" value={receiptRemark} onChange={(e) => setReceiptRemark(e.target.value)} placeholder="ตัวอย่าง: สินค้าชำรุด 1 กล่อง แจ้งซัพพลายเออร์แล้ว..." className="w-full border border-gray-300 rounded-xl p-3 text-sm outline-none focus:ring-2 focus:ring-blue-500 bg-gray-50/50 resize-none transition-shadow" /></div>
                <div className="bg-gray-50 p-4 rounded-xl border border-gray-100 mb-6 space-y-3"><div className="flex justify-between text-sm"><span className="text-gray-600 font-medium">จำนวนรายการสแกน:</span><span className="font-bold text-gray-800">{scannedItems.length} รายการ</span></div><div className="flex justify-between text-sm items-center pt-2 border-t border-gray-200"><span className="text-gray-600 font-medium">รวมชิ้นสินค้า:</span><span className="font-black text-emerald-600 text-3xl">{scannedItems.reduce((sum, i) => sum + i.qty, 0)}</span></div></div>
                <button onClick={confirmReceipt} disabled={scannedItems.length === 0} className={`w-full py-4 rounded-xl font-black flex items-center justify-center transition-all text-lg shadow-md ${scannedItems.length > 0 ? 'bg-emerald-500 hover:bg-emerald-600 text-white active:scale-95' : 'bg-gray-200 text-gray-400 cursor-not-allowed shadow-none'}`}><PackagePlus className="mr-2" size={24} /> ยืนยันนำเข้าสต๊อก</button>
              </div>
            </div>
          )}
        </div>
      );
    };

    // --- COMPONENT: Goods Issue (เบิกจ่าย) ---
    const GoodsIssueComponent = ({ db, updateMultiple, showNotify, showAlert, showConfirm, getProduct }) => {
      const [scanInput, setScanInput] = useState('');
      const [issueItems, setIssueItems] = useState([]);
      const [reference, setReference] = useState('');
      const [issueRemark, setIssueRemark] = useState(''); 
      const [manualProduct, setManualProduct] = useState(''); 

      const handleScan = (e) => {
        if (e.key === 'Enter' && scanInput.trim() !== '') {
          const inputVal = scanInput.trim(); setScanInput(''); 
          const product = db.products.find(p => p.barcode === inputVal || p.id === inputVal || p.name === inputVal);
          if (!product) return showAlert('ค้นหาไม่พบ', 'ไม่พบสินค้านี้ในระบบ', 'error');
          addIssueItem(product);
        }
      };

      const handleManualAdd = () => {
        if (!manualProduct) return;
        const product = getProduct(manualProduct);
        if (!product) return showAlert('ค้นหาไม่พบ', 'ไม่พบรหัสสินค้านี้', 'error');
        addIssueItem(product);
        setManualProduct(''); 
      };

      const addIssueItem = (product) => {
        const existingItem = issueItems.find(i => i.productId === product.id);
        const currentReqQty = existingItem ? existingItem.qty : 0;
        if (currentReqQty + 1 > product.stock) return showAlert('สต๊อกไม่พอ', `สินค้า ${product.name} มีสต๊อกคงเหลือเพียง ${product.stock} ${product.unit}`, 'error');
        if (existingItem) setIssueItems(issueItems.map(i => i.productId === product.id ? { ...i, qty: i.qty + 1 } : i));
        else setIssueItems([...issueItems, { productId: product.id, qty: 1 }]);
      };

      const updateIssueQty = (productId, newQty) => {
        const qty = parseInt(newQty) || 0;
        const product = getProduct(productId);
        if (qty < 0) return;
        if (qty > product.stock) return showAlert('สต๊อกไม่พอ', `สินค้า ${product.name} มีสต๊อกคงเหลือเพียง ${product.stock} ${product.unit}`, 'error');
        if (qty === 0) setIssueItems(issueItems.filter(i => i.productId !== productId));
        else setIssueItems(issueItems.map(i => i.productId === productId ? { ...i, qty: qty } : i));
      };

      const confirmIssue = () => {
        if (issueItems.length === 0 || !reference) return showAlert('ข้อมูลไม่ครบ', 'กรุณาระบุ ผู้เบิก/อ้างอิง และสแกนสินค้าอย่างน้อย 1 รายการ', 'error');
        showConfirm('ยืนยันตัดสต๊อก', `ต้องการเบิกสินค้าจำนวน ${issueItems.length} รายการ ออกจากระบบใช่หรือไม่?`, () => {
          let updatedProducts = [...db.products];
          let newTransactions = [];
          const fullReference = issueRemark ? `${reference} (${issueRemark})` : reference;

          issueItems.forEach(item => {
            const prodIdx = updatedProducts.findIndex(p => p.id === item.productId);
            updatedProducts[prodIdx].stock -= item.qty;
            newTransactions.push({ id: `TXN-${Date.now()}-${Math.floor(Math.random()*100)}`, type: 'OUT', date: new Date().toISOString(), productId: item.productId, qty: item.qty, referenceNo: fullReference });
          });

          updateMultiple({ products: updatedProducts, transactions: [...newTransactions, ...db.transactions] });
          setIssueItems([]); setReference(''); setIssueRemark(''); showNotify('เบิกจ่ายสินค้าสำเร็จและตัดสต๊อกเรียบร้อย', 'success');
        });
      };

      return (
        <div className="space-y-6">
          <h2 className="text-2xl font-bold text-gray-800">เบิกจ่ายสินค้า (Goods Issue)</h2>
          <div className="grid grid-cols-1 xl:grid-cols-3 gap-6">
            <div className="xl:col-span-2 space-y-6">
              <div className="bg-white p-5 md:p-8 rounded-2xl shadow-sm border border-gray-100 space-y-6 print:hidden">
                <div><label className="block text-sm font-bold text-gray-700 mb-2">ผู้เบิก / เลขที่ใบเบิก / แผนก (Reference) <span className="text-red-500">*</span></label><input type="text" value={reference} onChange={(e) => setReference(e.target.value)} placeholder="เช่น แผนกผลิต JO-2026-001" className="w-full border-2 border-amber-100 rounded-xl p-3 outline-none focus:ring-4 focus:ring-amber-50 focus:border-amber-400 bg-amber-50/20 font-medium text-gray-800 transition-all" /></div>
                <div className="grid grid-cols-1 md:grid-cols-2 gap-6 pt-6 border-t border-gray-100">
                  <div className="bg-amber-50/50 p-4 rounded-xl border border-amber-100 shadow-inner"><label className="block text-amber-900 font-bold mb-3 flex items-center text-sm"><Barcode className="mr-2" size={18} /> สแกนบาร์โค้ด / พิมพ์รหัส / ชื่อ</label><input type="text" value={scanInput} onChange={(e) => setScanInput(e.target.value)} onKeyDown={handleScan} placeholder="สแกน หรือ พิมพ์ค้นหาที่นี่..." className="w-full p-3.5 text-lg font-mono border-2 border-amber-200 rounded-lg outline-none focus:border-amber-500 focus:ring-4 focus:ring-amber-100 transition-shadow bg-white" /></div>
                  <div className="bg-gray-50/50 p-4 rounded-xl border border-gray-100"><label className="block text-gray-700 font-bold mb-3 flex items-center text-sm"><Search className="mr-2 text-gray-400" size={18} /> เลือกสินค้าด้วยมือ (มีตัวช่วย)</label><div className="flex space-x-2"><input type="text" list="manual-product-list" value={manualProduct} onChange={e => setManualProduct(e.target.value)} placeholder="-- พิมพ์ชื่อหรือรหัสสินค้า --" className="w-full border border-gray-300 rounded-lg p-3 outline-none focus:border-amber-500 focus:ring-2 focus:ring-amber-100 bg-white" /><datalist id="manual-product-list">{db.products.filter(p => p.stock > 0).map(p => <option key={p.id} value={p.id}>[{p.id}] {p.name} (เหลือ {p.stock})</option>)}</datalist><button onClick={handleManualAdd} className="bg-slate-800 text-white px-4 rounded-lg hover:bg-slate-900 transition-colors shadow-sm"><Plus size={20} /></button></div></div>
                </div>
              </div>

              {issueItems.length > 0 && (
                <div className="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden print:overflow-visible print:border-none print:shadow-none animate-in fade-in">
                  <div className="bg-gray-50 px-6 py-4 border-b border-gray-100 flex items-center"><PackageMinus className="text-amber-600 mr-2" size={20} /><h3 className="font-bold text-gray-800">รายการสินค้าที่เตรียมเบิก</h3></div>
                  <div className="overflow-x-auto print:overflow-visible">
                    <table className="w-full text-left min-w-[600px]"><thead className="bg-white text-xs text-gray-500 border-b uppercase tracking-wider"><tr><th className="px-6 py-4 font-bold">สินค้า</th><th className="px-6 py-4 font-bold text-center w-28">มีในสต๊อก</th><th className="px-6 py-4 font-bold text-center w-36">จำนวนที่เบิก</th><th className="px-6 py-4 font-bold text-center w-20 print:hidden">จัดการ</th></tr></thead><tbody className="divide-y divide-gray-50">
                      {issueItems.map((item, idx) => {
                        const p = getProduct(item.productId);
                        return (
                          <tr key={idx} className="print:break-inside-avoid hover:bg-gray-50 transition-colors">
                            <td className="px-6 py-4"><div className="font-bold text-gray-800">{p.name}</div><div className="text-xs text-gray-400 font-mono mt-0.5">{p.id}</div></td>
                            <td className="px-6 py-4 text-center font-medium text-gray-500 text-lg">{p.stock}</td>
                            <td className="px-6 py-4 text-center"><input type="number" min="1" max={p.stock} value={item.qty} onChange={(e) => updateIssueQty(item.productId, e.target.value)} className="w-24 border-2 border-gray-200 rounded-lg p-2 text-center font-black text-amber-600 text-lg outline-none focus:ring-4 focus:ring-amber-100 focus:border-amber-400 transition-all" /></td>
                            <td className="px-6 py-4 text-center print:hidden"><button onClick={() => setIssueItems(issueItems.filter(i => i.productId !== item.productId))} className="text-red-500 hover:text-white hover:bg-red-500 p-2 rounded-lg transition-colors border border-transparent hover:border-red-600"><X size={20} /></button></td>
                          </tr>
                        );
                      })}
                    </tbody></table>
                  </div>
                </div>
              )}
            </div>

            <div className="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 h-fit sticky top-6 print:hidden">
              <h3 className="text-lg font-bold text-gray-800 mb-6 border-b border-gray-100 pb-3 flex items-center"><FileText size={18} className="mr-2 text-blue-600"/> สรุปการเบิกจ่าย</h3>
              <div className="mb-6"><label className="block text-sm font-bold text-gray-700 mb-2">หมายเหตุ (Optional)</label><textarea rows="3" value={issueRemark} onChange={(e) => setIssueRemark(e.target.value)} placeholder="เพิ่มเติม เช่น เบิกไปซ่อมเครื่องจักรเบอร์ 5..." className="w-full border border-gray-300 rounded-xl p-3 text-sm outline-none focus:ring-2 focus:ring-amber-500 bg-gray-50/50 resize-none transition-shadow" /></div>
              <div className="bg-gray-50 p-4 rounded-xl border border-gray-100 mb-6 space-y-3"><div className="flex justify-between text-sm"><span className="text-gray-600 font-medium">อ้างอิง:</span><span className="font-bold text-gray-800 truncate max-w-[140px]">{reference || '-'}</span></div><div className="flex justify-between text-sm"><span className="text-gray-600 font-medium">จำนวนรายการ:</span><span className="font-bold text-gray-800">{issueItems.length} รายการ</span></div><div className="flex justify-between text-sm items-center pt-2 border-t border-gray-200"><span className="text-gray-600 font-medium">รวมชิ้นเบิก:</span><span className="font-black text-amber-500 text-3xl">{issueItems.reduce((sum, i) => sum + i.qty, 0)}</span></div></div>
              <button onClick={confirmIssue} disabled={issueItems.length === 0 || !reference} className={`w-full py-4 rounded-xl font-black flex items-center justify-center transition-all text-lg shadow-md ${issueItems.length > 0 && reference ? 'bg-amber-500 hover:bg-amber-600 text-white active:scale-95' : 'bg-gray-200 text-gray-400 cursor-not-allowed shadow-none'}`}><PackageMinus className="mr-2" size={24} /> ยืนยันตัดสต๊อก</button>
            </div>
          </div>
        </div>
      );
    };

    // --- COMPONENT: Stock ---
    const StockComponent = ({ db, updateDb, showNotify, showAlert, showConfirm }) => {
      const [viewMode, setViewMode] = useState('card'); 
      const [searchTerm, setSearchTerm] = useState('');
      const [filterCat, setFilterCat] = useState('');
      const [filterLoc, setFilterLoc] = useState('');
      const [lowStockOnly, setLowStockOnly] = useState(false);
      
      const [isModalOpen, setIsModalOpen] = useState(false);
      const [formData, setFormData] = useState(null);

      const [printProducts, setPrintProducts] = useState([]);
      const [selectedIds, setSelectedIds] = useState([]);

      const categories = [...new Set(db.products.map(p => p.category).filter(Boolean))];
      const locations = [...new Set(db.products.map(p => p.location).filter(Boolean))];

      const filteredProducts = db.products.filter(p => {
        const matchSearch = p.name.toLowerCase().includes(searchTerm.toLowerCase()) || p.id.toLowerCase().includes(searchTerm.toLowerCase()) || (p.barcode && p.barcode.toLowerCase().includes(searchTerm.toLowerCase()));
        const matchCat = filterCat ? p.category === filterCat : true;
        const matchLoc = filterLoc ? p.location === filterLoc : true;
        const matchLow = lowStockOnly ? p.stock <= p.minStock : true;
        return matchSearch && matchCat && matchLoc && matchLow;
      });

      const handleAdd = () => { setFormData({ id: `P00${db.products.length + 1}`, barcode: '', name: '', category: '', location: '', unit: 'ชิ้น', price: 0, stock: 0, minStock: 10, image: '', isEdit: false }); setIsModalOpen(true); };
      const handleEdit = (product) => { setFormData({ ...product, isEdit: true }); setIsModalOpen(true); };
      const handleDelete = (id) => { showConfirm('ยืนยันการลบ', 'คุณต้องการลบสินค้ารหัสนี้ออกจากระบบอย่างถาวรใช่หรือไม่?', () => { updateDb('products', db.products.filter(p => p.id !== id)); showNotify('ลบสินค้าสำเร็จ', 'success'); }); };

      const handleSave = () => {
        if(!formData.id || !formData.name) return showAlert('ข้อมูลไม่ครบ', 'กรุณากรอกรหัสและชื่อสินค้าให้ครบถ้วน', 'error');
        if (formData.isEdit) { updateDb('products', db.products.map(p => p.id === formData.id ? formData : p)); showNotify('อัปเดตข้อมูลสินค้าสำเร็จ'); } 
        else {
          if(db.products.find(p => p.id === formData.id)) return showAlert('ข้อมูลซ้ำ', 'รหัสสินค้านี้มีในระบบแล้ว กรุณาใช้รหัสอื่น', 'error');
          updateDb('products', [formData, ...db.products]); showNotify('เพิ่มสินค้าใหม่สำเร็จ');
        }
        setIsModalOpen(false);
      };

      const handleQuickPrint = (product) => { setPrintProducts([product]); setTimeout(() => window.print(), 100); };
      const handleBulkPrint = () => { const itemsToPrint = db.products.filter(p => selectedIds.includes(p.id)); setPrintProducts(itemsToPrint); setTimeout(() => window.print(), 100); };

      const handleBulkDelete = () => {
        showConfirm('ยืนยันการลบแบบกลุ่ม', `คุณต้องการลบสินค้าที่เลือกจำนวน ${selectedIds.length} รายการ ใช่หรือไม่?`, () => {
          updateDb('products', db.products.filter(p => !selectedIds.includes(p.id))); setSelectedIds([]); showNotify(`ลบสินค้า ${selectedIds.length} รายการสำเร็จ`, 'success');
        });
      };

      const toggleSelectAll = (e) => { if (e.target.checked) setSelectedIds(filteredProducts.map(p => p.id)); else setSelectedIds([]); };
      const toggleSelect = (id) => { if (selectedIds.includes(id)) setSelectedIds(selectedIds.filter(itemId => itemId !== id)); else setSelectedIds([...selectedIds, id]); };

      return (
        <div className="space-y-6">
          <div className={`space-y-6 ${printProducts.length > 0 ? 'print:hidden' : ''}`}>
            <div className="flex flex-col md:flex-row justify-between items-start md:items-center space-y-4 md:space-y-0">
              <h2 className="text-2xl font-bold text-gray-800">จัดการสต๊อกสินค้า (Inventory)</h2>
              <div className="flex space-x-2 bg-white p-1 rounded-xl border border-gray-200 shadow-sm print:hidden">
                <button onClick={() => setViewMode('card')} className={`px-4 py-2 rounded-lg text-sm font-bold flex items-center transition-colors ${viewMode === 'card' ? 'bg-blue-50 text-blue-600' : 'text-gray-500 hover:bg-gray-50'}`}><LayoutGrid size={16} className="mr-2" /> แบบการ์ด</button>
                <button onClick={() => setViewMode('table')} className={`px-4 py-2 rounded-lg text-sm font-bold flex items-center transition-colors ${viewMode === 'table' ? 'bg-blue-50 text-blue-600' : 'text-gray-500 hover:bg-gray-50'}`}><LayoutList size={16} className="mr-2" /> แบบตาราง</button>
              </div>
            </div>

            <div className="bg-white p-4 md:p-5 rounded-2xl shadow-sm border border-gray-100 print:hidden flex flex-col xl:flex-row gap-4">
              <div className="flex-1 relative"><input type="text" placeholder="ค้นหารหัส, ชื่อ, บาร์โค้ด..." value={searchTerm} onChange={e => setSearchTerm(e.target.value)} className="pl-11 pr-4 py-3 w-full border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 transition-shadow" /><Search className="absolute left-4 top-3.5 text-gray-400" size={18} /></div>
              <div className="flex flex-col sm:flex-row gap-3 items-stretch sm:items-center w-full xl:w-auto">
                <label className="flex items-center justify-center cursor-pointer text-sm font-bold text-amber-700 bg-amber-50 px-4 py-3 rounded-xl border border-amber-200 whitespace-nowrap w-full sm:w-auto transition-colors hover:bg-amber-100"><input type="checkbox" className="mr-2 w-4 h-4 accent-amber-600" checked={lowStockOnly} onChange={e => setLowStockOnly(e.target.checked)} /><AlertTriangle size={18} className="mr-1.5" /> ใกล้หมด/หมดสต๊อก</label>
                <select value={filterCat} onChange={e => setFilterCat(e.target.value)} className="border border-gray-300 rounded-xl p-3 outline-none focus:ring-2 focus:ring-blue-500 w-full sm:w-36 md:w-auto font-medium text-gray-700 bg-white"><option value="">หมวดหมู่ทั้งหมด</option>{categories.map(c => <option key={c} value={c}>{c}</option>)}</select>
                <select value={filterLoc} onChange={e => setFilterLoc(e.target.value)} className="border border-gray-300 rounded-xl p-3 outline-none focus:ring-2 focus:ring-blue-500 w-full sm:w-36 md:w-auto font-medium text-gray-700 bg-white"><option value="">สถานที่เก็บทั้งหมด</option>{locations.map(l => <option key={l} value={l}>{l}</option>)}</select>
                <button onClick={handleAdd} className="bg-blue-600 text-white px-5 py-3 rounded-xl hover:bg-blue-700 flex items-center justify-center font-bold shadow-md transition-transform active:scale-95 whitespace-nowrap w-full sm:w-auto"><Plus size={18} className="mr-1.5" /> เพิ่มสินค้า</button>
              </div>
            </div>

            <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 print:hidden">
              {viewMode === 'card' && <label className="flex items-center cursor-pointer text-sm font-bold text-gray-700 bg-white px-5 py-2.5 rounded-xl shadow-sm border border-gray-200 hover:bg-gray-50 transition-colors w-full sm:w-auto justify-center sm:justify-start"><input type="checkbox" checked={selectedIds.length > 0 && selectedIds.length === filteredProducts.length} onChange={toggleSelectAll} className="w-4 h-4 rounded text-blue-600 focus:ring-blue-500 mr-3 border-gray-300 accent-blue-600" />เลือกทั้งหมด ({filteredProducts.length})</label>}
              {selectedIds.length > 0 && <div className="bg-blue-50 border border-blue-200 rounded-xl p-2.5 flex justify-between items-center w-full sm:w-auto sm:ml-auto animate-in fade-in slide-in-from-top-2 shadow-sm"><span className="text-blue-800 font-bold px-4 text-sm whitespace-nowrap">เลือกแล้ว {selectedIds.length} รายการ</span><div className="flex space-x-2"><button onClick={handleBulkPrint} className="bg-white border border-blue-300 text-blue-700 px-4 py-2 rounded-lg hover:bg-blue-100 flex items-center text-sm font-bold shadow-sm transition-colors whitespace-nowrap"><Printer size={16} className="mr-2" /> พิมพ์บาร์โค้ด</button><button onClick={handleBulkDelete} className="bg-white border border-red-300 text-red-600 px-4 py-2 rounded-lg hover:bg-red-50 flex items-center text-sm font-bold shadow-sm transition-colors whitespace-nowrap"><Trash2 size={16} className="mr-2" /> ลบ</button></div></div>}
            </div>

            {viewMode === 'card' ? (
              <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6 print:grid-cols-3 print:gap-4">
                {filteredProducts.length === 0 ? (
                  <div className="col-span-full bg-white p-12 text-center rounded-2xl border border-gray-100 flex flex-col items-center"><Box size={48} className="text-gray-300 mb-4" /><h3 className="text-lg font-bold text-gray-700 mb-1">ไม่พบสินค้า</h3><p className="text-gray-500">ลองเปลี่ยนคำค้นหา หรือล้างตัวกรอง</p></div>
                ) : (
                  filteredProducts.map(p => (
                    <div key={p.id} className={`bg-white rounded-2xl shadow-sm border ${p.stock <= p.minStock ? 'border-amber-300 shadow-amber-100' : 'border-gray-100'} ${selectedIds.includes(p.id) ? 'ring-2 ring-blue-500 border-blue-500 shadow-md' : ''} overflow-hidden hover:shadow-lg transition-all duration-300 print:border-gray-300 print:shadow-none print:break-inside-avoid flex flex-col`}>
                      <div className="aspect-[4/3] w-full bg-gray-50 relative overflow-hidden group">
